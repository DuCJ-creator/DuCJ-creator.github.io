
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shirley's Sudoku</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; user-select: none; }
    :root {
      --blue-dark: #01579b; --blue-mid: #0288d1; --blue-light: #e1f5fe;
      --blue-pale: #f0f9ff; --blue-select: #b3e5fc; --green: #4caf50;
      --red: #ef5350; --red-light: #ffcdd2; --yellow: #ffd54f;
      --gray: #b0bec5; --erase: #ff8a65; --box-border: #01579b; --cell-border: #b3d9f0;
    }
    html { font-size: clamp(12px, 2vw, 16px); }
    body { background: var(--blue-pale); color: var(--blue-dark); font-family: 'Nunito', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 10px 8px 32px; min-height: 100vh; overflow-y: auto; overflow-x: hidden; }
    h1 { font-size: clamp(1.2rem, 4vw, 1.8rem); font-weight: 900; color: var(--blue-mid); margin: 6px 0 4px; }
    .controls { display: flex; gap: 4px; margin: 6px 0; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 480px; align-items: center; }
    button { padding: 6px 10px; border: none; border-radius: 8px; font-family: 'Nunito', sans-serif; font-weight: 700; cursor: pointer; font-size: clamp(0.7rem, 1.8vw, 0.85rem); white-space: nowrap; touch-action: manipulation; transition: filter 0.15s, transform 0.1s; }
    button:active { transform: scale(0.95); filter: brightness(0.9); }
    .difficulty-btn { background: #b3e5fc; color: var(--blue-dark); }
    .difficulty-btn.active { background: var(--blue-mid); color: white; }
    #reset-btn { background: #4fc3f7; color: white; }
    #undo-btn { background: var(--gray); color: #263238; }
    #erase-btn { background: var(--erase); color: white; }
    #note-btn { background: var(--yellow); color: #5d4037; }
    #note-btn.active { background: #ffa000; color: white; }
    #check-btn { background: var(--green); color: white; }
    .timer { padding: 6px 12px; background: var(--blue-light); color: var(--blue-dark); border-radius: 999px; font-weight: 700; font-size: clamp(0.7rem, 1.8vw, 0.85rem); min-width: 75px; text-align: center; }
    .sudoku-container { margin: 8px 0 6px; background: white; border-radius: 12px; box-shadow: 0 3px 12px rgba(0,0,0,0.12); display: inline-flex; justify-content: center; overflow: hidden; flex-shrink: 0; }
    .grid { display: grid; background: var(--box-border); padding: 2px; gap: 0; }
    .cell { display: flex; align-items: center; justify-content: center; background: white; font-family: 'Nunito', sans-serif; font-weight: 800; cursor: pointer; touch-action: manipulation; position: relative; transition: background 0.1s; }
    .cell.given { color: var(--blue-dark); background: var(--blue-light) !important; }
    .cell.user { color: var(--blue-mid); }
    .cell.error { background: var(--red-light) !important; color: var(--red); }
    .cell.selected { background: var(--blue-select) !important; outline: 2.5px solid var(--blue-mid); outline-offset: -1px; }
    .cell.highlight { background: #e8f4fd; }
    .cell.same-num { background: #c5e5f7; }
    .note-grid { display: grid; width: 100%; height: 100%; padding: 1px; }
    .note-num { display: flex; align-items: center; justify-content: center; color: #607d8b; font-weight: 700; line-height: 1; }
    .note-num.active { color: var(--blue-mid); }
    .pad-row { display: flex; gap: 5px; margin-top: 8px; justify-content: center; width: 100%; max-width: 480px; flex-shrink: 0; }
    .num-btn { flex: 1; padding: clamp(7px, 2vw, 11px) 0; background: var(--blue-light); color: var(--blue-dark); font-family: 'Nunito', sans-serif; font-size: clamp(0.95rem, 3vw, 1.2rem); font-weight: 800; border-radius: 8px; border: none; cursor: pointer; touch-action: manipulation; transition: background 0.15s, transform 0.1s; }
    .num-btn:active { transform: scale(0.93); background: var(--blue-select); }
    .victory-wrap { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); justify-content: center; align-items: center; z-index: 1000; }
    .victory-wrap.show { display: flex; }
    .victory-content { background: white; border-radius: 20px; padding: clamp(20px,6vw,32px) clamp(24px,7vw,40px); text-align: center; max-width: 90%; }
    .victory-emoji { font-size: clamp(2.5rem,10vw,4rem); margin-bottom: 8px; }
    .victory-title { font-size: clamp(1.4rem,6vw,2.2rem); font-weight: 900; color: var(--blue-mid); margin-bottom: 6px; }
    .victory-time { font-size: clamp(0.9rem,3.5vw,1.2rem); color: #78909c; margin-bottom: 20px; }
    #close-victory { background: var(--blue-mid); color: white; padding: 10px 24px; border-radius: 10px; }
    .confetti { position: fixed; top: -20px; border-radius: 2px; opacity: 0.85; animation: fall linear forwards; }
    @keyframes fall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
    .message { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(1,87,155,0.92); color: white; padding: 10px 22px; border-radius: 12px; font-family: 'Nunito', sans-serif; font-size: clamp(0.85rem,3vw,1rem); font-weight: 700; z-index: 1001; opacity: 0; transition: opacity 0.25s, transform 0.25s; pointer-events: none; white-space: nowrap; }
    .message.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .hint { font-size: 0.68rem; color: #90a4ae; margin-top: 5px; text-align: center; }
  </style>
</head>
<body>
  <h1>✏️ Shirley's Sudoku</h1>
  <div class="controls">
    <button class="difficulty-btn" data-size="4">初學 4×4</button>
    <button class="difficulty-btn active" data-size="6">輕鬆 6×6</button>
    <button class="difficulty-btn" data-size="9">挑戰 9×9</button>
    <button id="reset-btn">🔄 重置</button>
    <button id="undo-btn">↩ 撤銷</button>
    <button id="erase-btn">🧹 清除</button>
    <button id="note-btn">✏️ 筆記</button>
    <button id="check-btn">✅ 完成確認</button>
    <span id="timer" class="timer">⌛ 00:00</span>
  </div>
  <div class="sudoku-container"><div class="grid" id="sudoku-grid"></div></div>
  <div class="pad-row" id="number-pad"></div>
  <p class="hint">方向鍵移動格子 · Delete/Space 清除 · 點同數字清除</p>
  <div class="victory-wrap" id="victory-overlay">
    <div class="victory-content">
      <div class="victory-emoji">🎉</div>
      <div class="victory-title" id="victory-title">數獨高手！</div>
      <div class="victory-time" id="victory-time">完成時間：00:00</div>
      <button id="close-victory">再玩一局</button>
    </div>
  </div>
  <div class="message" id="message"></div>

  <script>
    let currentSize = 6;
    let board = [], given = [], notes = [];
    let history = [];
    let noteMode = false;
    let selectedPos = null;
    let timerInterval = null, elapsedSeconds = 0;

    const difficulties = { 4:{boxH:2,boxW:2}, 6:{boxH:2,boxW:3}, 9:{boxH:3,boxW:3} };

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
      return a;
    }

    function updateTimerDisplay() {
      const m = String(Math.floor(elapsedSeconds/60)).padStart(2,'0');
      const s = String(elapsedSeconds%60).padStart(2,'0');
      document.getElementById('timer').textContent = `⌛ ${m}:${s}`;
    }
    function startTimer() { clearInterval(timerInterval); elapsedSeconds=0; updateTimerDisplay(); timerInterval=setInterval(()=>{elapsedSeconds++;updateTimerDisplay();},1000); }
    function stopTimer() { clearInterval(timerInterval); timerInterval=null; }

    // ── Core validation: is num at (row,col) in grid valid per Sudoku rules? ──
    // Excludes the cell itself so works for both placement and checking.
    function isValidPlacement(grid, row, col, num, size) {
      if (num === 0) return true;
      const {boxH, boxW} = difficulties[size];
      for (let x = 0; x < size; x++) {
        if (x !== col && grid[row][x] === num) return false;
        if (x !== row && grid[x][col] === num) return false;
      }
      const r0 = row - (row % boxH), c0 = col - (col % boxW);
      for (let i = 0; i < boxH; i++)
        for (let j = 0; j < boxW; j++) {
          const r=r0+i, c=c0+j;
          if ((r!==row||c!==col) && grid[r][c]===num) return false;
        }
      return true;
    }

    // ── Backtracking solver. Returns true if solved, mutates grid. ──
    function solveGrid(grid, size) {
      for (let row=0; row<size; row++)
        for (let col=0; col<size; col++)
          if (grid[row][col]===0) {
            for (const num of shuffle([...Array(size).keys()].map(n=>n+1))) {
              if (isValidPlacement(grid,row,col,num,size)) {
                grid[row][col]=num;
                if (solveGrid(grid,size)) return true;
                grid[row][col]=0;
              }
            }
            return false;
          }
      return true;
    }

    // ── Count solutions (capped at 2) to detect uniqueness ──
    function countSolutions(grid, size, cap=2) {
      let count = 0;
      function bt() {
        for (let row=0; row<size; row++)
          for (let col=0; col<size; col++)
            if (grid[row][col]===0) {
              for (let num=1; num<=size; num++) {
                if (isValidPlacement(grid,row,col,num,size)) {
                  grid[row][col]=num;
                  bt();
                  grid[row][col]=0;
                  if (count >= cap) return;
                }
              }
              return;
            }
        count++;
      }
      bt();
      return count;
    }

    // ── Puzzle generation with guaranteed unique solution ──
    function generatePuzzle(size) {
      // 1. Fill a complete valid grid
      const full = Array.from({length:size}, ()=>Array(size).fill(0));
      solveGrid(full, size);

      // 2. Start with full board as givens
      board = full.map(r=>[...r]);
      given = Array.from({length:size}, ()=>Array(size).fill(true));
      notes = Array.from({length:size}, ()=>Array.from({length:size}, ()=>new Set()));

      // 3. Remove cells one by one, only if puzzle stays uniquely solvable
      const targetRemove = size===4 ? 8 : size===6 ? 16 : 45;
      const cells = shuffle(Array.from({length:size*size},(_,k)=>[Math.floor(k/size),k%size]));
      let removed = 0;

      for (const [i,j] of cells) {
        if (removed >= targetRemove) break;
        const saved = board[i][j];
        board[i][j] = 0;
        // Check uniqueness on a copy to avoid mutating board
        const copy = board.map(r=>[...r]);
        if (countSolutions(copy, size, 2) === 1) {
          given[i][j] = false;
          removed++;
        } else {
          board[i][j] = saved; // restore if ambiguous
        }
      }
    }

    function getCellSize() {
      const maxGrid = Math.min(window.innerWidth - 24, 420);
      return Math.floor(maxGrid / currentSize);
    }
    function getFontSizes(cs) { return { base: Math.max(10,Math.floor(cs*0.45)), note: Math.max(6,Math.floor(cs*0.22)) }; }

    function renderNoteContent(cell, cellNotes, cs) {
      const size=currentSize, {note:nf}=getFontSizes(cs);
      const cols=size<=4?2:3, rows=Math.ceil(size/cols);
      const g=document.createElement('div');
      g.className='note-grid';
      g.style.gridTemplateColumns=`repeat(${cols},1fr)`;
      g.style.gridTemplateRows=`repeat(${rows},1fr)`;
      for (let n=1;n<=size;n++) {
        const sp=document.createElement('span');
        sp.className='note-num'+(cellNotes.has(n)?' active':'');
        sp.textContent=cellNotes.has(n)?n:'';
        sp.style.fontSize=nf+'px';
        g.appendChild(sp);
      }
      cell.innerHTML=''; cell.appendChild(g);
    }

    function renderGrid() {
      const gridEl=document.getElementById('sudoku-grid');
      const size=currentSize;
      gridEl.style.gridTemplateColumns=`repeat(${size},1fr)`;
      gridEl.innerHTML='';
      const cs=getCellSize(), {base:bf}=getFontSizes(cs), {boxH,boxW}=difficulties[size];
      for (let i=0;i<size;i++) for (let j=0;j<size;j++) {
        const cell=document.createElement('div');
        cell.className='cell'; cell.dataset.row=i; cell.dataset.col=j;
        cell.style.width=cell.style.height=cs+'px';
        cell.style.border=`1px solid var(--cell-border)`;
        if (i%boxH===0) cell.style.borderTop='3px solid var(--box-border)';
        if (j%boxW===0) cell.style.borderLeft='3px solid var(--box-border)';
        if (i===size-1) cell.style.borderBottom='3px solid var(--box-border)';
        if (j===size-1) cell.style.borderRight='3px solid var(--box-border)';
        fillCell(cell,i,j,cs,bf);
        cell.addEventListener('pointerdown', e=>{ e.preventDefault(); selectCell(i,j); });
        gridEl.appendChild(cell);
      }
      if (selectedPos) applyHighlights();
    }

    function fillCell(cell, row, col, cs, bf) {
      cs=cs||getCellSize(); bf=bf||getFontSizes(cs).base;
      cell.classList.remove('given','user','error','note-cell');
      cell.innerHTML=''; cell.style.fontSize=bf+'px';
      if (given[row][col]) { cell.textContent=board[row][col]; cell.classList.add('given'); return; }
      const val=board[row][col], cn=notes[row][col];
      if (val!==0) {
        cell.textContent=val; cell.classList.add('user');
        // Show conflict (same number in same row/col/box)
        if (!isValidPlacement(board,row,col,val,currentSize)) cell.classList.add('error');
      } else if (cn&&cn.size>0) {
        cell.classList.add('note-cell'); renderNoteContent(cell,cn,cs);
      }
    }

    function updateCellDisplay(row,col) { const c=document.querySelector(`.cell[data-row="${row}"][data-col="${col}"]`); if(c) fillCell(c,row,col); }

    function refreshAllErrors() {
      for (let i=0;i<currentSize;i++) for (let j=0;j<currentSize;j++) if (!given[i][j]&&board[i][j]!==0) updateCellDisplay(i,j);
    }

    function applyHighlights() {
      document.querySelectorAll('.cell').forEach(c=>c.classList.remove('highlight','same-num','selected'));
      if (!selectedPos) return;
      const {row,col}=selectedPos, {boxH,boxW}=difficulties[currentSize];
      const r0=row-(row%boxH), c0=col-(col%boxW), selVal=board[row][col];
      document.querySelectorAll('.cell').forEach(c=>{
        const r=+c.dataset.row, cl=+c.dataset.col;
        if (r===row&&cl===col) c.classList.add('selected');
        else if (r===row||cl===col||(r>=r0&&r<r0+boxH&&cl>=c0&&cl<c0+boxW)) c.classList.add('highlight');
        if (selVal!==0&&board[r][cl]===selVal&&!(r===row&&cl===col)) c.classList.add('same-num');
      });
    }

    function selectCell(row,col) { selectedPos={row,col}; applyHighlights(); }

    function renderNumberPad() {
      const pad=document.getElementById('number-pad'); pad.innerHTML='';
      for (let n=1;n<=currentSize;n++) {
        const btn=document.createElement('button'); btn.className='num-btn'; btn.textContent=n;
        btn.addEventListener('pointerdown', e=>{ e.preventDefault(); inputNumber(n); });
        pad.appendChild(btn);
      }
    }

    function recordHistory(row,col,pv,nv,pn,nn) { history.push({row,col,prevValue:pv,newValue:nv,prevNotes:new Set(pn),newNotes:new Set(nn)}); }

    function eraseCell() {
      if (!selectedPos) return;
      const {row,col}=selectedPos; if (given[row][col]) return;
      const pv=board[row][col], pn=new Set(notes[row][col]||[]);
      if (pv===0&&pn.size===0) return;
      board[row][col]=0; notes[row][col]=new Set();
      recordHistory(row,col,pv,0,pn,new Set());
      updateCellDisplay(row,col); refreshAllErrors(); applyHighlights();
    }

    function toggleNote(num) {
      if (!selectedPos) return;
      const {row,col}=selectedPos; if (given[row][col]||board[row][col]!==0) return;
      const cn=notes[row][col]||new Set(), pn=new Set(cn);
      cn.has(num)?cn.delete(num):cn.add(num);
      notes[row][col]=cn; recordHistory(row,col,0,0,pn,cn);
      updateCellDisplay(row,col); applyHighlights();
    }

    function inputNumber(num) {
      if (!selectedPos) return;
      const {row,col}=selectedPos; if (given[row][col]) return;
      if (noteMode) { toggleNote(num); return; }
      const pv=board[row][col], pn=new Set(notes[row][col]||[]);
      if (pv===num) { board[row][col]=0; notes[row][col]=new Set(); recordHistory(row,col,pv,0,pn,new Set()); }
      else { board[row][col]=num; notes[row][col]=new Set(); recordHistory(row,col,pv,num,pn,new Set()); }
      updateCellDisplay(row,col); refreshAllErrors(); applyHighlights();
      if (isBoardFull() && isBoardCorrect()) setTimeout(showVictory, 200);
    }

    function isBoardFull() {
      for (let i=0;i<currentSize;i++) for (let j=0;j<currentSize;j++) if (board[i][j]===0) return false;
      return true;
    }

    // ── KEY FIX: validate by Sudoku rules, NOT by comparing to stored solution ──
    // This accepts any valid completion of the puzzle, not just the one we generated.
    function isBoardCorrect() {
      const size=currentSize;
      for (let i=0;i<size;i++) for (let j=0;j<size;j++) {
        if (board[i][j]===0) return false;
        if (!isValidPlacement(board,i,j,board[i][j],size)) return false;
      }
      return true;
    }

    function undoLast() {
      const action=history.pop(); if (!action) return;
      const {row,col,prevValue,prevNotes}=action;
      board[row][col]=prevValue; notes[row][col]=new Set(prevNotes);
      updateCellDisplay(row,col); refreshAllErrors(); applyHighlights();
    }

    window.addEventListener('keydown', e=>{
      if (e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
        e.preventDefault();
        if (!selectedPos) { selectCell(0,0); return; }
        let {row,col}=selectedPos;
        if (e.key==='ArrowUp') row=Math.max(0,row-1);
        if (e.key==='ArrowDown') row=Math.min(currentSize-1,row+1);
        if (e.key==='ArrowLeft') col=Math.max(0,col-1);
        if (e.key==='ArrowRight') col=Math.min(currentSize-1,col+1);
        selectCell(row,col); return;
      }
      if (['Delete','Backspace',' '].includes(e.key)) { e.preventDefault(); eraseCell(); return; }
      const num=parseInt(e.key);
      if (!isNaN(num)&&num>=1&&num<=currentSize) { e.preventDefault(); inputNumber(num); }
    });

    function updateNoteButtonUI() {
      const btn=document.getElementById('note-btn');
      btn.classList.toggle('active',noteMode);
      btn.textContent=noteMode?'✏️ 筆記中':'✏️ 筆記';
    }

    function initGame(size) {
      currentSize=size;
      document.querySelectorAll('.difficulty-btn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.size)===size));
      history=[]; noteMode=false; updateNoteButtonUI(); selectedPos=null;
      generatePuzzle(size); renderGrid(); renderNumberPad(); startTimer();
    }

    function showVictory() {
      stopTimer();
      const m=String(Math.floor(elapsedSeconds/60)).padStart(2,'0'), s=String(elapsedSeconds%60).padStart(2,'0');
      const titles={4:'數獨新手 🌱',6:'數獨高手 🌟',9:'數獨王者 👑'};
      document.getElementById('victory-title').textContent=titles[currentSize];
      document.getElementById('victory-time').textContent=`完成時間：${m}:${s}`;
      document.querySelectorAll('.confetti').forEach(c=>c.remove());
      createConfetti();
      document.getElementById('victory-overlay').classList.add('show');
    }

    function createConfetti() {
      const colors=['#f44336','#e91e63','#9c27b0','#3f51b5','#2196f3','#00bcd4','#4CAF50','#ff9800','#ffeb3b','#00e676'];
      for (let i=0;i<80;i++) {
        const c=document.createElement('div'); c.className='confetti';
        c.style.left=Math.random()*100+'vw'; c.style.backgroundColor=colors[Math.floor(Math.random()*colors.length)];
        c.style.width=(Math.random()*8+6)+'px'; c.style.height=(Math.random()*8+6)+'px';
        c.style.borderRadius=Math.random()>0.5?'50%':'2px';
        const dur=(Math.random()*2.5+2).toFixed(1), delay=(Math.random()*1.5).toFixed(1);
        c.style.animationDuration=dur+'s'; c.style.animationDelay=delay+'s';
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),(parseFloat(dur)+parseFloat(delay))*1000+200);
      }
    }

    let msgTimeout;
    function showMessage(text) {
      const msg=document.getElementById('message'); msg.textContent=text;
      clearTimeout(msgTimeout); msg.classList.add('show');
      msgTimeout=setTimeout(()=>msg.classList.remove('show'),1800);
    }

    function bind(id,fn) { document.getElementById(id).addEventListener('pointerdown',e=>{e.preventDefault();fn();}); }

    document.querySelectorAll('.difficulty-btn').forEach(btn=>{ btn.addEventListener('pointerdown',e=>{e.preventDefault();initGame(parseInt(btn.dataset.size));}); });
    bind('reset-btn', ()=>initGame(currentSize));
    bind('undo-btn', undoLast);
    bind('erase-btn', eraseCell);
    bind('note-btn', ()=>{noteMode=!noteMode;updateNoteButtonUI();});
    bind('check-btn', ()=>{
      if (!isBoardFull()) { showMessage('還沒填完喔！'); return; }
      if (isBoardCorrect()) showVictory();
      else showMessage('再看一下 🤔');
    });
    bind('close-victory', ()=>{ document.getElementById('victory-overlay').classList.remove('show'); initGame(currentSize); });

    window.addEventListener('resize', ()=>renderGrid());
    initGame(6);
  </script>
</body>
</html>
