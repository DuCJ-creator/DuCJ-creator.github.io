<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shirley's Toolbox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --denim: #1B3A6B;
  --denim-deep: #0f2444;
  --denim-mid: #244d8a;
  --denim-light: #2d5fa3;
  --burgundy: #7B1C35;
  --burgundy-deep: #540f22;
  --burgundy-mid: #9c2440;
  --burgundy-bright: #b82d4d;
  --cream: #f5efe6;
  --gold: #c9a84c;
  --gold-light: #e2c47a;
  --white: #ffffff;
}

body {
  min-height: 100vh;
  background: var(--denim-deep);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 4px),
    repeating-linear-gradient(90deg, rgba(255,255,255,0.008) 0px, rgba(255,255,255,0.008) 1px, transparent 1px, transparent 6px);
}

.hero {
  position: relative; z-index: 1;
  text-align: center;
  padding: 3.5rem 2rem 2rem;
  background: linear-gradient(180deg, var(--burgundy-deep) 0%, var(--denim-deep) 100%);
  border-bottom: 3px solid var(--gold);
}

.hero-badge {
  display: inline-block;
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--gold-light);
  border: 1px solid var(--gold);
  padding: 5px 18px;
  border-radius: 2px;
  margin-bottom: 1.4rem;
}

.hero-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.8rem, 7vw, 5rem);
  font-weight: 900;
  letter-spacing: 0.04em;
  line-height: 1;
  color: var(--white);
  text-shadow: 0 2px 20px rgba(0,0,0,0.5);
  margin-bottom: 0.5rem;
}

.hero-title em {
  font-style: italic;
  color: var(--gold-light);
}

.hero-sub {
  font-family: 'Playfair Display', serif;
  font-size: 1.05rem;
  font-style: italic;
  font-weight: 400;
  color: rgba(255,255,255,0.65);
  letter-spacing: 0.06em;
}

.hero-rule {
  display: flex; align-items: center; gap: 14px;
  margin: 1.6rem auto 0;
  max-width: 360px;
}
.hero-rule-line { flex: 1; height: 1px; background: var(--gold); opacity: 0.5; }
.hero-rule-diamond { width: 8px; height: 8px; background: var(--gold); transform: rotate(45deg); }

.container {
  position: relative; z-index: 1;
  max-width: 1060px;
  margin: 0 auto;
  padding: 2.8rem 1.6rem 5rem;
  display: flex;
  flex-direction: column;
  gap: 3rem;
}

.cat-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 1.2rem;
  padding: 14px 18px;
  border-radius: 6px 6px 0 0;
  position: relative;
}

.cat-num {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  font-weight: 900;
  font-style: italic;
  opacity: 0.25;
  line-height: 1;
  flex-shrink: 0;
  color: var(--white);
}

.cat-text { flex: 1; }

.cat-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem;
  font-weight: 700;
  letter-spacing: 0.02em;
  color: var(--white);
  line-height: 1.1;
}

.cat-sub {
  font-size: 0.72rem;
  font-weight: 400;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.75);
  margin-top: 3px;
}

.cat-icon { font-size: 24px; flex-shrink: 0; opacity: 0.85; }

.cat-time .cat-header    { background: linear-gradient(135deg, var(--denim) 0%, var(--denim-mid) 100%); border-left: 4px solid var(--gold); }
.cat-class .cat-header   { background: linear-gradient(135deg, var(--burgundy) 0%, var(--burgundy-mid) 100%); border-left: 4px solid var(--gold); }
.cat-teach .cat-header   { background: linear-gradient(135deg, var(--denim-mid) 0%, #1d4e8f 100%); border-left: 4px solid var(--burgundy-bright); }
.cat-subject .cat-header { background: linear-gradient(135deg, var(--burgundy-deep) 0%, var(--burgundy) 100%); border-left: 4px solid var(--gold); }
.cat-fun .cat-header     { background: linear-gradient(135deg, #1a2f55 0%, var(--denim) 100%); border-left: 4px solid var(--burgundy-bright); }

.tools-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
  gap: 8px;
  background: rgba(15,36,68,0.5);
  border: 1px solid rgba(201,168,76,0.2);
  border-top: none;
  border-radius: 0 0 6px 6px;
  padding: 14px;
}

.tool-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 11px 13px;
  border-radius: 4px;
  background: rgba(255,255,255,0.055);
  border: 1px solid rgba(255,255,255,0.1);
  cursor: pointer;
  transition: background 0.18s, border-color 0.18s, transform 0.18s;
  text-align: left;
  gap: 6px;
}

.tool-btn:hover {
  background: rgba(255,255,255,0.1);
  border-color: var(--gold);
  transform: translateY(-2px);
}

.tool-btn.active {
  background: rgba(201,168,76,0.15);
  border-color: var(--gold);
}

.tool-names { flex: 1; min-width: 0; }

.tool-name {
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--white);
  line-height: 1.3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.tool-cn {
  font-size: 0.65rem;
  color: rgba(255,255,255,0.5);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.tool-arr {
  font-size: 10px;
  color: var(--gold);
  opacity: 0.6;
  flex-shrink: 0;
  transition: opacity 0.2s, transform 0.2s;
}
.tool-btn:hover .tool-arr { opacity: 1; transform: translate(2px,-2px); }

/* iFrame Panel */
.frame-panel {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: rgba(10,20,40,0.92);
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
}

.frame-panel.open { display: flex; }

.frame-topbar {
  width: 100%;
  background: linear-gradient(90deg, var(--burgundy-deep), var(--denim-deep));
  border-bottom: 2px solid var(--gold);
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 16px;
  height: 52px;
  flex-shrink: 0;
}

.frame-title-text {
  flex: 1;
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  font-weight: 700;
  color: var(--white);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.frame-title-cn {
  font-size: 0.7rem;
  color: rgba(255,255,255,0.55);
  font-weight: 300;
  flex-shrink: 0;
}

.frame-close {
  width: 34px; height: 34px;
  border-radius: 4px;
  background: rgba(123,28,53,0.5);
  border: 1px solid var(--burgundy-bright);
  color: var(--white);
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s;
  font-family: monospace;
}
.frame-close:hover { background: var(--burgundy); }

.frame-open-btn {
  height: 34px;
  padding: 0 12px;
  border-radius: 4px;
  background: rgba(201,168,76,0.12);
  border: 1px solid var(--gold);
  color: var(--gold-light);
  font-size: 0.72rem;
  font-weight: 500;
  cursor: pointer;
  display: flex; align-items: center; gap: 5px;
  flex-shrink: 0;
  transition: background 0.15s;
  letter-spacing: 0.04em;
  white-space: nowrap;
}
.frame-open-btn:hover { background: rgba(201,168,76,0.25); }

.frame-wrapper {
  flex: 1;
  width: 100%;
  position: relative;
  overflow: hidden;
}

.frame-wrapper iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
  background: #fff;
}

.frame-loading {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: var(--denim-deep);
  color: rgba(255,255,255,0.5);
  font-size: 0.85rem;
  gap: 12px;
  pointer-events: none;
  transition: opacity 0.3s;
}
.frame-loading.hidden { opacity: 0; pointer-events: none; }

.spinner {
  width: 32px; height: 32px;
  border: 2px solid rgba(201,168,76,0.2);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.footer {
  position: relative; z-index: 1;
  text-align: center;
  padding: 1rem 0 2.5rem;
  font-family: 'Playfair Display', serif;
  font-size: 0.85rem;
  font-style: italic;
  color: rgba(255,255,255,0.25);
  letter-spacing: 0.1em;
  border-top: 1px solid rgba(201,168,76,0.15);
}

@media (max-width: 500px) {
  .tools-grid { grid-template-columns: repeat(2, 1fr); }
  .hero-title { font-size: 2.4rem; }
  .frame-title-cn { display: none; }
  .frame-open-btn span { display: none; }
}
</style>
</head>
<body>

<div class="frame-panel" id="framePanel">
  <div class="frame-topbar">
    <button class="frame-close" id="frameClose" aria-label="Close">✕</button>
    <div class="frame-title-text" id="frameTitleText">Tool</div>

    <button class="frame-open-btn" id="frameOpenBtn">↗ <span>Open in new tab</span></button>
  </div>
  <div class="frame-wrapper">
    <div class="frame-loading" id="frameLoading">

    </div>

<div class="hero">

    <div class="tools-grid">

      <button class="tool-btn" data-url="https://ducj-creator.github.io/Shirley%20Dice2.html" data-en="Lucky Dice" data-cn="幸運骰"><div class="tool-names"><div class="tool-name">Lucky Dice</div><div class="tool-cn">幸運骰</div></div><span class="tool-arr">▶</span></button>

<script>
const panel = document.getElementById('framePanel');
const frame = document.getElementById('mainFrame');
const loading = document.getElementById('frameLoading');
const titleText = document.getElementById('frameTitleText');
const titleCn = document.getElementById('frameTitleCn');
const openBtn = document.getElementById('frameOpenBtn');
let currentUrl = '';
let activeBtn = null;
let loadTimer = null;

document.querySelectorAll('.tool-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const url = btn.dataset.url;
    const en = btn.dataset.en;
    const cn = btn.dataset.cn;

    // If clicking the same tool that's already open, do nothing
    if (activeBtn === btn && panel.classList.contains('open')) return;

    if (activeBtn) activeBtn.classList.remove('active');
    btn.classList.add('active');
    activeBtn = btn;
    currentUrl = url;

    titleText.textContent = en;
    titleCn.textContent = cn;

    // Show panel and spinner
    loading.classList.remove('hidden');
    loading.style.opacity = '1';
    panel.classList.add('open');
    document.body.style.overflow = 'hidden';

    // Clear any pending load timer
    if (loadTimer) clearTimeout(loadTimer);

    // Reset iframe cleanly
    frame.src = 'about:blank';

    // Wait for panel to be fully painted + sized before loading the real URL
    loadTimer = setTimeout(() => {
      frame.src = url;
    }, 80);
  });
});

frame.addEventListener('load', () => {
  // Ignore the about:blank load event — only hide spinner for real URLs
  try {
    if (frame.contentWindow && frame.contentWindow.location.href === 'about:blank') return;
  } catch(e) {
    // Cross-origin frames throw on .href access — that means a real page loaded, hide spinner
  }
  loading.style.opacity = '0';
  setTimeout(() => { loading.classList.add('hidden'); }, 300);
});

function closePanel() {
  panel.classList.remove('open');
  document.body.style.overflow = '';
  if (loadTimer) clearTimeout(loadTimer);
  frame.src = 'about:blank';
  loading.classList.remove('hidden');
  loading.style.opacity = '1';
  if (activeBtn) { activeBtn.classList.remove('active'); activeBtn = null; }
}

document.getElementById('frameClose').addEventListener('click', closePanel);

openBtn.addEventListener('click', () => {
  if (currentUrl) window.open(currentUrl, '_blank');
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && panel.classList.contains('open')) closePanel();
});
</script>
</body>
</html>
