<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodie Match 黃金盛典 ✨  Shirley 版</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Noto+Sans+TC:wght@500;700&display=swap');

        :root {
            --primary: #4ECDC4;
            --accent: #FF6B6B;
            --success: #6BCB77;
            --warning: #FFD93D;
            --text: #2C3E50;
            --bg-sky: #87CEEB;
            --bg-cloud: #E0F7FA;
            --gold: #FFD700;
        }

        body {
            font-family: 'Fredoka', 'Noto Sans TC', sans-serif;
            background: linear-gradient(180deg, var(--bg-sky) 0%, var(--bg-cloud) 100%);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
        }

        /* 漂浮雲朵 (更多層) */
        body::before, body::after, .cloud-deco {
            content: "☁️";
            position: absolute;
            font-size: 5rem;
            opacity: 0.5;
            pointer-events: none;
            z-index: 0;
        }
        body::before { top: 5%; left: 5%; animation: float 28s infinite; }
        body::after { top: 15%; right: 8%; font-size: 6rem; animation: float 32s infinite reverse; }
        .cloud-deco { content: "☁️"; top: 70%; left: 15%; font-size: 4rem; animation: float 24s infinite; }
        @keyframes float { 
            0% { transform: translateX(-20px) translateY(0); } 
            50% { transform: translateX(30px) translateY(-15px); } 
            100% { transform: translateX(-20px) translateY(0); } 
        }

        #app {
            background: rgba(255, 255, 255, 0.96);
            width: 90%; max-width: 720px; height: 96vh;
            border-radius: 40px;
            box-shadow: 0 20px 0 rgba(0,0,0,0.1), 0 30px 50px rgba(0,0,0,0.25);
            padding: 18px;
            box-sizing: border-box;
            display: flex; flex-direction: column; position: relative;
            border: 6px solid #FFF;
            z-index: 20;
            backdrop-filter: blur(2px);
        }

        /* HUD 美化 */
        .hud-bar {
            display: flex; justify-content: space-between;
            background: #fef9e7; padding: 10px 20px;
            border-radius: 60px; margin-bottom: 12px;
            font-size: 1.3rem; font-weight: 700; color: #3e4b5e;
            box-shadow: 0 4px 0 #d4c9b0, inset 0 2px 8px white;
            border: 1px solid #fff2c0;
        }

        .question-area {
            background: #fffbf0;
            border-radius: 50px;
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 12px;
            box-shadow: inset 0 -3px 0 #ffe1a8, 0 8px 12px rgba(0,0,0,0.05);
            border: 2px solid #fad689;
        }

        .emoji-display {
            font-size: 7rem;
            margin-bottom: 5px;
            filter: drop-shadow(4px 8px 0 rgba(0,0,0,0.1));
            animation: subtleBounce 3s infinite;
        }
        @keyframes subtleBounce { 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-6px); } }

        /* 收集槽 (更精緻) */
        .answer-slot {
            display: flex;
            gap: 15px;
            background: #efdbc1;
            padding: 12px 20px;
            border-radius: 80px;
            width: 90%;
            justify-content: center;
            min-height: 70px;
            box-shadow: inset 0 4px 8px #caaf87;
        }

        .slot-item {
            flex: 1;
            background: #fffae7;
            border: 3px dashed #b2956a;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: #a7865f;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 10px;
            box-shadow: 0 2px 0 #9c7e5a;
        }

        .slot-item.filled {
            border-style: solid;
            color: white;
            transform: scale(1.05) rotate(0.5deg);
            box-shadow: 0 6px 0 rgba(0,0,0,0.15);
            text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
        }
        .slot-item.filled-cn { background: var(--primary); border-color: #1f8a7c; }
        .slot-item.filled-en { background: var(--accent); border-color: #b14545; font-family: 'Fredoka'; letter-spacing: 1px; }

        .timer-wrap {
            width: 100%; height: 14px; background: #edd9b0; border-radius: 20px; margin: 8px 0 12px; overflow: hidden;
            border: 2px solid #c9a96b;
        }
        .timer-fill { height: 100%; background: #6BCB77; width: 100%; transition: width 0.1s linear; border-radius: 20px; }

        #hint-text {
            color: #4a6fa5; margin-bottom: 8px; font-weight: 700; font-size: 1.2rem;
            background: #fef5d4; padding: 6px 20px; border-radius: 40px; display: inline-block;
            border: 2px solid #ffe29c;
        }

        .options-grid {
            display: grid; width: 100%; gap: 12px; margin-top: 8px; flex-grow: 1;
            align-content: center;
        }

        button.opt-btn {
            border: none; cursor: pointer;
            background: white; color: var(--text);
            border: 4px solid #ddd; box-shadow: 0 5px 0 #bbb;
            border-radius: 30px; padding: 16px;
            font-size: 1.7rem; font-weight: 600;
            transition: all 0.08s linear;
            position: relative;
            font-family: inherit;
        }
        
        button.opt-btn:active { top: 5px; box-shadow: none; }
        button.opt-btn:disabled { opacity: 0.5; pointer-events: none; top: 0; box-shadow: 0 5px 0 #bbb; }
        
        .phase-cn button.opt-btn { border-color: var(--primary); color: #1f5f5a; background: #f0fefa; }
        .phase-cn button.opt-btn:hover { background: #d5f5f0; transform: scale(1.02); }

        .phase-en button.opt-btn { border-color: var(--accent); color: #a14444; background: #fff3f3; }
        .phase-en button.opt-btn:hover { background: #ffe0e0; transform: scale(1.02); }

        .screen { display: none; flex-direction: column; height: 100%; align-items: center; justify-content: center; text-align: center; }
        .screen.active { display: flex; }

        .btn-large {
            background: var(--accent); color: white; font-size: 2rem; padding: 16px 48px; border-radius: 60px;
            border: none; box-shadow: 0 7px 0 #b14545; margin-top: 25px; cursor: pointer; font-weight: 700;
            transition: 0.06s linear;
        }
        .btn-large:active { transform: translateY(7px); box-shadow: none; }

        .feedback-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(255,250,240,0.9);
            display: none; align-items: center; justify-content: center; z-index: 200;
            flex-direction: column;
            backdrop-filter: blur(6px);
            border-radius: 40px;
        }
        #fb-icon { font-size: 7rem; filter: drop-shadow(0 8px 6px #00000030); }
        #fb-text { font-size: 3rem; font-weight: 900; margin-top: 10px; text-shadow: 3px 3px 0 #ffffff; }

        .golden-trophy {
            font-size: 9rem;
            text-shadow: 0 0 15px gold, 0 0 30px orange, 0 0 60px #ffb347;
            animation: trophyShine 1.2s ease-in-out infinite alternate;
        }
        @keyframes trophyShine {
            from { transform: scale(1); filter: brightness(1); }
            to { transform: scale(1.2); filter: brightness(1.3) drop-shadow(0 0 25px gold); }
        }

        .confetti {
            position: absolute; z-index: 10; width: 12px; height: 12px;
            background: #f00; top: -20px;
            animation: fall linear forwards;
        }
        @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }

        /* 裝飾小星星 */
        .star-deco { position: absolute; font-size: 2rem; opacity: 0.4; pointer-events: none; z-index: 1; }
    </style>
</head>
<body>
<div class="cloud-deco">☁️</div>
<div id="app">
    <div id="start-screen" class="screen active">
        <div style="font-size: 7rem; margin-bottom: 10px; filter: drop-shadow(0 8px 4px #c7a36b);">🧩🍱🔡</div>
        <h1 style="font-size: 3rem; margin: 0; color: #3b2e1e;">Foodie Match<br>食客大挑戰</h1>
        <div style="background:#FFFAE6; padding:20px; border-radius:40px; margin:20px; font-size:1.2rem; color:#6b4f2a; border:3px solid #ffcf8a;">
            🌟  Designed by Shirley  🌟<br>
            ① 選擇正確<span style="color:var(--primary);font-weight:bold;">中文</span><br>
            ② 再選對應<span style="color:var(--accent);font-weight:bold;">英文</span> 完成配對
        </div>
        <button class="btn-large" onclick="initGame()">✦ 開始 ✦</button>
    </div>

    <div id="game-screen" class="screen" style="justify-content: flex-start;">
        <div class="hud-bar">
            <span>🏆 Level <span id="lvl-num">1</span></span>
            <span style="color:#cc7f2a;">⭐ <span id="score-num">10</span></span>
        </div>

        <div class="question-area">
            <div class="emoji-display" id="q-emoji">🍎</div>            
            <div class="answer-slot">
                <div id="slot-cn" class="slot-item">🇨🇳 中文</div>
                <div id="slot-en" class="slot-item">🇬🇧 English</div>
            </div>
        </div>
        
        <div class="timer-wrap"><div id="timer-bar" class="timer-fill"></div></div>        
        <div id="hint-text">🍜 請選擇正確的中文</div>
        <div id="options-container" class="options-grid"></div>
    </div>

    <div id="feedback-overlay" class="feedback-overlay">
        <div id="fb-icon"></div>
        <div id="fb-text"></div>
    </div>
    <div id="levelup-screen" class="screen">
        <div style="font-size: 6rem;">🎉✨</div>
        <h1 style="color:var(--success);">LEVEL UP!</h1>
        <button class="btn-large" onclick="startLevel()">下一關 🚀</button>
    </div>
    <div id="gameover-screen" class="screen">
        <div style="font-size: 6rem;">😢</div>
        <h1>再試一次</h1>
        <button class="btn-large" onclick="initGame()">⟳ 重來</button>
    </div>
    <div id="win-screen" class="screen">
        <div class="golden-trophy">🏆</div>
        <h1 style="color: #ffb700; text-shadow: 4px 4px 0 #a66500;">完美通關!</h1>
        <p style="font-size: 2rem;">最終分數 <span id="final-score" style="font-weight:bold; color:#cc4e4e;"></span></p>
        <button class="btn-large" onclick="initGame()">🎊 再來一局</button>
    </div>
</div>

<script>
    (function() {
        // --- 音效系統 (優化) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const SoundFX = {
            play: (freq, type, dur, vol=0.1) => {
                if(audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + dur);
            },
            lock: () => SoundFX.play(620, 'sine', 0.12, 0.1), 
            win: () => {
                [523, 659, 784, 1046].forEach((f, i) => setTimeout(()=>SoundFX.play(f, 'triangle', 0.28, 0.08), i*90));
            },
            lose: () => {
                SoundFX.play(160, 'sawtooth', 0.4, 0.1);
                setTimeout(()=>SoundFX.play(100, 'sawtooth', 0.4, 0.1), 200);
            }
        };

        // --- 增強資料庫 (精確圖示 + 新增多樣化食物) ---
        const database = [
            {e:"apple", c:"蘋果", i:"🍎"}, {e:"banana", c:"香蕉", i:"🍌"}, 
            {e:"barbecue", c:"烤肉", i:"🔥🍖"}, // 更傳神
            {e:"bean", c:"豆子", i:"🫘"}, 
            {e:"beef", c:"牛肉", i:"🥩"}, 
            {e:"beer", c:"啤酒", i:"🍺"}, {e:"bread", c:"麵包", i:"🍞"}, {e:"breakfast", c:"早餐", i:"🥐☕"}, 
            {e:"brunch", c:"早午餐", i:"🥞🥓"}, {e:"buffet", c:"自助餐", i:"🍣🍱"}, 
            {e:"bun", c:"小圓麵包", i:"🥯"}, 
            {e:"burger", c:"漢堡", i:"🍔"}, 
            {e:"butter", c:"奶油", i:"🧈"}, {e:"cabbage", c:"高麗菜", i:"🥬"}, {e:"cafeteria", c:"自助餐館", i:"🏫🍽️"}, {e:"cake", c:"蛋糕", i:"🍰"}, 
            {e:"candy", c:"糖果", i:"🍬"}, {e:"carrot", c:"紅蘿蔔", i:"🥕"}, {e:"cereal", c:"麥片", i:"🥣"}, {e:"cheese", c:"乳酪", i:"🧀"}, 
            {e:"chocolate", c:"巧克力", i:"🍫"}, {e:"coffee", c:"咖啡", i:"☕"}, {e:"cola", c:"可樂", i:"🥤"}, {e:"cook", c:"廚師", i:"👨‍🍳"}, 
            {e:"cook", c:"烹煮", i:"🍳"}, {e:"cookie", c:"餅乾", i:"🍪"}, {e:"corn", c:"玉米", i:"🌽"}, {e:"cream", c:"鮮奶油", i:"🍦"}, 
            {e:"delicious", c:"美味的", i:"😋"}, {e:"desk", c:"餐桌", i:"🪑🍽️"}, {e:"dessert", c:"甜點", i:"🍮"}, {e:"diet", c:"節食", i:"🤐🥗"}, 
            {e:"diet", c:"飲食", i:"🥗"}, {e:"dining room", c:"飯廳", i:"🏠🍽️"}, {e:"dinner", c:"晚餐", i:"🍽️🌙"}, {e:"dish", c:"菜餚", i:"🍲"}, 
            {e:"doughnut", c:"甜甜圈", i:"🍩"}, {e:"drink", c:"喝", i:"🥤"}, {e:"drink", c:"飲料", i:"🧃"}, {e:"dumpling", c:"餃子", i:"🥟"}, 
            {e:"eat", c:"吃", i:"🍽️"}, {e:"egg", c:"蛋", i:"🥚"}, {e:"flour", c:"麵粉", i:"🌾⚪"}, {e:"food", c:"食物", i:"🥘"}, 
            {e:"fork", c:"叉子", i:"🍴"}, {e:"freezer", c:"冷凍庫", i:"❄️🧊"}, {e:"French fries", c:"薯條", i:"🍟"}, {e:"fruit", c:"水果", i:"🍇🍉"}, 
            {e:"fry", c:"煎/炒", i:"🍳"}, {e:"grape", c:"葡萄", i:"🍇"}, {e:"guava", c:"芭樂", i:"🟢🍐"}, 
            {e:"ham", c:"火腿", i:"🍖"}, 
            {e:"hamburger", c:"漢堡", i:"🍔"}, {e:"honey", c:"蜂蜜", i:"🍯"}, {e:"hot dog", c:"熱狗", i:"🌭"}, {e:"ice cream", c:"冰淇淋", i:"🍨"}, 
            {e:"juice", c:"果汁", i:"🧃"}, {e:"ketchup", c:"番茄醬", i:"🍅🥫"}, {e:"knife", c:"刀子", i:"🔪"}, {e:"lemon", c:"檸檬", i:"🍋"}, 
            {e:"lettuce", c:"萵苣", i:"🥬"}, {e:"lick", c:"舔", i:"👅"}, {e:"lunch", c:"午餐", i:"🥪"}, {e:"mango", c:"芒果", i:"🥭"}, 
            {e:"meal", c:"一餐", i:"🍱"}, 
            {e:"meat", c:"肉", i:"🍖"}, 
            {e:"menu", c:"菜單", i:"📜"}, {e:"microwave", c:"微波爐", i:"🔥🧊"}, 
            {e:"milk", c:"牛奶", i:"🥛"}, {e:"napkin", c:"餐巾", i:"🧻"}, {e:"noodle", c:"麵", i:"🍜"}, {e:"nut", c:"堅果", i:"🥜"}, 
            {e:"oil", c:"油", i:"🫗"}, {e:"onion", c:"洋蔥", i:"🧅"}, {e:"orange", c:"柳橙", i:"🍊"}, {e:"order", c:"點餐", i:"📝🙋"}, 
            {e:"oven", c:"烤箱", i:"🔥🍞"}, 
            // 新增美食單字
            {e:"pizza", c:"披薩", i:"🍕"}, {e:"sandwich", c:"三明治", i:"🥪"}, {e:"sushi", c:"壽司", i:"🍣"}, 
            {e:"tea", c:"茶", i:"🍵"}, {e:"water", c:"水", i:"💧"}, {e:"wine", c:"紅酒", i:"🍷"}, 
            {e:"yogurt", c:"優格", i:"🥛"}, {e:"steak", c:"牛排", i:"🥩"}, {e:"honey", c:"蜂蜜", i:"🍯"}, 
            {e:"popcorn", c:"爆米花", i:"🍿"}, {e:"honeydew", c:"哈密瓜", i:"🍈"}, {e:"peach", c:"水蜜桃", i:"🍑"}
        ];

        // --- 遊戲狀態 ---
        let gameData = [];
        let currentLevel = 1;
        let currentQIndex = 0;
        let score = 10;
        let timerInterval = null;
        let timeLeft = 10;
        let currentPhase = 1;      // 1:中文, 2:英文
        let currentTarget = null;
        let currentOptions = [];
        let confettiInterval = null;
        let isProcessing = false;   // 🔒 防止重複點擊/超時衝突

        // --- 工具 ---
        function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }
        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (id !== 'win-screen') stopConfetti();
        }

        // --- 碎紙花 (更繽紛) ---
        function launchConfettiBurst() {
            for(let i=0; i<18; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + '%';
                c.style.backgroundColor = `hsl(${Math.random()*360}, 90%, 60%)`;
                c.style.animationDuration = (Math.random() * 2 + 1.2) + 's';
                c.style.opacity = 0.8 + Math.random()*0.2;
                c.style.width = (8 + Math.random()*8) + 'px';
                c.style.height = c.style.width;
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 3500);
            }
        }
        function startContinuousConfetti() {
            stopConfetti();
            launchConfettiBurst();
            confettiInterval = setInterval(launchConfettiBurst, 700);
        }
        function stopConfetti() {
            if(confettiInterval) { clearInterval(confettiInterval); confettiInterval = null; }
            document.querySelectorAll('.confetti').forEach(c => c.remove());
        }

        // --- 核心邏輯 (修復並增強) ---
        function initGame() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            // 重置狀態
            isProcessing = false;
            score = 10;
            currentLevel = 1;
            gameData = shuffle([...database]);  // 全新洗牌
            document.getElementById('score-num').innerText = score;
            startLevel();
        }

        function startLevel() {
            currentQIndex = 0;
            document.getElementById('lvl-num').innerText = currentLevel;
            document.getElementById('score-num').innerText = score;
            switchScreen('game-screen');
            loadQuestion();
        }

        function loadQuestion() {
            // 計算總題數 (避免索引越界)
            const totalQuestions = gameData.length;
            const globalIndex = ((currentLevel - 1) * 7) + currentQIndex;
            if (currentQIndex >= 7 || globalIndex >= totalQuestions) {
                // 關卡結束 或 資料不夠 (但資料已擴充到近百筆, safe)
                if (currentLevel >= 12 || globalIndex >= totalQuestions) { // 12關彈性
                    document.getElementById('final-score').innerText = score;
                    switchScreen('win-screen');
                    startContinuousConfetti();
                } else {
                    currentLevel++;
                    switchScreen('levelup-screen');
                }
                return;
            }

            currentPhase = 1;
            currentTarget = gameData[globalIndex];

            document.getElementById('q-emoji').innerText = currentTarget.i;
            const slotCn = document.getElementById('slot-cn');
            const slotEn = document.getElementById('slot-en');
            slotCn.className = 'slot-item'; slotCn.innerText = '🇨🇳 中文';
            slotEn.className = 'slot-item'; slotEn.innerText = '🇬🇧 English';

            document.getElementById('hint-text').innerHTML = "🍜 步驟1：這是…？ (選中文)";
            document.getElementById('hint-text').style.color = "var(--primary)";

            prepareOptionsAndRender();
            startTimer();
        }

        function prepareOptionsAndRender() {
            let numOptions = 2;
            if (currentLevel >= 2) numOptions = 3;
            if (currentLevel >= 4) numOptions = 4;

            // 池子排除所有與 currentTarget.e 相同的條目 (避免同英文不同中文混淆)
            let pool = database.filter(i => i.e !== currentTarget.e);
            pool = shuffle(pool);
            let options = [currentTarget];
            for(let i=0; i<numOptions-1; i++) options.push(pool[i % pool.length]);
            
            currentOptions = shuffle(options);

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            container.style.gridTemplateColumns = numOptions > 2 ? '1fr 1fr' : '1fr';
            
            container.className = currentPhase === 1 ? 'options-grid phase-cn' : 'options-grid phase-en';

            currentOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerText = currentPhase === 1 ? opt.c : opt.e;
                btn.onclick = () => handleInput(opt);
                container.appendChild(btn);
            });
        }

        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = 10;
            const bar = document.getElementById('timer-bar');
            bar.style.width = '100%';
            bar.style.background = 'var(--success)';

            timerInterval = setInterval(() => {
                if (isProcessing) return; // 正在處理回饋時暫停倒數 (但已經停用按鈕)
                timeLeft = Math.max(0, timeLeft - 0.1);
                const pct = (timeLeft / 10) * 100;
                bar.style.width = `${pct}%`;
                if(pct < 50) bar.style.background = 'var(--warning)';
                if(pct < 20) bar.style.background = 'var(--accent)';

                if(timeLeft <= 0.01) {
                    clearInterval(timerInterval);
                    handleFail(true);  // 超時失敗
                }
            }, 100);
        }

        function handleInput(selectedOpt) {
            // 避免重複點擊 / 與超時重疊
            if (isProcessing) return;
            if (!currentTarget) return;

            const isCorrect = (selectedOpt.e === currentTarget.e);

            if (!isCorrect) {
                handleFail(false);
                return;
            }

            // ---------- 正確處理 ----------
            if (currentPhase === 1) {
                // 鎖住防止雙擊
                isProcessing = true;
                SoundFX.lock();
                clearInterval(timerInterval); // 停止計時

                const slotCn = document.getElementById('slot-cn');
                slotCn.innerText = currentTarget.c;
                slotCn.classList.add('filled', 'filled-cn');

                currentPhase = 2;
                document.getElementById('hint-text').innerHTML = "🇬🇧 步驟2：對應的英文？ (已洗牌)";
                document.getElementById('hint-text').style.color = "var(--accent)";

                // 重新產生英文選項
                prepareOptionsAndRender();
                // 重啟計時器
                startTimer();
                isProcessing = false; // 解鎖
            } 
            else {  // phase 2 正確，完成題目
                isProcessing = true;
                clearInterval(timerInterval);
                SoundFX.win();

                const slotEn = document.getElementById('slot-en');
                slotEn.innerText = currentTarget.e;
                slotEn.classList.add('filled', 'filled-en');

                const pts = 10 + (currentLevel - 1) * 5;
                score += pts;
                document.getElementById('score-num').innerText = score;
                showFeedback(true, pts);
                // showFeedback 結束後會呼叫下一題，內有 isProcessing = false
            }
        }

        function handleFail(isTimeout) {
            if (isProcessing) return; // 已在處理中
            isProcessing = true;
            clearInterval(timerInterval);

            SoundFX.lose();
            const pts = 10 + (currentLevel - 1) * 5;
            score = Math.max(0, score - pts);
            document.getElementById('score-num').innerText = score;
            showFeedback(false, pts);
        }

        function showFeedback(isSuccess, pts) {
            const overlay = document.getElementById('feedback-overlay');
            const icon = document.getElementById('fb-icon');
            const text = document.getElementById('fb-text');
            
            overlay.style.display = 'flex';
            
            if(isSuccess) {
                icon.innerText = "🎉";
                text.innerText = `+${pts}`;
                text.style.color = "var(--success)";
            } else {
                icon.innerText = "😕";
                text.innerText = `-${pts}`;
                text.style.color = "var(--accent)";
            }

            // 鎖住選項避免再點 (overlay本身會擋，但按鈕仍可focus，索性禁用)
            document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);

            setTimeout(() => {
                overlay.style.display = 'none';
                document.querySelectorAll('.opt-btn').forEach(b => b.disabled = false);
                if(score <= 0) {
                    switchScreen('gameover-screen');
                    isProcessing = false;  // 重置鎖
                } else {
                    currentQIndex++;
                    isProcessing = false;  // 解鎖，準備載入下一題
                    loadQuestion();
                }
            }, 1200);
        }

        // 暴露全域函式給 onclick 使用
        window.initGame = initGame;
        window.startLevel = startLevel;
    })();
</script>
</body>
</html>
