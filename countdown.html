<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Playfair+Display:wght@400;600&display=swap');
        
        body {
            font-family: 'Noto Serif TC', serif;
            background: radial-gradient(circle at 50% 30%, #1e1b4b 0%, #0f0a2e 70%);
            min-height: 100vh;
            color: #e0e7ff;
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('https://picsum.photos/id/1015/1920/1080') no-repeat center center;
            background-size: cover;
            opacity: 0.15;
            z-index: -1;
            pointer-events: none;
        }

        .title-font {
            font-family: 'Playfair Display', serif;
        }

        .countdown-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.08);
        }
        
        .countdown-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 30px 60px -10px rgba(0,0,0,0.7), 0 0 0 2px rgba(255,255,255,0.25);
        }

        .days-left {
            font-size: 5rem;
            line-height: 1;
            font-weight: 700;
        }

        /* 8 rotating distinct card palettes */
        .theme-0 { background: #312e81; }  /* deep indigo */
        .theme-0 .days-left { color: #a5f3fc; text-shadow: 0 0 20px rgba(165,243,252,0.6); }
        .theme-0 .card-label { color: #a5f3fc; }
        .theme-0 .card-msg { color: #c7d2fe; }

        .theme-1 { background: #064e3b; }  /* deep emerald */
        .theme-1 .days-left { color: #6ee7b7; text-shadow: 0 0 20px rgba(110,231,183,0.6); }
        .theme-1 .card-label { color: #6ee7b7; }
        .theme-1 .card-msg { color: #a7f3d0; }

        .theme-2 { background: #881337; }  /* deep rose */
        .theme-2 .days-left { color: #fda4af; text-shadow: 0 0 20px rgba(253,164,175,0.6); }
        .theme-2 .card-label { color: #fda4af; }
        .theme-2 .card-msg { color: #fecdd3; }

        .theme-3 { background: #78350f; }  /* deep amber */
        .theme-3 .days-left { color: #fcd34d; text-shadow: 0 0 20px rgba(252,211,77,0.6); }
        .theme-3 .card-label { color: #fcd34d; }
        .theme-3 .card-msg { color: #fde68a; }

        .theme-4 { background: #1e3a5f; }  /* slate blue */
        .theme-4 .days-left { color: #93c5fd; text-shadow: 0 0 20px rgba(147,197,253,0.6); }
        .theme-4 .card-label { color: #93c5fd; }
        .theme-4 .card-msg { color: #bfdbfe; }

        .theme-5 { background: #7c2d12; }  /* deep coral/burnt orange */
        .theme-5 .days-left { color: #fdba74; text-shadow: 0 0 20px rgba(253,186,116,0.6); }
        .theme-5 .card-label { color: #fdba74; }
        .theme-5 .card-msg { color: #fed7aa; }

        .theme-6 { background: #1a3a2a; }  /* deep forest */
        .theme-6 .days-left { color: #86efac; text-shadow: 0 0 20px rgba(134,239,172,0.6); }
        .theme-6 .card-label { color: #86efac; }
        .theme-6 .card-msg { color: #bbf7d0; }

        .theme-7 { background: #0c4a6e; }  /* deep sky */
        .theme-7 .days-left { color: #7dd3fc; text-shadow: 0 0 20px rgba(125,211,252,0.6); }
        .theme-7 .card-label { color: #7dd3fc; }
        .theme-7 .card-msg { color: #bae6fd; }

        /* Milestone urgency overrides — still opaque, very vivid */
        .special-100 { background: #3730a3 !important; }
        .special-100 .days-left { color: #c7d2fe !important; text-shadow: 0 0 20px rgba(199,210,254,0.7) !important; }
        .special-100 .card-label { color: #a5b4fc !important; }

        .special-50 { background: #6b21a8 !important; }
        .special-50 .days-left { color: #e9d5ff !important; text-shadow: 0 0 20px rgba(233,213,255,0.7) !important; }
        .special-50 .card-label { color: #d8b4fe !important; }

        .special-30 { background: #1e40af !important; }
        .special-30 .days-left { color: #bfdbfe !important; text-shadow: 0 0 20px rgba(191,219,254,0.7) !important; }
        .special-30 .card-label { color: #93c5fd !important; }

        .special-10 { background: #0e7490 !important; }
        .special-10 .days-left { color: #a5f3fc !important; text-shadow: 0 0 20px rgba(165,243,252,0.9) !important; }
        .special-10 .card-label { color: #67e8f9 !important; }

        .special-5 { background: #b45309 !important; }
        .special-5 .days-left { color: #fde68a !important; text-shadow: 0 0 24px rgba(253,230,138,0.9) !important; }
        .special-5 .card-label { color: #fcd34d !important; }

        .special-1 { 
            background: #9d174d !important;
            animation: pulse-urgent 2s infinite;
        }
        .special-1 .days-left { color: #fce7f3 !important; text-shadow: 0 0 30px rgba(252,231,243,1) !important; }
        .special-1 .card-label { color: #fbcfe8 !important; }

        @keyframes pulse-urgent {
            0%, 100% { box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 2px rgba(255,255,255,0.2), 0 0 40px rgba(244,114,182,0.4); }
            50% { box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 3px rgba(255,255,255,0.4), 0 0 70px rgba(192,132,252,0.6); }
        }

        .glass {
            background: rgba(15, 23, 42, 0.88);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(165, 243, 252, 0.25);
        }

        .quick-btn {
            transition: all 0.3s ease;
        }
        
        .quick-btn:hover {
            transform: translateY(-3px) scale(1.05);
            background-color: rgba(255,255,255,0.15) !important;
        }
    </style>
</head>
<body>
    <div class="max-w-4xl mx-auto p-6 relative z-10">
        <!-- Header -->
        <div class="flex items-center justify-between mb-12">
            <div>
                <h1 class="title-font text-6xl font-bold tracking-tighter text-white">COUNTDOWN 倒計時⌛️</h1>
                <p class="text-cyan-300 mt-1 text-xl">珍惜與你重要的每一天 · Cherish every precious day</p>
            </div>
            <button onclick="showAddModal()" 
                    class="flex items-center gap-3 bg-gradient-to-r from-cyan-400 to-purple-500 hover:from-cyan-500 hover:to-purple-600 text-white px-7 py-4 rounded-3xl shadow-xl transition-all font-medium">
                <i class="fa-solid fa-plus"></i>
                <span>新增事件 / Add Event</span>
            </button>
        </div>

        <!-- Quick Select -->
        <div class="mb-12">
            <p class="text-cyan-200 text-sm mb-4 font-medium tracking-widest">快速選擇常見事件 Common Event Quick Pick</p>
            <div class="flex flex-wrap gap-3" id="quick-select"></div>
        </div>

        <!-- Countdown List -->
        <div id="countdown-list" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden text-center py-24">
            <div class="mx-auto w-28 h-28 bg-white/10 rounded-full flex items-center justify-center mb-6 border border-cyan-400/30">
                <i class="fa-solid fa-star text-5xl text-cyan-300"></i>
            </div>
            <p class="text-3xl text-white">還沒有倒數事件 No Counting Down Event Yet</p>
            <p class="text-cyan-300 mt-3">點擊上方快速按鈕或新增自己的事件 Pick or Add</p>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="glass w-full max-w-lg mx-4 rounded-3xl p-9 shadow-2xl">
            <h2 id="modal-title" class="text-3xl font-medium text-white mb-8">新增倒數事件 / New Event</h2>
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-cyan-300 mb-2">事件名稱 / Event Name</label>
                    <input id="event-name" 
                           class="w-full px-6 py-4 bg-slate-900/70 border border-cyan-400/30 focus:border-cyan-400 rounded-2xl outline-none text-lg text-white placeholder:text-slate-400">
                </div>
                <div>
                    <label class="block text-sm font-medium text-cyan-300 mb-2">目標日期與時間 / Target Date & Time</label>
                    <input id="event-datetime" type="datetime-local"
                           class="w-full px-6 py-4 bg-slate-900/70 border border-cyan-400/30 focus:border-cyan-400 rounded-2xl outline-none text-lg text-white">
                </div>
                <div>
                    <label class="block text-sm font-medium text-cyan-300 mb-2">備註（選填） / Note (Optional)</label>
                    <textarea id="event-note" rows="3"
                              class="w-full px-6 py-4 bg-slate-900/70 border border-cyan-400/30 focus:border-cyan-400 rounded-2xl outline-none resize-none text-white"></textarea>
                </div>
            </div>
            <div class="flex gap-4 mt-10">
                <button onclick="hideModal()" 
                        class="flex-1 py-4 text-slate-300 font-medium rounded-2xl border border-slate-600 hover:bg-slate-800">
                    取消 / Cancel
                </button>
                <button onclick="saveEvent()" 
                        class="flex-1 py-4 bg-gradient-to-r from-cyan-400 to-purple-500 text-white font-medium rounded-2xl">
                    儲存 / Save
                </button>
            </div>
        </div>
    </div>

    <!-- Detail Modal -->
    <div id="detail-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="glass w-full max-w-xl mx-4 rounded-3xl overflow-hidden">
            <div id="detail-header" class="h-3"></div>
            <div class="p-9">
                <div class="flex justify-between">
                    <h2 id="detail-name" class="text-4xl font-medium text-white"></h2>
                    <button onclick="hideDetailModal()" class="text-4xl text-cyan-300 hover:text-white">✕</button>
                </div>
                <p id="detail-date" class="text-cyan-300 mt-2"></p>
                <div id="detail-countdown" class="my-14 text-center"></div>
                <div id="detail-note" class="bg-slate-900/60 rounded-2xl p-7 text-slate-200"></div>
                <div class="flex gap-4 mt-10">
                    <button onclick="editCurrentEvent()" 
                            class="flex-1 py-4 border border-cyan-400 text-cyan-300 rounded-2xl font-medium hover:bg-cyan-950">
                        編輯 / Edit
                    </button>
                    <button onclick="deleteCurrentEvent()" 
                            class="flex-1 py-4 bg-red-900/70 hover:bg-red-800 text-red-200 rounded-2xl font-medium">
                        刪除 / Delete
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let events = [];
        let currentEditId = null;
        let currentDetailId = null;

        const quickEvents = [
            { name: "CAP 會考", emoji: "📝" },
            { name: "GSAT 學測", emoji: "📚" },
            { name: "TVE 統測", emoji: "📋" },
            { name: "Mid-term 期中考", emoji: "📖" },
            { name: "Final 期末考", emoji: "✍️" },
            { name: "Contest 比賽", emoji: "🏆" },
            { name: "Birthday 生日", emoji: "🎂" },
            { name: "Anniversary 紀念日", emoji: "💍" },
            { name: "Graduation 畢業", emoji: "🎓" }
        ];

        function loadEvents() {
            const saved = localStorage.getItem('cosmicCountdowns');
            if (saved) events = JSON.parse(saved);
            renderQuickSelect();
            renderCountdowns();
        }

        function saveEvents() {
            localStorage.setItem('cosmicCountdowns', JSON.stringify(events));
        }

        function calculateTimeLeft(targetDate) {
            const now = new Date().getTime();
            const target = new Date(targetDate).getTime();
            const diff = target - now;
            if (diff <= 0) return { days: 0, hours: 0, minutes: 0, seconds: 0, passed: true };
            return {
                days: Math.floor(diff / (1000 * 60 * 60 * 24)),
                hours: Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)),
                minutes: Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)),
                seconds: Math.floor((diff % (1000 * 60)) / 1000),
                passed: false
            };
        }

        function getMilestoneClass(days) {
            if (days <= 1) return 'special-1';
            if (days <= 5) return 'special-5';
            if (days <= 10) return 'special-10';
            if (days <= 30) return 'special-30';
            if (days <= 50) return 'special-50';
            if (days <= 100) return 'special-100';
            return null;
        }

        function getBilingualMessage(days) {
            if (days <= 1) return "明天就是了！💫<br><span class='text-base opacity-80'>Tomorrow is the day!</span>";
            if (days <= 5) return "即將到來！<br><span class='text-base opacity-80'>It's almost here!</span>";
            if (days <= 10) return "只剩十天！<br><span class='text-base opacity-80'>Only 10 days left!</span>";
            if (days <= 30) return "一個月內！<br><span class='text-base opacity-80'>Within a month!</span>";
            if (days <= 50) return "越來越近了<br><span class='text-base opacity-80'>Getting closer...</span>";
            if (days <= 100) return "還有 100 天<br><span class='text-base opacity-80'>100 days to go</span>";
            return "值得期待的日子<br><span class='text-base opacity-80'>A day worth looking forward to</span>";
        }

        function renderQuickSelect() {
            const container = document.getElementById('quick-select');
            container.innerHTML = '';
            quickEvents.forEach(item => {
                const btn = document.createElement('button');
                btn.className = "quick-btn px-6 py-3.5 bg-white/10 hover:bg-white/20 border border-cyan-400/40 rounded-2xl text-sm text-white flex items-center gap-2.5 shadow-inner";
                btn.innerHTML = `${item.emoji} <span>${item.name}</span>`;
                btn.onclick = () => quickAddEvent(item.name);
                container.appendChild(btn);
            });
        }

        function quickAddEvent(name) {
            const futureDate = new Date();
            futureDate.setDate(futureDate.getDate() + 45);
            events.unshift({ id: Date.now().toString(), name, targetDate: futureDate.toISOString().slice(0, 16), note: "已從快速選擇新增" });
            saveEvents();
            renderCountdowns();
            const notif = document.createElement('div');
            notif.className = "fixed bottom-6 right-6 bg-emerald-600 text-white px-6 py-3 rounded-2xl shadow-xl z-50";
            notif.textContent = `已新增：${name}`;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 2000);
        }

function renderCountdowns() {
    const container = document.getElementById('countdown-list');
    const empty = document.getElementById('empty-state');
    container.innerHTML = '';
    if (events.length === 0) { empty.classList.remove('hidden'); return; }
    empty.classList.add('hidden');

    const dateOpts = { year: 'numeric', month: 'short', day: 'numeric', weekday: 'short' };
    const todayStr = new Date().toLocaleDateString(undefined, dateOpts);

    events.forEach((event, index) => {
        const timeLeft = calculateTimeLeft(event.targetDate);
        const milestoneClass = getMilestoneClass(timeLeft.days);
        const themeClass = milestoneClass ? milestoneClass : `theme-${index % 8}`;
        const eventDateStr = new Date(event.targetDate).toLocaleDateString(undefined, dateOpts);

        container.innerHTML += `
            <div onclick="showDetail(${index})" class="countdown-card cursor-pointer ${themeClass} rounded-3xl p-8 shadow-2xl">
                <div class="flex justify-between items-start mb-6">
                    <div class="text-2xl font-medium text-white">${event.name}</div>
                    ${timeLeft.passed ? `<span class="px-4 py-1 text-xs bg-red-500/80 rounded-full text-white">已過期</span>` : ''}
                </div>
                <div class="text-center my-8">
                    ${timeLeft.passed ? `
                        <div class="text-7xl mb-4">🌌</div>
                        <div class="text-3xl text-white">美好時刻已到來</div>
                    ` : `
                        <div class="days-left">${timeLeft.days}</div>
                        <div class="card-label -mt-4 text-2xl">天 / DAYS</div>
                    `}
                </div>
                <div class="card-msg text-center text-[15px] leading-tight mb-6">
                    ${getBilingualMessage(timeLeft.days)}
                </div>
                <div style="border-top: 1px solid rgba(255,255,255,0.2); padding-top: 14px; display: flex; justify-content: space-between; align-items: flex-end;">
                    <div style="text-align: left;">
                        <div style="font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.6; color: white; margin-bottom: 3px;">今天 Today</div>
                        <div style="font-size: 13px; color: white; opacity: 0.9; font-weight: 500;">${todayStr}</div>
                    </div>
                    <div style="opacity: 0.5; color: white; font-size: 18px; align-self: center;">→</div>
                    <div style="text-align: right;">
                        <div style="font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.6; color: white; margin-bottom: 3px;">目標 Target</div>
                        <div style="font-size: 13px; color: white; opacity: 0.9; font-weight: 500;">${eventDateStr}</div>
                    </div>
                </div>
            </div>
        `;
    });
}

        function showAddModal() {
            currentEditId = null;
            document.getElementById('modal-title').textContent = '新增倒數事件 / New Event';
            document.getElementById('event-name').value = '';
            document.getElementById('event-datetime').value = '';
            document.getElementById('event-note').value = '';
            document.getElementById('modal').classList.remove('hidden');
        }

        function hideModal() { document.getElementById('modal').classList.add('hidden'); }

        function saveEvent() {
            const name = document.getElementById('event-name').value.trim();
            const datetime = document.getElementById('event-datetime').value;
            const note = document.getElementById('event-note').value.trim();
            if (!name || !datetime) { alert('請填寫事件名稱與日期時間 / Please fill name and date'); return; }
            const eventData = { id: Date.now().toString(), name, targetDate: datetime, note };
            if (currentEditId) {
                const idx = events.findIndex(e => e.id === currentEditId);
                if (idx > -1) events[idx] = { ...events[idx], ...eventData };
            } else {
                events.push(eventData);
            }
            saveEvents();
            hideModal();
            renderCountdowns();
        }

        function showDetail(index) {
            currentDetailId = index;
            const event = events[index];
            const timeLeft = calculateTimeLeft(event.targetDate);
            const milestoneClass = getMilestoneClass(timeLeft.days);
            const themeClass = milestoneClass ? milestoneClass : `theme-${index % 8}`;

            document.getElementById('detail-name').textContent = event.name;
            document.getElementById('detail-date').textContent = new Date(event.targetDate).toLocaleString('zh-TW');

            const detailCountdown = document.getElementById('detail-countdown');
            if (timeLeft.passed) {
                detailCountdown.innerHTML = `<div class="text-8xl mb-6">🌠</div><div class="text-4xl">這一天已經來臨</div>`;
            } else {
                detailCountdown.innerHTML = `
                    <div class="text-8xl font-bold text-cyan-100">${timeLeft.days} 天</div>
                    <div class="text-xl text-cyan-300 mt-3">${timeLeft.hours}小時 ${timeLeft.minutes}分 ${timeLeft.seconds}秒</div>
                    <div class="mt-10 text-lg">${getBilingualMessage(timeLeft.days)}</div>
                `;
            }

            document.getElementById('detail-note').innerHTML = event.note ? `<p>${event.note}</p>` : '<span class="opacity-60">無備註 / No note</span>';
            document.getElementById('detail-header').className = `h-3 ${themeClass}`;
            document.getElementById('detail-modal').classList.remove('hidden');
        }

        function hideDetailModal() { document.getElementById('detail-modal').classList.add('hidden'); }

        function editCurrentEvent() {
            hideDetailModal();
            const event = events[currentDetailId];
            currentEditId = event.id;
            document.getElementById('modal-title').textContent = '編輯事件 / Edit Event';
            document.getElementById('event-name').value = event.name;
            document.getElementById('event-datetime').value = event.targetDate;
            document.getElementById('event-note').value = event.note || '';
            document.getElementById('modal').classList.remove('hidden');
        }

        function deleteCurrentEvent() {
            if (confirm('確定刪除此事件？ / Delete this event?')) {
                events.splice(currentDetailId, 1);
                saveEvents();
                hideDetailModal();
                renderCountdowns();
            }
        }

        window.onload = function() {
            loadEvents();
            setInterval(() => renderCountdowns(), 10000);
        };
    </script>
</body>
</html>
