<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Shirley's Grade Analysis Tools | 五標學術評鑑系統</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #f0ede5;
            font-family: 'Times New Roman', 'Noto Serif TC', 'Georgia', serif;
            padding: 24px;
            color: #2c3e2f;
        }

        .academic-container {
            max-width: 1500px;
            margin: 0 auto;
            background: white;
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.12);
            border-radius: 6px;
            overflow: hidden;
            border-top: 6px solid #9b6a42;
        }

        header {
            background: #fefaf2;
            padding: 20px 28px;
            text-align: center;
            border-bottom: 1px solid #e2d8ca;
        }
        h1 { font-size: 1.6rem; letter-spacing: 1px; color: #2c3e2f; font-weight: 600; }
        .sub { color: #7e6b4b; font-style: italic; font-size: 0.85rem; }

        .tabs {
            display: flex;
            background: #f5efe5;
            border-bottom: 1px solid #ddd0bc;
            flex-wrap: wrap;
        }
        .tab-btn {
            flex: 1; padding: 12px 0; font-size: 0.9rem; font-weight: 600;
            background: transparent; border: none; cursor: pointer;
            transition: 0.2s; color: #5a4a2e; font-family: inherit; min-width: 100px;
        }
        .tab-btn.active {
            background: white; color: #9b6a42; border-bottom: 3px solid #9b6a42;
        }

        /* ── Screen layout ── */
        .dashboard { display: flex; flex-wrap: wrap; }

        .input-panel {
            width: 360px;
            background: #fefcf8;
            border-right: 1px solid #e8dfd0;
            padding: 20px 18px;
            /* Allow natural scroll instead of fixed viewport height */
            overflow-y: auto;
            max-height: calc(100vh - 140px);
        }

        .report-panel {
            flex: 1;
            min-width: 0; /* prevent flex overflow */
            background: white;
            padding: 20px 24px;
            overflow-y: auto;
            max-height: calc(100vh - 140px);
        }

        /* ── Input cards ── */
        .input-card {
            background: white; border: 1px solid #ece0cf;
            margin-bottom: 18px; padding: 14px; border-radius: 12px;
        }
        .input-card h4 {
            font-size: 0.85rem; font-weight: 700; color: #6b4e2e;
            margin-bottom: 10px; border-left: 3px solid #c2a15b; padding-left: 8px;
        }
        label {
            font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
            display: block; margin-bottom: 4px; color: #5a4a2e;
        }
        input, textarea {
            width: 100%; padding: 8px 10px; border: 1px solid #ddd0bd;
            border-radius: 8px; font-size: 0.8rem;
            font-family: 'Courier New', monospace; margin-bottom: 10px;
            background: #fffefb;
        }
        textarea { resize: vertical; }

        .btn-run, .btn-print {
            width: 100%; background: #9b6a42; color: white; border: none;
            padding: 12px; font-weight: 700; font-size: 0.9rem;
            border-radius: 40px; margin-top: 6px; cursor: pointer;
        }
        .btn-print { background: #5a6e4a; margin-top: 10px; }
        .btn-run:hover { background: #7c5535; }
        .btn-print:hover { background: #4a5a3a; }

        /* ── Stats ── */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(85px, 1fr));
            gap: 8px; margin-bottom: 20px;
        }
        .stat-card {
            background: #fefaf5; border: 1px solid #ece2d4;
            border-radius: 12px; text-align: center; padding: 8px 4px;
        }
        .stat-card .stat-val { font-size: 1.2rem; font-weight: 800; color: #9b6a42; line-height: 1.2; }
        .stat-card .stat-label { font-size: 0.6rem; color: #8b7a62; }

        /* ── Charts ── */
        .chart-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px; margin: 20px 0;
        }
        .chart-box {
            background: #fff; border: 1px solid #e9dfcf;
            border-radius: 16px; padding: 12px;
            /* Fix: ensure canvas doesn't overflow */
            overflow: hidden;
            position: relative;
        }
        .chart-box canvas { display: block; width: 100% !important; }

        /* ── Critique / report text ── */
        .academic-critique {
            background: #fdf9f0; border-left: 6px solid #b68b40;
            padding: 14px 20px; margin: 20px 0; border-radius: 12px;
            line-height: 1.6; font-size: 0.85rem; white-space: pre-line;
        }

        /* ── Ranking ── */
        .ranking-section { margin: 16px 0; }
        .ranking-section h3 {
            font-size: 0.9rem; margin-bottom: 8px; color: #6b4e2e;
            display: inline-block; border-bottom: 1px solid #c2a15b;
        }
        .ranking-table-wrapper {
            overflow-x: auto; margin: 8px 0;
            border-radius: 10px; border: 1px solid #e2d8ca;
        }
        .ranking-table { width: 100%; border-collapse: collapse; font-size: 0.7rem; }
        .ranking-table th, .ranking-table td {
            border: 1px solid #ddd0bc; padding: 6px 8px; text-align: center;
        }
        .ranking-table th { background: #f5efe5; color: #6b4e2e; font-weight: 700; }
        .ranking-table td:first-child, .ranking-table th:first-child { width: 45px; }
        .ranking-table td:nth-child(2) { text-align: left; }
        .rank-1 { background: #fef5e0; }
        .rank-2 { background: #faf0e0; }
        .rank-3 { background: #f5ebe0; }

        /* ── Grade labels ── */
        .label-top    { background: #1a5d1a; color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.65rem; display: inline-block; }
        .label-front  { background: #2c6e2c; color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.65rem; display: inline-block; }
        .label-average{ background: #9b6a42; color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.65rem; display: inline-block; }
        .label-back   { background: #c08530; color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.65rem; display: inline-block; }
        .label-bottom { background: #c53030; color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.65rem; display: inline-block; }
        .label-fail   { background: #8b4513; color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.65rem; display: inline-block; }

        /* ── Track table ── */
        .table-wrapper {
            overflow-x: auto; margin: 16px 0;
            border-radius: 10px; border: 1px solid #e2d8ca;
        }
        .track-summary-table {
            width: 100%; min-width: 800px;
            border-collapse: collapse; font-size: 0.75rem;
        }
        .track-summary-table th, .track-summary-table td {
            border: 1px solid #ddd0bc; padding: 8px 6px; text-align: center;
        }
        .track-summary-table th { background: #f5efe5; color: #6b4e2e; font-weight: 700; }
        .trend-up { color: #276749; font-weight: bold; }
        .trend-down { color: #c53030; font-weight: bold; }

        /* ── Student badges ── */
        .student-detail-list {
            margin-top: 16px; border-top: 1px solid #e2d8ca; padding-top: 12px;
        }
        .student-badge {
            display: inline-flex; align-items: center; gap: 4px;
            background: #f0eae0; border-radius: 30px;
            padding: 4px 10px; margin: 4px 6px; font-size: 0.7rem; cursor: pointer;
        }
        .student-badge:hover { background: #dac29c; }

        /* ── Modal ── */
        .student-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .student-modal-card {
            background: white; max-width: 450px; width: 90%;
            border-radius: 24px; padding: 20px; border-top: 5px solid #9b6a42;
        }
        .close-modal {
            background: #e8dfd0; border: none;
            padding: 6px 16px; border-radius: 30px; margin-top: 12px; cursor: pointer;
        }

        .hidden { display: none !important; }
        .info-note { font-size: 0.65rem; color: #9a8a70; margin-top: 5px; }

        /* ── Print image placeholders (used during print) ── */
        .chart-print-img {
            display: none;
            width: 100%;
            max-height: 200px;
            object-fit: contain;
        }

        /* ============================================================
           PRINT STYLES
        ============================================================ */
        @media print {
            /* Hide all interactive / screen-only elements */
            .no-print,
            .tabs,
            .input-panel,
            .student-badge,
            .student-detail-list,
            .student-modal-overlay,
            .btn-run,
            .btn-print {
                display: none !important;
            }

            /* Reset page layout */
            html, body {
                background: white !important;
                padding: 0 !important;
                margin: 0 !important;
                width: 100% !important;
                font-size: 10pt;
            }

            .academic-container {
                max-width: 100% !important;
                margin: 0 !important;
                box-shadow: none !important;
                border: none !important;
                border-top: 4pt solid #9b6a42 !important;
            }

            /* Dashboard: make report panel full width */
            .dashboard { display: block !important; }

            .report-panel {
                width: 100% !important;
                max-width: 100% !important;
                max-height: none !important;
                overflow: visible !important;
                padding: 12pt 16pt !important;
            }

            /* Stat grid */
            .stat-grid {
                display: grid !important;
                grid-template-columns: repeat(4, 1fr) !important;
                gap: 5pt !important;
                margin-bottom: 10pt !important;
            }
            .stat-card {
                padding: 4pt !important;
                border: 0.5pt solid #ccc !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            .stat-card .stat-val { font-size: 11pt !important; }
            .stat-card .stat-label { font-size: 7pt !important; }

            /* Chart rows: show print images, hide canvas */
            .chart-row {
                display: grid !important;
                grid-template-columns: repeat(2, 1fr) !important;
                gap: 10pt !important;
                margin: 10pt 0 !important;
            }
            .chart-box {
                border: 0.5pt solid #ccc !important;
                padding: 6pt !important;
                break-inside: avoid !important;
                page-break-inside: avoid !important;
            }
            /* Hide canvas and show pre-rendered img */
            .chart-box canvas { display: none !important; }
            .chart-print-img { display: block !important; }

            /* Critique */
            .academic-critique {
                break-inside: avoid !important;
                page-break-inside: avoid !important;
                padding: 8pt 12pt !important;
                margin: 8pt 0 !important;
                font-size: 8.5pt !important;
                border-left: 4pt solid #b68b40 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            /* Ranking tables */
            .ranking-section { margin: 10pt 0 !important; }
            .ranking-table-wrapper { border: 0.5pt solid #999 !important; }
            .ranking-table { font-size: 7.5pt !important; }
            .ranking-table th, .ranking-table td { padding: 3pt 5pt !important; }
            .ranking-table th,
            .rank-1, .rank-2, .rank-3 {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            .ranking-table tr { break-inside: avoid !important; page-break-inside: avoid !important; }

            /* Track table */
            .table-wrapper { border: 0.5pt solid #999 !important; overflow: visible !important; }
            .track-summary-table { font-size: 7.5pt !important; min-width: unset !important; width: 100% !important; }
            .track-summary-table th, .track-summary-table td { padding: 3pt 4pt !important; }
            .track-summary-table th {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            .track-summary-table tr { break-inside: avoid !important; page-break-inside: avoid !important; }

            /* Labels / badges */
            .label-top, .label-front, .label-average,
            .label-back, .label-bottom, .label-fail {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            /* Headings */
            h2 { font-size: 14pt !important; margin: 6pt 0 4pt !important; }
            h3 { font-size: 11pt !important; margin: 5pt 0 !important; }
            h4 { font-size: 9pt !important; margin: 4pt 0 !important; }
            p  { margin: 3pt 0 !important; }

            @page {
                size: A4;
                margin: 15mm 12mm;
            }
        }

        @media (max-width: 780px) {
            .input-panel { width: 100%; border-right: none; border-bottom: 1px solid #e8dfd0; max-height: none; }
            .report-panel { max-height: none; padding: 16px; }
        }
    </style>
</head>
<body>
<div class="academic-container">
    <header class="no-print">
        <h1>Shirley's Grade Analysis Tools</h1>
        <p class="sub">五標學術評鑑 · 頂標 / 前標 / 均標 / 後標 / 底標 / 流標</p>
    </header>

    <div class="tabs no-print">
        <button class="tab-btn active" data-mode="solo">📖 單班分析</button>
        <button class="tab-btn" data-mode="multi">📊 班際對比</button>
        <button class="tab-btn" data-mode="track">📈 縱向追蹤</button>
    </div>

    <div class="dashboard">
        <div class="input-panel no-print" id="inputPanel"></div>

        <div class="report-panel" id="reportPanel">
            <div id="welcomePlaceholder" class="academic-critique" style="text-align:center;">
                <p>📐 選擇模式並輸入數據</p>
                <p style="font-size:0.8rem; margin-top:6px;">支援 Excel 貼上（姓名 分數），空格 / Tab / 逗號皆可</p>
            </div>

            <div id="dynamicReport" class="hidden">
                <h2 id="reportTitle" style="font-size:1.2rem; color:#2c3e2f; border-left:4px solid #b68b40; padding-left:10px;"></h2>
                <p id="reportSub" style="color:#8b7a62; font-size:0.75rem; margin-bottom:12px;"></p>

                <div class="stat-grid" id="statGrid"></div>

                <div class="chart-row">
                    <div class="chart-box">
                        <canvas id="chartPrimary"></canvas>
                        <img class="chart-print-img" id="imgPrimary" alt="主圖表">
                    </div>
                    <div class="chart-box">
                        <canvas id="chartRadar"></canvas>
                        <img class="chart-print-img" id="imgRadar" alt="雷達圖">
                    </div>
                </div>
                <div class="chart-row">
                    <div class="chart-box">
                        <canvas id="chartSecondary"></canvas>
                        <img class="chart-print-img" id="imgSecondary" alt="次要圖表">
                    </div>
                    <div class="chart-box">
                        <canvas id="chartDistribution"></canvas>
                        <img class="chart-print-img" id="imgDistribution" alt="分佈圖">
                    </div>
                </div>

                <div class="academic-critique" id="academicCritique"></div>

                <div id="rankingSection" class="ranking-section"></div>

                <!-- Student list is screen-only (hidden in print via CSS) -->
                <div id="studentListInsight" class="student-detail-list"></div>

                <div class="no-print" style="margin-top:16px;">
                    <button class="btn-print" id="printReportBtn">🖨️ 列印報告</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// ─────────────────────────────────────────────
//  State
// ─────────────────────────────────────────────
let activeMode = "solo";
let currentCharts = { primary: null, radar: null, secondary: null, distribution: null };
let currentReportPayload = null;
let currentGlobalPercentiles = null;

const colorPalette = ['#1a365d','#b7791f','#2c5282','#9b6a42','#276749','#c53030','#2b6cb0','#d69e2e'];

function getColor(index, opacity = 0.7) {
    const hex = colorPalette[index % colorPalette.length];
    if (opacity === 1) return hex;
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${opacity})`;
}

// ─────────────────────────────────────────────
//  Data parsing
// ─────────────────────────────────────────────
function parseStudentData(rawText) {
    if (!rawText || !rawText.trim()) return [];
    const lines = rawText.split(/\r?\n/);
    const students = [];
    for (let line of lines) {
        line = line.trim();
        if (!line) continue;
        let parts;
        if      (line.includes(","))  parts = line.split(",").map(s => s.trim());
        else if (line.includes("\t")) parts = line.split("\t").map(s => s.trim());
        else                          parts = line.split(/\s+/);
        if (parts.length >= 2) {
            const name  = parts[0];
            const score = parseFloat(parts[parts.length - 1]); // take last numeric token
            if (!isNaN(score) && score >= 0 && score <= 100)
                students.push({ name, score });
        }
    }
    return students;
}

// ─────────────────────────────────────────────
//  Five-percentile computation
// ─────────────────────────────────────────────
function calculateFivePercentiles(scores) {
    if (!scores.length) return { top:0, front:0, average:0, back:0, bottom:0 };
    const sorted = [...scores].sort((a,b) => a - b);
    const n = sorted.length;
    const p = pct => {
        const idx = (pct / 100) * (n - 1);
        const lo = Math.floor(idx), hi = Math.ceil(idx);
        return lo === hi ? sorted[lo] : sorted[lo] + (sorted[hi] - sorted[lo]) * (idx - lo);
    };
    return { top: p(88), front: p(75), average: p(50), back: p(25), bottom: p(12) };
}

function getFiveLevel(score, percentiles) {
    if (score >= percentiles.top)     return { level:"頂標", class:"label-top",    desc:"前12%頂尖學生" };
    if (score >= percentiles.front)   return { level:"前標", class:"label-front",  desc:"前25%優秀學生" };
    if (score >= percentiles.average) return { level:"均標", class:"label-average",desc:"前50%中等學生" };
    if (score >= percentiles.back)    return { level:"後標", class:"label-back",   desc:"前75%後段學生" };
    if (score >= percentiles.bottom)  return { level:"底標", class:"label-bottom", desc:"前88%邊緣學生" };
    return { level:"流標", class:"label-fail", desc:"未達底標，需重點輔導" };
}

// ─────────────────────────────────────────────
//  Stats
// ─────────────────────────────────────────────
function computeStats(students, className = "") {
    if (!students.length) return null;
    const scores = students.map(s => s.score);
    const avg = scores.reduce((a,b)=>a+b,0) / scores.length;
    const sorted = [...scores].sort((a,b)=>a-b);
    const n = sorted.length;
    const median = n % 2 === 0
        ? (sorted[n/2-1] + sorted[n/2]) / 2
        : sorted[Math.floor(n/2)];
    const maxVal = Math.max(...scores);
    const minVal = Math.min(...scores);
    const passCount = scores.filter(s => s >= 60).length;
    const passRate  = (passCount / n) * 100;
    const variance  = scores.reduce((sum,v) => sum + (v-avg)**2, 0) / n;
    const stdDev    = Math.sqrt(variance);
    const skewRaw   = stdDev === 0 ? 0 : scores.reduce((sum,v) => sum + ((v-avg)/stdDev)**3, 0) / n;
    const skewness  = isNaN(skewRaw) ? 0 : skewRaw;
    const percentiles = calculateFivePercentiles(scores);

    let topCount=0, frontCount=0, avgCount=0, backCount=0, bottomCount=0, failCount=0;
    students.forEach(s => {
        const lv = getFiveLevel(s.score, percentiles).level;
        if      (lv === "頂標") topCount++;
        else if (lv === "前標") frontCount++;
        else if (lv === "均標") avgCount++;
        else if (lv === "後標") backCount++;
        else if (lv === "底標") bottomCount++;
        else                    failCount++;
    });

    return {
        className, avg, median, maxVal, minVal, passRate, stdDev, skewness,
        gradeDist: [failCount, bottomCount, backCount, avgCount, frontCount, topCount],
        total: n, students, percentiles,
        topCount, frontCount, avgCount, backCount, bottomCount, failCount
    };
}

function radarDimensions(stats) {
    if (!stats) return [0,0,0,0,0,0];
    const stability  = stats.stdDev > 20 ? 35 : (stats.stdDev > 15 ? 55 : (stats.stdDev > 10 ? 70 : 88));
    const topRatio   = (stats.topCount / stats.total) * 100;
    const potential  = stats.skewness < -0.6 ? 88 : (stats.skewness > 0.7 ? 42 : 70);
    const balance    = 100 - Math.min(30, Math.abs(stats.avg - stats.median) * 1.8);
    return [
        Math.min(stats.avg, 100),
        stability,
        Math.min(topRatio, 100),
        Math.min(stats.passRate, 100),
        potential,
        Math.max(balance, 0)
    ];
}

// ─────────────────────────────────────────────
//  Report generators
// ─────────────────────────────────────────────
function generateRankingTable(students, stats, globalPercentiles) {
    if (!students || !students.length) return "";
    const sorted = [...students].sort((a,b) => b.score - a.score);
    const p = globalPercentiles || stats.percentiles;
    let html = `<h3>📊 學生成績排名表</h3>`;
    if (globalPercentiles) {
        html += `<p style="font-size:0.7rem;color:#6b4e2e;margin-bottom:6px;">
            ※ 五標採用全校統一標準：
            頂標 ${p.top.toFixed(0)} ／前標 ${p.front.toFixed(0)} ／均標 ${p.average.toFixed(0)} ／後標 ${p.back.toFixed(0)} ／底標 ${p.bottom.toFixed(0)}
        </p>`;
    }
    html += `<div class="ranking-table-wrapper"><table class="ranking-table">
        <thead><tr><th>名次</th><th>姓名</th><th>分數</th><th>與均差</th><th>五標等級</th></tr></thead>
        <tbody>`;
    sorted.forEach((st, idx) => {
        const rank = idx + 1;
        const rankClass = rank === 1 ? "rank-1" : rank === 2 ? "rank-2" : rank === 3 ? "rank-3" : "";
        const diff = (st.score - stats.avg).toFixed(1);
        const diffStr = diff >= 0 ? `+${diff}` : diff;
        const level = getFiveLevel(st.score, p);
        html += `<tr class="${rankClass}">
            <td>${rank}</td>
            <td style="text-align:left">${st.name}</td>
            <td><strong>${st.score}</strong></td>
            <td>${diffStr}</td>
            <td><span class="${level.class}">${level.level}</span></td>
        </tr>`;
    });
    html += `</tbody></table></div>`;
    return html;
}

function generateSoloCritique(stats) {
    const p = stats.percentiles;
    let t = `📊 統計摘要：平均 ${stats.avg.toFixed(1)} 分 | 中位數 ${stats.median.toFixed(1)} | 標準差 ${stats.stdDev.toFixed(1)}\n`;
    t += `🎯 【五標分數】頂標(88%): ${p.top.toFixed(0)} ／前標(75%): ${p.front.toFixed(0)} ／均標(50%): ${p.average.toFixed(0)} ／後標(25%): ${p.back.toFixed(0)} ／底標(12%): ${p.bottom.toFixed(0)}\n`;
    t += `📈 【五標人數】頂標 ${stats.topCount} 人 ／前標 ${stats.frontCount} 人 ／均標 ${stats.avgCount} 人 ／後標 ${stats.backCount} 人 ／底標 ${stats.bottomCount} 人 ／流標 ${stats.failCount} 人\n`;
    t += `🔖 及格率 ${stats.passRate.toFixed(1)}% | 頂標以上佔比 ${(stats.topCount/stats.total*100).toFixed(1)}%`;
    if (stats.failCount > 0) t += ` | ⚠️ 流標 ${stats.failCount} 人（未達底標）`;
    if (stats.stdDev > 18)   t += `\n⚠️ 成績極度離散，建議分組教學。`;
    else if (stats.stdDev > 12) t += `\n📌 成績差異中等，可採用差異化作業。`;
    return t;
}

function generateMultiComparisonCritique(statsList, labels, subject) {
    let allScores = [];
    statsList.forEach(s => { allScores = allScores.concat(s.students.map(st => st.score)); });
    const gp = calculateFivePercentiles(allScores);

    let t = subject ? `科目：${subject}\n` : "";
    t += `🏛️ ${statsList.length} 個班級對比分析\n`;
    t += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
    t += `📊 【全體合併五標標準（統一比較基準）】\n`;
    t += `   頂標: ${gp.top.toFixed(0)} | 前標: ${gp.front.toFixed(0)} | 均標: ${gp.average.toFixed(0)} | 後標: ${gp.back.toFixed(0)} | 底標: ${gp.bottom.toFixed(0)}\n\n`;
    t += `📈 【各班平均分對比】\n`;
    [...statsList].sort((a,b)=>b.avg-a.avg).forEach((s,i) => {
        const medal = i===0?"🏆":i===1?"🥈":"🥉";
        t += `   ${medal} ${s.className}：${s.avg.toFixed(1)} 分\n`;
    });
    t += `\n📊 【各班在統一五標下的人數分佈】\n`;
    t += `   班級\t頂\t前\t均\t後\t底\t流\n`;
    statsList.forEach(s => {
        let tc=0,fc=0,ac=0,bc=0,btc=0,fl=0;
        s.students.forEach(st => {
            const lv = getFiveLevel(st.score, gp).level;
            if      (lv==="頂標") tc++;
            else if (lv==="前標") fc++;
            else if (lv==="均標") ac++;
            else if (lv==="後標") bc++;
            else if (lv==="底標") btc++;
            else                  fl++;
        });
        t += `   ${s.className}\t${tc}\t${fc}\t${ac}\t${bc}\t${btc}\t${fl}\n`;
    });
    return { text: t, globalPercentiles: gp };
}

function generateTrackCritique(statsList, labels, cohort) {
    if (statsList.length < 2) return "至少需要兩次測驗";
    let html = cohort ? `<p><strong>對象：</strong>${cohort}</p>` : "";
    html += `<div class="table-wrapper"><table class="track-summary-table">
        <thead><tr>
            <th>測驗</th><th>平均</th><th>及格率</th>
            <th>頂標(88%)</th><th>前標(75%)</th><th>均標(50%)</th>
            <th>後標(25%)</th><th>底標(12%)</th><th>頂/前/均/後/底/流</th>
        </tr></thead><tbody>`;
    statsList.forEach((s, i) => {
        const p = s.percentiles;
        let trendHtml = "";
        if (i > 0) {
            const delta = s.avg - statsList[i-1].avg;
            if (Math.abs(delta) > 0.05)
                trendHtml = delta > 0
                    ? ` <span class="trend-up">▲${delta.toFixed(1)}</span>`
                    : ` <span class="trend-down">▼${Math.abs(delta).toFixed(1)}</span>`;
        }
        html += `<tr>
            <td><strong>${labels[i]}</strong>${trendHtml}</td>
            <td>${s.avg.toFixed(1)}</td>
            <td>${s.passRate.toFixed(1)}%</td>
            <td>${p.top.toFixed(0)}</td><td>${p.front.toFixed(0)}</td>
            <td>${p.average.toFixed(0)}</td><td>${p.back.toFixed(0)}</td>
            <td>${p.bottom.toFixed(0)}</td>
            <td style="font-size:0.7rem;">${s.topCount}/${s.frontCount}/${s.avgCount}/${s.backCount}/${s.bottomCount}/${s.failCount}</td>
        </tr>`;
    });
    html += `</tbody></table></div>`;
    const change = statsList[statsList.length-1].avg - statsList[0].avg;
    html += `<div style="margin-top:8px;padding:8px;background:#f0f4f0;border-radius:8px;font-size:0.8rem;">
        <strong>📈 趨勢：</strong>起始 ${statsList[0].avg.toFixed(1)} → 最新 ${statsList[statsList.length-1].avg.toFixed(1)}　`;
    html += change > 3  ? `顯著進步 <span class="trend-up">+${change.toFixed(1)}</span>`
          : change < -3 ? `明顯退步 <span class="trend-down">${change.toFixed(1)}</span>`
          : `維持穩定`;
    html += `</div>`;
    return html;
}

function showStudentReport(student, classStats, globalPercentiles) {
    const p = globalPercentiles || classStats.percentiles;
    const level = getFiveLevel(student.score, p);
    const diff  = classStats ? (student.score - classStats.avg).toFixed(1) : "—";
    const adviceMap = {
        "頂標":"頂標學生（前12%）！保持卓越，建議深化專題研究。",
        "前標":"前標優秀學生（前25%），建立錯題本，針對弱項加強。",
        "均標":"均標學生（前50%），基礎穩固，加強弱項單元。",
        "後標":"後標學生（前75%），需加強基礎，從課本例題重新推演。",
        "底標":"底標學生（前88%），建議參與課後輔導。",
        "流標":"流標學生，基礎薄弱，優先釐清核心概念。"
    };
    const modalDiv = document.createElement('div');
    modalDiv.className = 'student-modal-overlay';
    modalDiv.innerHTML = `
        <div class="student-modal-card">
            <h3>📋 ${student.name}</h3>
            <div style="display:flex;justify-content:space-between;margin:12px 0;background:#faf5e8;padding:12px;border-radius:16px;">
                <span><strong>成績</strong><br><span style="font-size:1.8rem;color:#9b6a42;">${student.score}</span></span>
                <span><strong>五標等級</strong><br><span class="${level.class}" style="font-size:1rem;padding:4px 12px;">${level.level}</span></span>
                <span><strong>班級均差</strong><br>${diff >= 0 ? '+' + diff : diff}</span>
            </div>
            <div><strong>📌 學習策略</strong><br>${adviceMap[level.level] || ""}</div>
            <div style="text-align:right;margin-top:12px;"><button class="close-modal">關閉</button></div>
        </div>`;
    document.body.appendChild(modalDiv);
    modalDiv.querySelector('.close-modal').addEventListener('click', () => modalDiv.remove());
    modalDiv.addEventListener('click', e => { if (e.target === modalDiv) modalDiv.remove(); });
}

function destroyCharts() {
    Object.keys(currentCharts).forEach(k => {
        if (currentCharts[k]) { currentCharts[k].destroy(); currentCharts[k] = null; }
    });
}

// After charts are created, capture them as PNG for print
function captureChartsForPrint() {
    const pairs = [
        ['chartPrimary',      'imgPrimary'],
        ['chartRadar',        'imgRadar'],
        ['chartSecondary',    'imgSecondary'],
        ['chartDistribution', 'imgDistribution']
    ];
    // Small delay so Chart.js finishes rendering
    setTimeout(() => {
        pairs.forEach(([canvasId, imgId]) => {
            const canvas = document.getElementById(canvasId);
            const img    = document.getElementById(imgId);
            if (canvas && img) {
                try { img.src = canvas.toDataURL('image/png'); }
                catch(e) { /* cross-origin, skip */ }
            }
        });
    }, 400);
}

function renderFullReport(mode, payload) {
    currentReportPayload = { mode, payload };
    document.getElementById("welcomePlaceholder").classList.add("hidden");
    document.getElementById("dynamicReport").classList.remove("hidden");

    const { statsList, labels, titleText, subText, radarDatasets, extraInfo } = payload;

    // ── Stat grid ──
    const statGrid = document.getElementById("statGrid");
    if (mode === "solo" && statsList[0]) {
        const s = statsList[0], p = s.percentiles;
        statGrid.innerHTML = [
            [s.avg.toFixed(1),         "平均"],
            [p.top.toFixed(0),         "頂標 88%"],
            [p.front.toFixed(0),       "前標 75%"],
            [p.average.toFixed(0),     "均標 50%"],
            [p.back.toFixed(0),        "後標 25%"],
            [p.bottom.toFixed(0),      "底標 12%"],
            [s.passRate.toFixed(0)+"%","及格率"],
            [s.stdDev.toFixed(1),      "標準差"]
        ].map(([v,l]) => `<div class="stat-card"><div class="stat-val">${v}</div><div class="stat-label">${l}</div></div>`).join('');
    } else if (mode === "multi") {
        statGrid.innerHTML = statsList.map((s,i) =>
            `<div class="stat-card"><div class="stat-val">${s.avg.toFixed(1)}</div><div class="stat-label">${labels[i]}<br>平均</div></div>`
        ).join('');
    } else {
        statGrid.innerHTML = statsList.map((s,i) =>
            `<div class="stat-card"><div class="stat-val">${s.avg.toFixed(1)}</div><div class="stat-label">${labels[i]}</div></div>`
        ).join('');
    }

    document.getElementById("reportTitle").textContent = titleText;
    document.getElementById("reportSub").innerHTML     = subText;

    // ── Destroy old charts ──
    destroyCharts();

    const CHART_OPTS = { responsive: true, maintainAspectRatio: true };

    // Primary chart
    const ctx1 = document.getElementById("chartPrimary").getContext("2d");
    if (mode === "solo") {
        currentCharts.primary = new Chart(ctx1, { type:'bar', data:{
            labels:['流標','底標','後標','均標','前標','頂標'],
            datasets:[{ label:'人數', data: statsList[0].gradeDist,
                backgroundColor:['#8b4513','#c53030','#c08530','#9b6a42','#2c6e2c','#1a5d1a'] }]
        }, options: CHART_OPTS });
    } else if (mode === "multi") {
        currentCharts.primary = new Chart(ctx1, { type:'bar', data:{
            labels, datasets:[{ label:'平均分', data: statsList.map(s=>s.avg),
                backgroundColor: statsList.map((_,i)=>getColor(i,0.7)) }]
        }, options: CHART_OPTS });
    } else {
        currentCharts.primary = new Chart(ctx1, { type:'line', data:{
            labels, datasets:[{ label:'平均分趨勢', data: statsList.map(s=>s.avg),
                borderColor:'#9b6a42', backgroundColor:'rgba(155,106,66,0.1)', fill:true, tension:0.3 }]
        }, options: CHART_OPTS });
    }

    // Radar chart
    const ctxR = document.getElementById("chartRadar").getContext("2d");
    currentCharts.radar = new Chart(ctxR, { type:'radar', data:{
        labels:['學力','穩定','頂尖佔比','及格','潛力','均衡'],
        datasets: radarDatasets
    }, options:{ ...CHART_OPTS, scales:{ r:{ min:0, max:100 } } } });

    // Secondary chart
    const ctx2 = document.getElementById("chartSecondary").getContext("2d");
    if (mode === "multi") {
        currentCharts.secondary = new Chart(ctx2, { type:'bar', data:{
            labels, datasets:[{ label:'標準差', data: statsList.map(s=>s.stdDev),
                backgroundColor: statsList.map((_,i)=>getColor(i,0.7)) }]
        }, options: CHART_OPTS });
    } else if (mode === "track") {
        const progress = statsList.map((s,i) =>
            i===0 ? 0 : parseFloat((s.avg - statsList[i-1].avg).toFixed(1)));
        currentCharts.secondary = new Chart(ctx2, { type:'bar', data:{
            labels, datasets:[{ label:'進步幅度', data: progress,
                backgroundColor: progress.map(v => v>=0 ? '#276749' : '#c53030') }]
        }, options: CHART_OPTS });
    } else {
        const s = statsList[0];
        currentCharts.secondary = new Chart(ctx2, { type:'line', data:{
            labels:['最低','中位','最高'],
            datasets:[{ label:'分佈', data:[s.minVal, s.median, s.maxVal],
                borderColor:'#6b4e2e', tension:0.3 }]
        }, options: CHART_OPTS });
    }

    // Distribution chart
    const ctx3 = document.getElementById("chartDistribution").getContext("2d");
    if (mode === "solo") {
        currentCharts.distribution = new Chart(ctx3, { type:'pie', data:{
            labels:['流標','底標','後標','均標','前標','頂標'],
            datasets:[{ data: statsList[0].gradeDist,
                backgroundColor:['#8b4513','#c53030','#c08530','#9b6a42','#2c6e2c','#1a5d1a'] }]
        }, options: CHART_OPTS });
    } else if (mode === "track") {
        currentCharts.distribution = new Chart(ctx3, { type:'line', data:{
            labels, datasets:[
                { label:'及格率%',    data: statsList.map(s=>s.passRate),  borderColor:'#276749', fill:true, tension:0.3 },
                { label:'頂標分數', data: statsList.map(s=>s.percentiles.top), borderColor:'#9b6a42', borderDash:[5,5], tension:0.3 }
            ]
        }, options: CHART_OPTS });
    } else {
        currentCharts.distribution = new Chart(ctx3, { type:'line', data:{
            labels, datasets:[{ label:'及格率%', data: statsList.map(s=>s.passRate),
                borderColor:'#9b6a42', tension:0.3 }]
        }, options: CHART_OPTS });
    }

    // ── Critique ──
    const critiqueDiv = document.getElementById("academicCritique");
    if (mode === "solo") {
        critiqueDiv.innerHTML = `<strong>📐 學術評鑑報告（五標／流標）</strong>\n${generateSoloCritique(statsList[0])}`;
        currentGlobalPercentiles = null;
    } else if (mode === "multi") {
        const result = generateMultiComparisonCritique(statsList, labels, extraInfo?.subject || "");
        critiqueDiv.innerHTML = `<strong>🏛️ 班際橫向對比（統一五標標準）</strong>\n${result.text}`;
        currentGlobalPercentiles = result.globalPercentiles;  // set BEFORE ranking tables
    } else {
        critiqueDiv.innerHTML = `<strong>📈 縱向追蹤評鑑</strong>${generateTrackCritique(statsList, labels, extraInfo?.cohort || "")}`;
        currentGlobalPercentiles = null;
    }

    // ── Ranking tables ──
    const rankingSection = document.getElementById("rankingSection");
    if (mode === "solo" && statsList[0]?.students) {
        rankingSection.innerHTML = generateRankingTable(statsList[0].students, statsList[0], null);
    } else if (mode === "multi" && statsList.length > 0 && currentGlobalPercentiles) {
        let html = `<h3>📊 各班學生成績排名（統一五標標準）</h3>`;
        statsList.forEach(s => {
            html += `<div style="margin-top:20px;">
                <h4 style="color:#6b4e2e;margin:10px 0 5px;">${s.className}</h4>
                ${generateRankingTable(s.students, s, currentGlobalPercentiles)}
            </div>`;
        });
        rankingSection.innerHTML = html;
    } else {
        rankingSection.innerHTML = "";
    }

    // ── Student list (screen only) ──
    const studentContainer = document.getElementById("studentListInsight");
    if (mode === "solo" && statsList[0]?.students) {
        const p = statsList[0].percentiles;
        studentContainer.innerHTML =
            `<div style="font-weight:600;margin-bottom:6px;font-size:0.8rem;">🎓 學生名冊（點擊查看五標診斷）</div>` +
            statsList[0].students.map(s => {
                const lv = getFiveLevel(s.score, p);
                return `<span class="student-badge" data-name="${s.name}" data-score="${s.score}">📌 ${s.name} ${s.score}（${lv.level}）</span>`;
            }).join('');
        studentContainer.querySelectorAll('.student-badge').forEach(el => {
            el.addEventListener('click', () =>
                showStudentReport({ name: el.dataset.name, score: parseFloat(el.dataset.score) }, statsList[0], null));
        });
    } else if (mode === "multi" && statsList.length > 0 && currentGlobalPercentiles) {
        let html = `<div style="font-weight:600;margin-bottom:6px;font-size:0.8rem;">🎓 全體學生名冊（點擊查看統一五標診斷）</div>`;
        statsList.forEach(s => {
            html += `<div style="margin-top:8px;"><strong style="color:#6b4e2e;">${s.className}</strong><br>`;
            s.students.forEach(st => {
                const lv = getFiveLevel(st.score, currentGlobalPercentiles);
                html += `<span class="student-badge" data-name="${st.name}" data-score="${st.score}" data-class="${s.className}">📌 ${st.name} ${st.score}（${lv.level}）</span>`;
            });
            html += `</div>`;
        });
        studentContainer.innerHTML = html;
        studentContainer.querySelectorAll('.student-badge').forEach(el => {
            el.addEventListener('click', () => {
                const cs = statsList.find(s => s.className === el.dataset.class);
                showStudentReport({ name: el.dataset.name, score: parseFloat(el.dataset.score) }, cs, currentGlobalPercentiles);
            });
        });
    } else {
        studentContainer.innerHTML = "";
    }

    // Capture charts as images for print
    captureChartsForPrint();
}

// ─────────────────────────────────────────────
//  Run functions
// ─────────────────────────────────────────────
function runSolo() {
    const className = (document.getElementById("soloClassName")?.value || "").trim() || "班級";
    const subject   = (document.getElementById("soloSubject")?.value   || "").trim() || "科目";
    const raw = document.getElementById("soloRawData")?.value || "";
    if (!raw.trim()) { alert("請輸入學生資料"); return; }
    const students = parseStudentData(raw);
    if (!students.length) { alert("無法解析資料，請確認格式（姓名 分數）"); return; }
    const stats = computeStats(students, className);
    if (!stats) return;
    renderFullReport("solo", {
        statsList: [stats], labels: [className],
        titleText: `${className} · ${subject} 五標分析`,
        subText:   `樣本 ${students.length} 人 | ${new Date().toLocaleDateString('zh-TW')}`,
        radarDatasets: [{
            label: className, data: radarDimensions(stats),
            borderColor: '#b7791f', backgroundColor: 'rgba(183,121,31,0.2)'
        }]
    });
}

function runMulti() {
    const statsList = [], labels = [];
    const subject = (document.getElementById("multiSubject")?.value || "").trim();
    for (let i = 1; i <= 5; i++) {
        const nameEl = document.getElementById(`multiName${i}`);
        const dataEl = document.getElementById(`multiData${i}`);
        if (!nameEl || !dataEl || !dataEl.value.trim()) continue;
        const students  = parseStudentData(dataEl.value);
        if (!students.length) continue;
        const className = nameEl.value.trim() || `班級${i}`;
        const stats = computeStats(students, className);
        if (stats) { statsList.push(stats); labels.push(className); }
    }
    if (statsList.length < 2) { alert("至少需要兩個有效班級的資料"); return; }
    const radarDatasets = statsList.map((st,i) => ({
        label: labels[i], data: radarDimensions(st),
        borderColor: getColor(i,1), backgroundColor: getColor(i,0.15), fill: false
    }));
    renderFullReport("multi", {
        statsList, labels,
        titleText: "班際橫向對比 · 統一五標標準",
        subText:   `${statsList.length} 個班級${subject ? ` · ${subject}` : ""}`,
        radarDatasets,
        extraInfo: { subject }
    });
}

function runTrack() {
    const statsList = [], labels = [];
    const cohort = (document.getElementById("trackCohort")?.value || "").trim();
    for (let i = 1; i <= 5; i++) {
        const labelEl = document.getElementById(`trackLabel${i}`);
        const dataEl  = document.getElementById(`trackData${i}`);
        if (!labelEl || !dataEl || !dataEl.value.trim()) continue;
        const students = parseStudentData(dataEl.value);
        if (!students.length) continue;
        const examName = labelEl.value.trim() || `測驗${i}`;
        const stats = computeStats(students, examName);
        if (stats) { labels.push(examName); statsList.push(stats); }
    }
    if (statsList.length < 2) { alert("請至少輸入兩次測驗的資料"); return; }
    const lastDim = radarDimensions(statsList[statsList.length-1]);
    renderFullReport("track", {
        statsList, labels,
        titleText: "縱向追蹤 · 五標演化",
        subText:   `${statsList.length} 次測驗${cohort ? ` · ${cohort}` : ""}`,
        radarDatasets: [{ label:"最新指標", data: lastDim, borderColor:'#9b6a42', backgroundColor:'rgba(155,106,66,0.15)' }],
        extraInfo: { cohort }
    });
}

function executeAnalysis() {
    if      (activeMode === "solo")  runSolo();
    else if (activeMode === "multi") runMulti();
    else                             runTrack();
}

                <div class="info-note">姓名 分數，空格 / Tab / 逗號分隔，每人一行</div>
            </div>
            <button class="btn-run" id="dynamicRunBtn">生成五標報告</button>`;
    } else if (activeMode === "multi") {
        html = `<div class="input-card"><h4>📌 科目</h4><input id="multiSubject" placeholder="科目名稱"></div>`;
        for (let i = 1; i <= 5; i++)
            html += `<div class="input-card"><h4>班級 ${i}</h4>
                <input id="multiName${i}" placeholder="班級名稱">
                <textarea id="multiData${i}" rows="3" placeholder="姓名 分數（每人一行）"></textarea></div>`;
        html += `<button class="btn-run" id="dynamicRunBtn">班際對比分析</button>`;
    } else {
        html = `<div class="input-card"><h4>📌 追蹤對象</h4><input id="trackCohort" placeholder="班級或學生群組名稱"></div>`;
        for (let i = 1; i <= 5; i++)
            html += `<div class="input-card"><h4>測驗 ${i}</h4>
                <input id="trackLabel${i}" placeholder="測驗名稱（如：第一次段考）">
                <textarea id="trackData${i}" rows="3" placeholder="姓名 分數（每人一行）"></textarea></div>`;
        html += `<button class="btn-run" id="dynamicRunBtn">縱向追蹤分析</button>`;
    }
    panel.innerHTML = html;
    document.getElementById("dynamicRunBtn").addEventListener("click", executeAnalysis);
}

// ─────────────────────────────────────────────
//  Init
// ─────────────────────────────────────────────
function initTabs() {
    document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            activeMode = btn.getAttribute("data-mode");
            buildDynamicForms();
            document.getElementById("welcomePlaceholder").classList.remove("hidden");
            document.getElementById("dynamicReport").classList.add("hidden");
            currentReportPayload = null;
            currentGlobalPercentiles = null;
            destroyCharts();
        });
    });
    buildDynamicForms();
}

// Print button: use event delegation so it always works regardless of render order
document.getElementById("reportPanel").addEventListener("click", e => {
    if (e.target && e.target.id === "printReportBtn") printReport();
});

initTabs();
</script>
</body>
</html>
