<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Shirley's Grade Analysis Tools | 五標學術評鑑系統</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f0ede5; font-family: 'Times New Roman', 'Noto Serif TC', 'Georgia', serif; padding: 24px; color: #2c3e2f; }
        .academic-container { max-width: 1500px; margin: 0 auto; background: white; box-shadow: 0 20px 40px -12px rgba(0,0,0,0.12); border-radius: 6px; overflow: hidden; border-top: 6px solid #9b6a42; }
        header { background: #fefaf2; padding: 20px 28px; text-align: center; border-bottom: 1px solid #e2d8ca; }
        h1 { font-size: 1.6rem; letter-spacing: 1px; color: #2c3e2f; font-weight: 600; }
        .sub { color: #7e6b4b; font-style: italic; font-size: 0.85rem; }
        .lang-toggle-bar { display: flex; justify-content: flex-end; align-items: center; background: #f5efe5; padding: 6px 18px; border-bottom: 1px solid #ddd0bc; gap: 6px; }
        .lang-btn { padding: 4px 14px; font-size: 0.75rem; font-weight: 700; border: 1px solid #c2a15b; border-radius: 20px; background: transparent; cursor: pointer; color: #6b4e2e; font-family: inherit; }
        .lang-btn.active { background: #9b6a42; color: white; border-color: #9b6a42; }
        .tabs { display: flex; background: #f5efe5; border-bottom: 1px solid #ddd0bc; flex-wrap: wrap; }
        .tab-btn { flex: 1; padding: 12px 0; font-size: 0.9rem; font-weight: 600; background: transparent; border: none; cursor: pointer; transition: 0.2s; color: #5a4a2e; font-family: inherit; min-width: 100px; }
        .tab-btn.active { background: white; color: #9b6a42; border-bottom: 3px solid #9b6a42; }
        .dashboard { display: flex; flex-wrap: wrap; }
        .input-panel { width: 360px; background: #fefcf8; border-right: 1px solid #e8dfd0; padding: 20px 18px; overflow-y: auto; max-height: calc(100vh - 160px); }
        .report-panel { flex: 1; min-width: 0; background: white; padding: 20px 24px; overflow-y: auto; max-height: calc(100vh - 160px); }
        .input-card { background: white; border: 1px solid #ece0cf; margin-bottom: 18px; padding: 14px; border-radius: 12px; }
        .input-card h4 { font-size: 0.85rem; font-weight: 700; color: #6b4e2e; margin-bottom: 10px; border-left: 3px solid #c2a15b; padding-left: 8px; }
        label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; display: block; margin-bottom: 4px; color: #5a4a2e; }
        input, textarea { width: 100%; padding: 8px 10px; border: 1px solid #ddd0bd; border-radius: 8px; font-size: 0.8rem; font-family: 'Courier New', monospace; margin-bottom: 10px; background: #fffefb; }
        textarea { resize: vertical; }
        .btn-run, .btn-print { width: 100%; background: #9b6a42; color: white; border: none; padding: 12px; font-weight: 700; font-size: 0.9rem; border-radius: 40px; margin-top: 6px; cursor: pointer; }
        .btn-print { background: #5a6e4a; margin-top: 10px; }
        .btn-run:hover { background: #7c5535; }
        .btn-print:hover { background: #4a5a3a; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(85px, 1fr)); gap: 8px; margin-bottom: 20px; }
        .stat-card { background: #fefaf5; border: 1px solid #ece2d4; border-radius: 12px; text-align: center; padding: 8px 4px; }
        .stat-card .stat-val { font-size: 1.2rem; font-weight: 800; color: #9b6a42; line-height: 1.2; }
        .stat-card .stat-label { font-size: 0.6rem; color: #8b7a62; }
        .chart-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; margin: 20px 0; }
        .chart-box { background: #fff; border: 1px solid #e9dfcf; border-radius: 16px; padding: 12px; overflow: hidden; position: relative; }
        .chart-box canvas { display: block; width: 100% !important; }
        .academic-critique { background: #fdf9f0; border-left: 6px solid #b68b40; padding: 14px 20px; margin: 20px 0; border-radius: 12px; line-height: 1.6; font-size: 0.85rem; white-space: pre-line; }
        .ranking-section { margin: 16px 0; }
        .ranking-section h3 { font-size: 0.9rem; margin-bottom: 8px; color: #6b4e2e; display: inline-block; border-bottom: 1px solid #c2a15b; }
        .ranking-table-wrapper { overflow-x: auto; margin: 8px 0; border-radius: 10px; border: 1px solid #e2d8ca; }
        .ranking-table { width: 100%; border-collapse: collapse; font-size: 0.7rem; }
        .ranking-table th, .ranking-table td { border: 1px solid #ddd0bc; padding: 6px 8px; text-align: center; }
        .ranking-table th { background: #f5efe5; color: #6b4e2e; font-weight: 700; }
        .ranking-table td:first-child, .ranking-table th:first-child { width: 45px; }
        .ranking-table td:nth-child(2) { text-align: left; }
        .rank-1 { background: #fef5e0; }
        .rank-2 { background: #faf0e0; }
        .rank-3 { background: #f5ebe0; }
        .label-top    { background: #1a5d1a; color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.65rem; display: inline-block; }
        .label-front  { background: #2c6e2c; color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.65rem; display: inline-block; }
        .label-average{ background: #9b6a42; color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.65rem; display: inline-block; }
        .label-back   { background: #c08530; color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.65rem; display: inline-block; }
        .label-bottom { background: #c53030; color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.65rem; display: inline-block; }
        .label-fail   { background: #8b4513; color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.65rem; display: inline-block; }
        .table-wrapper { overflow-x: auto; margin: 16px 0; border-radius: 10px; border: 1px solid #e2d8ca; }
        .track-summary-table { width: 100%; min-width: 800px; border-collapse: collapse; font-size: 0.75rem; }
        .track-summary-table th, .track-summary-table td { border: 1px solid #ddd0bc; padding: 8px 6px; text-align: center; }
        .track-summary-table th { background: #f5efe5; color: #6b4e2e; font-weight: 700; }
        .trend-up { color: #276749; font-weight: bold; }
        .trend-down { color: #c53030; font-weight: bold; }
        .student-detail-list { margin-top: 16px; border-top: 1px solid #e2d8ca; padding-top: 12px; }
        .student-badge { display: inline-flex; align-items: center; gap: 4px; background: #f0eae0; border-radius: 30px; padding: 4px 10px; margin: 4px 6px; font-size: 0.7rem; cursor: pointer; }
        .student-badge:hover { background: #dac29c; }
        .student-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .student-modal-card { background: white; max-width: 450px; width: 90%; border-radius: 24px; padding: 20px; border-top: 5px solid #9b6a42; }
        .close-modal { background: #e8dfd0; border: none; padding: 6px 16px; border-radius: 30px; margin-top: 12px; cursor: pointer; }
        .hidden { display: none !important; }
        .info-note { font-size: 0.65rem; color: #9a8a70; margin-top: 5px; }
        .chart-print-img { display: none; width: 100%; max-height: 200px; object-fit: contain; }

        @media print {
            .no-print, .tabs, .input-panel, .student-badge, .student-detail-list, .student-modal-overlay, .btn-run, .btn-print, .lang-toggle-bar { display: none !important; }
            html, body { background: white !important; padding: 0 !important; margin: 0 !important; width: 100% !important; font-size: 10pt; }
            .academic-container { max-width: 100% !important; margin: 0 !important; box-shadow: none !important; border: none !important; border-top: 4pt solid #9b6a42 !important; }
            .dashboard { display: block !important; }
            .report-panel { width: 100% !important; max-width: 100% !important; max-height: none !important; overflow: visible !important; padding: 12pt 16pt !important; }
            .stat-grid { display: grid !important; grid-template-columns: repeat(4, 1fr) !important; gap: 5pt !important; margin-bottom: 10pt !important; }
            .stat-card { padding: 4pt !important; border: 0.5pt solid #ccc !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .stat-card .stat-val { font-size: 11pt !important; }
            .stat-card .stat-label { font-size: 7pt !important; }
            .chart-row { display: grid !important; grid-template-columns: repeat(2, 1fr) !important; gap: 10pt !important; margin: 10pt 0 !important; }
            .chart-box { border: 0.5pt solid #ccc !important; padding: 6pt !important; break-inside: avoid !important; page-break-inside: avoid !important; }
            .chart-box canvas { display: none !important; }
            .chart-print-img { display: block !important; }
            .academic-critique { break-inside: avoid !important; page-break-inside: avoid !important; padding: 8pt 12pt !important; margin: 8pt 0 !important; font-size: 8.5pt !important; border-left: 4pt solid #b68b40 !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .ranking-section { margin: 10pt 0 !important; }
            .ranking-table-wrapper { border: 0.5pt solid #999 !important; }
            .ranking-table { font-size: 7.5pt !important; }
            .ranking-table th, .ranking-table td { padding: 3pt 5pt !important; }
            .ranking-table th, .rank-1, .rank-2, .rank-3 { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .ranking-table tr { break-inside: avoid !important; page-break-inside: avoid !important; }
            .table-wrapper { border: 0.5pt solid #999 !important; overflow: visible !important; }
            .track-summary-table { font-size: 7.5pt !important; min-width: unset !important; width: 100% !important; }
            .track-summary-table th, .track-summary-table td { padding: 3pt 4pt !important; }
            .track-summary-table th { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .track-summary-table tr { break-inside: avoid !important; page-break-inside: avoid !important; }
            .label-top, .label-front, .label-average, .label-back, .label-bottom, .label-fail { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            h2 { font-size: 14pt !important; margin: 6pt 0 4pt !important; }
            h3 { font-size: 11pt !important; margin: 5pt 0 !important; }
            h4 { font-size: 9pt !important; margin: 4pt 0 !important; }
            p  { margin: 3pt 0 !important; }
            @page { size: A4; margin: 15mm 12mm; }
        }
        @media (max-width: 780px) {
            .input-panel { width: 100%; border-right: none; border-bottom: 1px solid #e8dfd0; max-height: none; }
            .report-panel { max-height: none; padding: 16px; }
        }
    </style>
</head>
<body>
<div class="academic-container">
    <header class="no-print">
        <h1>Shirley's Grade Analysis Tools</h1>
        <p class="sub">Five-Threshold Academic Assessment System &#xb7; 五標學術評鑑 &#xb7; 頂標／前標／均標／後標／底標／流標</p>
    </header>

    <div class="lang-toggle-bar no-print">
        <span style="font-size:0.72rem;color:#7e6b4b;margin-right:4px;">Language 語言：</span>
        <button class="lang-btn active" id="btnZh" onclick="setLang('zh')">中文</button>
        <button class="lang-btn" id="btnEn" onclick="setLang('en')">English</button>
    </div>

    <div class="tabs no-print">
        <button class="tab-btn active" data-mode="solo">📖 <span class="t-solo-tab">單班分析</span></button>
        <button class="tab-btn" data-mode="multi">📊 <span class="t-multi-tab">班際對比</span></button>
        <button class="tab-btn" data-mode="track">📈 <span class="t-track-tab">縱向追蹤</span></button>
    </div>

    <div class="dashboard">
        <div class="input-panel no-print" id="inputPanel"></div>
        <div class="report-panel" id="reportPanel">
            <div id="welcomePlaceholder" class="academic-critique" style="text-align:center;">
                <p id="welcomeLine1">📐 選擇模式並輸入數據</p>
                <p id="welcomeLine2" style="font-size:0.8rem; margin-top:6px;">支援 Excel 貼上（姓名 分數），空格 / Tab / 逗號皆可</p>
            </div>
            <div id="dynamicReport" class="hidden">
                <h2 id="reportTitle" style="font-size:1.2rem; color:#2c3e2f; border-left:4px solid #b68b40; padding-left:10px;"></h2>
                <p id="reportSub" style="color:#8b7a62; font-size:0.75rem; margin-bottom:12px;"></p>
                <div class="stat-grid" id="statGrid"></div>
                <div class="chart-row">
                    <div class="chart-box"><canvas id="chartPrimary"></canvas><img class="chart-print-img" id="imgPrimary" alt="Primary Chart"></div>
                    <div class="chart-box"><canvas id="chartRadar"></canvas><img class="chart-print-img" id="imgRadar" alt="Radar Chart"></div>
                </div>
                <div class="chart-row">
                    <div class="chart-box"><canvas id="chartSecondary"></canvas><img class="chart-print-img" id="imgSecondary" alt="Secondary Chart"></div>
                    <div class="chart-box"><canvas id="chartDistribution"></canvas><img class="chart-print-img" id="imgDistribution" alt="Distribution Chart"></div>
                </div>
                <div class="academic-critique" id="academicCritique"></div>
                <div id="rankingSection" class="ranking-section"></div>
                <div id="studentListInsight" class="student-detail-list"></div>
                <div class="no-print" style="margin-top:16px;">
                    <button class="btn-print" id="printReportBtn">🖨️ <span class="t-print-btn">列印報告</span></button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// ─── Language ───────────────────────────────────────────
let lang = "zh";

const T = {
    zh: {
        soloTab: "單班分析",
        multiTab: "班際對比",
        trackTab: "縱向追蹤",
        welcome1: "📐 選擇模式並輸入數據",
        welcome2: "支援 Excel 貼上（姓名 分數），空格 / Tab / 逗號皆可",
        printBtn: "列印報告",

        // Input labels
        classInfo: "📌 班級資訊",
        className: "班級名稱（如：甲班）",
        subject: "科目（如：數學）",
        dataInput: "📝 成績輸入",
        dataPlaceholder: "王小明 92\n林雅筑 87\n陳大文\t76",
        dataNote: "姓名 分數，空格 / Tab / 逗號分隔，每人一行",
        runSolo: "生成五標報告",
        subjectLabel: "科目",
        subjectPlaceholder: "科目名稱",
        classLabel: "班級",
        classPlaceholder: "班級名稱",
        classDataPlaceholder: "姓名 分數（每人一行）",
        runMulti: "班際對比分析",
        trackTarget: "📌 追蹤對象",
        trackCohortPlaceholder: "班級或學生群組名稱",
        examLabel: "測驗",
        examNamePlaceholder: "測驗名稱（如：第一次段考）",
        runTrack: "縱向追蹤分析",

        // Stat labels
        avg: "平均",
        top88: "頂標 88%",
        front75: "前標 75%",
        avg50: "均標 50%",
        back25: "後標 25%",
        btm12: "底標 12%",
        passRate: "及格率",
        stdDev: "標準差",
        classAvg: "平均",

        // Grade levels
        topLabel: "頂標",
        frontLabel: "前標",
        avgLabel: "均標",
        backLabel: "後標",
        bottomLabel: "底標",
        failLabel: "流標",

        // Chart labels
        gradeDistLabels: ["流標","底標","後標","均標","前標","頂標"],
        radarLabels: ["學力","穩定","頂尖佔比","及格","潛力","均衡"],
        count: "人數",
        avgScore: "平均分",
        stdDevLabel: "標準差",
        progressLabel: "進步幅度",
        distLabel: "分佈",
        passRateLabel: "及格率%",
        topScoreLabel: "頂標分數",

        // Critique
        soloTitle: "📐 學術評鑑報告（五標／流標）",
        multiTitle: "🏛️ 班際橫向對比（統一五標標準）",
        trackTitle: "📈 縱向追蹤評鑑",
        stats: (avg, med, sd) => `📊 統計摘要：平均 ${avg} 分 | 中位數 ${med} | 標準差 ${sd}`,
        benchmarks: (t,f,a,b,bt) => `🎯 【五標分數】頂標(88%): ${t} ／前標(75%): ${f} ／均標(50%): ${a} ／後標(25%): ${b} ／底標(12%): ${bt}`,
        distCount: (t,f,a,b,bt,fl) => `📈 【五標人數】頂標 ${t} 人 ／前標 ${f} 人 ／均標 ${a} 人 ／後標 ${b} 人 ／底標 ${bt} 人 ／流標 ${fl} 人`,
        passInfo: (pr, tr) => `🔖 及格率 ${pr}% | 頂標以上佔比 ${tr}%`,
        failWarn: (n) => ` | ⚠️ 流標 ${n} 人（未達底標）`,
        highSD: "⚠️ 成績極度離散，建議分組教學。",
        midSD: "📌 成績差異中等，可採用差異化作業。",
        multiClasses: (n) => `🏛️ ${n} 個班級對比分析`,
        globalBench: "📊 【全體合併五標標準（統一比較基準）】",
        globalBenchLine: (t,f,a,b,bt) => `   頂標: ${t} | 前標: ${f} | 均標: ${a} | 後標: ${b} | 底標: ${bt}`,
        rankByAvg: "📈 【各班平均分對比】",
        distByClass: "📊 【各班在統一五標下的人數分佈】",
        distHeader: "   班級\t頂\t前\t均\t後\t底\t流",
        subjectLine: (s) => `科目：${s}`,
        rankingTitle: "📊 學生成績排名表",
        unifiedNote: (t,f,a,b,bt) => `※ 五標採用全校統一標準：頂標 ${t} ／前標 ${f} ／均標 ${a} ／後標 ${b} ／底標 ${bt}`,
        rankHeader: ["名次","姓名","分數","與均差","五標等級"],
        allClassRanking: "📊 各班學生成績排名（統一五標標準）",
        studentRoster: "🎓 學生名冊（點擊查看五標診斷）",
        allStudentRoster: "🎓 全體學生名冊（點擊查看統一五標診斷）",
        trackCohortLabel: "對象：",
        trackHeader: ["測驗","平均","及格率","頂標(88%)","前標(75%)","均標(50%)","後標(25%)","底標(12%)","頂/前/均/後/底/流"],
        trackTrend: (start, last) => `<strong>📈 趨勢：</strong>起始 ${start} → 最新 ${last}　`,
        trendUp: (d) => `顯著進步 <span class="trend-up">+${d}</span>`,
        trendDown: (d) => `明顯退步 <span class="trend-down">${d}</span>`,
        trendStable: "維持穩定",
        sampleInfo: (n) => `樣本 ${n} 人`,
        multiSubInfo: (n, s) => `${n} 個班級${s ? ` · ${s}` : ""}`,
        trackSubInfo: (n, c) => `${n} 次測驗${c ? ` · ${c}` : ""}`,
        adviceTop: "頂標學生（前12%）！保持卓越，建議深化專題研究。",
        adviceFront: "前標優秀學生（前25%），建立錯題本，針對弱項加強。",
        adviceAvg: "均標學生（前50%），基礎穩固，加強弱項單元。",
        adviceBack: "後標學生（前75%），需加強基礎，從課本例題重新推演。",
        adviceBottom: "底標學生（前88%），建議參與課後輔導。",
        adviceFail: "流標學生，基礎薄弱，優先釐清核心概念。",
        modalScore: "成績",
        modalLevel: "五標等級",
        modalDiff: "班級均差",
        modalStrategy: "📌 學習策略",
        closeModal: "關閉",
        analysisTitle: (cn, sub) => `${cn} · ${sub} 五標分析`,
        multiReportTitle: "班際橫向對比 · 統一五標標準",
        trackReportTitle: "縱向追蹤 · 五標演化",
        noData: "請輸入學生資料",
        parseError: "無法解析資料，請確認格式（姓名 分數）",
        needTwoClasses: "至少需要兩個有效班級的資料",
        needTwoExams: "請至少輸入兩次測驗的資料",
        needTwoExamsMin: "至少需要兩次測驗",
        noPrintAlert: "請先生成報告後再列印",

        // GSAT grade scale
        gsatSection: "📋 學測級分換算",
        gsatTop1Avg: "前1%考生平均原始分數（全國參考值，選填）",
        gsatTop1AvgPlaceholder: "留空則依全班／全校自動推算",
        gsatTop1Note: "填入全國參考值（= 級距 × 15）可得標準化級分；留空則自動以輸入成績中前1%推算",
        gsatInterval: "級距",
        gsatFullMark: "滿級分（15級）人數",
        gsatGradeLabel: "學測級分",
        gsatDistLabel: "級分分佈（1–15）",
        gsatFullMarkBadge: "滿級分",
        gsatAvgGrade: "平均級分",

const colorPalette = ['#1a365d','#b7791f','#2c5282','#9b6a42','#276749','#c53030','#2b6cb0','#d69e2e'];
function getColor(index, opacity=0.7) {
    const hex = colorPalette[index % colorPalette.length];
    if (opacity===1) return hex;
    const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${opacity})`;
}

// ─── Parse ──────────────────────────────────────────────
function parseStudentData(rawText) {
    if (!rawText||!rawText.trim()) return [];
    const lines = rawText.split(/\r?\n/);
    const students = [];
    for (let line of lines) {
        line = line.trim();
        if (!line) continue;
        let parts;
        if      (line.includes(","))  parts = line.split(",").map(s=>s.trim());
        else if (line.includes("\t")) parts = line.split("\t").map(s=>s.trim());
        else                          parts = line.split(/\s+/);
        if (parts.length >= 2) {
            const name  = parts[0];
            const score = parseFloat(parts[parts.length-1]);
            if (!isNaN(score) && score >= 0 && score <= 100) students.push({ name, score });
        }
    }
    return students;
}

// ─── Five thresholds ────────────────────────────────────
function calculateFivePercentiles(scores) {
    if (!scores.length) return {top:0,front:0,average:0,back:0,bottom:0};
    const sorted = [...scores].sort((a,b)=>a-b);
    const n = sorted.length;
    const p = pct => {
        const idx = (pct/100)*(n-1);
        const lo=Math.floor(idx), hi=Math.ceil(idx);
        return lo===hi ? sorted[lo] : sorted[lo]+(sorted[hi]-sorted[lo])*(idx-lo);
    };
    return {top:p(88),front:p(75),average:p(50),back:p(25),bottom:p(12)};
}

function getFiveLevel(score, percentiles) {
    if (score >= percentiles.top)     return {level:t("topLabel"),    chLevel:"頂標", cls:"label-top"};
    if (score >= percentiles.front)   return {level:t("frontLabel"),  chLevel:"前標", cls:"label-front"};
    if (score >= percentiles.average) return {level:t("avgLabel"),    chLevel:"均標", cls:"label-average"};
    if (score >= percentiles.back)    return {level:t("backLabel"),   chLevel:"後標", cls:"label-back"};
    if (score >= percentiles.bottom)  return {level:t("bottomLabel"), chLevel:"底標", cls:"label-bottom"};
    return {level:t("failLabel"), chLevel:"流標", cls:"label-fail"};
}

// ─── Stats ──────────────────────────────────────────────
function computeStats(students, className="") {
    if (!students.length) return null;
    const scores = students.map(s=>s.score);
    const avg = scores.reduce((a,b)=>a+b,0)/scores.length;
    const sorted = [...scores].sort((a,b)=>a-b);
    const n = sorted.length;
    const median = n%2===0 ? (sorted[n/2-1]+sorted[n/2])/2 : sorted[Math.floor(n/2)];
    const maxVal=Math.max(...scores), minVal=Math.min(...scores);
    const passCount=scores.filter(s=>s>=60).length;
    const passRate=(passCount/n)*100;
    const variance=scores.reduce((sum,v)=>sum+(v-avg)**2,0)/n;
    const stdDev=Math.sqrt(variance);
    const skewRaw=stdDev===0?0:scores.reduce((sum,v)=>sum+((v-avg)/stdDev)**3,0)/n;
    const skewness=isNaN(skewRaw)?0:skewRaw;
    const percentiles=calculateFivePercentiles(scores);
    let topCount=0,frontCount=0,avgCount=0,backCount=0,bottomCount=0,failCount=0;
    students.forEach(s=>{
        const lv=getFiveLevel(s.score,percentiles).chLevel;
        if(lv==="頂標") topCount++;
        else if(lv==="前標") frontCount++;
        else if(lv==="均標") avgCount++;
        else if(lv==="後標") backCount++;
        else if(lv==="底標") bottomCount++;
        else failCount++;
    });
    return {className,avg,median,maxVal,minVal,passRate,stdDev,skewness,
        gradeDist:[failCount,bottomCount,backCount,avgCount,frontCount,topCount],
        total:n,students,percentiles,topCount,frontCount,avgCount,backCount,bottomCount,failCount};
}

// ─── GSAT Grade Conversion ──────────────────────────────
function estimateTop1Avg(students) {
    if (!students.length) return null;
    const scores = [...students].map(s => s.score).sort((a, b) => b - a);
    const top1Count = Math.max(1, Math.ceil(scores.length * 0.01));
    const top1Scores = scores.slice(0, top1Count);
    return top1Scores.reduce((a, b) => a + b, 0) / top1Scores.length;
}

function computeGsatGrades(students, top1Avg) {
    if (!top1Avg || top1Avg <= 0) return null;
    const interval = top1Avg / 15;
    const graded = students.map(s => {
        let grade;
        if (s.score === 0) {
            grade = 0;
        } else {
            grade = Math.ceil(s.score / interval);
            if (grade > 15) grade = 15;
        }
        return { ...s, grade };
    });
    const fullMarkCount = graded.filter(s => s.grade === 15).length;
    const nonZero = graded.filter(s => s.grade > 0);
    const avgGrade = nonZero.length
        ? (nonZero.reduce((sum, s) => sum + s.grade, 0) / nonZero.length).toFixed(2)
        : "0.00";
    const dist = Array(16).fill(0); // dist[g] = count of students with grade g
    graded.forEach(s => { if (s.grade >= 0 && s.grade <= 15) dist[s.grade]++; });
    return { interval: interval.toFixed(2), graded, fullMarkCount, avgGrade, dist };
}

function radarDimensions(stats) {
    if (!stats) return [0,0,0,0,0,0];
    const stability = stats.stdDev>20?35:(stats.stdDev>15?55:(stats.stdDev>10?70:88));
    const topRatio  = (stats.topCount/stats.total)*100;
    const potential = stats.skewness<-0.6?88:(stats.skewness>0.7?42:70);
    const balance   = 100-Math.min(30,Math.abs(stats.avg-stats.median)*1.8);
    return [Math.min(stats.avg,100),stability,Math.min(topRatio,100),Math.min(stats.passRate,100),potential,Math.max(balance,0)];
}

// ─── Ranking table ──────────────────────────────────────
function generateRankingTable(students, stats, globalPercentiles, gsatData) {
    if (!students||!students.length) return "";
    const sorted=[...students].sort((a,b)=>b.score-a.score);
    const p=globalPercentiles||stats.percentiles;
    // Build grade lookup map if gsatData exists
    const gradeMap = {};
    if (gsatData) {
        gsatData.graded.forEach(s => { gradeMap[s.name + "_" + s.score] = s.grade; });
    }
    let html=`<h3>${t("rankingTitle")}</h3>`;
    if (globalPercentiles) {
        html+=`<p style="font-size:0.7rem;color:#6b4e2e;margin-bottom:6px;">${t("unifiedNote",p.top.toFixed(0),p.front.toFixed(0),p.average.toFixed(0),p.back.toFixed(0),p.bottom.toFixed(0))}</p>`;
    }
    const [rk,nm,sc,dv,lv]=t("rankHeader");
    const gsatCol = gsatData ? `<th>${t("gsatGradeCol")}</th>` : "";
    html+=`<div class="ranking-table-wrapper"><table class="ranking-table">
        <thead><tr><th>${rk}</th><th>${nm}</th><th>${sc}</th><th>${dv}</th><th>${lv}</th>${gsatCol}</tr></thead><tbody>`;
    sorted.forEach((st,idx)=>{
        const rank=idx+1;
        const rankClass=rank===1?"rank-1":rank===2?"rank-2":rank===3?"rank-3":"";
        const diff=(st.score-stats.avg).toFixed(1);
        const diffStr=diff>=0?`+${diff}`:diff;
        const level=getFiveLevel(st.score,p);
        const grade = gsatData ? gradeMap[st.name + "_" + st.score] : null;
        const gradeCell = gsatData
            ? `<td><strong style="color:${grade===15?'#9b6a42':'inherit'}">${grade}${grade===15?' ⭐':''}</strong></td>`
            : "";
        html+=`<tr class="${rankClass}">
            <td>${rank}</td><td style="text-align:left">${st.name}</td>
            <td><strong>${st.score}</strong></td><td>${diffStr}</td>
            <td><span class="${level.cls}">${level.level}</span></td>${gradeCell}</tr>`;
    });
    html+=`</tbody></table></div>`;
    return html;
}

// ─── Critiques ──────────────────────────────────────────
function generateSoloCritique(stats, gsatData) {
    const p=stats.percentiles;
    let tx=t("stats",stats.avg.toFixed(1),stats.median.toFixed(1),stats.stdDev.toFixed(1))+"\n";
    tx+=t("benchmarks",p.top.toFixed(0),p.front.toFixed(0),p.average.toFixed(0),p.back.toFixed(0),p.bottom.toFixed(0))+"\n";
    tx+=t("distCount",stats.topCount,stats.frontCount,stats.avgCount,stats.backCount,stats.bottomCount,stats.failCount)+"\n";
    tx+=t("passInfo",stats.passRate.toFixed(1),(stats.topCount/stats.total*100).toFixed(1));
    if (stats.failCount>0) tx+=t("failWarn",stats.failCount);
    if (stats.stdDev>18)   tx+="\n"+t("highSD");
    else if (stats.stdDev>12) tx+="\n"+t("midSD");
    if (gsatData) {
        tx+="\n"+t("gsatGradeInfo", gsatData.interval, gsatData.fullMarkCount, stats.total, gsatData.avgGrade);
    }
    return tx;
}

function generateMultiComparisonCritique(statsList, labels, subject, gsatData) {
    let allScores=[];
    statsList.forEach(s=>{ allScores=allScores.concat(s.students.map(st=>st.score)); });
    const gp=calculateFivePercentiles(allScores);
    let tx=subject?t("subjectLine",subject)+"\n":"";
    tx+=t("multiClasses",statsList.length)+"\n";
    tx+="━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n";
    tx+=t("globalBench")+"\n";
    tx+=t("globalBenchLine",gp.top.toFixed(0),gp.front.toFixed(0),gp.average.toFixed(0),gp.back.toFixed(0),gp.bottom.toFixed(0))+"\n\n";
    tx+=t("rankByAvg")+"\n";
    [...statsList].sort((a,b)=>b.avg-a.avg).forEach((s,i)=>{
        const medal=i===0?"🏆":i===1?"🥈":"🥉";
        tx+=`   ${medal} ${s.className}：${s.avg.toFixed(1)}\n`;
    });
    tx+="\n"+t("distByClass")+"\n";
    tx+=t("distHeader")+"\n";
    statsList.forEach(s=>{
        let tc=0,fc=0,ac=0,bc=0,btc=0,fl=0;
        s.students.forEach(st=>{
            const lv=getFiveLevel(st.score,gp).chLevel;
            if(lv==="頂標") tc++;
            else if(lv==="前標") fc++;
            else if(lv==="均標") ac++;
            else if(lv==="後標") bc++;
            else if(lv==="底標") btc++;
            else fl++;
        });
        tx+=`   ${s.className}\t${tc}\t${fc}\t${ac}\t${bc}\t${btc}\t${fl}\n`;
    });
    if (gsatData) {
        const allTotal = statsList.reduce((sum, s) => sum + s.total, 0);
        tx += "\n" + t("gsatGradeInfo", gsatData.interval, gsatData.fullMarkCount, allTotal, gsatData.avgGrade);
    }
    return {text:tx, globalPercentiles:gp};
}

        <thead><tr><th>${e}</th><th>${av}</th><th>${pr}</th>
        <th>${t88}</th><th>${f75}</th><th>${a50}</th>
        <th>${b25}</th><th>${l12}</th><th>${dist}</th></tr></thead><tbody>`;
    statsList.forEach((s,i)=>{
        const p=s.percentiles;
        let trendHtml="";
        if (i>0) {
            const delta=s.avg-statsList[i-1].avg;
            if (Math.abs(delta)>0.05)
                trendHtml=delta>0
                    ?` <span class="trend-up">▲${delta.toFixed(1)}</span>`
                    :` <span class="trend-down">▼${Math.abs(delta).toFixed(1)}</span>`;
        }
        html+=`<tr>
            <td><strong>${labels[i]}</strong>${trendHtml}</td>
            <td>${s.avg.toFixed(1)}</td><td>${s.passRate.toFixed(1)}%</td>
            <td>${p.top.toFixed(0)}</td><td>${p.front.toFixed(0)}</td>
            <td>${p.average.toFixed(0)}</td><td>${p.back.toFixed(0)}</td>
            <td>${p.bottom.toFixed(0)}</td>
            <td style="font-size:0.7rem;">${s.topCount}/${s.frontCount}/${s.avgCount}/${s.backCount}/${s.bottomCount}/${s.failCount}</td></tr>`;
    });
    html+=`</tbody></table></div>`;
    const change=statsList[statsList.length-1].avg-statsList[0].avg;
    html+=`<div style="margin-top:8px;padding:8px;background:#f0f4f0;border-radius:8px;font-size:0.8rem;">
        ${t("trackTrend",statsList[0].avg.toFixed(1),statsList[statsList.length-1].avg.toFixed(1))}`;
    html+=change>3?t("trendUp",change.toFixed(1)):change<-3?t("trendDown",Math.abs(change).toFixed(1)):t("trendStable");
    html+=`</div>`;
    return html;
}

// ─── Modal ──────────────────────────────────────────────
function showStudentReport(student, classStats, globalPercentiles) {
    const p=globalPercentiles||classStats.percentiles;
    const level=getFiveLevel(student.score,p);
    const diff=classStats?(student.score-classStats.avg).toFixed(1):"—";
    const adviceMap={
        "頂標":t("adviceTop"),"前標":t("adviceFront"),"均標":t("adviceAvg"),
        "後標":t("adviceBack"),"底標":t("adviceBottom"),"流標":t("adviceFail")
    };
    const modalDiv=document.createElement('div');
    modalDiv.className='student-modal-overlay';
    const diffStr=parseFloat(diff)>=0?`+${diff}`:diff;
    modalDiv.innerHTML=`
        <div class="student-modal-card">
            <h3>📋 ${student.name}</h3>
            <div style="display:flex;justify-content:space-between;margin:12px 0;background:#faf5e8;padding:12px;border-radius:16px;">
                <span><strong>${t("modalScore")}</strong><br><span style="font-size:1.8rem;color:#9b6a42;">${student.score}</span></span>
                <span><strong>${t("modalLevel")}</strong><br><span class="${level.cls}" style="font-size:1rem;padding:4px 12px;">${level.level}</span></span>
                <span><strong>${t("modalDiff")}</strong><br>${diffStr}</span>
            </div>
            <div><strong>${t("modalStrategy")}</strong><br>${adviceMap[level.chLevel]||""}</div>
            <div style="text-align:right;margin-top:12px;"><button class="close-modal">${t("closeModal")}</button></div>
        </div>`;
    document.body.appendChild(modalDiv);
    modalDiv.querySelector('.close-modal').addEventListener('click',()=>modalDiv.remove());
    modalDiv.addEventListener('click',e=>{if(e.target===modalDiv)modalDiv.remove();});
}

// ─── Run functions ──────────────────────────────────────
function runSolo() {
    const className=(document.getElementById("soloClassName")?.value||"").trim()||"Class";
    const subject  =(document.getElementById("soloSubject")?.value||"").trim()||"Subject";
    const raw=document.getElementById("soloRawData")?.value||"";
    if (!raw.trim()){alert(t("noData"));return;}
    const students=parseStudentData(raw);
    if (!students.length){alert(t("parseError"));return;}
    const stats=computeStats(students,className);
    if (!stats) return;
    const top1AvgVal = parseFloat(document.getElementById("soloTop1Avg")?.value||"");
    const top1Avg = isNaN(top1AvgVal) ? estimateTop1Avg(students) : top1AvgVal;
    const gsatData = top1Avg ? computeGsatGrades(students, top1Avg) : null;
    gsatData && (gsatData.isAutoEstimated = isNaN(top1AvgVal));
    renderFullReport("solo",{
        statsList:[stats], labels:[className],
        titleText:t("analysisTitle",className,subject),
        subText:`${t("sampleInfo",students.length)} | ${new Date().toLocaleDateString('zh-TW')}`,
        radarDatasets:[{label:className,data:radarDimensions(stats),borderColor:'#b7791f',backgroundColor:'rgba(183,121,31,0.2)'}],
        extraInfo:{gsatData}
    });
}

function runMulti() {
    const statsList=[],labels=[];
    const subject=(document.getElementById("multiSubject")?.value||"").trim();
    const top1AvgVal = parseFloat(document.getElementById("multiTop1Avg")?.value||"");
    for (let i=1;i<=5;i++) {
        const nameEl=document.getElementById(`multiName${i}`);
        const dataEl=document.getElementById(`multiData${i}`);
        if(!nameEl||!dataEl||!dataEl.value.trim()) continue;
        const students=parseStudentData(dataEl.value);
        if(!students.length) continue;
        const className=nameEl.value.trim()||(lang==="zh"?`班級${i}`:`Class ${i}`);
        const stats=computeStats(students,className);
        if(stats){statsList.push(stats);labels.push(className);}
    }
    if(statsList.length<2){alert(t("needTwoClasses"));return;}
    // Combine all students across classes for unified GSAT calculation
    const allStudents = statsList.flatMap(s => s.students);
    const top1Avg = isNaN(top1AvgVal) ? estimateTop1Avg(allStudents) : top1AvgVal;
    const gsatData = top1Avg ? computeGsatGrades(allStudents, top1Avg) : null;
    gsatData && (gsatData.isAutoEstimated = isNaN(top1AvgVal));
    // Attach per-class grade lookup into each stat's students if gsatData exists
    if (gsatData) {
        const gradeMap = {};
        gsatData.graded.forEach(s => { gradeMap[s.name + "_" + s.score] = s.grade; });
        statsList.forEach(s => {
            s._gsatGradeMap = gradeMap;
            s._gsatFullCount = s.students.filter(st => (gradeMap[st.name + "_" + st.score] ?? -1) === 15).length;
            s._gsatAvgGrade = (() => {
                const nonZero = s.students.filter(st => (gradeMap[st.name + "_" + st.score] ?? 0) > 0);
                return nonZero.length ? (nonZero.reduce((sum, st) => sum + gradeMap[st.name + "_" + st.score], 0) / nonZero.length).toFixed(2) : "0.00";
            })();
        });
    }
    const radarDatasets=statsList.map((st,i)=>({
        label:labels[i],data:radarDimensions(st),
        borderColor:getColor(i,1),backgroundColor:getColor(i,0.15),fill:false
    }));
    renderFullReport("multi",{
        statsList,labels,
        titleText:t("multiReportTitle"),
        subText:t("multiSubInfo",statsList.length,subject),
        radarDatasets,
        extraInfo:{subject, gsatData}
    });
}

function runTrack() {
    const statsList=[],labels=[];
    const cohort=(document.getElementById("trackCohort")?.value||"").trim();
    for (let i=1;i<=5;i++) {
        const labelEl=document.getElementById(`trackLabel${i}`);
        const dataEl=document.getElementById(`trackData${i}`);
        if(!labelEl||!dataEl||!dataEl.value.trim()) continue;
        const students=parseStudentData(dataEl.value);
        if(!students.length) continue;
        const examName=labelEl.value.trim()||(lang==="zh"?`測驗${i}`:`Exam ${i}`);
        const stats=computeStats(students,examName);
        if(stats){labels.push(examName);statsList.push(stats);}
    }
    if(statsList.length<2){alert(t("needTwoExams"));return;}
    const lastDim=radarDimensions(statsList[statsList.length-1]);
    renderFullReport("track",{
        statsList,labels,
        titleText:t("trackReportTitle"),
        subText:t("trackSubInfo",statsList.length,cohort),
        radarDatasets:[{label:lang==="zh"?"最新指標":"Latest",data:lastDim,borderColor:'#9b6a42',backgroundColor:'rgba(155,106,66,0.15)'}],
        extraInfo:{cohort}
    });
}

function executeAnalysis() {
    if(activeMode==="solo") runSolo();
    else if(activeMode==="multi") runMulti();
    else runTrack();
}

// ─── Init ────────────────────────────────────────────────
function initTabs() {
    document.querySelectorAll(".tab-btn").forEach(btn=>{
        btn.addEventListener("click",()=>{
            document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
            btn.classList.add("active");

    buildDynamicForms();
}

document.getElementById("reportPanel").addEventListener("click",e=>{
    if(e.target&&e.target.id==="printReportBtn") printReport();
});

initTabs();
</script>
