<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Shirley's Grade Analysis Tools | 五標學術評鑑系統</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0ede5;
            font-family: 'Times New Roman', 'Noto Serif TC', 'Georgia', serif;
            padding: 24px;
            color: #2c3e2f;
        }

        .academic-container {
            max-width: 1500px;
            margin: 0 auto;
            background: white;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.12);
            border-radius: 6px;
            overflow: hidden;
            border-top: 6px solid #9b6a42;
        }

        header {
            background: #fefaf2;
            padding: 20px 28px;
            text-align: center;
            border-bottom: 1px solid #e2d8ca;
        }

        h1 {
            font-size: 1.6rem;
            letter-spacing: 1px;
            color: #2c3e2f;
            font-weight: 600;
        }

        .sub {
            color: #7e6b4b;
            font-style: italic;
            font-size: 0.85rem;
        }

        .tabs {
            display: flex;
            background: #f5efe5;
            border-bottom: 1px solid #ddd0bc;
            flex-wrap: wrap;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 0;
            font-size: 0.9rem;
            font-weight: 600;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            color: #5a4a2e;
            font-family: inherit;
            min-width: 100px;
        }

        .tab-btn.active {
            background: white;
            color: #9b6a42;
            border-bottom: 3px solid #9b6a42;
        }

        .dashboard {
            display: flex;
            flex-wrap: wrap;
        }

        .input-panel {
            width: 360px;
            background: #fefcf8;
            border-right: 1px solid #e8dfd0;
            padding: 20px 18px;
            max-height: 85vh;
            overflow-y: auto;
        }

        .report-panel {
            flex: 1;
            background: white;
            padding: 20px 24px;
            max-height: 85vh;
            overflow-y: auto;
        }

        .input-card {
            background: white;
            border: 1px solid #ece0cf;
            margin-bottom: 18px;
            padding: 14px;
            border-radius: 12px;
        }

        .input-card h4 {
            font-size: 0.85rem;
            font-weight: 700;
            color: #6b4e2e;
            margin-bottom: 10px;
            border-left: 3px solid #c2a15b;
            padding-left: 8px;
        }

        label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            display: block;
            margin-bottom: 4px;
            color: #5a4a2e;
        }

        input, textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ddd0bd;
            border-radius: 8px;
            font-size: 0.8rem;
            font-family: 'Courier New', monospace;
            margin-bottom: 10px;
            background: #fffefb;
        }

        textarea {
            resize: vertical;
        }

        .btn-run, .btn-print {
            width: 100%;
            background: #9b6a42;
            color: white;
            border: none;
            padding: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            border-radius: 40px;
            margin-top: 6px;
            cursor: pointer;
        }

        .btn-print {
            background: #5a6e4a;
            margin-top: 10px;
        }

        .btn-run:hover { background: #7c5535; }
        .btn-print:hover { background: #4a5a3a; }

        /* 緊湊的統計卡片 */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(85px, 1fr));
            gap: 8px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #fefaf5;
            border: 1px solid #ece2d4;
            border-radius: 12px;
            text-align: center;
            padding: 8px 4px;
        }
        .stat-card .stat-val {
            font-size: 1.2rem;
            font-weight: 800;
            color: #9b6a42;
            line-height: 1.2;
        }
        .stat-card .stat-label {
            font-size: 0.6rem;
            color: #8b7a62;
        }

        .chart-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
            margin: 20px 0;
        }

        .chart-box {
            background: #fff;
            border: 1px solid #e9dfcf;
            border-radius: 16px;
            padding: 12px;
        }

        .academic-critique {
            background: #fdf9f0;
            border-left: 6px solid #b68b40;
            padding: 14px 20px;
            margin: 20px 0;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 0.85rem;
            white-space: pre-line;
        }

        /* 緊湊排名表格 - 節省紙張 */
        .ranking-section {
            margin: 16px 0;
        }
        .ranking-section h3 {
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: #6b4e2e;
            display: inline-block;
            border-bottom: 1px solid #c2a15b;
        }
        .ranking-table-wrapper {
            overflow-x: auto;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #e2d8ca;
        }
        .ranking-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.7rem;
        }
        .ranking-table th,
        .ranking-table td {
            border: 1px solid #ddd0bc;
            padding: 6px 8px;
            text-align: center;
        }
        .ranking-table th {
            background: #f5efe5;
            color: #6b4e2e;
            font-weight: 700;
            font-size: 0.7rem;
        }
        .ranking-table td:first-child,
        .ranking-table th:first-child { width: 45px; }
        .ranking-table td:nth-child(2) { text-align: left; }
        .rank-1 { background: #fef5e0; }
        .rank-2 { background: #faf0e0; }
        .rank-3 { background: #f5ebe0; }

        /* 縱向追蹤表格 */
        .table-wrapper {
            overflow-x: auto;
            margin: 16px 0;
            border-radius: 10px;
            border: 1px solid #e2d8ca;
        }
        .track-summary-table {
            width: 100%;
            min-width: 700px;
            border-collapse: collapse;
            font-size: 0.75rem;
        }
        .track-summary-table th,
        .track-summary-table td {
            border: 1px solid #ddd0bc;
            padding: 8px 6px;
            text-align: center;
        }
        .track-summary-table th {
            background: #f5efe5;
            color: #6b4e2e;
            font-weight: 700;
        }
        .trend-up { color: #276749; font-weight: bold; }
        .trend-down { color: #c53030; font-weight: bold; }

        .student-detail-list {
            margin-top: 16px;
            border-top: 1px solid #e2d8ca;
            padding-top: 12px;
        }
        .student-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #f0eae0;
            border-radius: 30px;
            padding: 4px 10px;
            margin: 4px 6px;
            font-size: 0.7rem;
            cursor: pointer;
        }
        .student-badge:hover { background: #dac29c; }

        .student-modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .student-modal-card {
            background: white;
            max-width: 450px;
            width: 90%;
            border-radius: 24px;
            padding: 20px;
            border-top: 5px solid #9b6a42;
        }
        .close-modal {
            background: #e8dfd0;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            margin-top: 12px;
            cursor: pointer;
        }

        .hidden { display: none !important; }
        .info-note { font-size: 0.65rem; color: #9a8a70; margin-top: 5px; }

        /* ========== 節省紙張的列印樣式 ========== */
        @media print {
            .no-print, .tabs, .input-panel, .btn-run, .btn-print, 
            .student-badge, .student-detail-list, .tab-btn,
            .student-modal-overlay, .close-modal {
                display: none !important;
            }
            
            .report-panel {
                padding: 0 !important;
                margin: 0 !important;
                max-height: none !important;
                overflow: visible !important;
            }
            
            .academic-container {
                box-shadow: none;
                border: none;
                margin: 0;
                padding: 0;
            }
            
            /* 緊湊列印，減少空白 */
            .stat-card { padding: 4px; }
            .stat-card .stat-val { font-size: 1rem; }
            .chart-box { padding: 8px; margin: 10px 0; }
            .academic-critique { padding: 10px 12px; margin: 12px 0; font-size: 9pt; }
            .ranking-table { font-size: 8pt; }
            .ranking-table th, .ranking-table td { padding: 3px 5px; }
            .track-summary-table { font-size: 8pt; }
            .track-summary-table th, .track-summary-table td { padding: 4px 5px; }
            
            h2 { font-size: 14pt; margin: 8px 0; }
            h3 { font-size: 11pt; margin: 6px 0; }
            p { margin: 4px 0; }
            
            /* 避免不必要的分頁 */
            .chart-box, .stat-grid, .academic-critique, 
            .ranking-section, .table-wrapper {
                break-inside: avoid;
                page-break-inside: avoid;
            }
            
            /* 統一的頁面邊距 */
            @page {
                margin: 0.8cm 0.6cm;
                size: A4;
            }
            
            body {
                background: white;
                padding: 0;
                margin: 0;
            }
            
            /* 強制背景色 */
            .stat-card, .academic-critique, .ranking-table th,
            .track-summary-table th {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }

        @media (max-width: 780px) {
            .input-panel { width: 100%; border-right: none; border-bottom: 1px solid #e8dfd0; }
            .report-panel { max-height: 60vh; padding: 16px; }
        }
    </style>
</head>
<body>
<div class="academic-container">
    <header class="no-print">
        <h1>Shirley's Grade Analysis Tools</h1>
        <p class="sub">五標診斷 · 節紙版學術評鑑</p>
    </header>

    <div class="tabs no-print">
        <button class="tab-btn active" data-mode="solo">📖 單班分析</button>
        <button class="tab-btn" data-mode="multi">📊 班際對比</button>
        <button class="tab-btn" data-mode="track">📈 縱向追蹤</button>
    </div>

    <div class="dashboard">
        <div class="input-panel no-print" id="inputPanel"></div>
        <div class="report-panel" id="reportPanel">
            <div id="welcomePlaceholder" class="academic-critique" style="text-align:center;">
                <p>📐 選擇模式並輸入數據</p>
                <p style="font-size:0.8rem;">支援 Excel 貼上 (姓名 分數)</p>
            </div>
            <div id="dynamicReport" class="hidden">
                <h2 id="reportTitle" style="font-size:1.2rem; color:#2c3e2f; border-left: 4px solid #b68b40; padding-left: 10px;"></h2>
                <p id="reportSub" style="color:#8b7a62; font-size:0.75rem; margin-bottom: 12px;"></p>
                
                <div class="stat-grid" id="statGrid"></div>
                
                <div class="chart-row">
                    <div class="chart-box"><canvas id="chartPrimary"></canvas></div>
                    <div class="chart-box"><canvas id="chartRadar"></canvas></div>
                </div>
                <div class="chart-row">
                    <div class="chart-box"><canvas id="chartSecondary"></canvas></div>
                    <div class="chart-box"><canvas id="chartDistribution"></canvas></div>
                </div>
                
                <div class="academic-critique" id="academicCritique"></div>
                
                <!-- 排名表格將放在這裡（僅單班模式） -->
                <div id="rankingSection" class="ranking-section"></div>
                
                <div id="studentListInsight" class="student-detail-list"></div>
                
                <div class="no-print" style="margin-top: 16px;">
                    <button class="btn-print" id="printReportBtn">🖨️ 列印報告</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let activeMode = "solo";
    let currentCharts = { primary: null, radar: null, secondary: null, distribution: null };
    let currentGlobalStats = null;
    let currentReportPayload = null;

    const colorPalette = ['#1a365d', '#b7791f', '#2c5282', '#9b6a42', '#276749', '#c53030', '#2b6cb0', '#d69e2e'];

    function getColor(index, opacity = 0.7) {
        const hex = colorPalette[index % colorPalette.length];
        if (opacity === 1) return hex;
        const r = parseInt(hex.slice(1,3), 16);
        const g = parseInt(hex.slice(3,5), 16);
        const b = parseInt(hex.slice(5,7), 16);
        return `rgba(${r}, ${g}, ${b}, ${opacity})`;
    }

    function parseStudentData(rawText) {
        if (!rawText.trim()) return [];
        const lines = rawText.split(/\r?\n/);
        const students = [];
        for (let line of lines) {
            line = line.trim();
            if (!line) continue;
            let parts;
            if (line.includes(",")) parts = line.split(",").map(s => s.trim());
            else if (line.includes("\t")) parts = line.split("\t").map(s => s.trim());
            else parts = line.split(/\s+/);
            if (parts.length >= 2) {
                const name = parts[0];
                const score = parseFloat(parts[1]);
                if (!isNaN(score) && score >= 0 && score <= 100) {
                    students.push({ name, score });
                }
            }
        }
        return students;
    }

    function calculateFivePercentiles(scores) {
        if (!scores.length) return { top: 0, front: 0, average: 0, back: 0, bottom: 0 };
        const sorted = [...scores].sort((a, b) => b - a);
        const n = sorted.length;
        const getPS = (p) => sorted[Math.floor((p / 100) * n)] || sorted[0];
        return {
            top: getPS(12), front: getPS(25), average: getPS(50),
            back: getPS(75), bottom: getPS(88)
        };
    }

    function computeStats(students, className = "") {
        if (!students.length) return null;
        const scores = students.map(s => s.score);
        const avg = scores.reduce((a,b)=>a+b,0)/scores.length;
        const sorted = [...scores].sort((a,b)=>a-b);
        const median = sorted.length%2===0 ? (sorted[sorted.length/2-1]+sorted[sorted.length/2])/2 : sorted[Math.floor(sorted.length/2)];
        const maxVal = Math.max(...scores);
        const minVal = Math.min(...scores);
        const passCount = scores.filter(s=>s>=60).length;
        const passRate = (passCount/scores.length)*100;
        const excellentCount = scores.filter(s=>s>=90).length;
        const goodCount = scores.filter(s=>s>=80 && s<90).length;
        const mediumCount = scores.filter(s=>s>=70 && s<80).length;
        const lowPassCount = scores.filter(s=>s>=60 && s<70).length;
        const failCount = scores.filter(s=>s<60).length;
        const variance = scores.reduce((sum,val)=>sum + Math.pow(val-avg,2),0)/scores.length;
        const stdDev = Math.sqrt(variance);
        const skewRaw = scores.reduce((sum,val)=>sum+Math.pow((val-avg)/stdDev,3),0)/scores.length;
        const skewness = isNaN(skewRaw) ? 0 : skewRaw;
        const gradeDist = [failCount, lowPassCount, mediumCount, goodCount, excellentCount];
        const percentiles = calculateFivePercentiles(scores);
        return { className, avg, median, maxVal, minVal, passRate, excellentCount, goodCount, mediumCount, lowPassCount, failCount, stdDev, skewness, gradeDist, total: students.length, students, percentiles };
    }

    function radarDimensions(stats) {
        if(!stats) return [0,0,0,0,0,0];
        const stability = stats.stdDev > 20 ? 35 : (stats.stdDev > 15 ? 55 : (stats.stdDev > 10 ? 70 : 88));
        const topRatio = (stats.students.filter(s => s.score >= stats.percentiles.top).length / stats.total) * 100;
        let potential = stats.skewness < -0.6 ? 88 : (stats.skewness > 0.7 ? 42 : 70);
        const balance = 100 - Math.min(30, Math.abs(stats.avg - stats.median)*1.8);
        return [stats.avg, stability, topRatio, stats.passRate, potential, balance];
    }

    // 緊湊排名表格 (節省空間)
    function generateRankingTable(students, stats) {
        if (!students || students.length === 0) return "";
        const sorted = [...students].sort((a, b) => b.score - a.score);
        const avg = stats.avg;
        let html = `<h3>📊 學生成績排名</h3>`;
        html += `<div class="ranking-table-wrapper">`;
        html += `<table class="ranking-table">`;
        html += `<thead><tr><th>名次</th><th>姓名</th><th>分數</th><th>與均差</th><th>評級</th></tr></thead><tbody>`;
        
        sorted.forEach((student, idx) => {
            const rank = idx + 1;
            let rankClass = rank === 1 ? "rank-1" : (rank === 2 ? "rank-2" : (rank === 3 ? "rank-3" : ""));
            const diff = (student.score - avg).toFixed(1);
            const diffSign = diff >= 0 ? `+${diff}` : diff;
            let grade = student.score >= 90 ? "優" : (student.score >= 80 ? "甲" : (student.score >= 70 ? "乙" : (student.score >= 60 ? "丙" : "丁")));
            html += `<tr class="${rankClass}"><td>${rank}</td><td style="text-align:left">${student.name}</td><td><strong>${student.score}</strong></td><td>${diffSign}</td><td>${grade}</td></tr>`;
        });
        html += `</tbody></table></div>`;
        return html;
    }

    function generateSoloCritique(stats) {
        const p = stats.percentiles;
        let text = `📊 平均 ${stats.avg.toFixed(1)}分 | 中位數 ${stats.median.toFixed(1)} | 標準差 ${stats.stdDev.toFixed(1)}\n`;
        text += `🎯 五標：頂標 ${p.top.toFixed(0)}／前標 ${p.front.toFixed(0)}／均標 ${p.average.toFixed(0)}／後標 ${p.back.toFixed(0)}／底標 ${p.bottom.toFixed(0)}\n`;
        text += `🔖 及格率 ${stats.passRate.toFixed(1)}% | 頂標以上 ${((stats.students.filter(s=>s.score>=p.top).length)/stats.total*100).toFixed(1)}%`;
        if(stats.failCount > 0) text += ` | 待加強 ${stats.failCount}人`;
        if(stats.stdDev > 18) text += `\n⚠️ 成績極度離散，建議分組教學。`;
        else if(stats.stdDev > 12) text += `\n📌 成績差異中等，可採用差異化作業。`;
        return text;
    }

    function generateMultiComparisonCritique(statsList, labels, subject) {
        let text = subject ? `科目：${subject}\n` : "";
        text += `🏛️ ${statsList.length}個班級對比\n`;
        const avgRank = [...statsList].sort((a,b)=>b.avg - a.avg);
        avgRank.forEach((s, i) => text += `${i===0?"🏆":(i===1?"🥈":"🥉")} ${s.className} ${s.avg.toFixed(1)}分\n`);
        text += `\n五標對比：\n`;
        statsList.forEach(s => text += `${s.className}: 頂${s.percentiles.top.toFixed(0)}/前${s.percentiles.front.toFixed(0)}/均${s.percentiles.average.toFixed(0)}\n`);
        return text;
    }

    function generateTrackCritique(statsList, labels, cohort) {
        if(statsList.length < 2) return "至少需要兩次測驗";
        let html = cohort ? `<p><strong>對象：</strong>${cohort}</p>` : "";
        html += `<div class="table-wrapper"><table class="track-summary-table">`;
        html += `<thead><tr><th>測驗</th><th>平均</th><th>及格率</th><th>頂標</th><th>前標</th><th>均標</th><th>後標</th><th>底標</th></tr></thead><tbody>`;
        statsList.forEach((s, i) => {
            const p = s.percentiles;
            const trend = (i>0 && s.avg !== statsList[i-1].avg) ? (s.avg > statsList[i-1].avg ? " ▲" : " ▼") : "";
            html += `<tr><td><strong>${labels[i]}</strong>${trend}</td>
                    <td>${s.avg.toFixed(1)}</td><td>${s.passRate.toFixed(1)}%</td>
                    <td>${p.top.toFixed(0)}</td><td>${p.front.toFixed(0)}</td>
                    <td>${p.average.toFixed(0)}</td><td>${p.back.toFixed(0)}</td><td>${p.bottom.toFixed(0)}</td></tr>`;
        });
        html += `</tbody></table></div>`;
        const change = statsList[statsList.length-1].avg - statsList[0].avg;
        html += `<div style="margin-top:10px; padding:8px; background:#f0f4f0; border-radius:8px; font-size:0.8rem;">`;
        html += `<strong>📈 趨勢：</strong>起始 ${statsList[0].avg.toFixed(1)} → 最新 ${statsList[statsList.length-1].avg.toFixed(1)} `;
        html += (change > 3 ? `顯著進步 +${change.toFixed(1)}` : (change < -3 ? `明顯退步 ${change.toFixed(1)}` : `維持穩定`));
        html += `</div>`;
        return html;
    }

    function showStudentReport(student, classStats) {
        const modalDiv = document.createElement('div');
        modalDiv.className = 'student-modal-overlay';
        const diff = classStats ? (student.score - classStats.avg).toFixed(1) : "—";
        const advice = student.score >= 90 ? "卓越表現！建議深化專題研究。" :
                      student.score >= 80 ? "表現良好，建立錯題本。" :
                      student.score >= 70 ? "基礎穩固，加強弱項。" :
                      student.score >= 60 ? "及格邊緣，從基礎複習。" : "基礎薄弱，優先釐清概念。";
        modalDiv.innerHTML = `
            <div class="student-modal-card">
                <h3>📋 ${student.name}</h3>
                <div style="display:flex; justify-content:space-between; margin:12px 0; background:#faf5e8; padding:12px; border-radius:16px;">
                    <span><strong>成績</strong><br><span style="font-size:1.8rem; color:#9b6a42;">${student.score}</span></span>
                    <span><strong>班級均差</strong><br>${diff}</span>
                </div>
                <div><strong>📌 學習策略</strong><br>${advice}</div>
                <div style="text-align:right; margin-top:12px;"><button class="close-modal">關閉</button></div>
            </div>
        `;
        document.body.appendChild(modalDiv);
        modalDiv.querySelector('.close-modal').addEventListener('click', () => modalDiv.remove());
        modalDiv.addEventListener('click', (e) => { if(e.target === modalDiv) modalDiv.remove(); });
    }

    function renderFullReport(mode, payload) {
        currentReportPayload = { mode, payload };
        document.getElementById("welcomePlaceholder").classList.add("hidden");
        document.getElementById("dynamicReport").classList.remove("hidden");

        const { statsList, labels, titleText, subText, radarDatasets, extraInfo } = payload;
        if(mode === "solo" && statsList[0]) currentGlobalStats = statsList[0];

        const statGrid = document.getElementById("statGrid");
        if(mode === "solo" && statsList[0]) {
            const s = statsList[0], p = s.percentiles;
            statGrid.innerHTML = `
                <div class="stat-card"><div class="stat-val">${s.avg.toFixed(1)}</div><div class="stat-label">平均</div></div>
                <div class="stat-card"><div class="stat-val">${p.top.toFixed(0)}</div><div class="stat-label">頂標</div></div>
                <div class="stat-card"><div class="stat-val">${p.front.toFixed(0)}</div><div class="stat-label">前標</div></div>
                <div class="stat-card"><div class="stat-val">${p.average.toFixed(0)}</div><div class="stat-label">均標</div></div>
                <div class="stat-card"><div class="stat-val">${p.back.toFixed(0)}</div><div class="stat-label">後標</div></div>
                <div class="stat-card"><div class="stat-val">${p.bottom.toFixed(0)}</div><div class="stat-label">底標</div></div>
                <div class="stat-card"><div class="stat-val">${s.passRate.toFixed(0)}%</div><div class="stat-label">及格率</div></div>
                <div class="stat-card"><div class="stat-val">${s.stdDev.toFixed(1)}</div><div class="stat-label">標準差</div></div>
            `;
        } else if(mode === "multi") {
            statGrid.innerHTML = statsList.map((s,i)=>`<div class="stat-card"><div class="stat-val">${s.avg.toFixed(1)}</div><div class="stat-label">${labels[i]}<br>頂${s.percentiles.top.toFixed(0)}</div></div>`).join('');
        } else {
            statGrid.innerHTML = statsList.map((s,i)=>`<div class="stat-card"><div class="stat-val">${s.avg.toFixed(1)}</div><div class="stat-label">${labels[i]}</div></div>`).join('');
        }

        document.getElementById("reportTitle").innerText = titleText;
        document.getElementById("reportSub").innerHTML = subText;

        Object.values(currentCharts).forEach(ch => { if(ch) ch.destroy(); });

        const ctx1 = document.getElementById("chartPrimary").getContext("2d");
        let primaryChart;
        if(mode === "solo") {
            primaryChart = new Chart(ctx1, { type: 'bar', data: { labels: ['不及格','60-69','70-79','80-89','90-100'], datasets: [{ label: '人數', data: statsList[0].gradeDist, backgroundColor: '#9b6a42' }] } });
        } else if(mode === "multi") {
            primaryChart = new Chart(ctx1, { type: 'bar', data: { labels, datasets: [{ label: '平均分', data: statsList.map(s=>s.avg), backgroundColor: statsList.map((_,i)=>getColor(i,0.7)) }] } });
        } else {
            primaryChart = new Chart(ctx1, { type: 'line', data: { labels, datasets: [{ label: '平均分趨勢', data: statsList.map(s=>s.avg), borderColor: '#9b6a42', fill: true, tension: 0.3 }] } });
        }
        currentCharts.primary = primaryChart;

        const ctxRadar = document.getElementById("chartRadar").getContext("2d");
        currentCharts.radar = new Chart(ctxRadar, { type: 'radar', data: { labels: ['學力','穩定','頂尖佔比','及格','潛力','均衡'], datasets: radarDatasets }, options: { responsive: true } });

        const ctxSec = document.getElementById("chartSecondary").getContext("2d");
        let secChart;
        if(mode === "multi") {
            secChart = new Chart(ctxSec, { type: 'bar', data: { labels, datasets: [{ label: '標準差', data: statsList.map(s=>s.stdDev), backgroundColor: statsList.map((_,i)=>getColor(i,0.7)) }] } });
        } else if(mode === "track" && statsList.length>=2) {
            const progress = statsList.map((s,i)=> i===0 ? 0 : (s.avg - statsList[i-1].avg).toFixed(1));
            secChart = new Chart(ctxSec, { type: 'bar', data: { labels, datasets: [{ label: '進步幅度', data: progress, backgroundColor: progress.map(v => parseFloat(v) >= 0 ? '#276749' : '#c53030') }] } });
        } else {
            const s = statsList[0];
            secChart = new Chart(ctxSec, { type: 'line', data: { labels: ['最低','中位','最高'], datasets: [{ label: '分佈', data: [s.minVal, s.median, s.maxVal], borderColor: '#6b4e2e' }] } });
        }
        currentCharts.secondary = secChart;

        const ctxDist = document.getElementById("chartDistribution").getContext("2d");
        let distChart;
        if(mode === "solo") {
            distChart = new Chart(ctxDist, { type: 'pie', data: { labels: ['不及格','60-69','70-79','80-89','90-100'], datasets: [{ data: statsList[0].gradeDist, backgroundColor: ['#aa7c54','#c29a6b','#dbb88c','#ecd7b0','#f8ecda'] }] } });
        } else if(mode === "track") {
            distChart = new Chart(ctxDist, { type: 'line', data: { labels, datasets: [{ label: '及格率%', data: statsList.map(s=>s.passRate), borderColor: '#276749', fill: true }, { label: '頂標', data: statsList.map(s=>s.percentiles.top), borderColor: '#9b6a42', borderDash: [5,5] }] } });
        } else {
            distChart = new Chart(ctxDist, { type: 'line', data: { labels, datasets: [{ label: '及格率%', data: statsList.map(s=>s.passRate), borderColor: '#9b6a42' }] } });
        }
        currentCharts.distribution = distChart;

        const critiqueDiv = document.getElementById("academicCritique");
        if(mode === "solo") critiqueDiv.innerHTML = `<strong>📐 學術評鑑</strong><br>${generateSoloCritique(statsList[0])}`;
        else if(mode === "multi") critiqueDiv.innerHTML = `<strong>🏛️ 班際對比</strong><br>${generateMultiComparisonCritique(statsList, labels, extraInfo?.subject || "")}`;
        else critiqueDiv.innerHTML = `<strong>📈 縱向追蹤</strong><br>${generateTrackCritique(statsList, labels, extraInfo?.cohort || "")}`;

        // 排名表格 (僅單班，緊湊顯示)
        const rankingSection = document.getElementById("rankingSection");
        if (mode === "solo" && statsList[0]?.students) {
            rankingSection.innerHTML = generateRankingTable(statsList[0].students, statsList[0]);
        } else {
            rankingSection.innerHTML = "";
        }

        const studentContainer = document.getElementById("studentListInsight");
        if(mode === "solo" && statsList[0]?.students) {
            const students = statsList[0].students;
            studentContainer.innerHTML = `<div style="font-weight:600; margin-bottom:6px; font-size:0.8rem;">🎓 學生名冊 (點擊看報告)</div>` + 
                students.map(s => `<span class="student-badge" data-name="${s.name}" data-score="${s.score}">📌 ${s.name} ${s.score}</span>`).join('');
            document.querySelectorAll('.student-badge').forEach(el => {
                el.addEventListener('click', () => {
                    const name = el.getAttribute('data-name');
                    const score = parseFloat(el.getAttribute('data-score'));
                    showStudentReport({ name, score }, statsList[0]);
                });
            });
        } else {
            studentContainer.innerHTML = "";
        }
    }

    function printReport() {
        if (!currentReportPayload) { alert("請先生成報告"); return; }
        window.print();
    }

    function runSolo() {
        const className = document.getElementById("soloClassName")?.value || "班級";
        const subject = document.getElementById("soloSubject")?.value || "科目";
        const raw = document.getElementById("soloRawData")?.value;
        if(!raw.trim()) { alert("請輸入學生資料"); return false; }
        const students = parseStudentData(raw);
        if(students.length===0) { alert("無效數據"); return false; }
        const stats = computeStats(students, className);
        const dim = radarDimensions(stats);
        renderFullReport("solo", { statsList: [stats], labels: [className], titleText: `${className} · ${subject}`, subText: `樣本 ${students.length}人 | ${new Date().toLocaleDateString()}`, radarDatasets: [{ label: className, data: dim, borderColor: '#b7791f', backgroundColor: 'rgba(183,121,31,0.2)' }] });
        return true;
    }

    function runMulti() {
        let statsList = [], labels = [];
        const subject = document.getElementById("multiSubject")?.value || "";
        for(let i=1;i<=5;i++) {
            const nameInput = document.getElementById(`multiName${i}`);
            const dataInput = document.getElementById(`multiData${i}`);
            if(nameInput && dataInput && dataInput.value.trim()) {
                const students = parseStudentData(dataInput.value);
                if(students.length) {
                    const className = nameInput.value.trim() || `班級${i}`;
                    const stats = computeStats(students, className);
                    if(stats) { statsList.push(stats); labels.push(className); }
                }
            }
        }
        if(statsList.length < 2) { alert("至少兩個有效班級"); return false; }
        const radarSets = statsList.map((st,i)=> ({ label: labels[i], data: radarDimensions(st), borderColor: getColor(i,1), backgroundColor: getColor(i,0.15), fill: false }));
        renderFullReport("multi", { statsList, labels, titleText: "班際橫向對比", subText: `${statsList.length}個班級 ${subject?`· ${subject}`:""}`, radarDatasets: radarSets, extraInfo: { subject } });
        return true;
    }

    function runTrack() {
        let labels = [], statsList = [];
        const cohort = document.getElementById("trackCohort")?.value || "";
        for(let i=1;i<=5;i++) {
            const labelInput = document.getElementById(`trackLabel${i}`);
            const dataInput = document.getElementById(`trackData${i}`);
            if(labelInput && dataInput && dataInput.value.trim()) {
                const students = parseStudentData(dataInput.value);
                if(students.length) {
                    const examName = labelInput.value.trim() || `測驗${i}`;
                    const stats = computeStats(students, examName);
                    if(stats) { labels.push(examName); statsList.push(stats); }
                }
            }
        }
        if(statsList.length < 2) { alert("請至少輸入兩次測驗"); return false; }
        const lastDim = radarDimensions(statsList[statsList.length-1]);
        renderFullReport("track", { statsList, labels, titleText: "縱向追蹤", subText: `${statsList.length}次測驗 ${cohort?`· ${cohort}`:""}`, radarDatasets: [{ label: "最新指標", data: lastDim, borderColor: '#9b6a42' }], extraInfo: { cohort } });
        return true;
    }

    function executeAnalysis() {
        if(activeMode === "solo") runSolo();
        else if(activeMode === "multi") runMulti();
        else runTrack();
    }

    function buildDynamicForms() {
        const panel = document.getElementById("inputPanel");
        if(activeMode === "solo") {
            panel.innerHTML = `<div class="input-card"><h4>📌 班級資訊</h4><input id="soloClassName" placeholder="班級名稱"><input id="soloSubject" placeholder="科目"></div>
            <div class="input-card"><h4>📝 成績輸入</h4><textarea id="soloRawData" rows="6" placeholder="王小明 92&#10;林雅筑 87"></textarea><div class="info-note">姓名 分數，空格/Tab/逗號分隔</div></div>
            <button class="btn-run" id="dynamicRunBtn">生成報告</button>`;
        } else if(activeMode === "multi") {
            let html = `<div class="input-card"><h4>📌 科目</h4><input id="multiSubject" placeholder="科目名稱"></div>`;
            for(let i=1;i<=5;i++) html += `<div class="input-card"><h4>班級 ${i}</h4><input id="multiName${i}" placeholder="班級名稱"><textarea id="multiData${i}" rows="2" placeholder="姓名 分數"></textarea></div>`;
            html += `<button class="btn-run" id="dynamicRunBtn">班際對比</button>`;
            panel.innerHTML = html;
        } else {
            let html = `<div class="input-card"><h4>📌 對象</h4><input id="trackCohort" placeholder="對象名稱"></div>`;
            for(let i=1;i<=5;i++) html += `<div class="input-card"><h4>測驗 ${i}</h4><input id="trackLabel${i}" placeholder="測驗名稱"><textarea id="trackData${i}" rows="2" placeholder="姓名 分數"></textarea></div>`;
            html += `<button class="btn-run" id="dynamicRunBtn">追蹤分析</button>`;
            panel.innerHTML = html;
        }
        document.getElementById("dynamicRunBtn")?.addEventListener("click", executeAnalysis);
        setTimeout(() => {
            const printBtn = document.getElementById("printReportBtn");
            if(printBtn) printBtn.addEventListener("click", printReport);
        }, 50);
    }

    function initTabs() {
        const btns = document.querySelectorAll(".tab-btn");
        btns.forEach(btn => {
            btn.addEventListener("click", () => {
                btns.forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                activeMode = btn.getAttribute("data-mode");
                buildDynamicForms();
                document.getElementById("welcomePlaceholder").classList.remove("hidden");
                document.getElementById("dynamicReport").classList.add("hidden");
                currentReportPayload = null;
            });
        });
        buildDynamicForms();
        setTimeout(() => {
            const printBtn = document.getElementById("printReportBtn");
            if(printBtn) printBtn.addEventListener("click", printReport);
        }, 100);
    }
    initTabs();
</script>
</body>
</html>
