
<style>
*{box-sizing:border-box;margin:0;padding:0}
#root{display:flex;flex-direction:column;align-items:center;padding:14px 8px;gap:10px;font-family:var(--font-sans)}
#main-row{display:flex;gap:14px;align-items:flex-start;justify-content:center;flex-wrap:wrap}
#gem-glossary{width:168px;background:#0d1b2a;border-radius:12px;padding:10px 8px;flex-shrink:0}
.gls-title{color:#c8d8e8;font-size:11px;font-weight:500;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;text-align:center}
.gls-item{display:flex;align-items:center;gap:7px;padding:4px 2px;border-radius:6px}
.gls-gem-icon{width:22px;height:22px;flex-shrink:0}
.gls-name{font-size:12px;font-weight:500;color:#e8f0f8}
.gls-desc{font-size:10px;color:#7a9ab8;line-height:1.3;margin-top:1px}
#board-col{display:flex;flex-direction:column;align-items:center;gap:8px}
#hud{display:flex;gap:10px}
.hud-box{background:#0d1b2a;border-radius:8px;padding:6px 14px;text-align:center}
.hud-lbl{font-size:10px;color:#7a9ab8;letter-spacing:.5px}
.hud-v{font-size:18px;font-weight:500;color:#e8f0f8}
#board-wrap{position:relative}
canvas#board{display:block;border-radius:10px;cursor:pointer}
#hooray-el{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:30px;font-weight:500;color:#fff;text-shadow:0 0 20px rgba(255,220,80,0.9),0 2px 8px rgba(0,0,0,0.8);pointer-events:none;opacity:0;transition:opacity .2s;white-space:nowrap}
#msg-el{font-size:12px;color:#7a9ab8;min-height:16px;text-align:center}
#btns{display:flex;gap:8px}
button{background:transparent;border:0.5px solid #3a5a7a;color:#c8d8e8;border-radius:8px;padding:6px 18px;font-size:13px;cursor:pointer;font-family:var(--font-sans)}
button:hover{background:rgba(255,255,255,0.06)}
</style>

<div id="root">
  <div id="main-row">
    <div id="gem-glossary">
      <div class="gls-title">Shirley's Gem Glossary</div>
      <div id="gls-list"></div>
    </div>
    <div id="board-col">
      <div id="hud">
        <div class="hud-box"><div class="hud-lbl">SCORE</div><div class="hud-v" id="hv-score">0</div></div>
        <div class="hud-box"><div class="hud-lbl">COMBOS</div><div class="hud-v" id="hv-combo">0</div></div>
        <div class="hud-box"><div class="hud-lbl">BEST</div><div class="hud-v" id="hv-best">0</div></div>
      </div>
      <div id="board-wrap">
        <canvas id="board"></canvas>
        <div id="hooray-el"></div>
      </div>
      <div id="msg-el">Select a gem to begin</div>
      <div id="btns">
        <button id="btn-hint">Hint</button>
        <button id="btn-new">New Game</button>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
const COLS=8,ROWS=8,CELL=54;
const CV=document.getElementById('board');
const ctx=CV.getContext('2d');
CV.width=COLS*CELL; CV.height=ROWS*CELL;

const GEMS=[
  {name:'Jade',     color:'#c8f5c8',mid:'#4caf50',dark:'#1b5e20',shine:'#f0fff0',label:'Pale green mineral',   words:['green','soft','smooth','opaque','carved']},
  {name:'Diamond',  color:'#e8f4ff',mid:'#90caf9',dark:'#1565c0',shine:'#ffffff',label:'Hardest natural gem',  words:['clear','hard','faceted','brilliant','rare']},
  {name:'Ruby',     color:'#ff1744',mid:'#b71c1c',dark:'#7f0000',shine:'#ff8a80',label:'Deep red corundum',    words:['red','fiery','precious','glowing','intense']},
  {name:'Sapphire', color:'#1565c0',mid:'#0d47a1',dark:'#002171',shine:'#82b1ff',label:'Blue corundum gem',    words:['blue','deep','royal','lustrous','velvety']},
  {name:'Emerald',  color:'#00c853',mid:'#1b5e20',dark:'#003300',shine:'#b9f6ca',label:'Vivid green beryl',    words:['vivid','lush','mossy','rich','prized']},
  {name:'Amethyst', color:'#9c27b0',mid:'#6a1b9a',dark:'#38006b',shine:'#ea80fc',label:'Purple quartz gem',   words:['purple','violet','regal','calming','crystal']},
  {name:'Topaz',    color:'#ff8f00',mid:'#e65100',dark:'#bf360c',shine:'#fff8e1',label:'Golden silicate gem',  words:['golden','warm','glassy','bright','clear']},
  {name:'Opal',     color:'#00bcd4',mid:'#006064',dark:'#002f33',shine:'#e0f7fa',label:'Iridescent hydrated silica',words:['iridescent','milky','shifting','colorful','unique']},
];

const HOORAY=['Good!','Super!','Unbelievable!','Invincible!','Unstoppable!','Unbreakable!'];
const SCORES={3:10,4:20,5:40,6:80,7:100,8:200};

let grid=[],sel=null,score=0,combo=0,best=0,phase='idle';
let hoorayT=null;
let hintCells=null,hintAnim=0,hintRaf=null;

function buildGlossary(){
  const list=document.getElementById('gls-list');
  list.innerHTML='';
  GEMS.forEach((g,i)=>{
    const item=document.createElement('div');
    item.className='gls-item';
    const ic=document.createElement('canvas');
    ic.className='gls-gem-icon';ic.width=44;ic.height=44;
    drawGem(ic.getContext('2d'),22,22,i,1,1,22);
    const tx=document.createElement('div');
    tx.innerHTML=`<div class="gls-name">${g.name}</div><div class="gls-desc">${g.words.join(', ')}</div>`;
    item.appendChild(ic);item.appendChild(tx);
    list.appendChild(item);
  });
}

function playMatchSound(n){
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    const freqs=[523,659,784,1047,1319,1568];
    const base=freqs[Math.min(n-3,5)];
    [0,0.08,0.16].forEach((t,i)=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.type='sine';o.frequency.value=base*(i===0?1:i===1?1.25:1.5);
      g.gain.setValueAtTime(0.18,ac.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+t+0.3);
      o.connect(g);g.connect(ac.destination);
      o.start(ac.currentTime+t);o.stop(ac.currentTime+t+0.35);
    });
    setTimeout(()=>ac.close(),800);
  }catch(e){}
}

function playHooray(text){
  if(!window.speechSynthesis)return;
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US';u.rate=0.9;u.pitch=1.2;
  speechSynthesis.cancel();speechSynthesis.speak(u);
}

function rnd(){return Math.floor(Math.random()*GEMS.length);}

function newGrid(){
  grid=[];
  for(let r=0;r<ROWS;r++){grid[r]=[];for(let c=0;c<COLS;c++)grid[r][c]=rnd();}
  let it=0;
  while(hasMatch()&&it++<60){
    const mk=findMarks();
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(mk[r][c])grid[r][c]=rnd();
  }
}

function hasMatch(){return findMarks().some(r=>r.some(v=>v));}

function findMarks(){
  const m=Array.from({length:ROWS},()=>new Array(COLS).fill(false));
  for(let r=0;r<ROWS;r++){let c=0;while(c<COLS){let e=c+1;while(e<COLS&&grid[r][e]===grid[r][c])e++;if(e-c>=3)for(let x=c;x<e;x++)m[r][x]=true;c=e;}}
  for(let c=0;c<COLS;c++){let r=0;while(r<ROWS){let e=r+1;while(e<ROWS&&grid[e][c]===grid[r][c])e++;if(e-r>=3)for(let y=r;y<e;y++)m[y][c]=true;r=e;}}
  return m;
}

function maxRun(mark){
  let mx=0;
  for(let r=0;r<ROWS;r++){let l=0;for(let c=0;c<COLS;c++){l=mark[r][c]?l+1:0;mx=Math.max(mx,l);}}
  for(let c=0;c<COLS;c++){let l=0;for(let r=0;r<ROWS;r++){l=mark[r][c]?l+1:0;mx=Math.max(mx,l);}}
  return mx;
}

function findHint(){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(c+1<COLS){sw(r,c,r,c+1);if(hasMatch()){sw(r,c,r,c+1);return[[r,c],[r,c+1]];}sw(r,c,r,c+1);}
    if(r+1<ROWS){sw(r,c,r+1,c);if(hasMatch()){sw(r,c,r+1,c);return[[r,c],[r+1,c]];}sw(r,c,r+1,c);}
  }
  return null;
}

function drawGem(cx,x,y,type,alpha,scale,cellH){
  const g=GEMS[type];if(!g)return;
  const r=(cellH/2-3)*scale;
  cx.save();cx.translate(x,y);cx.globalAlpha=alpha;
  const N=6;
  cx.beginPath();
  for(let i=0;i<N;i++){const a=Math.PI/N*2*i-Math.PI/2;cx.lineTo(Math.cos(a)*r*0.88,Math.sin(a)*r);}
  cx.closePath();
  const grad=cx.createRadialGradient(-r*0.2,-r*0.3,r*0.05,0,0,r);
  grad.addColorStop(0,g.shine);grad.addColorStop(0.4,g.color);grad.addColorStop(1,g.dark);
  cx.fillStyle=grad;cx.fill();
  cx.strokeStyle=g.shine+'99';cx.lineWidth=1.2;cx.stroke();
  cx.beginPath();
  for(let i=0;i<N;i++){const a=Math.PI/N*2*i-Math.PI/2;cx.lineTo(Math.cos(a)*r*0.52,Math.sin(a)*r*0.62);}
  cx.closePath();cx.strokeStyle=g.shine+'55';cx.lineWidth=0.8;cx.stroke();cx.fillStyle=g.mid+'22';cx.fill();
  cx.beginPath();cx.ellipse(-r*0.18,-r*0.3,r*0.25,r*0.14,Math.PI*0.35,0,Math.PI*2);
  cx.fillStyle=g.shine+'cc';cx.fill();
  cx.beginPath();cx.ellipse(-r*0.08,-r*0.22,r*0.1,r*0.06,Math.PI*0.35,0,Math.PI*2);
  cx.fillStyle='#ffffffee';cx.fill();
  if(type===1){for(let i=0;i<4;i++){const a=Math.PI/2*i;cx.beginPath();cx.moveTo(0,0);cx.lineTo(Math.cos(a)*r*0.7,Math.sin(a)*r*0.7);cx.strokeStyle='#ffffff66';cx.lineWidth=0.8;cx.stroke();}}
  if(type===7){const oc=['#ff80ab88','#80d8ff88','#ccff9088','#ffd18088','#ea80fc88'];for(let i=0;i<5;i++){const a=Math.PI*2/5*i;cx.beginPath();cx.arc(Math.cos(a)*r*0.38,Math.sin(a)*r*0.38,r*0.13,0,Math.PI*2);cx.fillStyle=oc[i];cx.fill();}}
  cx.restore();
}

function drawBoard(mark,prog,ph){
  ctx.clearRect(0,0,CV.width,CV.height);
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    ctx.fillStyle=(r+c)%2===0?'#0d1b2a':'#112233';
    rrect(ctx,c*CELL+1,r*CELL+1,CELL-2,CELL-2,5);ctx.fill();
  }
  const hpulse=hintCells?0.55+0.45*Math.sin(hintAnim*0.12):0;
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const t=grid[r][c];if(t<0)continue;
    const cx=c*CELL+CELL/2,cy=r*CELL+CELL/2;
    let alpha=1,scale=1;
    if(mark&&mark[r][c]&&ph==='out'){alpha=1-prog;scale=1-prog*0.5;}
    const isSel=sel&&sel[0]===r&&sel[1]===c;
    const isHint=hintCells&&hintCells.some(h=>h[0]===r&&h[1]===c);
    if(isSel){
      ctx.save();ctx.strokeStyle='#ffffffaa';ctx.lineWidth=2.5;
      rrect(ctx,c*CELL+3,r*CELL+3,CELL-6,CELL-6,5);ctx.stroke();ctx.restore();
      scale=1.12;
    } else if(isHint){
      ctx.save();
      const glow=ctx.createRadialGradient(cx,cy,4,cx,cy,CELL/2);
      glow.addColorStop(0,`rgba(255,230,80,${hpulse*0.55})`);
      glow.addColorStop(1,'rgba(255,230,80,0)');
      ctx.fillStyle=glow;ctx.beginPath();ctx.arc(cx,cy,CELL/2,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=`rgba(255,220,60,${hpulse})`;ctx.lineWidth=2.5;
      rrect(ctx,c*CELL+3,r*CELL+3,CELL-6,CELL-6,5);ctx.stroke();ctx.restore();
      scale=1+0.08*Math.sin(hintAnim*0.12);
    }
    drawGem(ctx,cx,cy,t,alpha,scale,CELL);
  }
}

function rrect(cx,x,y,w,h,r){cx.beginPath();cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);cx.arcTo(x+w,y,x+w,y+r,r);cx.lineTo(x+w,y+h-r);cx.arcTo(x+w,y+h,x+w-r,y+h,r);cx.lineTo(x+r,y+h);cx.arcTo(x,y+h,x,y+h-r,r);cx.lineTo(x,y+r);cx.arcTo(x,y,x+r,y,r);cx.closePath();}

function showHooray(txt,n){
  const el=document.getElementById('hooray-el');
  el.textContent=txt;el.style.opacity='1';
  if(hoorayT)clearTimeout(hoorayT);
  hoorayT=setTimeout(()=>el.style.opacity='0',1400);
  playMatchSound(n);
  setTimeout(()=>playHooray(txt),180);
}

function setMsg(t){document.getElementById('msg-el').textContent=t;}
function updHUD(){
  document.getElementById('hv-score').textContent=score;
  document.getElementById('hv-combo').textContent=combo;
  if(score>best){best=score;document.getElementById('hv-best').textContent=best;}
}

function clearHint(){
  hintCells=null;
  if(hintRaf){cancelAnimationFrame(hintRaf);hintRaf=null;}
}

function startHintAnim(){
  if(hintRaf)return;
  function tick(){
    if(!hintCells){hintRaf=null;return;}
    hintAnim++;drawBoard();
    hintRaf=requestAnimationFrame(tick);
  }
  hintRaf=requestAnimationFrame(tick);
}

function showHint(){
  if(phase!=='idle')return;
  clearHint();
  const h=findHint();
  if(!h){setMsg('No moves available!');return;}
  hintCells=h;hintAnim=0;
  const g1=GEMS[grid[h[0][0]][h[0][1]]].name;
  const g2=GEMS[grid[h[1][0]][h[1][1]]].name;
  setMsg(`Hint: swap ${g1} ↔ ${g2}`);
  startHintAnim();
  setTimeout(()=>{clearHint();drawBoard();},3500);
}

function autoHint(){
  if(phase!=='idle'||hintCells)return;
  const h=findHint();
  if(!h)return;
  hintCells=h;hintAnim=0;
  startHintAnim();
  setTimeout(()=>{clearHint();if(phase==='idle')drawBoard();},3000);
}

let autoHintTimer=null;
function resetAutoHint(){
  if(autoHintTimer)clearTimeout(autoHintTimer);
  autoHintTimer=setTimeout(autoHint,5000);
}

function resolve(cb){
  clearHint();
  const mark=findMarks();
  if(!mark.some(r=>r.some(v=>v))){cb&&cb();return;}
  const run=maxRun(mark);
  const pts=SCORES[Math.min(run,8)]||200;
  score+=pts;combo++;updHUD();
  showHooray(HOORAY[Math.min(run-3,5)],run);
  let t0=null;
  function animOut(ts){
    if(!t0)t0=ts;
    const p=Math.min((ts-t0)/280,1);
    drawBoard(mark,p,'out');
    if(p<1)requestAnimationFrame(animOut);
    else{
      for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(mark[r][c])grid[r][c]=-1;
      doGravity(()=>resolve(cb));
    }
  }
  requestAnimationFrame(animOut);
}

function doGravity(cb){
  for(let c=0;c<COLS;c++){
    let emp=[];
    for(let r=ROWS-1;r>=0;r--){
      if(grid[r][c]===-1)emp.push(r);
      else if(emp.length){let d=emp.shift();grid[d][c]=grid[r][c];grid[r][c]=-1;emp.push(r);}
    }
    for(let r=0;r<ROWS;r++)if(grid[r][c]===-1)grid[r][c]=rnd();
  }
  let t0=null;
  function animFall(ts){
    if(!t0)t0=ts;const p=Math.min((ts-t0)/220,1);
    drawBoard(null,p,'fall');
    if(p<1)requestAnimationFrame(animFall);
    else{drawBoard();cb&&cb();}
  }
  requestAnimationFrame(animFall);
}

function sw(r1,c1,r2,c2){let t=grid[r1][c1];grid[r1][c1]=grid[r2][c2];grid[r2][c2]=t;}

function canMove(){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(c+1<COLS){sw(r,c,r,c+1);if(hasMatch()){sw(r,c,r,c+1);return true;}sw(r,c,r,c+1);}
    if(r+1<ROWS){sw(r,c,r+1,c);if(hasMatch()){sw(r,c,r+1,c);return true;}sw(r,c,r+1,c);}
  }
  return false;
}

function cellAt(px,py){return[Math.floor(py/CELL),Math.floor(px/CELL)];}
function adj(r1,c1,r2,c2){return(Math.abs(r1-r2)+Math.abs(c1-c2))===1;}

CV.addEventListener('click',function(e){
  if(phase!=='idle')return;
  const rect=CV.getBoundingClientRect();
  const px=(e.clientX-rect.left)*(CV.width/rect.width);
  const py=(e.clientY-rect.top)*(CV.height/rect.height);
  const[r,c]=cellAt(px,py);
  if(r<0||r>=ROWS||c<0||c>=COLS)return;
  clearHint();resetAutoHint();
  if(!sel){
    sel=[r,c];drawBoard();
    setMsg(`${GEMS[grid[r][c]].name} selected — tap an adjacent gem`);
    return;
  }
  const[sr,sc]=sel;
  if(sr===r&&sc===c){sel=null;drawBoard();setMsg('Select a gem to begin');resetAutoHint();return;}
  if(!adj(sr,sc,r,c)){
    sel=[r,c];drawBoard();
    setMsg(`${GEMS[grid[r][c]].name} selected — tap an adjacent gem`);
    return;
  }
  sel=null;phase='anim';
  sw(sr,sc,r,c);drawBoard();
  if(!hasMatch()){sw(sr,sc,r,c);drawBoard();phase='idle';setMsg('No match! Try another swap');resetAutoHint();return;}
  setMsg('');
  resolve(function(){
    phase='idle';
    if(!canMove()){setMsg('No more moves — restarting…');setTimeout(startGame,2200);}
    else{setMsg('Select a gem to continue');resetAutoHint();}
  });
});

document.getElementById('btn-hint').addEventListener('click',()=>{
  if(phase!=='idle')return;
  clearHint();showHint();
});
document.getElementById('btn-new').addEventListener('click',startGame);

function startGame(){
  score=0;combo=0;sel=null;phase='idle';
  clearHint();if(autoHintTimer)clearTimeout(autoHintTimer);
  updHUD();newGrid();drawBoard();
  setMsg('Select a gem to begin');
  resetAutoHint();
}

buildGlossary();
startGame();
})();
</script>
