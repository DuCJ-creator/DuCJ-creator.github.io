<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gem Match</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:#0a1520;font-family:system-ui,sans-serif;overflow:hidden}
#root{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;gap:6px}
#main-row{display:flex;gap:10px;align-items:flex-start;justify-content:center}
#gem-glossary{width:140px;background:#0d1b2a;border-radius:12px;padding:8px 6px;flex-shrink:0;overflow-y:auto}
.gls-title{color:#c8d8e8;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;text-align:center}
.gls-item{display:flex;align-items:center;gap:6px;padding:3px 2px}
.gls-gem-icon{width:20px;height:20px;flex-shrink:0}
.gls-name{font-size:11px;font-weight:500;color:#e8f0f8}
.gls-desc{font-size:9px;color:#7a9ab8;line-height:1.3;margin-top:1px}
.gls-super{background:rgba(255,220,80,0.1);border-radius:6px;padding:3px 2px;margin-bottom:3px}
.gls-super .gls-name{color:#ffd740}
.gls-super .gls-desc{color:#b8a060}
#board-col{display:flex;flex-direction:column;align-items:center;gap:6px}
#hud{display:flex;gap:8px}
.hud-box{background:#0d1b2a;border-radius:8px;padding:5px 12px;text-align:center}
.hud-lbl{font-size:9px;color:#7a9ab8;letter-spacing:.5px}
.hud-v{font-size:16px;font-weight:500;color:#e8f0f8}
#board-wrap{position:relative;touch-action:none;user-select:none;-webkit-user-select:none}
canvas#board{display:block;border-radius:10px;cursor:pointer;touch-action:none}
#hooray-el{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:28px;font-weight:600;color:#fff;text-shadow:0 0 20px rgba(255,220,80,0.9),0 2px 8px rgba(0,0,0,0.8);pointer-events:none;opacity:0;transition:opacity .2s;white-space:nowrap}
#msg-el{font-size:11px;color:#7a9ab8;min-height:14px;text-align:center}
#btns{display:flex;gap:8px}
button{background:transparent;border:0.5px solid #3a5a7a;color:#c8d8e8;border-radius:8px;padding:5px 16px;font-size:12px;cursor:pointer}
button:hover,button:active{background:rgba(255,255,255,0.08)}
</style>
</head>
<body>
<div id="root">
  <div id="main-row">
    <div id="gem-glossary">
      <div class="gls-title">Gems</div>
      <div id="gls-list"></div>
    </div>
    <div id="board-col">
      <div id="hud">
        <div class="hud-box"><div class="hud-lbl">SCORE</div><div class="hud-v" id="hv-score">0</div></div>
        <div class="hud-box"><div class="hud-lbl">COMBOS</div><div class="hud-v" id="hv-combo">0</div></div>
        <div class="hud-box"><div class="hud-lbl">BEST</div><div class="hud-v" id="hv-best">0</div></div>
      </div>
      <div id="board-wrap">
        <canvas id="board"></canvas>
        <div id="hooray-el"></div>
      </div>
      <div id="msg-el">Swipe to swap gems</div>
      <div id="btns">
        <button id="btn-hint">Hint</button>
        <button id="btn-new">New Game</button>
      </div>
    </div>
  </div>
</div>
<script>
(function(){
const COLS=8,ROWS=8,SUPER=-2;
const CV=document.getElementById('board');
const ctx=CV.getContext('2d');
let CELL=54;

// ── Responsive: compute cell size from actual window dimensions ───────────────
function computeLayout(){
  const vw=window.innerWidth||document.documentElement.clientWidth||640;
  const vh=window.innerHeight||document.documentElement.clientHeight||600;
  // Fixed chrome heights: hud~36, msg~18, btns~34, gaps~30, padding~16
  const CHROME_H=36+18+34+30+16;
  // Sidebar width + gap (hide if too narrow)
  const showSidebar=vw>=380;
  const sideW=showSidebar?150:0;
  const availW=vw-sideW-16;
  const availH=vh-CHROME_H;
  CELL=Math.max(26,Math.min(Math.floor(availW/COLS),Math.floor(availH/ROWS),68));

  CV.width=COLS*CELL;
  CV.height=ROWS*CELL;

  const glossary=document.getElementById('gem-glossary');
  glossary.style.display=showSidebar?'':'none';
  glossary.style.maxHeight=(ROWS*CELL)+'px';

  const root=document.getElementById('root');
  root.style.width=vw+'px';
  root.style.minHeight=vh+'px';
}

window.addEventListener('resize',()=>{computeLayout();drawBoard();});

// ── Gem definitions ───────────────────────────────────────────────────────────
const GEMS=[
  {name:'Jade',     color:'#c8f5c8',mid:'#4caf50',dark:'#1b5e20',shine:'#f0fff0',words:['green','soft','carved']},
  {name:'Diamond',  color:'#e8f4ff',mid:'#90caf9',dark:'#1565c0',shine:'#ffffff',words:['clear','hard','brilliant']},
  {name:'Ruby',     color:'#ff1744',mid:'#b71c1c',dark:'#7f0000',shine:'#ff8a80',words:['red','fiery','glowing']},
  {name:'Sapphire', color:'#1565c0',mid:'#0d47a1',dark:'#002171',shine:'#82b1ff',words:['blue','royal','lustrous']},
  {name:'Emerald',  color:'#00c853',mid:'#1b5e20',dark:'#003300',shine:'#b9f6ca',words:['vivid','lush','prized']},
  {name:'Amethyst', color:'#9c27b0',mid:'#6a1b9a',dark:'#38006b',shine:'#ea80fc',words:['purple','regal','crystal']},
  {name:'Topaz',    color:'#ff8f00',mid:'#e65100',dark:'#bf360c',shine:'#fff8e1',words:['golden','warm','bright']},
  {name:'Opal',     color:'#00bcd4',mid:'#006064',dark:'#002f33',shine:'#e0f7fa',words:['iridescent','shifting','unique']},
];

const HOORAY=['Good!','Super!','Unbelievable!','Invincible!','Unstoppable!','Unbreakable!'];
const SCORES={3:10,4:20,5:40,6:80,7:100,8:200};

let grid=[],sel=null,score=0,combo=0,best=0,phase='idle';
let hoorayT=null,hintCells=null,hintAnim=0,autoHintTimer=null;
let superAnim=0,touchStart=null;

// ── Glossary ──────────────────────────────────────────────────────────────────
function buildGlossary(){
  const list=document.getElementById('gls-list');
  list.innerHTML='';
  const si=document.createElement('div');si.className='gls-item gls-super';
  const sic=document.createElement('canvas');sic.className='gls-gem-icon';sic.width=40;sic.height=40;
  drawSuper(sic.getContext('2d'),20,20,1,20,0);
  const stx=document.createElement('div');
  stx.innerHTML='<div class="gls-name">Super</div><div class="gls-desc">wild — any gem</div>';
  si.appendChild(sic);si.appendChild(stx);list.appendChild(si);
  GEMS.forEach((g,i)=>{
    const item=document.createElement('div');item.className='gls-item';
    const ic=document.createElement('canvas');ic.className='gls-gem-icon';ic.width=40;ic.height=40;
    drawGem(ic.getContext('2d'),20,20,i,1,1,40);
    const tx=document.createElement('div');
    tx.innerHTML=`<div class="gls-name">${g.name}</div><div class="gls-desc">${g.words.join(', ')}</div>`;
    item.appendChild(ic);item.appendChild(tx);list.appendChild(item);
  });
}

// ── Audio ─────────────────────────────────────────────────────────────────────
function playMatchSound(n){
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    const base=[523,659,784,1047,1319,1568][Math.min(n-3,5)];
    [0,0.08,0.16].forEach((t,i)=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.type='sine';o.frequency.value=base*(i===0?1:i===1?1.25:1.5);
      g.gain.setValueAtTime(0.18,ac.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+t+0.3);
      o.connect(g);g.connect(ac.destination);
      o.start(ac.currentTime+t);o.stop(ac.currentTime+t+0.35);
    });
    setTimeout(()=>ac.close(),800);
  }catch(e){}
}
function playHoorayAudio(text){
  if(!window.speechSynthesis)return;
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US';u.rate=0.9;u.pitch=1.2;
  speechSynthesis.cancel();speechSynthesis.speak(u);
}

// ── Grid logic ────────────────────────────────────────────────────────────────
function rnd(){return Math.floor(Math.random()*GEMS.length);}

function ensureSuperOnBoard(){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(grid[r][c]===SUPER)return;
  grid[Math.floor(Math.random()*ROWS)][Math.floor(Math.random()*COLS)]=SUPER;
}

function newGrid(){
  grid=[];
  for(let r=0;r<ROWS;r++){grid[r]=[];for(let c=0;c<COLS;c++)grid[r][c]=rnd();}
  grid[Math.floor(Math.random()*ROWS)][Math.floor(Math.random()*COLS)]=SUPER;
  let it=0;
  while(hasNormalMatch()&&it++<80){
    const mk=findMarksIgnoreSuper();
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(mk[r][c]&&grid[r][c]!==SUPER)grid[r][c]=rnd();
  }
}

function findMarks(){
  const m=Array.from({length:ROWS},()=>new Array(COLS).fill(false));
  for(let r=0;r<ROWS;r++){
    let c=0;
    while(c<COLS){
      let rt=grid[r][c]===SUPER?-99:grid[r][c],e=c+1;
      while(e<COLS){const t=grid[r][e];if(t===SUPER){e++;continue;}if(rt===-99){rt=t;e++;continue;}if(t===rt){e++;continue;}break;}
      if(e-c>=3&&rt!==-99)for(let x=c;x<e;x++)m[r][x]=true;
      c=e;
    }
  }
  for(let c=0;c<COLS;c++){
    let r=0;
    while(r<ROWS){
      let rt=grid[r][c]===SUPER?-99:grid[r][c],e=r+1;
      while(e<ROWS){const t=grid[e][c];if(t===SUPER){e++;continue;}if(rt===-99){rt=t;e++;continue;}if(t===rt){e++;continue;}break;}
      if(e-r>=3&&rt!==-99)for(let y=r;y<e;y++)m[y][c]=true;
      r=e;
    }
  }
  return m;
}

function hasNormalMatch(){
  for(let r=0;r<ROWS;r++){let c=0;while(c<COLS){let e=c+1;while(e<COLS&&grid[r][e]===grid[r][c]&&grid[r][c]!==SUPER)e++;if(e-c>=3&&grid[r][c]!==SUPER)return true;c=e;}}
  for(let c=0;c<COLS;c++){let r=0;while(r<ROWS){let e=r+1;while(e<ROWS&&grid[e][c]===grid[r][c]&&grid[r][c]!==SUPER)e++;if(e-r>=3&&grid[r][c]!==SUPER)return true;r=e;}}
  return false;
}

function findMarksIgnoreSuper(){
  const m=Array.from({length:ROWS},()=>new Array(COLS).fill(false));
  for(let r=0;r<ROWS;r++){let c=0;while(c<COLS){let e=c+1;while(e<COLS&&grid[r][e]===grid[r][c]&&grid[r][c]!==SUPER)e++;if(e-c>=3&&grid[r][c]!==SUPER)for(let x=c;x<e;x++)m[r][x]=true;c=e;}}
  for(let c=0;c<COLS;c++){let r=0;while(r<ROWS){let e=r+1;while(e<ROWS&&grid[e][c]===grid[r][c]&&grid[r][c]!==SUPER)e++;if(e-r>=3&&grid[r][c]!==SUPER)for(let y=r;y<e;y++)m[y][c]=true;r=e;}}
  return m;
}

function hasMatch(){return findMarks().some(r=>r.some(v=>v));}

function maxRun(mark){
  let mx=0;
  for(let r=0;r<ROWS;r++){let l=0;for(let c=0;c<COLS;c++){l=mark[r][c]?l+1:0;mx=Math.max(mx,l);}}
  for(let c=0;c<COLS;c++){let l=0;for(let r=0;r<ROWS;r++){l=mark[r][c]?l+1:0;mx=Math.max(mx,l);}}
  return mx;
}

function findHint(){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(c+1<COLS){sw(r,c,r,c+1);if(hasMatch()){sw(r,c,r,c+1);return[[r,c],[r,c+1]];}sw(r,c,r,c+1);}
    if(r+1<ROWS){sw(r,c,r+1,c);if(hasMatch()){sw(r,c,r+1,c);return[[r,c],[r+1,c]];}sw(r,c,r+1,c);}
  }
  return null;
}

function sw(r1,c1,r2,c2){let t=grid[r1][c1];grid[r1][c1]=grid[r2][c2];grid[r2][c2]=t;}

function canMove(){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(c+1<COLS){sw(r,c,r,c+1);if(hasMatch()){sw(r,c,r,c+1);return true;}sw(r,c,r,c+1);}
    if(r+1<ROWS){sw(r,c,r+1,c);if(hasMatch()){sw(r,c,r+1,c);return true;}sw(r,c,r+1,c);}
  }
  return false;
}

// ── Drawing ───────────────────────────────────────────────────────────────────
function drawGem(cx,x,y,type,alpha,scale,cellH){
  const g=GEMS[type];if(!g)return;
  const r=(cellH/2-3)*scale;
  cx.save();cx.translate(x,y);cx.globalAlpha=alpha;
  const N=6;
  cx.beginPath();
  for(let i=0;i<N;i++){const a=Math.PI/N*2*i-Math.PI/2;cx.lineTo(Math.cos(a)*r*0.88,Math.sin(a)*r);}
  cx.closePath();
  const grad=cx.createRadialGradient(-r*0.2,-r*0.3,r*0.05,0,0,r);
  grad.addColorStop(0,g.shine);grad.addColorStop(0.4,g.color);grad.addColorStop(1,g.dark);
  cx.fillStyle=grad;cx.fill();
  cx.strokeStyle=g.shine+'99';cx.lineWidth=1.2;cx.stroke();
  cx.beginPath();
  for(let i=0;i<N;i++){const a=Math.PI/N*2*i-Math.PI/2;cx.lineTo(Math.cos(a)*r*0.52,Math.sin(a)*r*0.62);}
  cx.closePath();cx.strokeStyle=g.shine+'55';cx.lineWidth=0.8;cx.stroke();cx.fillStyle=g.mid+'22';cx.fill();
  cx.beginPath();cx.ellipse(-r*0.18,-r*0.3,r*0.25,r*0.14,Math.PI*0.35,0,Math.PI*2);cx.fillStyle=g.shine+'cc';cx.fill();
  cx.beginPath();cx.ellipse(-r*0.08,-r*0.22,r*0.1,r*0.06,Math.PI*0.35,0,Math.PI*2);cx.fillStyle='#ffffffee';cx.fill();
  if(type===1){for(let i=0;i<4;i++){const a=Math.PI/2*i;cx.beginPath();cx.moveTo(0,0);cx.lineTo(Math.cos(a)*r*0.7,Math.sin(a)*r*0.7);cx.strokeStyle='#ffffff66';cx.lineWidth=0.8;cx.stroke();}}
  if(type===7){const oc=['#ff80ab88','#80d8ff88','#ccff9088','#ffd18088','#ea80fc88'];for(let i=0;i<5;i++){const a=Math.PI*2/5*i;cx.beginPath();cx.arc(Math.cos(a)*r*0.38,Math.sin(a)*r*0.38,r*0.13,0,Math.PI*2);cx.fillStyle=oc[i];cx.fill();}}
  cx.restore();
}

function drawSuper(cx,x,y,alpha,cellH,tick){
  const R=cellH/2-2;
  cx.save();cx.translate(x,y);cx.globalAlpha=alpha;
  const rc=['#ff4444','#ff9900','#ffee00','#44dd44','#4488ff','#aa44ff','#ff44cc','#ff4444'];
  for(let i=0;i<8;i++){
    const a1=Math.PI*2/8*i+tick*0.04,a2=Math.PI*2/8*(i+1)+tick*0.04;
    cx.beginPath();cx.moveTo(0,0);cx.arc(0,0,R*0.95,a1,a2);cx.closePath();cx.fillStyle=rc[i]+'bb';cx.fill();
  }
  cx.beginPath();
  const pts=8,outerR=R*0.75,innerR=R*0.35;
  for(let i=0;i<pts*2;i++){
    const a=Math.PI/pts*i-Math.PI/2+tick*0.015,rr=i%2===0?outerR:innerR;
    i===0?cx.moveTo(Math.cos(a)*rr,Math.sin(a)*rr):cx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr);
  }
  cx.closePath();
  const sg=cx.createRadialGradient(0,-outerR*0.3,1,0,0,outerR);
  sg.addColorStop(0,'#ffffff');sg.addColorStop(0.5,'#ffe080');sg.addColorStop(1,'#ffaa00');
  cx.fillStyle=sg;cx.fill();cx.strokeStyle='#fff8';cx.lineWidth=1;cx.stroke();
  cx.beginPath();cx.arc(0,0,R*0.14,0,Math.PI*2);cx.fillStyle='#ffffff';cx.fill();
  for(let i=0;i<4;i++){
    const a=Math.PI/4*i+tick*0.02,len=R*0.55;
    cx.beginPath();cx.moveTo(Math.cos(a)*R*0.1,Math.sin(a)*R*0.1);cx.lineTo(Math.cos(a)*len,Math.sin(a)*len);
    cx.strokeStyle='#ffffffcc';cx.lineWidth=1.2;cx.stroke();
  }
  cx.restore();
}

function rrect(cx,x,y,w,h,r){cx.beginPath();cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);cx.arcTo(x+w,y,x+w,y+r,r);cx.lineTo(x+w,y+h-r);cx.arcTo(x+w,y+h,x+w-r,y+h,r);cx.lineTo(x+r,y+h);cx.arcTo(x,y+h,x,y+h-r,r);cx.lineTo(x,y+r);cx.arcTo(x,y,x+r,y,r);cx.closePath();}

function drawBoard(mark,prog,ph){
  ctx.clearRect(0,0,CV.width,CV.height);
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    ctx.fillStyle=(r+c)%2===0?'#0d1b2a':'#112233';
    rrect(ctx,c*CELL+1,r*CELL+1,CELL-2,CELL-2,5);ctx.fill();
  }
  const hpulse=hintCells?0.55+0.45*Math.sin(hintAnim*0.12):0;
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const t=grid[r][c];if(t<-2)continue;
    const cx2=c*CELL+CELL/2,cy=r*CELL+CELL/2;
    let alpha=1,scale=1;
    if(mark&&mark[r][c]&&ph==='out'){alpha=1-prog;scale=1-prog*0.5;}
    const isSel=sel&&sel[0]===r&&sel[1]===c;
    const isHint=hintCells&&hintCells.some(h=>h[0]===r&&h[1]===c);
    if(isSel){
      ctx.save();ctx.strokeStyle='#ffffffaa';ctx.lineWidth=2.5;
      rrect(ctx,c*CELL+3,r*CELL+3,CELL-6,CELL-6,5);ctx.stroke();ctx.restore();scale=1.12;
    } else if(isHint){
      ctx.save();
      const glow=ctx.createRadialGradient(cx2,cy,4,cx2,cy,CELL/2);
      glow.addColorStop(0,`rgba(255,230,80,${hpulse*0.55})`);glow.addColorStop(1,'rgba(255,230,80,0)');
      ctx.fillStyle=glow;ctx.beginPath();ctx.arc(cx2,cy,CELL/2,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=`rgba(255,220,60,${hpulse})`;ctx.lineWidth=2.5;
      rrect(ctx,c*CELL+3,r*CELL+3,CELL-6,CELL-6,5);ctx.stroke();ctx.restore();
      scale=1+0.08*Math.sin(hintAnim*0.12);
    }
    if(t===SUPER){
      ctx.save();ctx.translate(cx2,cy);ctx.scale(scale,scale);ctx.translate(-cx2,-cy);
      drawSuper(ctx,cx2,cy,alpha,CELL/2,superAnim);ctx.restore();
    } else {
      drawGem(ctx,cx2,cy,t,alpha,scale,CELL);
    }
  }
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function showHooray(txt,n){
  const el=document.getElementById('hooray-el');
  el.textContent=txt;el.style.opacity='1';
  if(hoorayT)clearTimeout(hoorayT);
  hoorayT=setTimeout(()=>el.style.opacity='0',1400);
  playMatchSound(n);setTimeout(()=>playHoorayAudio(txt),180);
}
function setMsg(t){document.getElementById('msg-el').textContent=t;}
function updHUD(){
  document.getElementById('hv-score').textContent=score;
  document.getElementById('hv-combo').textContent=combo;
  if(score>best){best=score;document.getElementById('hv-best').textContent=best;}
}

// ── Hint ──────────────────────────────────────────────────────────────────────
function clearHint(){hintCells=null;}
function showHint(){
  if(phase!=='idle')return;clearHint();
  const h=findHint();if(!h){setMsg('No moves available!');return;}
  hintCells=h;hintAnim=0;
  const n1=grid[h[0][0]][h[0][1]]===SUPER?'Super':GEMS[grid[h[0][0]][h[0][1]]].name;
  const n2=grid[h[1][0]][h[1][1]]===SUPER?'Super':GEMS[grid[h[1][0]][h[1][1]]].name;
  setMsg(`Hint: swap ${n1} ↔ ${n2}`);
  setTimeout(clearHint,3500);
}
function autoHint(){
  if(phase!=='idle'||hintCells)return;
  const h=findHint();if(!h)return;
  hintCells=h;hintAnim=0;setTimeout(clearHint,3000);
}
function resetAutoHint(){
  if(autoHintTimer)clearTimeout(autoHintTimer);
  autoHintTimer=setTimeout(autoHint,5000);
}

// ── Game flow ─────────────────────────────────────────────────────────────────
function resolve(cb){
  clearHint();
  const mark=findMarks();
  if(!mark.some(r=>r.some(v=>v))){ensureSuperOnBoard();cb&&cb();return;}
  const run=maxRun(mark);
  score+=(SCORES[Math.min(run,8)]||200);combo++;updHUD();
  showHooray(HOORAY[Math.min(run-3,5)],run);
  let t0=null;
  function animOut(ts){
    if(!t0)t0=ts;const p=Math.min((ts-t0)/280,1);
    drawBoard(mark,p,'out');
    if(p<1)requestAnimationFrame(animOut);
    else{
      for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(mark[r][c])grid[r][c]=-1;
      doGravity(()=>resolve(cb));
    }
  }
  requestAnimationFrame(animOut);
}

function doGravity(cb){
  for(let c=0;c<COLS;c++){
    let emp=[];
    for(let r=ROWS-1;r>=0;r--){
      if(grid[r][c]===-1)emp.push(r);
      else if(emp.length){let d=emp.shift();grid[d][c]=grid[r][c];grid[r][c]=-1;emp.push(r);}
    }
    for(let r=0;r<ROWS;r++)if(grid[r][c]===-1)grid[r][c]=rnd();
  }
  ensureSuperOnBoard();
  let t0=null;
  function animFall(ts){
    if(!t0)t0=ts;const p=Math.min((ts-t0)/220,1);
    drawBoard();if(p<1)requestAnimationFrame(animFall);else{drawBoard();cb&&cb();}
  }
  requestAnimationFrame(animFall);
}

function attemptSwap(r1,c1,r2,c2){
  if(phase!=='idle')return;
  if(r1<0||r1>=ROWS||c1<0||c1>=COLS||r2<0||r2>=ROWS||c2<0||c2>=COLS)return;
  if(Math.abs(r1-r2)+Math.abs(c1-c2)!==1)return;
  clearHint();resetAutoHint();sel=null;
  phase='anim';sw(r1,c1,r2,c2);drawBoard();
  if(!hasMatch()){
    sw(r1,c1,r2,c2);drawBoard();phase='idle';
    setMsg('No match! Try another swap');resetAutoHint();return;
  }
  setMsg('');
  resolve(()=>{
    phase='idle';
    if(!canMove()){setMsg('No more moves — restarting…');setTimeout(startGame,2200);}
    else{setMsg('Swipe to swap gems');resetAutoHint();}
  });
}

// ── Input: touch swipe ────────────────────────────────────────────────────────
function canvasXY(clientX,clientY){
  const rect=CV.getBoundingClientRect();
  const sx=CV.width/rect.width,sy=CV.height/rect.height;
  return{px:(clientX-rect.left)*sx,py:(clientY-rect.top)*sy};
}
function cellAt(px,py){return[Math.floor(py/CELL),Math.floor(px/CELL)];}

CV.addEventListener('touchstart',function(e){
  e.preventDefault();
  if(phase!=='idle')return;
  const t=e.touches[0];
  const{px,py}=canvasXY(t.clientX,t.clientY);
  const[r,c]=cellAt(px,py);
  if(r<0||r>=ROWS||c<0||c>=COLS)return;
  touchStart={x:t.clientX,y:t.clientY,r,c};
},{passive:false});

CV.addEventListener('touchend',function(e){
  e.preventDefault();
  if(!touchStart||phase!=='idle'){touchStart=null;return;}
  const{r,c,x:x0,y:y0}=touchStart;touchStart=null;
  const dx=e.changedTouches[0].clientX-x0;
  const dy=e.changedTouches[0].clientY-y0;
  const dist=Math.sqrt(dx*dx+dy*dy);

  if(dist<10){
    // tap — click-style select/swap fallback
    clearHint();resetAutoHint();
    const tname=grid[r][c]===SUPER?'Super':GEMS[grid[r][c]].name;
    if(!sel){sel=[r,c];drawBoard();setMsg(`${tname} — tap adjacent to swap`);return;}
    const[sr,sc]=sel;
    if(sr===r&&sc===c){sel=null;drawBoard();setMsg('Swipe to swap gems');resetAutoHint();return;}
    if(Math.abs(sr-r)+Math.abs(sc-c)!==1){sel=[r,c];drawBoard();setMsg(`${tname} — tap adjacent to swap`);return;}
    sel=null;attemptSwap(sr,sc,r,c);
    return;
  }
  // swipe direction
  let dr=0,dc=0;
  if(Math.abs(dx)>=Math.abs(dy))dc=dx>0?1:-1;else dr=dy>0?1:-1;
  attemptSwap(r,c,r+dr,c+dc);
},{passive:false});

CV.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});

// ── Input: mouse click ────────────────────────────────────────────────────────
CV.addEventListener('click',function(e){
  if(phase!=='idle')return;
  const{px,py}=canvasXY(e.clientX,e.clientY);
  const[r,c]=cellAt(px,py);
  if(r<0||r>=ROWS||c<0||c>=COLS)return;
  clearHint();resetAutoHint();
  const tname=grid[r][c]===SUPER?'Super':GEMS[grid[r][c]].name;
  if(!sel){sel=[r,c];drawBoard();setMsg(`${tname} — click adjacent to swap`);return;}
  const[sr,sc]=sel;
  if(sr===r&&sc===c){sel=null;drawBoard();setMsg('Select a gem to begin');resetAutoHint();return;}
  if(Math.abs(sr-r)+Math.abs(sc-c)!==1){sel=[r,c];drawBoard();setMsg(`${tname} — click adjacent to swap`);return;}
  sel=null;attemptSwap(sr,sc,r,c);
});

document.getElementById('btn-hint').addEventListener('click',()=>{if(phase!=='idle')return;clearHint();showHint();});
document.getElementById('btn-new').addEventListener('click',startGame);

function startGame(){
  score=0;combo=0;sel=null;phase='idle';
  clearHint();if(autoHintTimer)clearTimeout(autoHintTimer);
  updHUD();newGrid();setMsg('Swipe to swap gems');resetAutoHint();
}

// ── Animation loop ────────────────────────────────────────────────────────────
function startSuperAnim(){
  function tick(){superAnim++;if(hintCells)hintAnim++;drawBoard();requestAnimationFrame(tick);}
  requestAnimationFrame(tick);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
// Use requestAnimationFrame to guarantee layout is complete before measuring
requestAnimationFrame(function(){
  computeLayout();
  buildGlossary();
  startGame();
  startSuperAnim();
});

})();
</script>
