<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shirley's TOEFL Junior Visualized Charts</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
  <style>
    :root{
      --bg:#f4f6f9;--card:#fff;--text:#2c3e50;--muted:#7f8c8d;--border:#e2e8f0;
      --primary:#4a6fa5;--plight:#edf2f7;--accent:#e74c3c;
    }
    *{box-sizing:border-box;margin:0;padding:0;font-family:'Noto Sans TC',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    html,body{width:100%;max-width:100%;overflow-x:hidden;background:var(--bg);color:var(--text)}
    body{padding:18px}
    header{max-width:1280px;margin:0 auto 18px;text-align:center;background:linear-gradient(135deg,#2c3e50,#4a6fa5);padding:18px;border-radius:14px;color:white;box-shadow:0 8px 20px rgba(44,62,80,.14)}
    header h1{font-size:23px;font-weight:700;margin-bottom:4px} header p{font-size:13px;opacity:.9}
    .top-bar{max-width:1280px;margin:0 auto 16px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
    .mode-tabs{display:flex;gap:8px;flex-wrap:wrap}
    .tab-btn{padding:10px 18px;background:#e2e8f0;border:0;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;color:var(--text)}
    .tab-btn.active{background:var(--primary);color:#fff;box-shadow:0 4px 12px rgba(74,111,165,.25)}
    .export-pdf-btn{padding:10px 18px;background:#27ae60;color:#fff;border:0;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(39,174,96,.22)}
    .export-pdf-btn:hover{background:#219653}
    .hint{max-width:1280px;margin:0 auto 12px;font-size:12px;color:#64748b;line-height:1.5}
    .main-container{width:100%;max-width:1280px;margin:0 auto}
    .mode-content{display:none;grid-template-columns:280px minmax(0,1fr);gap:16px;width:100%}
    .mode-content.active{display:grid}
    @media(max-width:980px){.mode-content{grid-template-columns:1fr}.panel{max-height:none!important}}
    .panel{background:var(--card);padding:18px;border-radius:14px;border:1px solid var(--border);height:fit-content;box-shadow:0 8px 24px rgba(0,0,0,.035)}
    h2{font-size:16px;margin-bottom:14px;font-weight:700;border-left:4px solid var(--primary);padding-left:9px}
    .input-group{margin-bottom:10px} label{display:block;font-size:12px;font-weight:600;margin-bottom:4px;color:#4a5568}
    input[type="number"],input[type="text"],select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:#fff;color:var(--text)}
    button.action-btn{width:100%;padding:10px;background:var(--primary);color:#fff;border:0;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:5px}
    .display-area{min-width:0;width:100%}
    .report-pdf-wrapper{background:#fff;padding:20px;border-radius:14px;border:1px solid var(--border);width:100%;max-width:100%;overflow:hidden}
    .report-meta-info{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid #2c3e50;padding-bottom:10px;margin-bottom:16px;color:var(--muted);gap:12px}
    .report-title-pdf{font-size:21px;color:var(--text);font-weight:700}.report-date{font-size:12px;white-space:nowrap}
    .charts-grid-compare{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;width:100%}
    .pdf-page-block{background:#fff;padding:14px;border-radius:12px;border:1px solid var(--border);box-shadow:0 4px 12px rgba(0,0,0,.02);width:100%;min-width:0;height:355px;break-inside:avoid;page-break-inside:avoid}
    .single-card{max-width:740px;margin:0 auto;height:410px}
    .chart-title-label{font-size:15px;font-weight:700;background:var(--plight);padding:6px 16px;border-radius:20px;text-align:center;margin-bottom:10px;width:100%}
    .chart-layout-box{display:flex;width:100%;height:calc(100% - 72px);gap:12px;align-items:center;justify-content:space-between}
    .text-data-list{flex:0 0 168px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:9px;display:flex;flex-direction:column;gap:5px;height:100%;justify-content:center;overflow:hidden}
    .data-item{font-size:11px;font-weight:700;display:flex;align-items:center;gap:5px;color:#334155;white-space:nowrap}.color-dot{width:9px;height:9px;border-radius:2px;display:inline-block;flex-shrink:0}
    .sum-badge-box{margin-top:4px;padding-top:6px;border-top:1px dashed #cbd5e1;font-size:11px;font-weight:700;color:#1e3a8a;line-height:1.35}
    .chart-container{position:relative;flex:1;height:100%;min-width:0}.chart-container canvas{display:block!important;width:100%!important;height:100%!important}
    .info-badge{margin-top:8px;font-size:12px;color:#2c3e50;background:#f1f5f9;padding:4px 12px;border-radius:20px;font-weight:700;border:1px solid #cbd5e1;text-align:center;width:100%}
    .compare-group-block{border:1px solid var(--border);padding:10px;border-radius:10px;margin-bottom:10px;background:#fafafa}.compare-group-header{font-size:13px;font-weight:700;margin-bottom:7px;color:var(--primary);display:flex;justify-content:space-between;align-items:center}.remove-btn{background:none;border:0;color:var(--accent);cursor:pointer;font-size:11px;font-weight:700}
    @media(max-width:1180px){.charts-grid-compare{gap:10px}.pdf-page-block{height:345px;padding:12px}.text-data-list{flex-basis:158px}.data-item,.sum-badge-box{font-size:10px}}

    @page{size:A4 landscape;margin:7mm}
    @media print{
      html,body{background:#fff!important;width:100%!important;height:auto!important;overflow:visible!important;padding:0!important;margin:0!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
      header,.top-bar,.hint,.panel{display:none!important}
      .main-container,.mode-content,.display-area{display:block!important;width:100%!important;max-width:none!important;margin:0!important;padding:0!important}
      .mode-content:not(.active){display:none!important}
      .report-pdf-wrapper{border:0!important;border-radius:0!important;box-shadow:none!important;padding:0!important;margin:0!important;width:100%!important;max-width:none!important;overflow:visible!important;background:#fff!important}
      .report-meta-info{margin-bottom:4mm!important;padding-bottom:3mm!important}.report-title-pdf{font-size:20pt!important}.report-date{font-size:10pt!important}
      .charts-grid-compare{display:grid!important;grid-template-columns:1fr 1fr!important;gap:4mm!important;width:100%!important;page-break-inside:avoid!important;break-inside:avoid!important}
      .pdf-page-block{height:82mm!important;padding:4mm!important;border:1px solid #dbe3ec!important;border-radius:4mm!important;box-shadow:none!important;page-break-inside:avoid!important;break-inside:avoid!important;background:#fff!important;overflow:hidden!important}
      .single-card{height:120mm!important;max-width:190mm!important;margin:0 auto!important}.chart-title-label{font-size:13pt!important;padding:2mm 5mm!important;margin-bottom:3mm!important}.chart-layout-box{height:calc(100% - 20mm)!important;gap:4mm!important}.text-data-list{flex:0 0 44mm!important}.data-item,.sum-badge-box{font-size:8.5pt!important}.info-badge{font-size:9pt!important;margin-top:2mm!important;padding:1mm 3mm!important}.chart-container{height:100%!important}
    }
  </style>
</head>
<body>
<header>
  <h1>Shirley's TOEFL Junior Visualized Charts</h1>
  <p>中學托福成績可視化圖表分析系統｜固定寬度修正版</p>
</header>
<div class="top-bar">
  <div class="mode-tabs">
    <button class="tab-btn active" onclick="switchMode('single')">📊 單組數據分析</button>
    <button class="tab-btn" onclick="switchMode('compare')">🔄 多組類別橫向對比</button>
  </div>
  <button class="export-pdf-btn" onclick="exportToPDF()">🖨️ 導出 PDF 報告</button>
</div>
<div class="hint">PDF 匯出改用瀏覽器原生列印，會開啟列印視窗；Mac 請選「儲存為 PDF」。這個方式不會再產生空白頁，也不會把圖表放大爆版。</div>
<div class="main-container">
  <div id="modeSingle" class="mode-content active">
    <div class="panel">
      <h2>數據配置面板</h2>
      <div class="input-group"><label>圖表類型選擇</label><select id="singleChartType" onchange="renderSingleChart()"><option value="doughnut">高級圓環圖 (Doughnut)</option><option value="bar">優雅柱狀圖 (Bar)</option><option value="line">趨勢折線圖 (Line)</option><option value="scatter">分佈點狀圖 (Scatter)</option></select></div>
      <hr style="border:0;border-top:1px solid var(--border);margin:12px 0">
      <div class="input-group"><label>1級 (藍色證書) 人數</label><input type="number" id="s_val1" value="5" min="0" oninput="renderSingleChart()"></div>
      <div class="input-group"><label>2級 (綠色證書) 人數</label><input type="number" id="s_val2" value="11" min="0" oninput="renderSingleChart()"></div>
      <div class="input-group"><label>3級 (銅色證書) 人數</label><input type="number" id="s_val3" value="7" min="0" oninput="renderSingleChart()"></div>
      <div class="input-group"><label>4級 (銀色證書) 人數</label><input type="number" id="s_val4" value="13" min="0" oninput="renderSingleChart()"></div>
      <div class="input-group"><label>5級 (金色證書) 人數</label><input type="number" id="s_val5" value="7" min="0" oninput="renderSingleChart()"></div>
      <div class="input-group"><label>自動計算總數</label><input type="number" id="singleTotal" value="43" disabled></div>
      <button class="action-btn" onclick="renderSingleChart()">刷新圖表</button>
    </div>
    <div class="display-area">
      <div class="report-pdf-wrapper" id="pdfReportSingle">
        <div class="report-meta-info"><span class="report-title-pdf">TOEFL Junior 班級成績分佈報告</span><span class="report-date" id="pdfDateSingle">報告生成日期: --</span></div>
        <div class="pdf-page-block single-card">
          <div class="chart-title-label">數據分佈詳情</div>
          <div class="chart-layout-box"><div class="text-data-list" id="singleTextList"></div><div class="chart-container"><canvas id="singleChartCanvas"></canvas></div></div>
          <div class="info-badge" id="singleBadge">總計人數 (分母)：43 人</div>
        </div>
      </div>
    </div>
  </div>
  <div id="modeCompare" class="mode-content">
    <div class="panel" style="max-height:80vh;overflow-y:auto">
      <h2>對比配置面板</h2>
      <div class="input-group"><label>統一圖表類型</label><select id="compareChartType" onchange="renderCompareCharts()"><option value="doughnut">高級圓環圖 (Doughnut)</option><option value="bar">優雅柱狀圖 (Bar)</option><option value="line">趨勢折線圖 (Line)</option><option value="scatter">分佈點狀圖 (Scatter)</option></select></div>
      <button class="action-btn" onclick="addCompareGroup()" style="background:#2c3e50;margin-bottom:12px">＋ 新增對比數據組 (最多6組)</button>
      <div id="compareGroupsContainer"></div>
      <button class="action-btn" onclick="renderCompareCharts()">生成並對比圖表</button>
    </div>
    <div class="display-area">
      <div class="report-pdf-wrapper" id="pdfReportCompare">
        <div class="report-meta-info"><span class="report-title-pdf">TOEFL Junior 多組數據橫向對比分析報告</span><span class="report-date" id="pdfDateCompare">報告生成日期: --</span></div>
        <div class="charts-grid-compare" id="compareChartsGrid"></div>
      </div>
    </div>
  </div>
</div>
<script>
  Chart.register(ChartDataLabels);
  const colors={background:['rgba(64,115,158,.85)','rgba(70,142,115,.85)','rgba(184,115,51,.85)','rgba(142,152,163,.85)','rgba(212,175,55,.85)'],border:['#2f5a80','#2d6a53','#8a5225','#6c7782','#9c7e23']};
  const labels=['1級 (藍)','2級 (綠)','3級 (銅)','4級 (銀)','5級 (金)'];
  let singleChartInstance=null,compareChartInstances=[],compareGroupCount=0,currentActiveMode='single';
  const defaultCompareData=[{title:'2026MS',vals:[5,11,7,13,7]},{title:'2027MS',vals:[1,13,17,17,3]},{title:'2028MS',vals:[1,20,12,10,1]},{title:'2029MS 班級D',vals:[4,29,15,5,0]}];
  function switchMode(mode){currentActiveMode=mode;document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.mode-content').forEach(c=>c.classList.remove('active'));if(mode==='single'){document.querySelectorAll('.tab-btn')[0].classList.add('active');document.getElementById('modeSingle').classList.add('active');renderSingleChart()}else{document.querySelectorAll('.tab-btn')[1].classList.add('active');document.getElementById('modeCompare').classList.add('active');renderCompareCharts()}}
  function setDates(){const d=new Date();const s=`報告生成日期: ${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;document.getElementById('pdfDateSingle').innerText=s;document.getElementById('pdfDateCompare').innerText=s}
  function calcSingleTotal(){let sum=0;for(let i=1;i<=5;i++)sum+=Number(document.getElementById(`s_val${i}`).value)||0;document.getElementById('singleTotal').value=sum;document.getElementById('singleBadge').innerText=`總計人數 (分母)：${sum} 人`;return sum}
  function generateTextListHTML(vals,total){let html='',sum345=0;vals.forEach((val,idx)=>{const pct=total>0?((val/total)*100).toFixed(1):'0.0';if(idx>=2)sum345+=val;html+=`<div class="data-item"><span class="color-dot" style="background-color:${colors.background[idx]};border:1px solid ${colors.border[idx]}"></span><span>${labels[idx]}: <b>${val}人</b> (${pct}%)</span></div>`});const total345Pct=total>0?((sum345/total)*100).toFixed(1):'0.0';html+=`<div class="sum-badge-box">📈 3級至5級加總：<br><span><b>${sum345} 人</b> (${total345Pct}%)</span></div>`;return html}
  function renderSingleChart(){setDates();const ctx=document.getElementById('singleChartCanvas').getContext('2d'),type=document.getElementById('singleChartType').value;const vals=[];for(let i=1;i<=5;i++)vals.push(Number(document.getElementById(`s_val${i}`).value)||0);const total=calcSingleTotal();document.getElementById('singleTextList').innerHTML=generateTextListHTML(vals,total);if(singleChartInstance)singleChartInstance.destroy();singleChartInstance=new Chart(ctx,buildChartConfig(type,vals,total,'人數分佈'))}
  function initCompareConfig(){const c=document.getElementById('compareGroupsContainer');c.innerHTML='';compareGroupCount=0;defaultCompareData.forEach(g=>addCompareGroup(g.title,g.vals));renderCompareCharts()}
  function addCompareGroup(title='',vals=[0,0,0,0,0]){const c=document.getElementById('compareGroupsContainer');if(c.querySelectorAll('.compare-group-block').length>=6){alert('最多只能建立 6 組對比數據！');return}compareGroupCount++;const id=compareGroupCount;const b=document.createElement('div');b.className='compare-group-block';b.id=`cg_block_${id}`;b.innerHTML=`<div class="compare-group-header"><span>數據組 #${id}</span><button class="remove-btn" onclick="removeCompareGroup(${id})">✕ 刪除</button></div><div class="input-group" style="margin-bottom:8px"><input type="text" id="cg_title_${id}" value="${title||'未命名班級 '+id}"></div><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:4px">${[1,2,3,4,5].map(i=>`<div><label style="font-size:10px;text-align:center">${i}級</label><input type="number" id="cg_${id}_${i}" value="${vals[i-1]}" min="0" style="padding:4px;font-size:12px;text-align:center" oninput="renderCompareCharts()"></div>`).join('')}</div>`;c.appendChild(b)}
  function removeCompareGroup(id){const c=document.getElementById('compareGroupsContainer');if(c.querySelectorAll('.compare-group-block').length<=2){alert('最少需要保留 2 組數據進行對比！');return}document.getElementById(`cg_block_${id}`).remove();renderCompareCharts()}
  function renderCompareCharts(){setDates();const grid=document.getElementById('compareChartsGrid');compareChartInstances.forEach(ins=>ins.destroy());compareChartInstances=[];grid.innerHTML='';const type=document.getElementById('compareChartType').value;document.getElementById('compareGroupsContainer').querySelectorAll('.compare-group-block').forEach(block=>{const id=block.id.replace('cg_block_','');const title=document.getElementById(`cg_title_${id}`).value||`數據組 ${id}`;const vals=[];let total=0;for(let i=1;i<=5;i++){const v=Number(document.getElementById(`cg_${id}_${i}`).value)||0;vals.push(v);total+=v}const card=document.createElement('div');card.className='pdf-page-block';card.innerHTML=`<div class="chart-title-label">${title}</div><div class="chart-layout-box"><div class="text-data-list">${generateTextListHTML(vals,total)}</div><div class="chart-container"><canvas id="canvas_compare_${id}"></canvas></div></div><div class="info-badge">總計人數 (分母)：${total} 人</div>`;grid.appendChild(card);const ctx=document.getElementById(`canvas_compare_${id}`).getContext('2d');compareChartInstances.push(new Chart(ctx,buildChartConfig(type,vals,total,'人數')))})}
  function buildChartConfig(type,vals,total,datasetLabel){let chartData={},chartOptions={responsive:true,maintainAspectRatio:false,animation:false,layout:{padding:(type==='doughnut'||type==='scatter')?4:{top:18,bottom:4,left:4,right:4}},plugins:{legend:{display:false},tooltip:{enabled:true},datalabels:{display:function(context){const val=type==='scatter'?context.dataset.data[context.dataIndex].y:context.dataset.data[context.dataIndex];return val>0},color:type==='doughnut'?'#fff':'#2c3e50',anchor:type==='doughnut'?'center':'end',align:type==='doughnut'?'center':'top',offset:2,font:{size:10,weight:'bold'},formatter:function(value){let val=type==='scatter'?value.y:value;const pct=total>0?((val/total)*100).toFixed(1):'0.0';return type==='doughnut'?`${val}人\n(${pct}%)`:`${val}人 (${pct}%)`},textAlign:'center'}}};
    if(type==='scatter'){chartData={datasets:labels.map((label,idx)=>({label,data:[{x:idx+1,y:vals[idx]}],backgroundColor:colors.background[idx],borderColor:colors.border[idx],pointRadius:7}))};chartOptions.scales={x:{min:.5,max:5.5,ticks:{stepSize:1,callback:v=>labels[v-1]||'',font:{size:9}},grid:{display:false}},y:{beginAtZero:true,ticks:{precision:0}}}}
    else if(type==='line'){chartData={labels,datasets:[{label:datasetLabel,data:vals,backgroundColor:'rgba(74,111,165,.1)',borderColor:'#4a6fa5',borderWidth:2,tension:.2,fill:true,pointRadius:3}]};chartOptions.scales={y:{beginAtZero:true,grid:{color:'#f1f5f9'},ticks:{precision:0}},x:{ticks:{font:{size:9}},grid:{display:false}}}}
    else{chartData={labels,datasets:[{label:datasetLabel,data:vals,backgroundColor:colors.background,borderColor:type==='bar'?colors.border:'#fff',borderWidth:1}]};if(type==='doughnut'){chartOptions.cutout='50%'}else{chartOptions.scales={y:{beginAtZero:true,grid:{color:'#f1f5f9'},ticks:{precision:0}},x:{ticks:{font:{size:9}},grid:{display:false}}}}}
    return{type,data:chartData,options:chartOptions}}
  function exportToPDF(){setDates();if(currentActiveMode==='single')renderSingleChart();else renderCompareCharts();setTimeout(()=>{window.print()},350)}
  window.addEventListener('beforeprint',()=>{setDates();compareChartInstances.forEach(c=>c.resize());if(singleChartInstance)singleChartInstance.resize()});
  window.onload=function(){renderSingleChart();initCompareConfig()};
</script>
</body>
</html>
