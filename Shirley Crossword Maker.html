<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Shirley's Crossword Atelier — 專業填字工坊</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #e8e4dc;
            background-image: radial-gradient(circle at 25% 40%, rgba(0,0,0,0.02) 2%, transparent 2.5%);
            background-size: 48px 48px;
            font-family: 'Inter', system-ui, sans-serif;
            padding: 2rem 1.5rem;
            min-height: 100vh;
            color: #1e2a2a;
        }

        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700;900&family=Space+Grotesk:wght@400;500;600&display=swap');

        h1, h2, h3, .serif-headline {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        body, button, input, textarea, .clue-item, .cell input {
            font-family: 'Space Grotesk', sans-serif;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: #fffef7;
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.2);
            padding: 2rem;
            border: 1px solid rgba(0,0,0,0.05);
        }

        header {
            border-bottom: 3px solid #d9c5a7;
            margin-bottom: 2rem;
            padding-bottom: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 1rem;
        }

        h1 {
            font-size: clamp(2rem, 6vw, 3rem);
            background: linear-gradient(135deg, #1e3c3a 0%, #2c5e5a 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .subtitle {
            color: #5f6c6a;
            font-size: 0.85rem;
            border-left: 3px solid #d9c5a7;
            padding-left: 1rem;
        }

        /* 表格輸入區 */
        .word-editor-section {
            background: #f6f4ef;
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .dynamic-table-wrapper {
            overflow-x: auto;
            border-radius: 1rem;
            background: white;
            border: 1px solid #e2dbcf;
        }

        .words-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .words-table th {
            background: #e8e2d7;
            padding: 0.9rem 1rem;
            text-align: left;
            font-weight: 600;
            color: #2d3e3b;
            border-bottom: 2px solid #cdc2b0;
        }

        .words-table td {
            border-bottom: 1px solid #eae3d8;
            padding: 0;
        }

        .word-input-cell, .clue-input-cell {
            width: 100%;
            padding: 0.9rem 1rem;
            font-size: 0.9rem;
            background: transparent;
            border: none;
            font-family: 'Space Grotesk', monospace;
        }

        .word-input-cell:focus, .clue-input-cell:focus {
            outline: none;
            background: #fff7e8;
        }

        .table-actions {
            margin-top: 1rem;
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .pill-btn {
            background: white;
            border: 1px solid #cdc2b0;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            color: #2c5e5a;
        }

        .pill-btn:hover {
            background: #e2dbcf;
            transform: translateY(-1px);
        }

        .stats-badge {
            background: #2c5e5a10;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #2c5e5a;
        }

        .game-area {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            margin-top: 1rem;
        }

        .crossword-container {
            flex: 2;
            min-width: 300px;
            background: white;
            border-radius: 1.5rem;
            padding: 1.2rem;
            box-shadow: 0 4px 14px rgba(0,0,0,0.03), 0 0 0 1px #f0ebe2;
        }

        .clues-container {
            flex: 1.2;
            background: white;
            border-radius: 1.5rem;
            padding: 1.2rem;
            box-shadow: 0 4px 14px rgba(0,0,0,0.03), 0 0 0 1px #f0ebe2;
        }

        .crossword-grid {
            display: grid;
            gap: 2px;
            background-color: #b6aa92;
            border: 2px solid #b6aa92;
            margin: 0 auto;
            justify-content: center;
        }

        .cell {
            aspect-ratio: 1;
            background: white;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cell.filled {
            background-color: #d1cbbc;
            background-image: repeating-linear-gradient(45deg, #c2b69c22 0px, #c2b69c22 2px, transparent 2px, transparent 6px);
        }

        .cell.numbered::before {
            content: attr(data-number);
            position: absolute;
            top: 2px;
            left: 4px;
            font-size: 9px;
            font-weight: 700;
            color: #7f6e4f;
            font-family: monospace;
        }

        .cell input {
            width: 100%;
            height: 100%;
            border: none;
            text-align: center;
            font-size: clamp(14px, 4vw, 20px);
            font-weight: 600;
            text-transform: uppercase;
            background: transparent;
            outline: none;
            font-family: 'Space Grotesk', monospace;
        }

        .clues-section h3 {
            font-size: 1rem;
            border-left: 4px solid #d9c5a7;
            padding-left: 12px;
            margin-bottom: 16px;
            color: #2c5e5a;
        }

        .clue-item {
            padding: 8px 12px;
            margin-bottom: 8px;
            background: #fefaf5;
            border-radius: 12px;
            font-size: 0.85rem;
        }

        .clue-number {
            font-weight: 800;
            color: #c17b4c;
            margin-right: 6px;
        }

        button {
            background: #2c5e5a;
            border: none;
            padding: 0.8rem 1.6rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: #1e423f;
            transform: translateY(-2px);
        }

        button:disabled {
            background: #b6aa92;
            cursor: not-allowed;
        }

        .alert {
            padding: 12px 18px;
            border-radius: 60px;
            margin: 12px 0;
            font-weight: 500;
        }

        .alert-success { background: #e2f0e6; color: #1e5631; border-left: 5px solid #2c9b5e; }
        .alert-error { background: #fce9e6; color: #b13e3e; border-left: 5px solid #c25c5c; }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(30, 40, 35, 0.75);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .student-info-modal {
            background: #fffef7;
            border-radius: 2rem;
            padding: 2rem;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 25px 40px rgba(0,0,0,0.3);
        }

        .info-form div { margin-bottom: 1rem; }
        .info-form label { display: block; margin-bottom: 0.3rem; font-weight: 600; color: #2c5e5a; }
        .info-form input { width: 100%; padding: 10px; border: 1px solid #e2dbcf; border-radius: 12px; }

        @media print {
            body > *:not(#print-area) { display: none !important; }
            #print-area { display: block !important; margin: 0; padding: 15mm; background: white; }
            #print-area * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            @page { size: A4; margin: 12mm; }
        }
        #print-area { display: none; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div>
            <h1>SHIRLEY'S<br>CROSSWORD ATELIER</h1>
            <div class="subtitle">專業填字遊戲生成器 · 智慧交叉算法</div>
        </div>
        <div class="stats-badge" id="live-word-counter">0 個單字</div>
    </header>

    <div class="word-editor-section">
        <div class="section-label">✧ 單字與提示輸入區 ✧</div>
        <div class="dynamic-table-wrapper">
            <table class="words-table" id="words-editor-table">
                <thead><tr><th>單字 (大寫字母)</th><th>提示 / 線索</th></tr></thead>
                <tbody id="table-rows-container">
                    <tr><td><input type="text" class="word-input-cell" placeholder="例如: APPLE"></td><td><input type="text" class="clue-input-cell" placeholder="一種紅色或綠色的水果"></td></tr>
                </tbody>
            </table>
        </div>
        <div class="table-actions">
            <button type="button" class="pill-btn" id="add-row-btn">+ 新增一行</button>
            <button type="button" class="pill-btn" id="remove-last-row">− 刪除最後一行</button>
            <button type="button" class="pill-btn" id="clear-table-btn">清空所有</button>
            <span class="stats-badge" id="table-word-count">1 個單字</span>
        </div>
        <p class="subtitle" style="margin-top: 12px; font-size:0.7rem;">✨ 可從 Excel / Google Sheets 直接複製貼上，表格會自動擴充！</p>
    </div>

    <div style="display: flex; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap;">
        <button id="generate-btn">⚡ 生成填字遊戲</button>
        <button id="print-worksheet-btn" disabled>🖨️ 列印工作表</button>
        <button id="download-pdf-btn" disabled>📘 下載學習報告 (PDF)</button>
    </div>

    <div id="alert-area"></div>

    <div class="game-area">
        <div class="crossword-container">
            <h3 style="text-align:center;">✧ 填字遊戲網格 ✧</h3>
            <div class="crossword-grid" id="crossword-grid"></div>
            <div style="text-align:center; margin-top:1rem; font-weight:500;">完成進度: <span id="completion">0%</span> | 已找到: <span id="found-count">0</span>/<span id="total-count">0</span></div>
        </div>
        <div class="clues-container">
            <div class="clues-section"><h3>→ 橫向 (ACROSS)</h3><div id="across-clues"></div></div>
            <div class="clues-section"><h3>↓ 縱向 (DOWN)</h3><div id="down-clues"></div></div>
        </div>
    </div>
</div>

<!-- 模態框 -->
<div id="student-info-modal" class="modal-overlay" style="display:none;"><div class="student-info-modal"><h3>📘 學生資訊</h3><div class="info-form"><div><label>班級</label><input type="text" id="class-input"></div><div><label>姓名 *</label><input type="text" id="name-input"></div><div><label>座號</label><input type="text" id="seat-input"></div></div><div style="display:flex;gap:10px;margin-top:20px;"><button id="cancel-btn" style="background:#b6aa92;">取消</button><button id="confirm-btn" style="background:#2c5e5a;">產生 PDF</button></div></div></div>
<div id="worksheet-modal" class="modal-overlay" style="display:none;"><div class="student-info-modal"><h3>🖨️ 列印選項</h3><div><label>工作表標題</label><input type="text" id="ws-title-input" placeholder="Crossword Puzzle" style="width:100%;margin:8px 0;padding:8px;"></div><div><label>班級 (選填)</label><input type="text" id="ws-class-input" style="width:100%;margin:8px 0;padding:8px;"></div><div style="margin:12px 0;"><label><input type="checkbox" id="ws-answer-key" checked> 包含答案欄</label></div><div style="display:flex;gap:10px;"><button id="ws-cancel-btn" style="background:#b6aa92;">取消</button><button id="ws-confirm-btn" style="background:#2c5e5a;">產生並列印</button></div></div></div>

<div id="print-area"></div>

<script>
    // ======================== 表格輸入邏輯 ========================
    const tbody = document.getElementById('table-rows-container');
    
    function getWordsFromTable() {
        const rows = tbody.querySelectorAll('tr');
        const words = [];
        const cluesMap = {};
        for(let row of rows) {
            const wordInput = row.querySelector('.word-input-cell');
            const clueInput = row.querySelector('.clue-input-cell');
            let word = wordInput?.value.trim().toUpperCase() || '';
            let clue = clueInput?.value.trim() || '';
            if(word && clue) {
                words.push(word);
                cluesMap[word] = clue;
            }
        }
        return { words, clues: cluesMap };
    }

    function updateTableStats() {
        const { words } = getWordsFromTable();
        document.getElementById('table-word-count').innerText = `${words.length} 個單字`;
        document.getElementById('live-word-counter').innerHTML = `${words.length} 個單字`;
        const hasValid = words.length >= 2;
        document.getElementById('generate-btn').disabled = !hasValid;
    }

    function addEmptyRow() {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td><input type="text" class="word-input-cell" placeholder="例如: PYTHON"></td><td><input type="text" class="clue-input-cell" placeholder="一種程式語言"></td>`;
        tbody.appendChild(tr);
        attachRowPasteHandler(tr);
        updateTableStats();
    }

    function removeLastRow() {
        if(tbody.children.length > 1) tbody.removeChild(tbody.lastElementChild);
        updateTableStats();
    }

    function clearTable() {
        while(tbody.children.length > 1) tbody.removeChild(tbody.lastElementChild);
        const firstRow = tbody.children[0];
        if(firstRow) {
            firstRow.querySelector('.word-input-cell').value = '';
            firstRow.querySelector('.clue-input-cell').value = '';
        }
        updateTableStats();
        showAlert('已清空單字列表', 'success');
    }

    function handleTablePaste(e, targetCell) {
        e.preventDefault();
        let pastedData = (e.clipboardData || window.clipboardData).getData('text');
        if(!pastedData) return;
        const rowsData = pastedData.split(/\r?\n/).filter(r => r.trim().length > 0);
        let targetRow = targetCell.closest('tr');
        let startRowIdx = Array.from(tbody.children).indexOf(targetRow);
        if(startRowIdx === -1) startRowIdx = 0;
        
        for(let i = 0; i < rowsData.length; i++) {
            const cols = rowsData[i].split(/\t/);
            if(!tbody.children[startRowIdx + i] && i > 0) addEmptyRow();
            const currentRowElem = tbody.children[startRowIdx + i];
            if(currentRowElem) {
                const wordField = currentRowElem.querySelector('.word-input-cell');
                const clueField = currentRowElem.querySelector('.clue-input-cell');
                if(wordField && cols[0] !== undefined) wordField.value = cols[0].trim();
                if(clueField && cols[1] !== undefined) clueField.value = cols[1].trim();
            }
        }
        updateTableStats();
        showAlert('貼上成功！表格已自動擴充', 'success');
    }

    function attachRowPasteHandler(row) {
        row.querySelectorAll('input').forEach(inp => {
            inp.addEventListener('paste', (e) => handleTablePaste(e, inp));
        });
    }

    function showAlert(msg, type='success') {
        const alertDiv = document.getElementById('alert-area');
        alertDiv.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
        setTimeout(() => { if(alertDiv.firstChild) alertDiv.innerHTML = ''; }, 2800);
    }

    // ======================== 核心填字演算法 (改良版，確保每個單字都有起始編號) ========================
    let gameState = { words:[], clues:{}, crossword:null, grid:[], numberedCells:{}, completion:0, foundWords:new Set(), userInputs:{}, placedWords:[] };

    function generateCrossword(words, clues) {
        const gridSize = Math.min(20, Math.max(12, Math.max(...words.map(w=>w.length)) + 6));
        let grid = Array(gridSize).fill().map(() => Array(gridSize).fill(''));
        let numberedCells = {};
        let placedWords = [];
        
        // 將單字按長度排序，長的優先放置
        const sortedWords = [...words].sort((a,b) => b.length - a.length);
        
        // 放置第一個單字 (水平方向在中間區域)
        const firstWord = sortedWords[0];
        const centerRow = Math.floor(gridSize / 2);
        const startCol = Math.floor((gridSize - firstWord.length) / 2);
        for(let i = 0; i < firstWord.length; i++) grid[centerRow][startCol + i] = firstWord[i];
        numberedCells[`${centerRow},${startCol}`] = 1;
        placedWords.push({ word: firstWord, row: centerRow, col: startCol, direction: 'across', number: 1 });
        
        let nextNumber = 2;
        const remainingWords = sortedWords.slice(1);
        
        // 嘗試放置每個剩餘單字
        for(const word of remainingWords) {
            let placed = false;
            // 隨機打亂已放置單字順序以增加變化
            const shuffledPlaced = [...placedWords].sort(() => Math.random() - 0.5);
            
            for(const pw of shuffledPlaced) {
                if(placed) break;
                // 尋找交叉點：word 中的字母與 pw 中的字母相同的位置
                for(let wi = 0; wi < word.length; wi++) {
                    for(let pwi = 0; pwi < pw.word.length; pwi++) {
                        if(word[wi] === pw.word[pwi]) {
                            let newRow, newCol, newDir;
                            if(pw.direction === 'across') {
                                // pw 是水平，新單字垂直交叉
                                newRow = pw.row - wi;
                                newCol = pw.col + pwi;
                                newDir = 'down';
                            } else {
                                // pw 是垂直，新單字水平交叉
                                newRow = pw.row + pwi;
                                newCol = pw.col - wi;
                                newDir = 'across';
                            }
                            
                            if(canPlaceWordAt(grid, word, newRow, newCol, newDir, gridSize)) {
                                // 放置單字
                                for(let i = 0; i < word.length; i++) {
                                    if(newDir === 'across') grid[newRow][newCol + i] = word[i];
                                    else grid[newRow + i][newCol] = word[i];
                                }
                                numberedCells[`${newRow},${newCol}`] = nextNumber;
                                placedWords.push({ word: word, row: newRow, col: newCol, direction: newDir, number: nextNumber });
                                nextNumber++;
                                placed = true;
                                break;
                            }
                        }
                    }
                    if(placed) break;
                }
            }
            
            // 如果無法交叉放置，嘗試獨立放置
            if(!placed) {
                for(let attempt = 0; attempt < 100; attempt++) {
                    const dir = Math.random() > 0.5 ? 'across' : 'down';
                    let row, col;
                    if(dir === 'across') {
                        row = Math.floor(Math.random() * gridSize);
                        col = Math.floor(Math.random() * (gridSize - word.length));
                    } else {
                        row = Math.floor(Math.random() * (gridSize - word.length));
                        col = Math.floor(Math.random() * gridSize);
                    }
                    if(canPlaceWordAt(grid, word, row, col, dir, gridSize)) {
                        for(let i = 0; i < word.length; i++) {
                            if(dir === 'across') grid[row][col + i] = word[i];
                            else grid[row + i][col] = word[i];
                        }
                        numberedCells[`${row},${col}`] = nextNumber;
                        placedWords.push({ word: word, row: row, col: col, direction: dir, number: nextNumber });
                        nextNumber++;
                        placed = true;
                        break;
                    }
                }
            }
        }
        
        return { grid, placedWords, numberedCells, clues };
    }
    
    function canPlaceWordAt(grid, word, row, col, dir, gridSize) {
        if(dir === 'across') {
            if(col < 0 || col + word.length > gridSize || row < 0 || row >= gridSize) return false;
            for(let i = 0; i < word.length; i++) {
                const cell = grid[row][col + i];
                if(cell !== '' && cell !== word[i]) return false;
            }
            // 檢查邊界隔離
            if(col > 0 && grid[row][col - 1] !== '') return false;
            if(col + word.length < gridSize && grid[row][col + word.length] !== '') return false;
            for(let i = 0; i < word.length; i++) {
                if(grid[row][col + i] === '') {
                    if(row > 0 && grid[row - 1][col + i] !== '') return false;
                    if(row < gridSize - 1 && grid[row + 1][col + i] !== '') return false;
                }
            }
        } else {
            if(row < 0 || row + word.length > gridSize || col < 0 || col >= gridSize) return false;
            for(let i = 0; i < word.length; i++) {
                const cell = grid[row + i][col];
                if(cell !== '' && cell !== word[i]) return false;
            }
            if(row > 0 && grid[row - 1][col] !== '') return false;
            if(row + word.length < gridSize && grid[row + word.length][col] !== '') return false;
            for(let i = 0; i < word.length; i++) {
                if(grid[row + i][col] === '') {
                    if(col > 0 && grid[row + i][col - 1] !== '') return false;
                    if(col < gridSize - 1 && grid[row + i][col + 1] !== '') return false;
                }
            }
        }
        return true;
    }

    function renderCrossword() {
        const el = document.getElementById('crossword-grid');
        if(!gameState.grid.length) return;
        const gs = gameState.grid.length;
        el.style.gridTemplateColumns = `repeat(${gs}, minmax(32px, 1fr))`;
        el.innerHTML = '';
        for(let i = 0; i < gs; i++) {
            for(let j = 0; j < gs; j++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if(gameState.grid[i][j] === '') {
                    cell.classList.add('filled');
                } else {
                    const key = `${i},${j}`;
                    if(gameState.numberedCells[key]) {
                        cell.classList.add('numbered');
                        cell.setAttribute('data-number', gameState.numberedCells[key]);
                    }
                    const inp = document.createElement('input');
                    inp.maxLength = 1;
                    inp.dataset.row = i;
                    inp.dataset.col = j;
                    const saved = gameState.userInputs[key] || '';
                    inp.value = saved;
                    inp.style.color = (saved && saved === gameState.grid[i][j]) ? '#2c9b5e' : '#c25c5c';
                    inp.addEventListener('input', (e) => {
                        let v = e.target.value.toUpperCase();
                        e.target.value = v;
                        gameState.userInputs[`${i},${j}`] = v;
                        e.target.style.color = (v === gameState.grid[i][j]) ? '#2c9b5e' : '#c25c5c';
                        updateCompletion();
                    });
                    cell.appendChild(inp);
                }
                el.appendChild(cell);
            }
        }
        updateCompletion();
    }

    function updateCompletion() {
        let correct = 0, total = 0;
        gameState.foundWords.clear();
        for(let i = 0; i < gameState.grid.length; i++) {
            for(let j = 0; j < gameState.grid.length; j++) {
                if(gameState.grid[i][j] !== '') {
                    total++;
                    const val = gameState.userInputs[`${i},${j}`] || '';
                    if(val === gameState.grid[i][j]) correct++;
                }
            }
        }
        if(gameState.crossword && gameState.crossword.placedWords) {
            gameState.crossword.placedWords.forEach(pw => {
                let ok = true;
                for(let idx = 0; idx < pw.word.length; idx++) {
                    const k = pw.direction === 'across' ? `${pw.row},${pw.col + idx}` : `${pw.row + idx},${pw.col}`;
                    if((gameState.userInputs[k] || '') !== pw.word[idx]) { ok = false; break; }
                }
                if(ok) gameState.foundWords.add(pw.word);
            });
        }
        const percent = total > 0 ? Math.round((correct / total) * 100) : 0;
        document.getElementById('completion').innerText = `${percent}%`;
        document.getElementById('found-count').innerText = gameState.foundWords.size;
        document.getElementById('total-count').innerText = gameState.words.length;
    }

    function renderClues() {
        const acrossDiv = document.getElementById('across-clues');
        const downDiv = document.getElementById('down-clues');
        acrossDiv.innerHTML = '';
        downDiv.innerHTML = '';
        if(!gameState.crossword) return;
        const acrossWords = gameState.crossword.placedWords.filter(p => p.direction === 'across').sort((a,b) => a.number - b.number);
        const downWords = gameState.crossword.placedWords.filter(p => p.direction === 'down').sort((a,b) => a.number - b.number);
        acrossWords.forEach(pw => {
            const div = document.createElement('div');
            div.className = 'clue-item';
            div.innerHTML = `<span class="clue-number">${pw.number}.</span> ${gameState.clues[pw.word] || pw.word}`;
            acrossDiv.appendChild(div);
        });
        downWords.forEach(pw => {
            const div = document.createElement('div');
            div.className = 'clue-item';
            div.innerHTML = `<span class="clue-number">${pw.number}.</span> ${gameState.clues[pw.word] || pw.word}`;
            downDiv.appendChild(div);
        });
    }

    function generateGame() {
        const { words, clues } = getWordsFromTable();
        if(words.length < 2) {
            showAlert('至少需要 2 個單字才能生成填字遊戲', 'error');
            return;
        }
        gameState.words = words;
        gameState.clues = clues;
        gameState.userInputs = {};
        gameState.foundWords.clear();
        const cw = generateCrossword(words, clues);
        if(!cw || cw.placedWords.length === 0) {
            showAlert('生成失敗，請嘗試不同的單字組合', 'error');
            return;
        }
        gameState.crossword = cw;
        gameState.grid = cw.grid;
        gameState.numberedCells = cw.numberedCells;
        renderCrossword();
        renderClues();
        updateCompletion();
        document.getElementById('download-pdf-btn').disabled = false;
        document.getElementById('print-worksheet-btn').disabled = false;
        showAlert(`✨ 成功生成填字遊戲！包含 ${cw.placedWords.length} 個單字`, 'success');
    }

    // ======================== PDF 與列印功能 ========================
    async function generatePDFReport() {
        if(!gameState.crossword) { alert('請先生成填字遊戲'); return; }
        const name = document.getElementById('name-input').value.trim();
        if(!name) { alert('請輸入姓名'); return; }
        const studentInfo = {
            class: document.getElementById('class-input').value.trim(),
            name: name,
            seat: document.getElementById('seat-input').value.trim()
        };
        
        const container = document.createElement('div');
        container.style.cssText = 'background:white; padding:20px; font-family:Arial,sans-serif; width:700px; margin:0 auto;';
        container.innerHTML = `
            <h2 style="text-align:center;color:#2c5e5a;">${studentInfo.name} 的填字遊戲學習報告</h2>
            <div style="display:flex; justify-content:space-between; margin:15px 0; padding:10px; background:#f5f0e8;">
                <div><strong>班級:</strong> ${studentInfo.class || '—'}</div>
                <div><strong>姓名:</strong> ${studentInfo.name}</div>
                <div><strong>座號:</strong> ${studentInfo.seat || '—'}</div>
                <div><strong>日期:</strong> ${new Date().toLocaleDateString()}</div>
            </div>
            <div style="margin:15px 0; padding:10px; background:#e8f5e9; text-align:center;">
                <strong>完成進度: ${document.getElementById('completion').innerText} (${gameState.foundWords.size}/${gameState.words.length} 個單字)</strong>
            </div>
            <h3>📋 單字完成狀態</h3>
            ${gameState.words.map(w => `<div style="padding:5px; margin:3px 0; background:${gameState.foundWords.has(w)?'#c8e6c9':'#ffcdd2'}; border-radius:5px;"><strong>${w}</strong> — ${gameState.clues[w]} ${gameState.foundWords.has(w)?'✓':'✗'}</div>`).join('')}
            <h3>🔍 橫向提示 (ACROSS)</h3>
            ${gameState.crossword.placedWords.filter(p=>p.direction==='across').map(p=>`<div><strong>${p.number}.</strong> ${gameState.clues[p.word]}</div>`).join('')}
            <h3>🔽 縱向提示 (DOWN)</h3>
            ${gameState.crossword.placedWords.filter(p=>p.direction==='down').map(p=>`<div><strong>${p.number}.</strong> ${gameState.clues[p.word]}</div>`).join('')}
            <h3>📚 未完成單字複習</h3>
            ${gameState.words.filter(w=>!gameState.foundWords.has(w)).map(w=>`<div><strong>${w}</strong>: ${gameState.clues[w]}</div>`).join('') || '🎉 恭喜！已完成所有單字！'}
        `;
        
        document.body.appendChild(container);
        const canvas = await html2canvas(container, { scale: 2, backgroundColor: '#ffffff' });
        const imgData = canvas.toDataURL('image/png');
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        const imgWidth = 190;
        const imgHeight = (canvas.height * imgWidth) / canvas.width;
        pdf.addImage(imgData, 'PNG', 10, 10, imgWidth, imgHeight);
        pdf.save(`${studentInfo.name}_填字遊戲報告.pdf`);
        document.body.removeChild(container);
    }

    function buildWorksheetHTML() {
        const title = document.getElementById('ws-title-input').value.trim() || 'Crossword Puzzle';
        const wsClass = document.getElementById('ws-class-input').value.trim();
        const showAnswerKey = document.getElementById('ws-answer-key').checked;
        const grid = gameState.grid;
        const numberedCells = gameState.numberedCells;
        const placedWords = gameState.crossword.placedWords;
        const clues = gameState.clues;
        
        let minRow = grid.length, maxRow = 0, minCol = grid[0].length, maxCol = 0;
        for(let i=0;i<grid.length;i++) for(let j=0;j<grid[0].length;j++) {
            if(grid[i][j] !== '') {
                if(i<minRow) minRow=i; if(i>maxRow) maxRow=i;
                if(j<minCol) minCol=j; if(j>maxCol) maxCol=j;
            }
        }
        
        let gridHTML = '<table style="border-collapse:collapse; margin:0 auto;">';
        for(let i=minRow; i<=maxRow; i++) {
            gridHTML += '<tr>';
            for(let j=minCol; j<=maxCol; j++) {
                if(grid[i][j] === '') {
                    gridHTML += `<td style="width:34px; height:34px; border:2px solid #333; background:#bbb;"> </td>`;
                } else {
                    const hasNumber = numberedCells[`${i},${j}`];
                    gridHTML += `<td style="width:34px; height:34px; border:2px solid #333; background:white; text-align:center; vertical-align:middle; position:relative;">
                        ${hasNumber ? `<span style="position:absolute; top:2px; left:3px; font-size:8px; font-weight:bold;">${hasNumber}</span>` : ''}
                        <span style="font-size:14px;">&nbsp;</span>
                    </td>`;
                }
            }
            gridHTML += '</tr>';
        }
        gridHTML += '</table>';
        
        const across = placedWords.filter(p=>p.direction==='across').sort((a,b)=>a.number-b.number);
        const down = placedWords.filter(p=>p.direction==='down').sort((a,b)=>a.number-b.number);
        
        let answerHTML = '';
        if(showAnswerKey) {
            const all = [...placedWords].sort((a,b)=>a.number-b.number);
            answerHTML = `<div style="margin-top:20px; border-top:2px dashed #aaa; padding-top:12px;">
                <h3 style="text-align:center;">🔑 解答欄</h3>
                <div style="display:flex; flex-wrap:wrap; gap:8px; justify-content:center;">
                    ${all.map(p=>`<span style="padding:2px 8px; border:1px solid #ccc; border-radius:4px;">${p.number}${p.direction==='across'?'A':'D'}. ${p.word}</span>`).join('')}
                </div>
            </div>`;
        }
        
        return `
            <div style="font-family:Arial,sans-serif; max-width:1000px; margin:0 auto;">
                <div style="text-align:center; margin-bottom:20px; border-bottom:2px solid #333; padding-bottom:10px;">
                    <h2>${title}</h2>
                    <div style="display:flex; justify-content:space-around; margin-top:10px;">
                        <div>姓名: _________________________</div>
                        ${wsClass ? `<div>班級: ${wsClass}</div>` : '<div>班級: _________</div>'}
                        <div>日期: ${new Date().toLocaleDateString()}</div>
                    </div>
                </div>
                <div style="display:flex; flex-wrap:wrap; gap:20px; justify-content:center;">
                    <div style="flex:0 0 auto;">${gridHTML}</div>
                    <div style="flex:1; min-width:200px;">
                        <h3>⟶ 橫向 (ACROSS)</h3>
                        ${across.map(p=>`<div style="margin:5px 0;"><strong>${p.number}.</strong> ${clues[p.word]}</div>`).join('')}
                        <h3 style="margin-top:15px;">↓ 縱向 (DOWN)</h3>
                        ${down.map(p=>`<div style="margin:5px 0;"><strong>${p.number}.</strong> ${clues[p.word]}</div>`).join('')}
                    </div>
                </div>
                ${answerHTML}
            </div>
        `;
    }
    
    function printWorksheet() {
        if(!gameState.crossword) { alert('請先生成填字遊戲'); return; }
        document.getElementById('worksheet-modal').style.display = 'none';
        const printArea = document.getElementById('print-area');
        printArea.innerHTML = buildWorksheetHTML();
        window.print();
        setTimeout(() => { printArea.innerHTML = ''; }, 500);
    }

    // ======================== 事件綁定 ========================
    document.getElementById('generate-btn').onclick = generateGame;
    document.getElementById('add-row-btn').onclick = addEmptyRow;
    document.getElementById('remove-last-row').onclick = removeLastRow;
    document.getElementById('clear-table-btn').onclick = clearTable;
    document.getElementById('download-pdf-btn').onclick = () => { if(gameState.crossword) document.getElementById('student-info-modal').style.display = 'flex'; else alert('請先生成填字遊戲'); };
    document.getElementById('print-worksheet-btn').onclick = () => { if(gameState.crossword) document.getElementById('worksheet-modal').style.display = 'flex'; else alert('請先生成填字遊戲'); };
    document.getElementById('cancel-btn').onclick = () => document.getElementById('student-info-modal').style.display = 'none';
    document.getElementById('confirm-btn').onclick = async () => { document.getElementById('student-info-modal').style.display = 'none'; await generatePDFReport(); };
    document.getElementById('ws-cancel-btn').onclick = () => document.getElementById('worksheet-modal').style.display = 'none';
    document.getElementById('ws-confirm-btn').onclick = printWorksheet;
    
    function initTable() {
        Array.from(tbody.children).forEach(row => attachRowPasteHandler(row));
        const observer = new MutationObserver((mutations) => {
            mutations.forEach(mut => {
                mut.addedNodes.forEach(node => {
                    if(node.nodeType === 1 && node.tagName === 'TR') attachRowPasteHandler(node);
                });
            });
        });
        observer.observe(tbody, { childList: true });
        updateTableStats();
    }
    initTable();
</script>
