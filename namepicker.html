
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Space+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#080612;--mist:#f0ebff;--mist2:#d6ccf7;--mist3:#a89dd4;
  --gold:#d4a843;--gold2:#e8c96a;
  --violet:#7c5cbf;--violet2:#a07de0;--violet3:#c4a8f5;
  --border:rgba(160,125,224,0.22);--border2:rgba(160,125,224,0.42);
  --panel:rgba(20,14,40,0.72);
}
body{background:var(--ink);color:var(--mist);font-family:'Cormorant Garamond',serif;min-height:100vh;overflow-x:hidden}
canvas#stars{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0}
.page{position:relative;z-index:1;padding:2rem 1.5rem 3rem;max-width:680px;margin:0 auto}
.site-title{text-align:center;font-size:1.65rem;font-weight:300;letter-spacing:.18em;color:var(--gold2);text-transform:uppercase;margin-bottom:.2rem}
.site-sub{text-align:center;font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.3em;color:var(--violet3);text-transform:uppercase;margin-bottom:1.8rem}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:1.2rem 1.3rem;margin-bottom:1.1rem;backdrop-filter:blur(6px)}
.plabel{font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:.2em;color:var(--violet3);text-transform:uppercase;margin-bottom:.7rem;display:flex;align-items:center;gap:.5rem}
.plabel::after{content:'';flex:1;height:1px;background:var(--border)}
textarea{width:100%;background:rgba(5,3,14,0.7);border:1px solid var(--border);border-radius:10px;color:var(--mist);font-family:'Space Mono',monospace;font-size:.75rem;line-height:1.75;padding:.85rem 1rem;resize:vertical;min-height:120px;outline:none;transition:border .2s}
textarea:focus{border-color:var(--border2)}
textarea::placeholder{color:rgba(180,165,220,0.3)}
.modes{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.55rem}
.mcard{background:rgba(8,5,18,0.6);border:1px solid var(--border);border-radius:11px;padding:.8rem .6rem .7rem;cursor:pointer;text-align:center;transition:all .22s}
.mcard:hover{border-color:var(--border2);background:rgba(124,92,191,0.15)}
.mcard.active{border-color:var(--violet2);background:rgba(124,92,191,0.28)}
.mcard.active .mcard-icon,.mcard.active .mcard-name{color:var(--gold2)}
.mcard-icon{font-size:1.3rem;color:var(--violet3);margin-bottom:.35rem;display:block}
.mcard-name{font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mist3);line-height:1.4}
.sub-row{display:flex;align-items:center;gap:.8rem;margin-top:.9rem;padding-top:.8rem;border-top:1px solid var(--border)}
.sub-row label{font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:.1em;color:var(--violet3);white-space:nowrap}
.sub-row input[type=range]{flex:1;accent-color:var(--violet2)}
.sub-row .val{font-family:'Space Mono',monospace;font-size:.72rem;color:var(--gold2);min-width:20px;text-align:center}
.result-zone{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:1.4rem 1.3rem;min-height:140px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.result-zone.has-content{justify-content:flex-start;align-items:stretch;text-align:left}
.placeholder-txt{font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.15em;color:rgba(160,130,210,0.35);text-transform:uppercase}
.big-name{font-size:3.2rem;font-weight:300;letter-spacing:.06em;color:var(--gold2);text-align:center;padding:.8rem 0 .4rem;animation:cpulse 2.6s ease-in-out infinite;line-height:1.15}
@keyframes cpulse{0%,100%{opacity:1}50%{opacity:.82}}
.progress-txt{font-family:'Space Mono',monospace;font-size:.65rem;color:var(--violet3);text-align:center;letter-spacing:.08em;margin-bottom:.7rem}
.next-btn{align-self:center;margin-top:.6rem;padding:.55rem 1.5rem;background:rgba(124,92,191,0.2);border:1px solid var(--border2);border-radius:9px;color:var(--gold2);font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .2s}
.next-btn:hover{background:rgba(124,92,191,0.42);border-color:var(--gold2)}
.result-title{font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:.2em;color:var(--violet3);text-transform:uppercase;margin-bottom:.9rem;padding-bottom:.7rem;border-bottom:1px solid var(--border);width:100%}

/* shuffle draggable list */
.shuffle-list{width:100%;list-style:none}
.shuffle-item{display:flex;align-items:center;gap:.6rem;padding:.45rem .75rem;margin-bottom:.38rem;background:rgba(124,92,191,0.1);border:1px solid var(--border);border-radius:8px;cursor:grab;user-select:none;transition:background .15s,opacity .15s}
.shuffle-item:hover{background:rgba(124,92,191,0.2);border-color:var(--border2)}
.shuffle-item.dragging{opacity:.35;cursor:grabbing}
.shuffle-item.drag-over{border-color:var(--gold2);background:rgba(212,168,67,0.12)}
.shuffle-num{font-family:'Space Mono',monospace;font-size:.6rem;color:var(--violet3);min-width:18px}
.shuffle-name{font-family:'Space Mono',monospace;font-size:.75rem;color:var(--mist);flex:1}
.shuffle-handle{font-size:.8rem;color:rgba(160,130,210,0.4)}
.highlight-btn{padding:.15rem .5rem;background:rgba(212,168,67,0.15);border:1px solid rgba(212,168,67,0.35);border-radius:5px;color:var(--gold);font-family:'Space Mono',monospace;font-size:.58rem;cursor:pointer;transition:all .15s;white-space:nowrap}
.highlight-btn:hover{background:rgba(212,168,67,0.3);border-color:var(--gold2)}

/* spotlight overlay */
.spotlight{display:none;position:absolute;inset:0;background:rgba(5,3,14,0.93);border-radius:14px;z-index:10;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:1.5rem}
.spotlight.on{display:flex}
.spotlight-name{font-size:3.4rem;font-weight:300;color:var(--gold2);letter-spacing:.06em;animation:cpulse 2.6s ease-in-out infinite}
.spotlight-close{margin-top:1.2rem;padding:.5rem 1.4rem;background:rgba(124,92,191,0.2);border:1px solid var(--border2);border-radius:9px;color:var(--mist3);font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:.1em;cursor:pointer;transition:all .2s}
.spotlight-close:hover{background:rgba(124,92,191,0.4);color:var(--gold2)}

/* group/pair cards */
.gcard{margin-bottom:.8rem;background:rgba(8,5,18,0.55);border:1px solid var(--border);border-radius:11px;padding:.85rem 1rem}
.gcard-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:.55rem}
.gcard-title{font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.18em;color:var(--gold);text-transform:uppercase}
.points-ctrl{display:flex;align-items:center;gap:.4rem}
.pt-btn{width:22px;height:22px;border-radius:50%;border:1px solid var(--border2);background:rgba(124,92,191,0.2);color:var(--gold2);font-size:.9rem;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:'Space Mono',monospace}
.pt-btn:hover{background:rgba(124,92,191,0.45)}
.pt-score{font-family:'Space Mono',monospace;font-size:.78rem;color:var(--gold2);min-width:28px;text-align:center}
.pt-score.pos{color:#6ee89a}
.pt-score.neg{color:#f08080}
.gcard-members{display:flex;flex-wrap:wrap;gap:.3rem}
.chip{display:inline-block;background:rgba(124,92,191,0.18);border:1px solid var(--border);border-radius:6px;padding:.18rem .55rem;font-size:.75rem;color:var(--mist2);font-family:'Space Mono',monospace;cursor:grab;user-select:none;transition:all .15s}
.chip:hover{background:rgba(124,92,191,0.32);border-color:var(--border2)}
.chip.dragging{opacity:.35;cursor:grabbing}
.gcard-members.drag-over{outline:1px dashed var(--gold);border-radius:6px;background:rgba(212,168,67,0.07)}
.pts-summary{margin-top:.6rem;padding:.7rem .9rem;background:rgba(5,3,14,0.5);border:1px solid var(--border);border-radius:9px}
.pts-summary-title{font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.15em;color:var(--violet3);text-transform:uppercase;margin-bottom:.45rem}
.pts-row{font-family:'Space Mono',monospace;font-size:.65rem;color:var(--mist2);display:flex;justify-content:space-between;padding:.15rem 0}
.pts-lead{color:var(--gold2)}
</style>

<canvas id="stars"></canvas>
<div class="page">
  <div class="site-title">Shirley's Name / Group Picker</div>
  <div class="site-sub">姓名／分組抽選器</div>

  <div class="panel">
    <div class="plabel">Names — one per line 每行一個姓名</div>
    <textarea id="names" placeholder="Alice&#10;Bob&#10;Carol&#10;Diana&#10;Ethan&#10;Fiona&#10;George&#10;Hannah&#10;..."></textarea>
  </div>

  <div class="panel">
    <div class="plabel">Mode 模式</div>
    <div class="modes">
      <div class="mcard active" data-mode="lucky"><span class="mcard-icon">✦</span><div class="mcard-name">Lucky Draw<br>幸運抽獎</div></div>
      <div class="mcard" data-mode="all"><span class="mcard-icon">◈</span><div class="mcard-name">Draw All<br>逐一抽取</div></div>
      <div class="mcard" data-mode="shuffle"><span class="mcard-icon">⟳</span><div class="mcard-name">Shuffle List<br>隨機排序</div></div>
      <div class="mcard" data-mode="group"><span class="mcard-icon">⬡</span><div class="mcard-name">Group by Size<br>按人數分組</div></div>
      <div class="mcard" data-mode="teams"><span class="mcard-icon">◉</span><div class="mcard-name">Split Teams<br>分隊</div></div>
      <div class="mcard" data-mode="pair"><span class="mcard-icon">⟡</span><div class="mcard-name">Pair Up<br>配對</div></div>
    </div>
    <div id="group-row" class="sub-row" style="display:none">
      <label>Group size 每組人數</label>
      <input type="range" id="group-size" min="2" max="8" value="3" step="1">
      <span class="val" id="group-size-val">3</span>
    </div>
    <div id="teams-row" class="sub-row" style="display:none">
      <label>Number of teams 隊伍數</label>
      <input type="range" id="teams-count" min="2" max="10" value="3" step="1">
      <span class="val" id="teams-count-val">3</span>
    </div>
  </div>

  <div style="position:relative">
    <div class="panel result-zone" id="result-zone">
      <div class="placeholder-txt">Select a mode &amp; enter names to begin</div>
    </div>
    <div class="spotlight" id="spotlight">
      <div class="spotlight-name" id="spotlight-name"></div>
      <button class="spotlight-close" id="spotlight-close">✕ close</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
<script>
const cvs=document.getElementById('stars'),ctx=cvs.getContext('2d');
let stars=[];
function initS(){cvs.width=window.innerWidth;cvs.height=window.innerHeight;stars=[];const n=Math.floor(cvs.width*cvs.height/5000);for(let i=0;i<n;i++)stars.push({x:Math.random()*cvs.width,y:Math.random()*cvs.height,r:Math.random()*1.1+.2,o:Math.random(),d:Math.random()*.006+.002,ph:Math.random()*Math.PI*2});}
function draw(t){ctx.clearRect(0,0,cvs.width,cvs.height);stars.forEach(s=>{const op=s.o*(.45+.55*Math.sin(s.ph+t*s.d*60));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,248,240,${op.toFixed(2)})`;ctx.fill();});requestAnimationFrame(draw);}
window.addEventListener('resize',initS);initS();draw(0);

const namesEl=document.getElementById('names');
const resultZone=document.getElementById('result-zone');
const spotlightEl=document.getElementById('spotlight');
const spotlightName=document.getElementById('spotlight-name');
const spotlightClose=document.getElementById('spotlight-close');
const groupRow=document.getElementById('group-row');
const teamsRow=document.getElementById('teams-row');
const groupSizeEl=document.getElementById('group-size');
const groupSizeVal=document.getElementById('group-size-val');
const teamsCountEl=document.getElementById('teams-count');
const teamsCountVal=document.getElementById('teams-count-val');

let mode='lucky',remaining=[],allNames=[],seqIdx=0,seqList=[];
let shuffleOrder=[];
let groupsData=[];   // [{members:[], pts:0}]
let groupsMode='';   // 'group'|'teams'|'pair'

spotlightClose.addEventListener('click',()=>spotlightEl.classList.remove('on'));

groupSizeEl.addEventListener('input',()=>{groupSizeVal.textContent=groupSizeEl.value;if(mode==='group')run();});
teamsCountEl.addEventListener('input',()=>{teamsCountVal.textContent=teamsCountEl.value;if(mode==='teams')run();});

document.querySelectorAll('.mcard').forEach(card=>{
  card.addEventListener('click',()=>{
    document.querySelectorAll('.mcard').forEach(c=>c.classList.remove('active'));
    card.classList.add('active');
    mode=card.dataset.mode;
    groupRow.style.display=(mode==='group')?'flex':'none';
    teamsRow.style.display=(mode==='teams')?'flex':'none';
    if(mode==='lucky'||mode==='all'){remaining=[];allNames=[];seqList=[];seqIdx=0;}
    run();
  });
});

namesEl.addEventListener('input',()=>{remaining=[];allNames=[];seqList=[];seqIdx=0;shuffleOrder=[];run();});

function getNames(){return namesEl.value.split('\n').map(n=>n.trim()).filter(n=>n.length>0);}
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}

function celebrate(){
  if(typeof confetti==='undefined')return;
  confetti({particleCount:70,spread:55,origin:{y:.7},colors:['#d4a843','#e8c96a','#a07de0','#7c5cbf','#f5f0ff']});
  setTimeout(()=>confetti({particleCount:50,angle:60,spread:45,origin:{x:0,y:.7},colors:['#d4a843','#e8c96a','#a07de0']}),300);
  setTimeout(()=>confetti({particleCount:50,angle:120,spread:45,origin:{x:1,y:.7},colors:['#d4a843','#e8c96a','#a07de0']}),550);
}

function setResult(html){resultZone.innerHTML=html;resultZone.classList.add('has-content');}
function empty(msg='Select a mode &amp; enter names to begin'){resultZone.innerHTML=`<div class="placeholder-txt">${msg}</div>`;resultZone.classList.remove('has-content');}

function run(){
  const names=getNames();
  if(!names.length){empty();return;}
  if(mode==='lucky'){
    if(!allNames.length||JSON.stringify(allNames)!==JSON.stringify(names)){allNames=names;remaining=shuffle([...names]);}
    showLucky();
  } else if(mode==='all'){
    if(!seqList.length||JSON.stringify(allNames)!==JSON.stringify(names)){allNames=names;seqList=shuffle([...names]);seqIdx=0;}
    showSeq();
  } else if(mode==='shuffle'){
    if(!shuffleOrder.length||shuffleOrder.length!==names.length){shuffleOrder=shuffle(names);}
    doShuffle();
  } else if(mode==='group'){doGroupInit(names,parseInt(groupSizeEl.value));
  } else if(mode==='teams'){doTeamsInit(names,parseInt(teamsCountEl.value));
  } else if(mode==='pair'){doPairInit(names);}
}

function showLucky(){
  if(!remaining.length)remaining=shuffle([...allNames]);
  const picked=remaining.shift();celebrate();
  const left=remaining.length,total=allNames.length;
  let html=`<div class="result-title">✦ Lucky Draw 幸運抽獎</div>`;
  html+=`<div class="big-name">${picked}</div>`;
  html+=`<div class="progress-txt">${total-left} drawn · ${left} remaining</div>`;
  html+=`<button class="next-btn" id="lucky-next">${left>0?'✦ Draw Next 再抽一位':'✦ Restart 重新開始'}</button>`;
  setResult(html);
  document.getElementById('lucky-next').addEventListener('click',()=>{if(!remaining.length)remaining=shuffle([...allNames]);showLucky();});
}

function showSeq(){
  if(seqIdx>=seqList.length)seqIdx=0;
  const name=seqList[seqIdx];celebrate();
  const isLast=seqIdx===seqList.length-1;
  let html=`<div class="result-title">◈ Draw All 逐一抽取</div>`;
  html+=`<div class="big-name">${name}</div>`;
  html+=`<div class="progress-txt">${seqIdx+1} / ${seqList.length}</div>`;
  html+=`<button class="next-btn" id="seq-next">${isLast?'✦ Restart 重新開始':'✦ Next 下一位'}</button>`;
  setResult(html);
  document.getElementById('seq-next').addEventListener('click',()=>{seqIdx=isLast?0:seqIdx+1;if(isLast){seqList=shuffle([...allNames]);seqIdx=0;}showSeq();});
}

// ── Shuffle with drag-to-reorder + click-to-spotlight ──
function doShuffle(){
  let html=`<div class="result-title">⟳ Shuffle List 隨機排序 <span style="color:var(--mist3);font-size:.55rem;letter-spacing:.05em">drag to reorder · click name to spotlight</span></div>`;
  html+=`<ul class="shuffle-list" id="shuffle-list">`;
  shuffleOrder.forEach((n,i)=>{
    html+=`<li class="shuffle-item" draggable="true" data-idx="${i}">
      <span class="shuffle-handle">⠿</span>
      <span class="shuffle-num">${i+1}.</span>
      <span class="shuffle-name">${n}</span>
      <button class="highlight-btn" data-name="${n}">spotlight ✦</button>
    </li>`;
  });
  html+=`</ul>`;
  html+=`<button class="next-btn" style="align-self:center;margin-top:.8rem" id="reshuf-btn">⟳ Reshuffle 再次隨機</button>`;
  setResult(html);

  document.getElementById('reshuf-btn').addEventListener('click',()=>{shuffleOrder=shuffle(getNames());doShuffle();});

  document.querySelectorAll('.highlight-btn').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      showSpotlight(btn.dataset.name);
    });
  });

  // drag-to-reorder
  let dragIdx=null;
  const list=document.getElementById('shuffle-list');
  list.querySelectorAll('.shuffle-item').forEach(item=>{
    item.addEventListener('dragstart',e=>{dragIdx=parseInt(e.currentTarget.dataset.idx);e.currentTarget.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    item.addEventListener('dragend',e=>{e.currentTarget.classList.remove('dragging');list.querySelectorAll('.shuffle-item').forEach(i=>i.classList.remove('drag-over'));});
    item.addEventListener('dragover',e=>{e.preventDefault();item.classList.add('drag-over');});
    item.addEventListener('dragleave',()=>item.classList.remove('drag-over'));
    item.addEventListener('drop',e=>{
      e.preventDefault();item.classList.remove('drag-over');
      const toIdx=parseInt(item.dataset.idx);
      if(dragIdx===null||dragIdx===toIdx)return;
      const moved=shuffleOrder.splice(dragIdx,1)[0];
      shuffleOrder.splice(toIdx,0,moved);
      dragIdx=null;
      doShuffle();
    });
  });
}

function showSpotlight(name){
  spotlightName.textContent=name;
  spotlightEl.classList.add('on');
  celebrate();
}

// ── Generic group renderer with drag-between-groups + points ──
function buildGroupsData(groups){
  groupsData=groups.map(g=>({members:[...g],pts:0}));
}

function renderGroups(label,rerollFn){
  const unitLabel=groupsMode==='pair'?'Pair':'Group';
  const unitLabelZh=groupsMode==='pair'?'對':'組';

  let html=`<div class="result-title">${label} <span style="color:var(--mist3);font-size:.55rem">drag names between groups to rearrange</span></div>`;

  groupsData.forEach((g,i)=>{
    const sc=g.pts;
    const scClass=sc>0?'pos':sc<0?'neg':'';
    html+=`<div class="gcard" data-gi="${i}">
      <div class="gcard-hd">
        <span class="gcard-title">${unitLabel} ${i+1} · 第${i+1}${unitLabelZh}</span>
        <div class="points-ctrl">
          <button class="pt-btn" data-gi="${i}" data-d="-1">−</button>
          <span class="pt-score ${scClass}" id="pts-${i}">${sc}</span>
          <button class="pt-btn" data-gi="${i}" data-d="1">+</button>
        </div>
      </div>
      <div class="gcard-members" id="members-${i}">
        ${g.members.map(n=>`<span class="chip" draggable="true" data-name="${n}" data-gi="${i}">${n}</span>`).join('')}
      </div>
    </div>`;
  });

  // points summary
  html+=`<div class="pts-summary"><div class="pts-summary-title">✦ Score Summary 積分總結</div><div id="pts-summary-rows"></div></div>`;
  html+=`<button class="next-btn" style="align-self:center;margin-top:.8rem" id="reroll-btn">⟳ Re-randomise 重新隨機</button>`;

  setResult(html);
  updatePtsSummary();

  // point buttons
  document.querySelectorAll('.pt-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const gi=parseInt(btn.dataset.gi),d=parseInt(btn.dataset.d);
      groupsData[gi].pts+=d;
      const el=document.getElementById(`pts-${gi}`);
      el.textContent=groupsData[gi].pts;
      el.className='pt-score'+(groupsData[gi].pts>0?' pos':groupsData[gi].pts<0?' neg':'');
      updatePtsSummary();
    });
  });

  document.getElementById('reroll-btn').addEventListener('click',rerollFn);

  // drag-between-groups
  let dragName=null,dragFromGi=null;

  document.querySelectorAll('.chip').forEach(chip=>{
    chip.addEventListener('dragstart',e=>{
      dragName=e.currentTarget.dataset.name;
      dragFromGi=parseInt(e.currentTarget.dataset.gi);
      e.currentTarget.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
    });
    chip.addEventListener('dragend',e=>e.currentTarget.classList.remove('dragging'));
  });

  document.querySelectorAll('.gcard-members').forEach(zone=>{
    zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('drag-over');});
    zone.addEventListener('dragleave',()=>zone.classList.remove('drag-over'));
    zone.addEventListener('drop',e=>{
      e.preventDefault();zone.classList.remove('drag-over');
      const toGi=parseInt(zone.id.replace('members-',''));
      if(dragName===null||dragFromGi===toGi)return;
      groupsData[dragFromGi].members=groupsData[dragFromGi].members.filter(n=>n!==dragName);
      groupsData[toGi].members.push(dragName);
      dragName=null;dragFromGi=null;
      renderGroups(label,rerollFn);
    });
  });
}

function updatePtsSummary(){
  const el=document.getElementById('pts-summary-rows');
  if(!el)return;
  const sorted=[...groupsData].map((g,i)=>({i,pts:g.pts})).sort((a,b)=>b.pts-a.pts);
  const maxPts=sorted[0].pts;
  const unitLabel=groupsMode==='pair'?'Pair':'Group';
  el.innerHTML=sorted.map(g=>{
    const lead=g.pts===maxPts&&maxPts!==0;
    return `<div class="pts-row${lead?' pts-lead':''}"><span>${unitLabel} ${g.i+1}</span><span>${g.pts} pts${lead?' ✦':''}</span></div>`;
  }).join('');
}

function doGroupInit(names,size){
  groupsMode='group';
  const s=shuffle(names);const grps=[];
  for(let i=0;i<s.length;i+=size)grps.push(s.slice(i,i+size));
  buildGroupsData(grps);
  renderGroups(`⬡ Groups of ${size} 每組${size}人`,()=>doGroupInit(getNames(),size));
  celebrate();
}

function doTeamsInit(names,tc){
  groupsMode='teams';
  const teams=Array.from({length:tc},()=>[]);
  shuffle(names).forEach((n,i)=>teams[i%tc].push(n));
  buildGroupsData(teams);
  renderGroups(`◉ ${tc} Teams ${tc}隊`,()=>doTeamsInit(getNames(),tc));
  celebrate();
}

function doPairInit(names){
  groupsMode='pair';
  const s=shuffle(names);const pairs=[];
  for(let i=0;i<s.length-1;i+=2)pairs.push([s[i],s[i+1]]);
  if(s.length%2===1)pairs.push([s[s.length-1],'(no partner)']);
  buildGroupsData(pairs);
  renderGroups(`⟡ Pairs 配對`,()=>doPairInit(getNames()));
  celebrate();
}
</script>
