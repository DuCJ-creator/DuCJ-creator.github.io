<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Literature Collection | Pluto</title>
    <style>
        :root {
            --bg-color: #fbf9f4;
            --text-color: #2c2a29;
            --sub-text: #8c8a88;
            --border-color: #e5dfd8;
            --hover-bg: rgba(125, 107, 167, 0.03);
            --quote-text: #4c4a48;
        }
        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --sub-text: #a0a0a0;
            --border-color: #2c2c2c;
            --hover-bg: rgba(177, 159, 251, 0.05);
            --quote-text: #b0b0b0;
        }
        body { margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color); font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; justify-content: center; min-height: 100vh; transition: background-color 0.3s, color 0.3s; }
        .container { max-width: 680px; width: 90%; padding: 80px 0; display: block; }
        .view-mode { display: none; }
        .active-view { display: block; }
        .header { margin-bottom: 40px; }
        .header h1 { font-family: "Georgia", serif; font-size: 52px; font-weight: 400; margin: 0; line-height: 1.1; }
        .header h1 span { color: #7d6ba7; display: block; margin-top: 5px; }
        .header .subtitle { font-size: 14px; color: var(--sub-text); letter-spacing: 2px; margin-top: 25px; font-weight: 300; }
        .filter-nav { display: flex; gap: 15px; margin-bottom: 40px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }
        .filter-btn { font-size: 14px; color: var(--sub-text); background: none; border: none; cursor: pointer; padding: 5px 10px; letter-spacing: 1px; font-weight: 500; transition: all 0.2s; border-radius: 4px; }
        .filter-btn:hover { color: var(--text-color); background: var(--hover-bg); }
        .filter-btn.active-filter { color: #fff; background-color: #7d6ba7; }
        .essay-list { border-top: 1px solid var(--border-color); }
        .essay-item { display: flex; align-items: flex-start; padding: 35px 0; border-bottom: 1px solid var(--border-color); text-decoration: none; color: inherit; cursor: pointer; transition: background-color 0.2s; }
        .essay-item:hover { background-color: var(--hover-bg); }
        .item-number { font-family: "Georgia", serif; font-size: 40px; color: #c5bfb6; width: 80px; line-height: 1; }
        .item-content { flex: 1; }
        .item-title-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 6px; }
        .item-title-en { font-size: 20px; font-weight: 600; letter-spacing: 0.5px; }
        .item-title-zh { font-size: 14px; color: var(--sub-text); font-weight: 400; }
        .item-author { font-family: "Georgia", serif; font-style: italic; font-size: 15px; color: #9c8fb7; }
        .back-home { font-size: 14px; color: var(--sub-text); text-decoration: none; display: inline-block; margin-bottom: 40px; cursor: pointer; }
        .reader-title-container { margin-bottom: 50px; }
        .reader-title { font-family: "Georgia", serif; font-size: 36px; font-weight: 400; line-height: 1.3; margin: 0 0 6px 0; }
        .reader-title-zh { font-size: 18px; color: var(--sub-text); margin-bottom: 15px; font-weight: 400; }
        .reader-author { font-family: "Georgia", serif; font-style: italic; color: var(--sub-text); font-size: 18px; }
        main p { font-family: "Georgia", serif; font-size: 19px; margin-bottom: 28px; text-align: justify; line-height: 1.8; }
        main blockquote { margin: 40px 0; padding-left: 20px; border-left: 3px solid #7d6ba7; font-family: "Georgia", serif; font-style: italic; font-size: 22px; color: var(--quote-text); line-height: 1.6; }
        .vocab-tip { border-bottom: 1px dashed #7d6ba7; cursor: help; position: relative; font-weight: 500; }
        .vocab-tip::after { content: attr(data-tip); position: absolute; bottom: 125%; left: 50%; transform: translateX(-50%); background-color: #2c2a29; color: #fff; padding: 6px 12px; border-radius: 4px; font-size: 14px; font-family: -apple-system, sans-serif; white-space: nowrap; opacity: 0; visibility: hidden; transition: opacity 0.2s; z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .vocab-tip:hover::after { opacity: 1; visibility: visible; }
        .control-btn { position: fixed; right: 20px; padding: 10px; background: #7d6ba7; color: #fff; border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); font-size: 20px; z-index: 100; display: flex; align-items: center; justify-content: center; transition: transform 0.2s; }
        .control-btn:hover { transform: scale(1.05); }
        #audio-btn { bottom: 85px; display: none; }
        #theme-btn { bottom: 20px; }
        .highlight { background-color: #f0e68c; border-radius: 3px; padding: 0 2px; }
        [data-theme="dark"] .highlight { background-color: #7d6ba7; color: #fff; }
    </style>
</head>
<body>

<div id="reading-bar" style="position:fixed; top:0; left:0; height:4px; background:#7d6ba7; width:0%; z-index:999; transition:width 0.1s;"></div>

<button id="audio-btn" class="control-btn" onclick="speakText()">&#128266;</button>
<button id="theme-btn" class="control-btn" onclick="toggleTheme()">&#127769;</button>

<div class="container">

    <div id="home-view" class="view-mode active-view">
        <header class="header">
            <h1>Classic <span>Literature</span></h1>
            <div class="subtitle">&#x1FA90; Click any title to start reading</div>
        </header>
        <div class="filter-nav">
            <button class="filter-btn active-filter" onclick="filterCategory('all', this)">ALL</button>
            <button class="filter-btn" onclick="filterCategory('essay', this)">ESSAYS</button>
            <button class="filter-btn" onclick="filterCategory('poetry', this)">POETRY</button>
            <button class="filter-btn" onclick="filterCategory('story', this)">STORIES</button>
        </div>
        <nav class="essay-list" id="main-menu"></nav>
    </div>

    <div id="reader-view" class="view-mode">
        <span class="back-home" onclick="goBackHome()">&#8592; Back to Collection</span>
        <header class="reader-title-container">
            <h1 class="reader-title" id="art-title"></h1>
            <div class="reader-title-zh" id="art-title-zh"></div>
            <div class="reader-author" id="art-author"></div>
        </header>
        <main id="article-content"></main>
    </div>

</div>

<script>
var articles = [
    { id: "01", title: "Of Studies", titleZh: "\u8ac7\u8b80\u66f8", author: "Francis Bacon", category: "essay", file: "essays/01_of_studies.txt" },
    { id: "02", title: "Of Beauty", titleZh: "\u8ac7\u7f8e", author: "Francis Bacon", category: "essay", file: "essays/02_of_beauty.txt" },
    { id: "03", title: "The Gettysburg Address", titleZh: "\u84cb\u8328\u5821\u5ba3\u8a00", author: "Abraham Lincoln", category: "essay", file: "essays/03_gettysburg.txt" },
    { id: "14", title: "Dream-Children: A Reverie", titleZh: "\u5922\u4e2d\u7684\u5b69\u5b50", author: "Charles Lamb", category: "essay", file: "essays/14_dream_children.txt" },
    { id: "15", title: "The Lowest Animal", titleZh: "\u6700\u4f4e\u7b49\u7684\u52d5\u7269", author: "Mark Twain", category: "essay", file: "essays/15_lowest_animal.txt" },
    { id: "04", title: "The Road Not Taken", titleZh: "\u672a\u8d70\u4e4b\u8def", author: "Robert Frost", category: "poetry", file: "essays/04_the_road.txt" },
    { id: "05", title: "Stopping by Woods on a Snowy Evening", titleZh: "\u96ea\u665a\u6797\u908a\u6b47\u99ac", author: "Robert Frost", category: "poetry", file: "essays/05_stopping_woods.txt" },
    { id: "06", title: "Sonnet 18", titleZh: "\u5341\u56db\u884c\u8a5718", author: "William Shakespeare", category: "poetry", file: "essays/06_sonnet18.txt" },
    { id: "07", title: "Invictus", titleZh: "\u4e0d\u6557", author: "William Ernest Henley", category: "poetry", file: "essays/07_invictus.txt" },
    { id: "08", title: "The Happy Prince", titleZh: "\u5feb\u6a02\u738b\u5b50", author: "Oscar Wilde", category: "story", file: "essays/08_happy_prince.txt" },
    { id: "09", title: "The Fox and the Grapes", titleZh: "\u72d0\u72f8\u8207\u8461\u8404", author: "Aesop", category: "story", file: "essays/09_fox_grapes.txt" },
    { id: "10", title: "The North Wind and the Sun", titleZh: "\u5317\u98a8\u8207\u592a\u967d", author: "Aesop", category: "story", file: "essays/10_north_wind.txt" },
    { id: "11", title: "The Ambitious Guest", titleZh: "\u6709\u91ce\u5fc3\u7684\u9752\u5e74", author: "Nathaniel Hawthorne", category: "story", file: "essays/11_ambitious_guest.txt" },
    { id: "12", title: "The Gift of the Magi", titleZh: "\u9ea5\u790a\u7684\u792禮\u7269", author: "O. Henry", category: "story", file: "essays/12_gift_magi.txt" },
    { id: "13", title: "The Last Leaf", titleZh: "\u6700\u5f8c\u4e00\u7247\u85e4\u8449", author: "O. Henry", category: "story", file: "essays/13_last_leaf.txt" },
    { id: "16", title: "The Sphinx Without a Secret", titleZh: "\u6c92\u6709\u79d8\u5bc6\u7684\u65af\u82ac\u514b\u65af", author: "Oscar Wilde", category: "story", file: "essays/16_sphinx.txt" }
];

var isSpeaking = false;

function renderMenu(items) {
    var menu = document.getElementById("main-menu");
    menu.innerHTML = "";
    for (var i = 0; i < items.length; i++) {
        var article = items[i];
        var el = document.createElement("div");
        el.className = "essay-item";
        el.innerHTML = "<div class=\"item-number\">" + article.id + "</div><div class=\"item-content\"><div class=\"item-title-row\"><span class=\"item-title-en\">" + article.title + "</span><span class=\"item-title-zh\">" + article.titleZh + "</span></div><div class=\"item-author\">" + article.author + "</div></div>";
        (function(id) {
            el.onclick = function() { openArticle(id); };
        })(article.id);
        menu.appendChild(el);
    }
}

function filterCategory(cat, btn) {
    var buttons = document.querySelectorAll(".filter-btn");
    for (var i = 0; i < buttons.length; i++) {
        buttons[i].classList.remove("active-filter");
    }
    btn.classList.add("active-filter");
    var filtered = [];
    for (var j = 0; j < articles.length; j++) {
        if (cat === "all" || articles[j].category === cat) {
            filtered.push(articles[j]);
        }
    }
    renderMenu(filtered);
}

function openArticle(id) {
    var article = null;
    for (var i = 0; i < articles.length; i++) {
        if (articles[i].id === id) { article = articles[i]; break; }
    }
    if (!article) return;

    document.getElementById("home-view").classList.remove("active-view");
    document.getElementById("reader-view").classList.add("active-view");
    document.getElementById("audio-btn").style.display = "flex";
    document.getElementById("art-title").textContent = article.title;
    document.getElementById("art-title-zh").textContent = article.titleZh;
    document.getElementById("art-author").textContent = article.author;

    var content = document.getElementById("article-content");
    content.innerHTML = "<p>Loading...</p>";

    fetch(article.file)
        .then(function(res) {
            if (!res.ok) throw new Error("File not found: " + article.file);
            return res.text();
        })
        .then(function(text) {
            var paragraphs = text.split(/\n\s*\n/);
            var html = "";
            for (var i = 0; i < paragraphs.length; i++) {
                var p = paragraphs[i].trim();
                if (p) html += "<p>" + p.replace(/\n/g, "<br>") + "</p>";
            }
            content.innerHTML = html;
        })
        .catch(function(err) {
            content.innerHTML = "<p style=\"color:#c0392b;\">Error: " + err.message + "</p>";
        });

    window.scrollTo(0, 0);
}

function goBackHome() {
    document.getElementById("reader-view").classList.remove("active-view");
    document.getElementById("home-view").classList.add("active-view");
    document.getElementById("audio-btn").style.display = "none";
    window.speechSynthesis.cancel();
    isSpeaking = false;
    document.getElementById("audio-btn").textContent = "\uD83D\uDD0A";
    window.scrollTo(0, 0);
}

function speakText() {
    var btn = document.getElementById("audio-btn");
    if (isSpeaking) {
        window.speechSynthesis.cancel();
        isSpeaking = false;
        btn.textContent = "\uD83D\uDD0A";
        return;
    }
    var selected = window.getSelection().toString().trim();
    var text = selected ? selected : document.getElementById("article-content").innerText;
    if (!text) return;
    var utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = "en-US";
    utterance.rate = 0.9;
    utterance.onend = function() { isSpeaking = false; btn.textContent = "\uD83D\uDD0A"; };
    window.speechSynthesis.speak(utterance);
    isSpeaking = true;
    btn.textContent = "\u23F9";
}

function toggleTheme() {
    var isDark = document.documentElement.getAttribute("data-theme") === "dark";
    document.documentElement.setAttribute("data-theme", isDark ? "" : "dark");
    document.getElementById("theme-btn").textContent = isDark ? "\uD83C\uDF19" : "\u2600\uFE0F";
}

document.getElementById("article-content").addEventListener("mouseup", function() {
    var selection = window.getSelection();
    if (!selection || selection.toString().trim() === "") return;
    var range = selection.getRangeAt(0);
    var content = document.getElementById("article-content");
    if (!content.contains(range.commonAncestorContainer)) return;
    var parentEl = range.commonAncestorContainer.parentElement;
    if (parentEl && parentEl.classList.contains("highlight")) {
        var text = document.createTextNode(parentEl.textContent);
        parentEl.replaceWith(text);
        selection.removeAllRanges();
        return;
    }
    try {
        var span = document.createElement("span");
        span.className = "highlight";
        range.surroundContents(span);
        selection.removeAllRanges();
    } catch(e) {}
});

window.addEventListener("scroll", function() {
    var doc = document.documentElement;
    var scrolled = doc.scrollTop / (doc.scrollHeight - doc.clientHeight) * 100;
    document.getElementById("reading-bar").style.width = scrolled + "%";
});

renderMenu(articles);
</script>
</body>
</html>
