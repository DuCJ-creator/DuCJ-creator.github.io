<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Literature Collection | Pluto</title>
    <style>
        /* ==================== 1. 全域與字體 ==================== */
        body { margin: 0; padding: 0; background-color: #fbf9f4; color: #2c2a29; font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; justify-content: center; min-height: 100vh; }
        .container { max-width: 680px; width: 90%; padding: 80px 0; display: block; }
        
        /* ==================== 2. 模式切換控制 ==================== */
        .view-mode { display: none; }
        .active-view { display: block; }

        /* ==================== 3. 列表首頁樣式 ==================== */
        .header { margin-bottom: 60px; }
        .header h1 { font-family: "Georgia", serif; font-size: 52px; font-weight: 400; margin: 0; line-height: 1.1; }
        .header h1 span { color: #7d6ba7; display: block; margin-top: 5px; }
        .header .subtitle { font-size: 14px; color: #8c8a88; letter-spacing: 2px; margin-top: 25px; font-weight: 300; }
        .essay-list { border-top: 1px solid #e5dfd8; }
        .essay-item { display: flex; align-items: flex-start; padding: 35px 0; border-bottom: 1px solid #e5dfd8; text-decoration: none; color: inherit; cursor: pointer; transition: background-color 0.2s; }
        .essay-item:hover { background-color: rgba(125, 107, 167, 0.03); }
        .item-number { font-family: "Georgia", serif; font-size: 40px; color: #c5bfb6; width: 80px; line-height: 1; }
        .item-content { flex: 1; }
        .item-title { font-size: 20px; font-weight: 600; margin-bottom: 6px; letter-spacing: 0.5px; }
        .item-author { font-family: "Georgia", serif; font-style: italic; font-size: 15px; color: #9c8fb7; }

        /* ==================== 4. 沉浸閱讀頁樣式 ==================== */
        .back-home { font-size: 14px; color: #8c8a88; text-decoration: none; display: inline-block; margin-bottom: 40px; cursor: pointer; }
        .reader-title { font-family: "Georgia", serif; font-size: 36px; font-weight: 400; line-height: 1.3; margin-bottom: 10px; }
        .reader-author { font-family: "Georgia", serif; font-style: italic; color: #6c6a68; margin-bottom: 50px; font-size: 18px; }
        main p { font-family: "Georgia", serif; font-size: 19px; margin-bottom: 28px; text-align: justify; line-height: 1.8; }
        main blockquote { margin: 40px 0; padding-left: 20px; border-left: 3px solid #7d6ba7; font-family: "Georgia", serif; font-style: italic; font-size: 22px; color: #4c4a48; line-height: 1.6; }
        
        /* 雙語懸停註解 */
        .vocab-tip { border-bottom: 1px dashed #7d6ba7; cursor: help; position: relative; font-weight: 500; }
        .vocab-tip::after { content: attr(data-tip); position: absolute; bottom: 125%; left: 50%; transform: translateX(-50%); background-color: #2c2a29; color: #fff; padding: 6px 12px; border-radius: 4px; font-size: 14px; font-family: -apple-system, sans-serif; white-space: nowrap; opacity: 0; visibility: hidden; transition: opacity 0.2s; z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .vocab-tip:hover::after { opacity: 1; visibility: visible; }

        /* 浮動控制鈕 */
        #audio-btn { position: fixed; bottom: 20px; right: 20px; padding: 10px; background: #7d6ba7; color: #fff; border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); font-size: 20px; display: none; }
    </style>
</head>
<body>

    <!-- 頂部閱讀進度條 -->
    <div id="reading-bar" style="position:fixed; top:0; left:0; height:4px; background:#7d6ba7; width:0%; z-index:999; transition:width 0.1s;"></div>
    
    <!-- 浮動語音按鈕 -->
    <button id="audio-btn" onclick="speakText()">🔊</button>

    <div class="container">
        
        <!-- ==================== 視圖 A：15 篇目列表首頁 ==================== -->
        <div id="home-view" class="view-mode active-view">
            <header class="header">
                <h1>Classic <span>Literature</span></h1>
                <div class="subtitle">沉浸式文學賞析 🪐 點擊任一篇目即可進入深度閱讀</div>
            </header>
            <nav class="essay-list" id="main-menu">
                <!-- 由 JavaScript 依據下方資料自動生成 15 篇列表，此處留空 -->
            </nav>
        </div>

        <!-- ==================== 視圖 B：動態沉浸閱讀器 ==================== -->
        <div id="reader-view" class="view-mode">
            <span class="back-home" onclick="goBackHome()">← Back to Collection</span>
            <header>
                <h1 class="reader-title" id="art-title">Title</h1>
                <div class="reader-author" id="art-author">Author</div>
            </header>
            <main id="article-content">
                <!-- .txt 檔案的內文將會被動態注入到這裡 -->
            </main>
        </div>

    </div>

    <!-- ==================== 5. 核心邏輯 JavaScript ==================== -->
    <script>
    // 🗂️ 15 篇經典文章的資料庫清單（文字檔均放在 essays 資料夾中）
    const articles = [
        { id: "01", title: "Of Studies", author: "Francis Bacon", file: "essays/01_of_studies.txt" },
        { id: "02", title: "Of Beauty", author: "Francis Bacon", file: "essays/02_of_beauty.txt" },
        { id: "03", title: "The Gettysburg Address", author: "Abraham Lincoln", file: "essays/03_gettysburg.txt" },
        { id: "04", title: "The Road Not Taken", author: "Robert Frost", file: "essays/04_the_road.txt" },
        { id: "05", title: "Stopping by Woods on a Snowy Evening", author: "Robert Frost", file: "essays/05_stopping_woods.txt" },
        { id: "06", title: "Sonnet 18", author: "William Shakespeare", file: "essays/06_sonnet18.txt" },
        { id: "07", title: "Invictus", author: "William Ernest Henley", file: "essays/07_invictus.txt" },
        { id: "08", title: "The Happy Prince", author: "Oscar Wilde", file: "essays/08_happy_prince.txt" },
        { id: "09", title: "The Fox and the Grapes", author: "Aesop", file: "essays/09_fox_grapes.txt" },
        { id: "10", title: "The North Wind and the Sun", author: "Aesop", file: "essays/10_north_wind.txt" },
        { id: "11", title: "The Ambitious Guest", author: "Nathaniel Hawthorne", file: "essays/11_ambitious_guest.txt" },
        { id: "12", title: "The Gift of the Magi", author: "O. Henry", file: "essays/12_gift_magi.txt" },
        { id: "13", title: "The Last Leaf", author: "O. Henry", file: "essays/13_last_leaf.txt" },
        { id: "14", title: "Dream-Children: A Reverie", author: "Charles Lamb", file: "essays/14_dream_children.txt" },
        { id: "15", title: "The Sphinx Without a Secret", author: "Oscar Wilde", file: "essays/15_sphinx.txt" }
    ];

    let currentFileKey = ""; 
    let isSpeaking = false; 
    let lastSelectedText = ""; 

    // 🚀 網頁初始化：渲染選單
    const menuContainer = document.getElementById("main-menu");
    articles.forEach(art => {
        const itemHtml = `
            <div class="essay-item" onclick="loadArticle('${art.file}', '${art.title}', '${art.author}')">
                <div class="item-number">${art.id}</div>
                <div class="item-content">
                    <div class="item-title">${art.title}</div>
                    <div class="item-author">${art.author}</div>
                </div>
            </div>`;
        menuContainer.innerHTML += itemHtml;
    });

    // 📡 AJAX 動態非同步抓取 TXT 文字檔
    function loadArticle(filePath, title, author) {
        currentFileKey = filePath; 
        
        fetch(filePath)
            .then(response => {
                if (!response.ok) throw new Error("File not found");
                return response.text();
            })
            .then(text => {
                document.getElementById("art-title").innerText = title;
                document.getElementById("art-author").innerText = author;
                
                // 檢查本地快取有沒有該頁的「畫線紀錄」，有就用快取，沒有就加載文字檔全文
                let savedContent = localStorage.getItem(currentFileKey);
                document.getElementById("article-content").innerHTML = savedContent ? savedContent : text;

                // 切換檢視畫面，顯示語音鈕
                document.getElementById("home-view").classList.remove("active-view");
                document.getElementById("reader-view").classList.add("active-view");
                document.getElementById("audio-btn").style.display = "block";
                window.scrollTo(0, 0);
            })
            .catch(err => alert("文章加載失敗，請檢查 essays 資料夾路徑！"));
    }

    // 🏡 返回主選單
    function goBackHome() {
        window.speechSynthesis.cancel();
        isSpeaking = false;
        document.getElementById("audio-btn").innerText = "🔊";
        document.getElementById("audio-btn").style.display = "none";
        document.getElementById("reader-view").classList.remove("active-view");
        document.getElementById("home-view").classList.add("active-view");
        document.getElementById("reading-bar").style.width = "0%";
    }

    // 🔊 語音控制模組（已修正框選、開關衝突）
    document.addEventListener('selectionchange', function() {
        let selection = window.getSelection();
        let text = selection.toString().trim();
        if (text.length > 0) lastSelectedText = text;
    });

    function speakText() {
        if (isSpeaking) {
            window.speechSynthesis.cancel();
            isSpeaking = false;
            lastSelectedText = "";
            document.getElementById("audio-btn").innerText = "🔊";
            return;
        }

        let textToSpeak = (lastSelectedText && lastSelectedText.length > 0) ? lastSelectedText : document.getElementById("article-content").innerText;
        if (textToSpeak.length === 0) return;

        window.speechSynthesis.cancel();
        let utterance = new SpeechSynthesisUtterance(textToSpeak);
        utterance.lang = 'en-US'; utterance.rate = 0.95;

        utterance.onstart = function() { isSpeaking = true; document.getElementById("audio-btn").innerText = "⏹️"; };
