<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teacher Shirley's Teaching Agents | 杜老師的教學代理人</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:         #1c2b4a;
      --green:      #5a9e6f;
      --green-lt:   #7dc492;
      --mustard:    #c8a83a;
      --mustard-lt: #e2c355;
      --pearl:      #f0ede6;
      --pearl-s:    rgba(240,237,230,0.60);
      --pearl-m:    rgba(240,237,230,0.35);
      --glass:      rgba(240,237,230,0.06);
      --glass-h:    rgba(240,237,230,0.11);
      --bdr:        rgba(240,237,230,0.13);
      --bdr-gold:   rgba(200,168,58,0.38);
      --txt:        #f0ede6;
      --txt-s:      rgba(240,237,230,0.60);
      --txt-m:      rgba(240,237,230,0.35);
      --gold:       #c8a83a;
      --gold-lt:    #e2c355;
      --bar-h:      56px;
      --side-w:     230px;
      --r:          16px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--txt);
    }

    /* background */
    #stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .glow  { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 0; }
    .g1 { width:600px; height:600px; top:-180px; left:-180px; background: radial-gradient(circle,#2a4a8a,transparent 70%); opacity:.35; }
    .g2 { width:480px; height:480px; bottom:5%; right:-120px; background: radial-gradient(circle,#3a7a52,transparent 70%); opacity:.28; }
    .g3 { width:360px; height:360px; top:45%; left:35%; background: radial-gradient(circle,#c8a83a44,transparent 70%); opacity:.22; }

    /* app shell */
    #app {
      position: relative; z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* top bar */
    #bar {
      height: var(--bar-h);
      flex-shrink: 0;
      display: flex; align-items: center; gap: 14px; padding: 0 20px;
      background: rgba(20,36,70,.88);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--bdr);
      z-index: 10;
    }
    #bar-logo { font-family:'Cormorant Garamond',serif; font-size:1.05rem; font-style:italic; color:var(--gold); white-space:nowrap; flex-shrink:0; }
    #bar-sep  { width:1px; height:22px; background:var(--bdr); flex-shrink:0; }
    #bar-tool { font-size:12px; color:var(--txt-s); letter-spacing:.05em; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    #btn-out {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 13px; border-radius: 8px;
      background: rgba(201,168,76,.10); border: 1px solid rgba(201,168,76,.28);
      color: var(--gold); font-size: 11px; font-weight: 500;
      letter-spacing: .08em; text-transform: uppercase;
      cursor: pointer; text-decoration: none;
      transition: background .2s; white-space: nowrap; flex-shrink: 0;
    }
    #btn-out:hover { background: rgba(201,168,76,.22); }
    #btn-out svg { width:12px; height:12px; }
    #btn-out.hide { display: none; }

    /* main row */
    #main {
      flex: 1;
      min-height: 0;   /* critical: allows children to shrink below content size */
      display: flex;
      overflow: hidden;
    }

    /* sidebar */
    #side {
      width: var(--side-w);
      flex-shrink: 0;
      overflow-y: auto;
      overflow-x: hidden;
      background: rgba(18,28,55,.72);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-right: 1px solid var(--bdr);
      display: flex; flex-direction: column;
      padding: 20px 12px; gap: 6px;
    }
    #side::-webkit-scrollbar { width: 3px; }
    #side::-webkit-scrollbar-thumb { background: var(--bdr); border-radius: 2px; }

    .s-label {
      font-size: 10px; font-weight: 500; letter-spacing: .18em; text-transform: uppercase;
      color: var(--txt-m); padding: 0 8px; margin-bottom: 4px; flex-shrink: 0;
    }

    #btn-home {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; border-radius: 10px;
      cursor: pointer; border: 1px solid transparent;
      transition: background .2s, border-color .2s; flex-shrink: 0;
    }
    #btn-home:hover { background: var(--glass); border-color: var(--bdr); }
    #btn-home .hi { font-size: 18px; }
    #btn-home .ht { font-size: 11px; color: var(--txt-m); letter-spacing: .04em; }

    .ni {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; border-radius: 10px;
      cursor: pointer; border: 1px solid transparent;
      transition: background .2s, border-color .2s; flex-shrink: 0;
    }
    .ni:hover { background: var(--glass); border-color: var(--bdr); }
    .ni.on    { background: rgba(90,158,111,.15); border-color: rgba(90,158,111,.38); }
    .ni-ico {
      width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 16px;
      background: rgba(255,255,255,.05); border: 1px solid var(--bdr); transition: background .2s;
    }
    .ni.on .ni-ico { background: rgba(90,158,111,.20); border-color: rgba(90,158,111,.30); }
    .ni-txt { min-width: 0; overflow: hidden; }
    .ni-name { font-family:'Cormorant Garamond',serif; font-size:.92rem; color:var(--txt); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .ni.on .ni-name { color: #7dc492; }
    .ni-hint { font-size: 10px; color: var(--txt-m); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }

    /* content area */
    #content {
      flex: 1;
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HOME PANEL ──
       Safari fix: avoid position:absolute for the scrolling container.
       Instead make #home a flex child that fills #content via flex:1,
       then scroll inside it. Safari handles this reliably. */
    #home {
      flex: 1;
      min-height: 0;           /* allow shrink inside flex parent */
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;  /* smooth momentum scroll on Safari/iOS */
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 52px 28px 80px;
      transition: opacity .3s;
    }
    #home.off { opacity: 0; pointer-events: none; }
    #home::-webkit-scrollbar { width: 4px; }
    #home::-webkit-scrollbar-thumb { background: var(--bdr); border-radius: 2px; }

    .hdr { text-align: center; margin-bottom: 48px; max-width: 600px; }
    .eb {
      display: inline-block; font-size: 10px; font-weight: 500;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--gold); padding: 4px 14px; margin-bottom: 16px;
      border: 1px solid rgba(201,168,76,.28); border-radius: 100px;
      background: rgba(201,168,76,.06);
    }
    .hdr h1 { font-family:'Cormorant Garamond',serif; font-size: clamp(1.8rem,4vw,3rem); font-weight: 300; line-height: 1.2; }
    .hdr h1 em { font-style: italic; color: var(--gold-lt); }
    .hdr .sub {
      font-family:'Cormorant Garamond',serif;
      font-size: clamp(1rem,2vw,1.28rem); font-weight: 300; font-style: italic;
      color: var(--txt-s); margin-top: 10px; letter-spacing: .03em;
    }
    .dvd { width: 50px; height: 1px; margin: 20px auto 0; background: linear-gradient(90deg,transparent,var(--gold),transparent); }

    /* ── CARDS GRID ──
       width:100% + max-width keeps it centered;
       align-self:center makes the grid not stretch to fill flex column */
    .grid {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 16px;
      width: 100%;
      max-width: 860px;
      align-self: center;   /* centres inside flex column */
    }
    @media(max-width:820px){ .grid { grid-template-columns: repeat(2,1fr); } }
    @media(max-width:520px){ .grid { grid-template-columns: 1fr; } }

    .card {
      background: var(--glass); border: 1px solid var(--bdr); border-radius: var(--r);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      padding: 24px 20px 20px; cursor: pointer;
      display: flex; flex-direction: column; gap: 10px;
      transition: transform .3s cubic-bezier(.23,1,.32,1), background .25s, border-color .25s, box-shadow .3s;
      position: relative; overflow: hidden;
    }
    .card::after {
      content:''; position: absolute; top:-50%; left:-75%; width:50%; height:200%;
      background: linear-gradient(105deg,transparent 40%,rgba(255,255,255,.05) 50%,transparent 60%);
      transform: skewX(-20deg); transition: left .5s; pointer-events: none;
    }
    .card:hover { transform: translateY(-4px) scale(1.012); background: var(--glass-h); border-color: var(--bdr-gold); box-shadow: 0 18px 48px rgba(0,0,0,.4); }
    .card:hover::after { left: 130%; }
    .card.on { border-color: rgba(90,158,111,.45); background: rgba(90,158,111,.10); }
    .c-ico { width:40px; height:40px; border-radius:10px; font-size:19px; display:flex; align-items:center; justify-content:center; background:rgba(201,168,76,.09); border:1px solid rgba(201,168,76,.18); transition:transform .25s; }
    .card:hover .c-ico { transform: scale(1.1) rotate(-4deg); }
    .c-title { font-family:'Cormorant Garamond',serif; font-size:1.08rem; font-weight:400; color:var(--txt); }
    .c-desc  { font-size:.77rem; color:var(--txt-s); line-height:1.6; flex:1; }
    .c-cta   { display:flex; align-items:center; gap:5px; font-size:.72rem; font-weight:500; letter-spacing:.10em; text-transform:uppercase; color:var(--gold); margin-top:2px; transition:gap .2s; }
    .card:hover .c-cta { gap: 9px; }
    .c-cta svg { width:12px; height:12px; transition:transform .2s; }
    .card:hover .c-cta svg { transform: translateX(3px); }

    .hfooter { margin-top: 44px; font-size: 11px; color: var(--txt-m); letter-spacing: .06em; text-align: center; align-self: center; }
    .hfooter span { color: var(--gold); opacity: .7; }

    /* ── IFRAME PANEL ──
       Same Safari fix: flex child of #content, not position:absolute.
       Hidden state uses opacity+pointer-events so it doesn't collapse layout. */
    #fp {
      flex: 1;
      min-height: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
      position: relative;   /* only relative, so children can use absolute inside */
      display: none;        /* fully removed from flow when not active */
    }
    #fp.on { display: flex; flex-direction: column; opacity: 1; pointer-events: all; }

    /* iframe fills fp completely */
    #mf { position: absolute; inset: 0; width: 100%; height: 100%; border: none; display: block; background: #fff; }

    /* loader overlay */
    #ldr {
      position: absolute; inset: 0; z-index: 5;
      background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 18px; transition: opacity .4s;
    }
    #ldr.off { opacity: 0; pointer-events: none; }
    .spin { width:32px; height:32px; border:2px solid rgba(90,158,111,.20); border-top-color:#5a9e6f; border-radius:50%; animation:sp .8s linear infinite; }
    @keyframes sp { to { transform: rotate(360deg); } }
    #ldr p { font-size:12px; color:var(--txt-m); letter-spacing:.06em; }

    /* error overlay */
    #ep {
      display: none; position: absolute; inset: 0; z-index: 6;
      background: var(--bg);
      flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; padding: 40px; text-align: center;
    }
    #ep.on { display: flex; }
    #ep h2 { font-family:'Cormorant Garamond',serif; font-size:1.5rem; font-weight:300; }
    #ep p  { font-size:12px; color:var(--txt-m); line-height:1.7; max-width:340px; }
    #ep a  { display:inline-flex; align-items:center; gap:6px; padding:9px 20px; border-radius:9px; background:rgba(90,158,111,.14); border:1px solid rgba(90,158,111,.35); color:#7dc492; font-size:12px; font-weight:500; text-decoration:none; transition:background .2s; }
    #ep a:hover { background: rgba(90,158,111,.26); }
  </style>
</head>
<body>

<canvas id="stars"></canvas>
<div class="glow g1"></div><div class="glow g2"></div><div class="glow g3"></div>

<div id="app">

  <!-- top bar -->
  <div id="bar">
    <div id="bar-logo">Teacher Shirley's</div>
    <div id="bar-sep"></div>
    <div id="bar-tool">選擇一個工具開始</div>
    <a id="btn-out" class="hide" href="#" target="_blank" rel="noopener noreferrer">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3H3v10h10V9M9 3h4v4M13 3L7 9"/></svg>
      另開視窗
    </a>
  </div>

  <div id="main">

    <!-- sidebar -->
    <nav id="side">
      <div class="s-label">Teaching Agents</div>
      <div id="btn-home"><span class="hi">🏠</span><span class="ht">首頁總覽</span></div>
      <div id="navlist"></div>
    </nav>

    <!-- content -->
    <div id="content">

      <!-- home panel -->
      <div id="home">
        <div class="hdr">
          <div class="eb">AI-Powered Learning Suite</div>
          <h1>Teacher <em>Shirley's</em><br>Teaching Agents</h1>
          <p class="sub">雪莉的教學小夥伴們</p>
          <div class="dvd"></div>
        </div>
        <div class="grid" id="cgrid"></div>
        <div class="hfooter">© 2025 &nbsp;<span>Teacher Shirley</span>&nbsp; · CHHS &nbsp;·&nbsp; 點擊卡片即可在此嵌入工具</div>
      </div>

      <!-- iframe panel -->
      <div id="fp">
        <div id="ldr"><div class="spin"></div><p>載入中，請稍候…</p></div>
        <div id="ep">
          <h2>無法嵌入此頁面</h2>
          <p>此工具的伺服器限制了 iframe 嵌入。<br>請在該 Vercel 專案根目錄加入 <code>vercel.json</code>（見說明），或點擊下方在新分頁開啟。</p>
          <a id="elink" href="#" target="_blank" rel="noopener noreferrer">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px"><path d="M7 3H3v10h10V9M9 3h4v4M13 3L7 9"/></svg>
            在新分頁開啟
          </a>
        </div>
        <iframe id="mf" allow="fullscreen" referrerpolicy="no-referrer"></iframe>
      </div>

    </div>
  </div>
</div>

<script>
const TOOLS = [
  { id:'ivocab',      icon:'📖', title:'iVocab Quiz',            short:'單字測驗',   desc:'互動式單字測驗，強化英文詞彙記憶，支援自訂題庫與即時回饋。',            url:'https://ivocab-quiz.vercel.app/' },
  { id:'gsat',        icon:'📝', title:'GSAT Mock Creator',       short:'模擬卷生成', desc:'學測模擬卷自動生成器，一鍵建立符合考試格式的練習題組。',               url:'https://gsat-mock.vercel.app/' },
  { id:'translation', icon:'🌐', title:'Translation',             short:'智慧翻譯',   desc:'智慧翻譯工具，針對學測閱讀文體最佳化，輔助精準理解英文語境。',          url:'https://gsat-translation-grader.vercel.app/' },
  { id:'reading',     icon:'📚', title:'Reading',                 short:'閱讀理解',   desc:'AI 閱讀理解訓練平台，提供段落分析、關鍵詞提示與理解度評量。',          url:'https://shirley-ai-reading.vercel.app/' },
  { id:'quiz to form',icon:'🔗', title:'Quiz-Form',          short:'Form測驗',   desc:'將測驗變成線上Google Form。',                                        url:'https://script.google.com/a/macros/chhs.hcc.edu.tw/s/AKfycbyhJVgb2yqreS235fJ7srXcVAdp9Hd9dwHqIQEbJPlbAcbmAGMvnUBi1EukCm3-jdlm/exec' },
  { id:'class',       icon:'🎓', title:"Teacher Shirley's Class", short:'課堂資源',   desc:'杜老師課堂資源中心，包含課程講義、作業繳交與學習進度追蹤。',            url:'https://script.google.com/a/macros/chhs.hcc.edu.tw/s/AKfycbxK4Cri-NvJz1uG302sqzx25_QXfI0wnMN1QqGS1dhmG2f_jyybVt-_q89J_MfsWb44NA/exec' },
  { id:'grade',       icon:'📈', title:"Grade Analysis", short:'成績分析',   desc:'關聯Google Sheet 分析各種成績表現。',                                      url:'https://script.google.com/a/macros/chhs.hcc.edu.tw/s/AKfycbx98rUfcbWGUQV3svT37OvAK0ZQAB_VgGTkC_lMTv5NgmUob3265Q8xC-9y9eiQHe9afQ/exec' },
  { id:'toolbox',     icon:'🛠️', title:"Shirley's Tool Box",      short:'教學百寶箱', desc:'課堂輔助工具集合，計時器、分組抽籤等實用應用一次收錄。',                url:'https://ducj-creator.github.io/toolbox.html' }
];

const home    = document.getElementById('home');
const fp      = document.getElementById('fp');
const mf      = document.getElementById('mf');
const ldr     = document.getElementById('ldr');
const ep      = document.getElementById('ep');
const elink   = document.getElementById('elink');
const barTool = document.getElementById('bar-tool');
const btnOut  = document.getElementById('btn-out');
const navlist = document.getElementById('navlist');
const cgrid   = document.getElementById('cgrid');

let timer = null;
const SVG_ARR = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8h10M9 4l4 4-4 4"/></svg>`;

// build sidebar nav items
TOOLS.forEach(t => {
  const d = document.createElement('div');
  d.className = 'ni'; d.id = 'n-'+t.id;
  d.innerHTML = `<div class="ni-ico">${t.icon}</div><div class="ni-txt"><div class="ni-name">${t.title}</div><div class="ni-hint">${t.short}</div></div>`;
  d.addEventListener('click', () => openTool(t));
  navlist.appendChild(d);
});

// build home cards
TOOLS.forEach(t => {
  const c = document.createElement('div');
  c.className = 'card'; c.id = 'c-'+t.id;
  c.innerHTML = `<div class="c-ico">${t.icon}</div><div class="c-title">${t.title}</div><p class="c-desc">${t.desc}</p><div class="c-cta">開啟 ${SVG_ARR}</div>`;
  c.addEventListener('click', () => openTool(t));
  cgrid.appendChild(c);
});

document.getElementById('btn-home').addEventListener('click', showHome);

function showHome() {
  home.classList.remove('off');
  home.style.display = '';      /* restore flex:1 flow */
  fp.classList.remove('on');    /* triggers display:none via CSS */
  barTool.textContent = '選擇一個工具開始';
  btnOut.classList.add('hide');
  clearTimeout(timer);
  mf.src = 'about:blank';
  clearActive();
}

function openTool(t) {
  home.classList.add('off');
  home.style.display = 'none';  /* remove from flex flow so #fp gets full height */
  fp.classList.add('on');       /* triggers display:flex via CSS */
  barTool.textContent = t.title;
  btnOut.href = t.url;
  btnOut.classList.remove('hide');
  elink.href = t.url;
  clearActive();
  document.getElementById('n-'+t.id).classList.add('on');
  document.getElementById('c-'+t.id).classList.add('on');

  ldr.classList.remove('off');
  ep.classList.remove('on');
  clearTimeout(timer);
  mf.src = 'about:blank';

  // Wait for panel to be fully painted before setting real src
  setTimeout(() => {
    mf.src = t.url;
    // Fallback: if no load event fires within 8s, assume blocked
    timer = setTimeout(() => {
      ldr.classList.add('off');
      ep.classList.add('on');
    }, 8000);
  }, 80);
}

mf.addEventListener('load', () => {
  // Ignore about:blank load
  try {
    if (mf.contentWindow && mf.contentWindow.location.href === 'about:blank') return;
  } catch(e) {
    // Cross-origin: real page loaded — fall through to hide loader
  }
  if (!fp.classList.contains('on')) return;
  clearTimeout(timer);
  ldr.classList.add('off');
});

function clearActive() {
  document.querySelectorAll('.ni').forEach(e => e.classList.remove('on'));
  document.querySelectorAll('.card').forEach(e => e.classList.remove('on'));
}

// starfield
(function(){
  const cv = document.getElementById('stars'), cx = cv.getContext('2d');
  let S = [], W, H;
  function resize(){ W = cv.width = innerWidth; H = cv.height = innerHeight; }
  function init(n){ S = []; for(let i=0;i<n;i++) S.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*.8+.15,a:Math.random(),da:(Math.random()-.5)*.003,v:Math.random()*.05+.008}); }
  function draw(){ cx.clearRect(0,0,W,H); S.forEach(s=>{ s.a+=s.da; if(s.a<=0||s.a>=1)s.da*=-1; s.y-=s.v; if(s.y<-2)s.y=H+2; cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fillStyle=`rgba(220,235,210,${s.a*.45})`;cx.fill(); }); requestAnimationFrame(draw); }
  resize(); init(200); draw();
  window.addEventListener('resize', ()=>{ resize(); init(200); });
})();
</script>
</body>
</html>
