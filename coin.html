<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FLIP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Cinzel:wght@400;700;900&display=swap');

    :root {
      --gold-light: #fff7c7;
      --gold-mid: #e6b93f;
      --gold-dark: #8f5f0d;
      --gold-edge: #c58b18;
      --coin-size: clamp(210px, 48vw, 280px);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at center top, rgba(255, 208, 84, 0.16), transparent 38%),
        radial-gradient(circle at center bottom, rgba(255, 255, 255, 0.05), transparent 42%),
        #050505;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    .stage {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 36px 20px;
      color: white;
    }

    .header-icon {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      border: 3px solid #facc15;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 30% 25%, #fff8c7, #f5c542 42%, #8a5b0d 100%);
      box-shadow: 0 0 30px rgba(245, 197, 66, 0.34);
      color: #3b2602;
      font-family: 'Cinzel', serif;
      font-weight: 900;
      font-size: 1.4rem;
    }

    .coin-container {
      perspective: 1600px;
      width: var(--coin-size);
      height: var(--coin-size);
      margin: 0 auto;
      filter: drop-shadow(0 32px 45px rgba(0, 0, 0, 0.75));
    }

    .coin {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      cursor: pointer;
      transform: rotateY(0deg);
      will-change: transform;
    }

    .coin.is-disabled {
      cursor: wait;
    }

    .coin-side {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      backface-visibility: hidden;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #3a2400;
      background:
        radial-gradient(circle at 30% 24%, rgba(255, 255, 255, 0.92) 0 8%, transparent 21%),
        radial-gradient(circle at 48% 44%, #fff4aa 0 10%, #efc14a 34%, #c38717 64%, #734606 100%);
      border: 10px solid var(--gold-edge);
      box-shadow:
        inset 0 0 0 5px rgba(255, 248, 198, 0.72),
        inset 0 0 0 16px rgba(108, 66, 7, 0.32),
        inset 0 22px 45px rgba(255, 255, 255, 0.4),
        inset 0 -34px 50px rgba(54, 31, 0, 0.72),
        0 0 60px rgba(245, 196, 66, 0.42);
    }

    .coin-side::before {
      content: '';
      position: absolute;
      inset: 6%;
      border-radius: 50%;
      pointer-events: none;
      background:
        repeating-radial-gradient(circle at center, rgba(255, 255, 255, 0.13) 0 1px, transparent 1px 6px),
        conic-gradient(from 18deg,
          rgba(255, 255, 255, 0.18),
          rgba(139, 87, 9, 0.16),
          rgba(255, 255, 255, 0.22),
          rgba(93, 53, 0, 0.18),
          rgba(255, 255, 255, 0.18));
      mix-blend-mode: overlay;
      opacity: 0.85;
    }

    .coin-side::after {
      content: '';
      position: absolute;
      inset: 5%;
      border-radius: 50%;
      border: 2px dashed rgba(73, 42, 0, 0.45);
      box-shadow:
        inset 0 0 0 8px rgba(255, 235, 138, 0.2),
        0 0 0 6px rgba(103, 64, 4, 0.14);
      pointer-events: none;
    }

    .tails {
      transform: rotateY(180deg);
    }

    .coin-art {
      position: relative;
      z-index: 3;
      width: 68%;
      height: 68%;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      background:
        radial-gradient(circle at 38% 28%, rgba(255, 252, 210, 0.72), rgba(255, 230, 118, 0.28) 38%, rgba(97, 55, 0, 0.08) 70%),
        rgba(255, 221, 91, 0.16);
      box-shadow:
        inset 0 0 18px rgba(255, 255, 255, 0.24),
        0 10px 22px rgba(56, 31, 0, 0.35);
    }

    .coin-art svg {
      width: 56%;
      height: 56%;
      fill: #4a2a00;
      filter:
        drop-shadow(0 2px 0 rgba(255, 240, 157, 0.55))
        drop-shadow(0 12px 12px rgba(56, 31, 0, 0.42));
    }

    .coin-label {
      margin-top: 10px;
      font-family: 'Cinzel', serif;
      font-size: clamp(0.76rem, 2.2vw, 0.98rem);
      font-weight: 900;
      letter-spacing: 0.24em;
      color: #422700;
      text-shadow: 0 1px 0 rgba(255, 240, 170, 0.75);
    }

    .result {
      min-height: 88px;
      margin-top: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 10vw, 5.4rem);
      line-height: 1;
      letter-spacing: -0.04em;
      color: transparent;
      background-clip: text;
      -webkit-background-clip: text;
      background-image: linear-gradient(to bottom, #fff7c7, #f5c542, #d49a1c);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .hint {
      margin-top: 14px;
      color: rgba(255, 255, 255, 0.54);
      font-size: 0.95rem;
      letter-spacing: 0.08em;
    }

    .result.is-pending {
      opacity: 0.62;
      transform: scale(0.97);
    }

    @media (max-width: 480px) {
      .header-title {
        font-size: 3.4rem;
      }
    }
  </style>
</head>
<body>
  <main class="stage">
    <section class="text-center">
      <div class="flex items-center justify-center gap-4 mb-10">
        <div class="header-icon">F</div>
        <h1 class="header-title text-6xl tracking-[-3px] font-bold" style="font-family: 'Playfair Display', serif;">FLIP</h1>
      </div>

      <div class="coin-container" aria-label="Flip coin button">
        <div id="coin" class="coin" role="button" tabindex="0" aria-pressed="false" aria-label="Flip the coin">
          <div id="heads-side" class="coin-side heads" aria-hidden="false">
            <div class="coin-art">
              <svg viewBox="0 0 64 64" aria-hidden="true">
                <path d="M11 50h42v6H11v-6Zm4.8-5.4L12 19l12.6 10.8L32 9l7.4 20.8L52 19l-3.8 25.6H15.8Zm5.4-6h21.6l1.2-8.2-7.2 6.2L32 23.1l-4.8 13.5-7.2-6.2 1.2 8.2Z" />
              </svg>
              <div class="coin-label">HEADS</div>
            </div>
          </div>

          <div id="tails-side" class="coin-side tails" aria-hidden="true">
            <div class="coin-art">
              <svg viewBox="0 0 64 64" aria-hidden="true">
                <path d="M32 6c3.8 7.6 8.6 11.7 15.8 13.5-4.1 4.9-5.7 9.9-5.2 16.2.5 6.5-3.1 12.5-10.6 18.3-7.5-5.8-11.1-11.8-10.6-18.3.5-6.3-1.1-11.3-5.2-16.2C23.4 17.7 28.2 13.6 32 6Zm0 10.9c-2.5 3.2-5.6 5.5-9.6 7.1 2.3 4.1 3.2 8.2 2.8 12.8-.3 4 1.8 7.9 6.8 12.2 5-4.3 7.1-8.2 6.8-12.2-.4-4.6.5-8.7 2.8-12.8-4-1.6-7.1-3.9-9.6-7.1Zm-6.3 14.7h12.6v5.1H25.7v-5.1Z" />
              </svg>
              <div class="coin-label">TAILS</div>
            </div>
          </div>
        </div>
      </div>

      <div id="result" class="result">TAP THE COIN</div>
      <div class="hint">Click, tap, Space, or Enter</div>
    </section>
  </main>

  <script>
    const coin = document.getElementById('coin');
    const resultEl = document.getElementById('result');

    let isFlipping = false;
    let currentRotation = 0;

    // Web Audio API: no external audio file needed, so this works even when hotlink audio URLs fail.
    let audioContext;

    function getAudioContext() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioContext;
    }

    function playTone({ frequency = 440, duration = 0.12, type = 'sine', volume = 0.25, startOffset = 0 }) {
      const ctx = getAudioContext();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const start = ctx.currentTime + startOffset;
      const end = start + duration;

      osc.type = type;
      osc.frequency.setValueAtTime(frequency, start);
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(volume, start + 0.015);
      gain.gain.exponentialRampToValueAtTime(0.0001, end);

      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(start);
      osc.stop(end + 0.02);
    }

    function playFlipSound() {
      // Fast metallic ticking while the coin starts flipping.
      const ticks = [720, 860, 690, 930, 760, 980, 810];
      ticks.forEach((frequency, index) => {
        playTone({
          frequency,
          duration: 0.045,
          type: 'square',
          volume: 0.055,
          startOffset: index * 0.055
        });
      });
    }

    function playHeadsSound() {
      // Bright upward chime for heads.
      playTone({ frequency: 660, duration: 0.13, type: 'triangle', volume: 0.16, startOffset: 0 });
      playTone({ frequency: 880, duration: 0.18, type: 'triangle', volume: 0.14, startOffset: 0.11 });
      playTone({ frequency: 1320, duration: 0.23, type: 'sine', volume: 0.09, startOffset: 0.24 });
    }

    function playTailsSound() {
      // Deeper descending ring for tails.
      playTone({ frequency: 520, duration: 0.14, type: 'triangle', volume: 0.15, startOffset: 0 });
      playTone({ frequency: 392, duration: 0.19, type: 'triangle', volume: 0.13, startOffset: 0.12 });
      playTone({ frequency: 262, duration: 0.24, type: 'sine', volume: 0.09, startOffset: 0.27 });
    }

    function setResultVisual(result) {
      resultEl.textContent = result;
      resultEl.classList.remove('is-pending');
      resultEl.style.backgroundImage = result === 'HEADS'
        ? 'linear-gradient(to bottom, #fff7c7, #f5c542, #d49a1c)'
        : 'linear-gradient(to bottom, #e0f2fe, #67e8f9, #0891b2)';
    }

    function flipCoin() {
      if (isFlipping) return;

      isFlipping = true;
      coin.classList.add('is-disabled');
      coin.setAttribute('aria-pressed', 'true');
      resultEl.textContent = 'FLIPPING...';
      resultEl.classList.add('is-pending');
      resultEl.style.backgroundImage = 'linear-gradient(to bottom, #fff7c7, #f5c542, #d49a1c)';

      const isHeads = Math.random() < 0.5;
      const result = isHeads ? 'HEADS' : 'TAILS';

      // IMPORTANT:
      // Do not simply add 0 or 180 to the previous angle.
      // If the previous result was TAILS, the previous angle is already 180deg mod 360.
      // Adding 0 would keep it on TAILS even when the text says HEADS.
      // So we first move to the next clean 360deg boundary, then add the target face offset.
      const fullSpins = 7 * 360;
      const baseRotation = Math.ceil(currentRotation / 360) * 360;
      const targetFaceOffset = isHeads ? 0 : 180;
      const targetRotation = baseRotation + fullSpins + targetFaceOffset;

      playFlipSound();

      coin.style.transition = 'transform 2.6s cubic-bezier(0.18, 0.78, 0.18, 1)';
      coin.style.transform = `rotateY(${targetRotation}deg)`;
      currentRotation = targetRotation;

      window.setTimeout(() => {
        setResultVisual(result);
        if (isHeads) {
          playHeadsSound();
        } else {
          playTailsSound();
        }

        isFlipping = false;
        coin.classList.remove('is-disabled');
        coin.setAttribute('aria-pressed', 'false');
      }, 2620);
    }

    coin.addEventListener('click', flipCoin);
    coin.addEventListener('keydown', event => {
      if (event.key === ' ' || event.key === 'Enter') {
        event.preventDefault();
        flipCoin();
      }
    });
  </script>
</body>
</html>
