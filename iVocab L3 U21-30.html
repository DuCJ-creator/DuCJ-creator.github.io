        /* 基礎樣式重置 */
        * {

        }
        
        body {
            font-family: 'Arial', sans-serif;
            background-color: #0a2e38;

            text-align: center;

            padding: 0;

            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            touch-action: manipulation;
        }
        
        .container {
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            width: 95%;
            max-width: 800px;
            margin: 10px;
            border: 3px solid #d4af37;
        }
        
        h1 {
            color: #d4af37;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.7);
            font-size: 1.8rem;
            margin-bottom: 15px;
            background: linear-gradient(to right, #ff8a00, #e52e71, #b24592);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbow 5s linear infinite;
            line-height: 1.3;
        }
        
        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }
        
        .question-container {
            margin: 15px 0;
            padding: 15px;
            background-color: rgba(0, 50, 30, 0.7);
            border-radius: 10px;
            border: 2px solid #ff0000;
            position: relative;
            min-height: 100px;
            transition: opacity 0.3s ease;
        }
        
        .question {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #fff;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
            line-height: 1.3;
        }
        
        .options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
            transition: opacity 0.3s ease;
        }
        
        .option {
            background-color: #f0f8ff;
            border: 2px solid #d4af37;
            border-radius: 50%;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
            color: black;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            width: 100px;
            height: 100px;
            margin: 0 auto;
            touch-action: manipulation;
        }
        
        .option:active {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.7);
            background-color: #e6f7ff;
        }
        
        .option::before {
            content: "";
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            background: linear-gradient(45deg, #ff8a00, #e52e71, #b24592, #f15f79);
            background-size: 400% 400%;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s;
            border-radius: 50%;
            animation: christmasLight 4s linear infinite;
        }
        
        @keyframes christmasLight {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .option:active::before {
            opacity: 0.3;
        }
        
        .correct {
            background-color: rgba(0, 255, 0, 0.3);
            border-color: #00ff00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.7);
        }
        
        .incorrect {
            background-color: rgba(255, 0, 0, 0.3);
            border-color: #ff0000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.7);
        }
        
        .score-container {
            margin: 15px 0;
            font-size: 1.2rem;
            color: #d4af37;
            display: flex;
            justify-content: space-between;
            width: 100%;
        }
        
        .controls {
            margin: 15px 0;
        }
        
        button {
            background-color: #d4af37;
            color: #0a2e38;
            border: none;
            padding: 12px 20px;
            font-size: 1.1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 0 5px;
            font-weight: bold;
            touch-action: manipulation;
            min-width: 140px;
        }
        
        button:active {
            background-color: #ffd700;
            transform: scale(0.98);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.7);
        }
        
        .feedback {
            font-size: 1.2rem;
            margin: 15px 0;
            min-height: 30px;
            color: #d4af37;
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.5);
            transition: opacity 0.3s ease;
        }
        
        .moose {
            position: absolute;
            font-size: 2.5rem;
            animation: jump 1s infinite alternate;
            z-index: 10;
            left: 50%;
            transform: translateX(-50%);
        }
        
        @keyframes jump {
            0% { transform: translate(-50%, 0); }
            100% { transform: translate(-50%, -15px); }
        }
        
        .snowflake {
            position: absolute;
            color: white;
            font-size: 1.2rem;
            animation: fall linear infinite;
            z-index: -1;
        }
        
        @keyframes fall {
            to { transform: translateY(100vh); }
        }
        
        .hidden {
            display: none;
        }
        
        .result-container {
            background-color: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 15px;
            margin-top: 15px;
            border: 3px solid #d4af37;
        }
        
        .result-title {
            color: #d4af37;
            font-size: 1.8rem;
            margin-bottom: 15px;
        }
        
        .result-score {
            font-size: 1.3rem;
            margin-bottom: 15px;
        }
        
        .timer-container {
            width: 100%;
            height: 10px;
            background-color: #333;
            border-radius: 5px;
            margin: 15px 0;
            overflow: hidden;
        }
        
        .timer-bar {
            height: 100%;
            background: linear-gradient(to right, #00ff00, #ff0000);
            width: 100%;
            transition: width 0.1s linear;
        }
        
        .start-container {
            text-align: center;
            padding: 20px;
        }

        /* 新增：遊戲時間選擇樣式 */

            margin-top: 10px;
            margin-bottom: 15px;
            font-size: 0.95rem;
            color: #d4af37;
        }
        .time-select label {
            margin: 0 8px;
            cursor: pointer;
        }
        .time-select input {
            margin-right: 3px;
        }
        
        .start-btn {
            background-color: #e52e71;
            color: white;
            font-size: 1.3rem;
            padding: 14px 28px;
            margin-top: 15px;
        }
        
        .urgent {
            animation: pulse 0.5s infinite alternate;
        }
        
        @keyframes pulse {
            from { opacity: 1; }
            to { opacity: 0.7; }
        }
        
        /* 響應式設計 - 平板 */
        @media (min-width: 768px) {
            .container {
                padding: 25px;

            .score-container {

            }
            
            button {

                padding: 16px 28px;

                width: 80px;
                height: 80px;
                font-size: 0.85rem;
            }

                font-size: 2rem;
            }
        }

        const vocabulary = newVocabulary;

        // 遊戲變數
        let currentQuestionIndex = 0;
        let score = 0;
        let questions = [];
        let timer = null; // 整場遊戲計時器
        let usedInCurrentSession = []; // 本局已使用單字索引

        // 整場遊戲時間（秒）
        let totalGameTime = 180;
        let gameTimeLeft = 180;

        // ⭐ 連擊計分變數：連續答對 / 連續答錯次數
        let correctStreak = 0;
        let wrongStreak = 0;
        
        // DOM 元素
        const questionElement = document.getElementById('question');
        const optionsContainer = document.getElementById('options-container');
        const scoreElement = document.getElementById('score');
        const questionCountElement = document.getElementById('question-count');
        const feedbackElement = document.getElementById('feedback');
        const resultContainer = document.getElementById('result-container');
        const finalScoreElement = document.getElementById('final-score');
        const resultMessageElement = document.getElementById('result-message');
        const timerBar = document.getElementById('timer-bar');
        const mooseContainer = document.getElementById('moose-container');
        const restartButtonEnd = document.getElementById('restart-btn-end');
        const startContainer = document.getElementById('start-container');
        const gameContainer = document.getElementById('game-container');
        const startButton = document.getElementById('start-btn');
        const questionContainer = document.getElementById('question-container');
        
        // 創建音效
        function createSound(frequency, type) {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.type = type;
                oscillator.frequency.value = frequency;
                gainNode.gain.value = 0.1;
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.start();
                
                return {
                    stop: function() {
                        gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.1);
                        setTimeout(function() {
                            oscillator.stop();
                        }, 100);
                    }
                };
            } catch (e) {
                console.log('Web Audio API is not supported in this browser');
                return { stop: function() {} };
            }
        }
        
        // 初始化遊戲
        function initGame() {
            currentQuestionIndex = 0;
            score = 0;
            usedInCurrentSession = []; 
            correctStreak = 0;
            wrongStreak = 0;
            
            // 依選擇的遊戲時間設定
            const selectedTime = document.querySelector('input[name="game-time"]:checked');
            totalGameTime = selectedTime ? parseInt(selectedTime.value, 10) : 180;
            gameTimeLeft = totalGameTime;
            
            // 清除之前的計時器
            if (timer) {
                clearInterval(timer);
                timer = null;
            }
            
            // 重置遊戲狀態
            questions = [];
            
            // 更新UI
            updateScore();
            timerBar.style.width = '100%';
            timerBar.style.backgroundColor = '#00ff00';
            timerBar.classList.remove('urgent');
            
            // 顯示遊戲元素
            questionContainer.classList.remove('hidden');
            optionsContainer.classList.remove('hidden');
            feedbackElement.classList.remove('hidden');
            resultContainer.classList.add('hidden');
            
            // 生成第一個問題
            generateQuestion();
            
            // 開始整場計時
            startGameTimer();
            
            // 開始雪花動畫
            createSnowflakes();
        }

        // 整場遊戲計時
        function startGameTimer() {
            if (timer) {
                clearInterval(timer);
                timer = null;
            }
            timer = setInterval(() => {
                gameTimeLeft--;
                if (gameTimeLeft < 0) gameTimeLeft = 0;
                const percent = (gameTimeLeft / totalGameTime) * 100;
                timerBar.style.width = percent + '%';

                // 顏色與緊急效果
                if (gameTimeLeft <= totalGameTime * 0.2) {
                    timerBar.style.backgroundColor = '#ff0000';
                    timerBar.classList.add('urgent');
                } else if (gameTimeLeft <= totalGameTime * 0.5) {
                    timerBar.style.backgroundColor = '#ffff00';
                    timerBar.classList.remove('urgent');
                } else {
                    timerBar.style.backgroundColor = '#00ff00';
                    timerBar.classList.remove('urgent');
                }

                if (gameTimeLeft <= 0) {
                    clearInterval(timer);
                    timer = null;
                    endGame(); // 時間到結束遊戲
                }
            }, 1000);
        }
        
        // 生成新問題
        function generateQuestion() {
            // 如果本局已用完所有單字，清空記錄以開始新一輪
            if (usedInCurrentSession.length >= vocabulary.length) {
                usedInCurrentSession = [];
            }
            
            // 找出尚未使用的索引
            const availableIndices = vocabulary
                .map((_, i) => i)
                .filter(i => !usedInCurrentSession.includes(i));
            
            if (availableIndices.length === 0) {
                usedInCurrentSession = [];
            }
            
            const randomIndex = availableIndices[Math.floor(Math.random() * availableIndices.length)];
            usedInCurrentSession.push(randomIndex);
            const selectedWord = vocabulary[randomIndex];
            
            const question = {
                word: selectedWord.word,
                type: selectedWord.type,
                correctMeaning: selectedWord.meaning,
                options: generateOptions(selectedWord.meaning)
            };
            
            questions[currentQuestionIndex] = question;
            showQuestion();
        }
        
        // 生成選項 (包含正確答案和3個隨機錯誤答案)
        function generateOptions(correctMeaning) {
            const options = [correctMeaning];
            
            const otherMeanings = vocabulary
                .map(item => item.meaning)
                .filter(meaning => meaning !== correctMeaning);
            
            while (options.length < 4 && otherMeanings.length > 0) {
                const randomIndex = Math.floor(Math.random() * otherMeanings.length);
                const randomMeaning = otherMeanings[randomIndex];
                if (!options.includes(randomMeaning)) {
                    options.push(randomMeaning);
                    otherMeanings.splice(randomIndex, 1);
                }
            }
            
            return shuffleArray(options);
        }
        
        // 打亂陣列順序
        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }
        
        // 顯示當前問題
        function showQuestion() {
            const currentQuestion = questions[currentQuestionIndex];
            
            questionCountElement.textContent = currentQuestionIndex + 1;
            questionElement.textContent = `${currentQuestion.word} (${currentQuestion.type})`;
            
            optionsContainer.innerHTML = '';
            
            currentQuestion.options.forEach((option, index) => {
                const optionElement = document.createElement('div');
                optionElement.classList.add('option');
                optionElement.textContent = option;
                optionElement.addEventListener('click', () => selectOption(option, currentQuestion.correctMeaning));
                
                const colors = ['#ffcce6', '#ccf2ff', '#e6ffcc', '#ffebcc'];
                optionElement.style.backgroundColor = colors[index];
                
                optionsContainer.appendChild(optionElement);
            });
            
            feedbackElement.textContent = '';
            feedbackElement.style.color = '#d4af37';
            
            mooseContainer.innerHTML = '';
            const moose = document.createElement('div');
            moose.classList.add('moose');
            moose.textContent = '🫎';
            mooseContainer.appendChild(moose);
        }
        
        // 選擇選項
        function selectOption(selectedOption, correctAnswer) {
            if (gameTimeLeft <= 0) return;
            
            // 禁用所有選項
            const options = document.querySelectorAll('.option');
            options.forEach(option => {
                option.style.pointerEvents = 'none';
                if (option.textContent === correctAnswer) {
                    option.classList.add('correct');
                } else if (option.textContent === selectedOption && selectedOption !== correctAnswer) {
                    option.classList.add('incorrect');
                }
            });
            
            if (selectedOption === correctAnswer) {
                // ⭐ 正確：連續答對次數+1，錯誤連擊歸 0
                correctStreak++;
                wrongStreak = 0;
                const bonus = 5 * correctStreak; // 5, 10, 15, 20...
                score += bonus;

                feedbackElement.textContent = `正確! +${bonus} 分 🎄`;
                feedbackElement.style.color = '#00ff00';
                
                const correctSound = createSound(600, 'sine');
                setTimeout(() => {
                    if (correctSound) correctSound.stop();
                }, 200);
                
                updateScore();
                
                setTimeout(() => {
                    currentQuestionIndex++;
                    generateQuestion();
                }, 500);
            } else {
                // ⭐ 錯誤：連續答錯次數+1，正確連擊歸 0
                wrongStreak++;
                correctStreak = 0;
                const penalty = 5 * wrongStreak; // 5, 10, 15, 20...
                score -= penalty;
                if (score < 0) score = 0; // 不讓分數變負
                
                feedbackElement.textContent = `錯誤! -${penalty} 分，正確答案是: ${correctAnswer}`;
                feedbackElement.style.color = '#ff0000';
                
                const errorSound = createSound(400, 'sawtooth');
                setTimeout(() => {
                    if (errorSound) errorSound.stop();
                }, 300);
                
                updateScore();
                
                // 分數歸 0 就結束，否則繼續下一題
                if (score <= 0) {
                    setTimeout(() => {
                        endGame();
                    }, 800);
                } else {
                    setTimeout(() => {
                        currentQuestionIndex++;
                        generateQuestion();
                    }, 800);
                }
            }
        }
        
        // 更新分數顯示
        function updateScore() {
            scoreElement.textContent = score;
        }
        
        // 結束遊戲
        function endGame() {
            // 停止整場計時
            if (timer) {
                clearInterval(timer);
                timer = null;
            }
            
            finalScoreElement.textContent = score;
            
            if (score >= 20) {
                resultMessageElement.textContent = '太棒了! 你是英文單字大師! 🎅';
            } else if (score >= 10) {
                resultMessageElement.textContent = '做得不錯! 繼續加油! ⛄';
            } else if (score >= 5) {
                resultMessageElement.textContent = '還可以，再多練習會更好! 🎄';
            } else {
                resultMessageElement.textContent = '繼續努力，你會越來越進步! 🦌';
            }
            
            resultContainer.classList.remove('hidden');
            questionContainer.classList.add('hidden');
            optionsContainer.classList.add('hidden');
            feedbackElement.classList.add('hidden');
             const resultPayload = {
      type: "LUNAR_MISSION_RESULT",
      mission: "Mission 5: iVocab Words",
      score: score,
      correct: 0,
      wrong: 0
    };
    if (window.parent && window.parent !== window) {
      window.parent.postMessage(resultPayload, "*");
    }
    if (window.opener && !window.opener.closed) {
      window.opener.postMessage(resultPayload, "*");
    }
        }
        
        // 創建雪花效果
        function createSnowflakes() {
            const oldSnowflakes = document.querySelectorAll('.snowflake');
            oldSnowflakes.forEach(snowflake => snowflake.remove());
            
            for (let i = 0; i < 50; i++) {
                const snowflake = document.createElement('div');
                snowflake.classList.add('snowflake');
                snowflake.innerHTML = '❄';
                
                snowflake.style.left = `${Math.random() * 100}%`;
                snowflake.style.fontSize = `${Math.random() * 10 + 10}px`;
                snowflake.style.opacity = Math.random();
                snowflake.style.animationDuration = `${Math.random() * 5 + 5}s`;
                snowflake.style.animationDelay = `${Math.random() * 5}s`;
                
                document.body.appendChild(snowflake);
            }
        }
        
        // 事件監聽器
        function setupEventListeners() {
            restartButtonEnd.addEventListener('click', () => {
                startContainer.classList.add('hidden');
                gameContainer.classList.remove('hidden');
                initGame();
            });
            
            startButton.addEventListener('click', () => {
                startContainer.classList.add('hidden');
                gameContainer.classList.remove('hidden');
                initGame();
            });
        }
        
        // 初始化遊戲
        function initializeGame() {
            gameContainer.classList.add('hidden');
            startContainer.classList.remove('hidden');
            createSnowflakes();
            setupEventListeners();
        }
        
        // 啟動遊戲
        initializeGame();
    </script>
