<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>Cosmic Vocab Challenge</title>

  <style>
    :root {
      --bg-deep: #0a1026;
      --bg-mid: #101936;
      --bg-soft: #16244a;
      --nebula-1: #7c3aed;
      --nebula-2: #06b6d4;
      --nebula-3: #ec4899;
      --text-main: #f8fbff;
      --text-soft: #bfd3ff;
      --card: rgba(15, 23, 52, 0.72);
      --card-border: rgba(255, 255, 255, 0.14);
      --success: #22c55e;
      --danger: #ef4444;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system,
        BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 20% 20%, rgba(124, 58, 237, 0.28), transparent 26rem),
        radial-gradient(circle at 80% 20%, rgba(6, 182, 212, 0.22), transparent 24rem),
        radial-gradient(circle at 50% 80%, rgba(236, 72, 153, 0.16), transparent 22rem),
        linear-gradient(180deg, #09101f 0%, #0d1530 38%, #111b3b 72%, #0c1430 100%);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background-image:
        radial-gradient(2px 2px at 10% 20%, rgba(255,255,255,0.85) 50%, transparent 51%),
        radial-gradient(1.5px 1.5px at 25% 80%, rgba(255,255,255,0.75) 50%, transparent 51%),
        radial-gradient(2px 2px at 40% 35%, rgba(255,255,255,0.8) 50%, transparent 51%),
        radial-gradient(1.5px 1.5px at 60% 15%, rgba(255,255,255,0.85) 50%, transparent 51%),
        radial-gradient(2px 2px at 75% 65%, rgba(255,255,255,0.78) 50%, transparent 51%),
        radial-gradient(1.5px 1.5px at 90% 25%, rgba(255,255,255,0.7) 50%, transparent 51%),
        radial-gradient(2px 2px at 85% 85%, rgba(255,255,255,0.75) 50%, transparent 51%),
        radial-gradient(1.5px 1.5px at 15% 60%, rgba(255,255,255,0.7) 50%, transparent 51%);
      opacity: 0.95;
    }

    body::after {
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05), transparent 50%),
        radial-gradient(circle at 30% 30%, rgba(124, 58, 237, 0.12), transparent 40%),
        radial-gradient(circle at 70% 70%, rgba(6, 182, 212, 0.08), transparent 35%);
      filter: blur(10px);
      opacity: 0.7;
    }

    button {
      font: inherit;
      border: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    button:disabled {
      cursor: default;
    }

    .app {
      position: relative;
      z-index: 1;
      width: min(1120px, 100%);
      min-height: 100dvh;
      margin: 0 auto;
      padding: clamp(14px, 4vw, 34px);
      display: grid;
      place-items: center;
    }

    .screen {
      width: 100%;
      display: none;
      animation: rise 0.35s ease;
    }

    .screen.active {
      display: block;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .instant-start {
      min-height: min(720px, calc(100dvh - 32px));
      display: grid;
      place-items: center;
    }

    .setup-card,
    .game-card,
    .result-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .launch-card {
      width: min(560px, 100%);
      padding: clamp(18px, 4vw, 28px);
      text-align: center;
    }

    .mascot {
      width: min(118px, 26vw);
      aspect-ratio: 1;
      margin: 0 auto 10px;
      border-radius: 38% 62% 55% 45% / 48% 42% 58% 52%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 35% 30%, rgba(255,255,255,0.24), transparent 18%),
        linear-gradient(135deg, #7c3aed, #06b6d4 55%, #f472b6);
      box-shadow:
        0 0 36px rgba(124, 58, 237, 0.35),
        0 16px 46px rgba(6, 182, 212, 0.22);
      position: relative;
    }

    .mascot::before,
    .mascot::after {
      content: "";
      position: absolute;
      top: 34%;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #0f172a;
      box-shadow: 0 0 0 7px rgba(255,255,255,0.88);
    }

    .mascot::before {
      left: 34%;
    }

    .mascot::after {
      right: 34%;
    }

    .mascot span {
      transform: translateY(22px);
      font-size: 1.35rem;
    }

    .launch-title {
      margin: 4px 0 14px;
      font-size: clamp(2rem, 5.4vw, 3.35rem);
      line-height: 0.96;
      letter-spacing: -0.055em;
      font-weight: 1000;
    }

    .launch-title .top-line,
    .launch-title .bottom-line {
      display: block;
    }

    .launch-title .bottom-line {
      color: #eef4ff;
    }

    .gradient-text {
      background: linear-gradient(100deg, #c084fc, #67e8f9, #f9a8d4);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .level-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      max-width: 420px;
      margin: 0 auto 16px;
    }

    .level-btn,
    .answer-btn,
    .main-btn,
    .ghost-btn {
      min-height: 48px;
      border-radius: var(--radius-md);
      font-weight: 900;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .level-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: #dbeafe;
    }

    .level-btn.active {
      background: linear-gradient(135deg, #8b5cf6, #06b6d4);
      color: #fff;
      box-shadow: 0 10px 24px rgba(6,182,212,0.2);
    }

    .main-btn {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      min-height: 54px;
      color: #fff;
      background: linear-gradient(135deg, #8b5cf6, #06b6d4);
      letter-spacing: 0.04em;
      box-shadow: 0 16px 34px rgba(6,182,212,0.2);
    }

    .main-btn:hover,
    .level-btn:hover,
    .answer-btn:hover,
    .ghost-btn:hover {
      transform: translateY(-2px);
    }

    .loading {
      margin-top: 12px;
      color: var(--text-soft);
      font-size: 0.88rem;
      opacity: 0.78;
      line-height: 1.5;
      text-align: center;
    }

    .game-card,
    .result-card {
      width: min(840px, 100%);
      margin: 0 auto;
      padding: clamp(18px, 4vw, 34px);
    }

    .topbar,
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .topbar {
      margin-bottom: 18px;
    }

    .stat {
      padding: 14px;
      border-radius: var(--radius-lg);
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.08);
      text-align: center;
    }

    .stat-label {
      color: #bfd3ff;
      font-size: 0.74rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .stat-value {
      display: block;
      margin-top: 4px;
      font-size: clamp(1.5rem, 5vw, 2.3rem);
      font-weight: 1000;
      letter-spacing: -0.04em;
      color: #ffffff;
    }

    .timer-ring {
      width: min(200px, 46vw);
      aspect-ratio: 1;
      margin: 8px auto 20px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        conic-gradient(#67e8f9 calc(var(--progress, 1) * 360deg), rgba(255,255,255,0.12) 0deg);
      box-shadow:
        0 0 0 10px rgba(255,255,255,0.04),
        0 18px 50px rgba(6,182,212,0.16);
    }

    .timer-core {
      width: 72%;
      aspect-ratio: 1;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,0.08), transparent 40%),
        rgba(7, 12, 30, 0.95);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .timer-number {
      font-size: clamp(3rem, 12vw, 5.2rem);
      font-weight: 1000;
      letter-spacing: -0.08em;
      color: #e0f2fe;
      text-shadow: 0 0 12px rgba(103,232,249,0.28);
    }

    .question-card {
      text-align: center;
      padding: clamp(18px, 4vw, 30px);
      border-radius: var(--radius-xl);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .prompt {
      color: #c7d2fe;
      font-weight: 800;
      margin: 0 0 8px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.78rem;
    }

    .word {
      margin: 0;
      font-size: clamp(2.4rem, 10vw, 5rem);
      line-height: 1;
      letter-spacing: -0.06em;
      color: white;
    }

    .part {
      margin-top: 10px;
      color: #93c5fd;
      font-weight: 900;
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .answer-btn {
      padding: 16px;
      min-height: 68px;
      text-align: left;
      color: #f8fbff;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 8px 18px rgba(0,0,0,0.12);
    }

    .answer-btn.correct {
      background: linear-gradient(135deg, #16a34a, #22c55e);
      color: #fff;
    }

    .answer-btn.wrong {
      background: linear-gradient(135deg, #dc2626, #f87171);
      color: #fff;
    }

    .result-card {
      text-align: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: #dbeafe;
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .result-title {
      margin: 8px 0;
      font-size: clamp(2.4rem, 10vw, 5.2rem);
      line-height: 0.92;
      letter-spacing: -0.08em;
    }

    .score-big {
      margin: 18px auto;
      width: min(220px, 64vw);
      aspect-ratio: 1;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #8b5cf6, #06b6d4);
      color: white;
      font-size: clamp(3rem, 13vw, 5.8rem);
      font-weight: 1000;
      box-shadow: 0 24px 56px rgba(6,182,212,0.24);
    }

    .actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
      padding-bottom: var(--safe-bottom);
    }

    .ghost-btn {
      padding: 14px 18px;
      background: rgba(255,255,255,0.08);
      color: #e2e8f0;
      border: 1px solid rgba(255,255,255,0.1);
    }

    @media (min-width: 700px) {
      .level-grid {
        grid-template-columns: repeat(7, minmax(0, 1fr));
        max-width: 100%;
      }

      .main-btn {
        max-width: 100%;
      }
    }

    @media (max-width: 640px) {
      .app {
        padding: 14px;
        place-items: start center;
      }

      .instant-start {
        min-height: calc(100dvh - 28px);
      }

      .launch-card {
        padding: 16px;
      }

      .launch-title {
        font-size: clamp(1.8rem, 8vw, 2.5rem);
        margin-bottom: 12px;
      }

      .mascot {
        width: min(96px, 24vw);
        margin-bottom: 8px;
      }

      .answers {
        grid-template-columns: 1fr;
      }

      .answer-btn {
        text-align: center;
        min-height: 58px;
      }
    }

    @media (max-width: 420px) {
      .topbar,
      .summary-grid {
        grid-template-columns: 1fr 1fr 1fr;
        gap: 8px;
      }

      .stat {
        padding: 10px 6px;
      }

      .stat-label {
        font-size: 0.64rem;
      }

      .stat-value {
        font-size: 1.35rem;
      }

      .level-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (max-width: 340px) {
      .level-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .topbar,
      .summary-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <section id="menu" class="screen active">
      <div class="instant-start">
        <div class="setup-card launch-card">
          <div class="mascot" aria-hidden="true">
            <span>👽</span>
          </div>

          <h1 class="launch-title">
            <span class="gradient-text top-line">Cosmic Vocab</span>
            <span class="bottom-line">Challenge</span>
          </h1>

          <div
            id="levelGrid"
            class="level-grid"
            role="group"
            aria-label="Select vocabulary level"
          ></div>

          <button id="startBtn" class="main-btn">Start Game 🚀</button>

          <div id="loading" class="loading">Vocabulary ready.</div>
        </div>
      </div>
    </section>

    <section id="game" class="screen">
      <div class="game-card">
        <div class="topbar">
          <div class="stat">
            <span class="stat-label">Score</span>
            <span id="score" class="stat-value">0</span>
          </div>

          <div class="stat">
            <span class="stat-label">Combo</span>
            <span id="combo" class="stat-value">×0</span>
          </div>

          <div class="stat">
            <span class="stat-label">Seen</span>
            <span id="seen" class="stat-value">0</span>
          </div>
        </div>

        <div id="timerRing" class="timer-ring" style="--progress: 1;">
          <div class="timer-core">
            <span id="timer" class="timer-number">8</span>
          </div>
        </div>

        <div class="question-card">
          <p class="prompt">Choose the correct meaning</p>
          <h2 id="word" class="word">vocabulary</h2>
          <div id="part" class="part">noun</div>
          <div id="answers" class="answers"></div>
        </div>
      </div>
    </section>

    <section id="result" class="screen">
      <div class="result-card">
        <span class="eyebrow">✨ Mission Result</span>

        <h2 class="result-title">
          <span class="gradient-text">Game Over</span>
        </h2>

        <div id="finalScore" class="score-big">0</div>

        <div class="summary-grid">
          <div class="stat">
            <span class="stat-label">Best Combo</span>
            <span id="bestCombo" class="stat-value">0</span>
          </div>

          <div class="stat">
            <span class="stat-label">Correct</span>
            <span id="correctCount" class="stat-value">0</span>
          </div>

          <div class="stat">
            <span class="stat-label">Words Seen</span>
            <span id="wordsSeen" class="stat-value">0</span>
          </div>
        </div>

        <div class="actions">
          <button
            id="retryBtn"
            class="main-btn"
            style="width:auto; min-width:190px;"
          >
            Play Again
          </button>

          <button id="menuBtn" class="ghost-btn">
            Back to Menu
          </button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const ROUND_SECONDS = 8;

    const fallbackWords = [
      { level: "L1", word: "brave", part: "adj.", meaning: "勇敢的" },
      { level: "L1", word: "quiet", part: "adj.", meaning: "安靜的" },
      { level: "L1", word: "borrow", part: "v.", meaning: "借入" },
      { level: "L2", word: "journey", part: "n.", meaning: "旅程" },
      { level: "L2", word: "protect", part: "v.", meaning: "保護" },
      { level: "L2", word: "valuable", part: "adj.", meaning: "有價值的" },
      { level: "L3", word: "ancient", part: "adj.", meaning: "古代的" },
      { level: "L3", word: "discover", part: "v.", meaning: "發現" },
      { level: "L3", word: "energy", part: "n.", meaning: "能量" },
      { level: "L4", word: "confident", part: "adj.", meaning: "有自信的" },
      { level: "L4", word: "solution", part: "n.", meaning: "解決方法" },
      { level: "L4", word: "reduce", part: "v.", meaning: "減少" },
      { level: "L5", word: "evidence", part: "n.", meaning: "證據" },
      { level: "L5", word: "significant", part: "adj.", meaning: "重要的；顯著的" },
      { level: "L5", word: "persuade", part: "v.", meaning: "說服" },
      { level: "L6", word: "phenomenon", part: "n.", meaning: "現象" },
      { level: "L6", word: "approximate", part: "adj.", meaning: "大約的" },
      { level: "L6", word: "sustainable", part: "adj.", meaning: "永續的" }
    ];

    let vocabulary = [...fallbackWords];
    let selectedLevel = "All";
    let currentQuestion = null;
    let wordQueue = [];
    let activeQueueKey = "";

    let score = 0;
    let combo = 0;
    let bestCombo = 0;
    let correct = 0;
    let seen = 0;

    let timerId = null;
    let deadline = 0;
    let acceptingAnswers = false;

    const $ = (id) => document.getElementById(id);

    const screens = {
      menu: $("menu"),
      game: $("game"),
      result: $("result")
    };

    const levels = ["L1", "L2", "L3", "L4", "L5", "L6", "All"];
    const levelGrid = $("levelGrid");

    levels.forEach(level => {
      const btn = document.createElement("button");
      btn.className = "level-btn" + (level === selectedLevel ? " active" : "");
      btn.type = "button";
      btn.textContent = level;

      btn.addEventListener("click", () => {
        selectedLevel = level;
        wordQueue = [];
        activeQueueKey = "";

        [...levelGrid.children].forEach(child => {
          child.classList.remove("active");
        });

        btn.classList.add("active");
      });

      levelGrid.appendChild(btn);
    });

    function showScreen(name) {
      Object.values(screens).forEach(screen => {
        screen.classList.remove("active");
      });

      screens[name].classList.add("active");
    }

    function shuffle(array) {
      const copied = [...array];

      for (let i = copied.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copied[i], copied[j]] = [copied[j], copied[i]];
      }

      return copied;
    }

    function getPool() {
      const pool = selectedLevel === "All"
        ? vocabulary
        : vocabulary.filter(item => item.level === selectedLevel);

      return pool.length >= 4 ? pool : vocabulary;
    }

    function getQueueKey(pool) {
      return `${selectedLevel}:${pool.length}:${vocabulary.length}`;
    }

    function refillWordQueue(pool) {
      wordQueue = shuffle(pool);
      activeQueueKey = getQueueKey(pool);
    }

    function getNextWord(pool) {
      const queueKey = getQueueKey(pool);

      if (!wordQueue.length || activeQueueKey !== queueKey) {
        refillWordQueue(pool);
      }

      return wordQueue.pop();
    }

    function makeQuestion() {
      const pool = getPool();
      const answer = getNextWord(pool);

      const distractors = shuffle(
        vocabulary.filter(item => item.meaning !== answer.meaning)
      ).slice(0, 3);

      return {
        ...answer,
        options: shuffle([answer, ...distractors].map(item => item.meaning))
      };
    }

    function updateStats() {
      $("score").textContent = score;
      $("combo").textContent = `×${combo}`;
      $("seen").textContent = seen;
    }

    function startGame() {
      wordQueue = [];
      activeQueueKey = "";

      score = 0;
      combo = 0;
      bestCombo = 0;
      correct = 0;
      seen = 0;

      updateStats();
      showScreen("game");
      nextQuestion();
    }

    function nextQuestion() {
      clearInterval(timerId);

      acceptingAnswers = true;
      currentQuestion = makeQuestion();
      seen += 1;

      $("word").textContent = currentQuestion.word;
      $("part").textContent = `${currentQuestion.part} · ${currentQuestion.level}`;
      $("answers").innerHTML = "";

      currentQuestion.options.forEach(option => {
        const btn = document.createElement("button");
        btn.className = "answer-btn";
        btn.type = "button";
        btn.textContent = option;

        btn.addEventListener("click", () => {
          chooseAnswer(btn, option);
        });

        $("answers").appendChild(btn);
      });

      updateStats();
      startTimer();
    }

    function startTimer() {
      deadline = performance.now() + ROUND_SECONDS * 1000;
      tickTimer();
      timerId = setInterval(tickTimer, 80);
    }

    function tickTimer() {
      const remainingMs = Math.max(0, deadline - performance.now());
      const remaining = Math.ceil(remainingMs / 1000);
      const progress = remainingMs / (ROUND_SECONDS * 1000);

      $("timer").textContent = remaining;
      $("timerRing").style.setProperty("--progress", progress);

      if (remainingMs <= 0) {
        clearInterval(timerId);
        endGame();
      }
    }

    function chooseAnswer(button, option) {
      if (!acceptingAnswers) return;

      acceptingAnswers = false;
      clearInterval(timerId);

      const isCorrect = option === currentQuestion.meaning;
      const allButtons = [...$("answers").children];

      allButtons.forEach(btn => {
        if (btn.textContent === currentQuestion.meaning) {
          btn.classList.add("correct");
        } else if (btn === button) {
          btn.classList.add("wrong");
        }

        btn.disabled = true;
      });

      if (!isCorrect) {
        setTimeout(endGame, 520);
        return;
      }

      combo += 1;
      correct += 1;
      bestCombo = Math.max(bestCombo, combo);
      score += 100 + combo * 25;

      updateStats();
      setTimeout(nextQuestion, 560);
    }

    function endGame() {
      clearInterval(timerId);

      acceptingAnswers = false;

      $("finalScore").textContent = score;
      $("bestCombo").textContent = bestCombo;
      $("correctCount").textContent = correct;
      $("wordsSeen").textContent = seen;

      showScreen("result");
    }

    async function loadVocabulary() {
      try {
        const response = await fetch("vocab.json", { cache: "no-store" });

        if (!response.ok) {
          throw new Error("No external vocabulary file");
        }

        const data = await response.json();

        const normalized = data
          .map(item => ({
            level: item.level || item.Level || "L1",
            word: item.word || item.Word || item.vocab || item.Vocab,
            part: item.part || item.pos || item.Part || "",
            meaning: item.meaning || item.chinese || item.definition || item.Meaning
          }))
          .filter(item => item.word && item.meaning);

        if (normalized.length >= 4) {
          vocabulary = normalized;
          $("loading").textContent = `${normalized.length} vocabulary items loaded.`;
        }
      } catch (error) {
        $("loading").textContent = "Built-in vocabulary loaded.";
      }
    }

    $("startBtn").addEventListener("click", startGame);
    $("retryBtn").addEventListener("click", startGame);
    $("menuBtn").addEventListener("click", () => showScreen("menu"));

    loadVocabulary();
  </script>
</body>
</html>
