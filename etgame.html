<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Vocab Challenge · Beat the ET</title>
  <style>
    :root {
      --bg-1: #fff7ed;
      --bg-2: #ecfeff;
      --bg-3: #eef2ff;
      --ink: #172033;
      --muted: #64748b;
      --card: rgba(255, 255, 255, 0.82);
      --card-solid: #ffffff;
      --line: rgba(15, 23, 42, 0.1);
      --primary: #7c3aed;
      --primary-dark: #5b21b6;
      --secondary: #06b6d4;
      --success: #16a34a;
      --danger: #ef4444;
      --warning: #f59e0b;
      --shadow: 0 24px 80px rgba(79, 70, 229, 0.16);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(252, 211, 77, 0.45), transparent 34rem),
        radial-gradient(circle at top right, rgba(34, 211, 238, 0.45), transparent 30rem),
        linear-gradient(135deg, var(--bg-1), var(--bg-2) 48%, var(--bg-3));
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 999px;
      pointer-events: none;
      z-index: 0;
      filter: blur(2px);
      opacity: 0.5;
    }

    body::before {
      width: 18rem;
      height: 18rem;
      right: -5rem;
      bottom: 10%;
      background: rgba(124, 58, 237, 0.16);
    }

    body::after {
      width: 14rem;
      height: 14rem;
      left: -4rem;
      bottom: -3rem;
      background: rgba(6, 182, 212, 0.18);
    }

    button, select {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      position: relative;
      z-index: 1;
      width: min(1120px, 100%);
      min-height: 100dvh;
      margin: 0 auto;
      padding: clamp(16px, 4vw, 42px);
      display: grid;
      place-items: center;
    }

    .screen {
      width: 100%;
      display: none;
      animation: rise 420ms ease both;
    }

    .screen.active { display: block; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(10px) scale(0.99); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .hero {
      min-height: min(760px, calc(100dvh - 32px));
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(280px, 0.95fr);
      gap: clamp(18px, 4vw, 38px);
      align-items: center;
    }

    .instant-start {
      min-height: min(720px, calc(100dvh - 32px));
      display: grid;
      place-items: center;
    }

    .launch-card {
      width: min(620px, 100%);
      text-align: center;
    }

    .hero-copy,
    .setup-card,
    .game-card,
    .result-card {
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.72);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      border-radius: var(--radius-xl);
    }

    .hero-copy {
      padding: clamp(24px, 5vw, 52px);
      overflow: hidden;
      position: relative;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(124, 58, 237, 0.1);
      color: var(--primary-dark);
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 18px 0 24px;
      font-size: clamp(2.8rem, 9vw, 6.6rem);
      line-height: 0.9;
      letter-spacing: -0.08em;
    }

    .gradient-text {
      background: linear-gradient(110deg, var(--primary), var(--secondary), var(--warning));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .subtitle {
      max-width: 56ch;
      color: var(--muted);
      font-size: clamp(1rem, 2.4vw, 1.25rem);
      line-height: 1.65;
      margin: 0;
    }

    .vibe-row {
      margin-top: 26px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .pill {
      padding: 10px 13px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid var(--line);
      color: #334155;
      font-weight: 700;
      font-size: 0.9rem;
    }

    .setup-card {
      padding: clamp(22px, 4vw, 36px);
    }

    .mascot {
      width: min(220px, 60vw);
      aspect-ratio: 1;
      margin: 0 auto 20px;
      border-radius: 38% 62% 55% 45% / 48% 42% 58% 52%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 35% 32%, #ffffff 0 8%, transparent 9%),
        radial-gradient(circle at 63% 33%, #ffffff 0 8%, transparent 9%),
        linear-gradient(140deg, #a78bfa, #22d3ee 55%, #fde68a);
      box-shadow: 0 20px 50px rgba(124, 58, 237, 0.28);
      position: relative;
      isolation: isolate;
    }

    .mascot::before,
    .mascot::after {
      content: "";
      position: absolute;
      top: 32%;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: #172033;
      z-index: 2;
    }

    .mascot::before { left: 36%; }
    .mascot::after { right: 36%; }

    .mascot span {
      transform: translateY(34px);
      font-size: 2rem;
    }

    .field-label {
      display: block;
      margin-bottom: 10px;
      color: #475569;
      font-weight: 800;
      font-size: 0.94rem;
    }

    .level-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }

    .level-btn,
    .answer-btn,
    .main-btn,
    .ghost-btn {
      min-height: 48px;
      border-radius: var(--radius-md);
      font-weight: 900;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .level-btn {
      background: rgba(255, 255, 255, 0.75);
      color: #475569;
      border: 1px solid var(--line);
    }

    .level-btn.active {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff;
      box-shadow: 0 12px 26px rgba(124, 58, 237, 0.24);
    }

    .main-btn {
      width: 100%;
      min-height: 58px;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      box-shadow: 0 18px 36px rgba(124, 58, 237, 0.28);
      letter-spacing: 0.04em;
    }

    .main-btn:hover,
    .level-btn:hover,
    .answer-btn:hover,
    .ghost-btn:hover {
      transform: translateY(-2px);
    }

    .helper {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.6;
      text-align: center;
      margin: 16px 0 0;
    }

    .launch-card .loading {
      margin-top: 14px;
      opacity: 0.75;
    }

    .game-card,
    .result-card {
      width: min(820px, 100%);
      margin: 0 auto;
      padding: clamp(18px, 4vw, 34px);
    }

    .topbar {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }

    .stat {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.72);
      text-align: center;
    }

    .stat-label {
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .stat-value {
      display: block;
      margin-top: 4px;
      font-size: clamp(1.55rem, 5vw, 2.4rem);
      font-weight: 1000;
      letter-spacing: -0.04em;
    }

    .timer-ring {
      width: min(210px, 48vw);
      aspect-ratio: 1;
      margin: 10px auto 18px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: conic-gradient(var(--primary) calc(var(--progress, 1) * 360deg), rgba(15, 23, 42, 0.08) 0deg);
      box-shadow: inset 0 0 0 12px rgba(255, 255, 255, 0.72), 0 24px 56px rgba(6, 182, 212, 0.18);
    }

    .timer-core {
      width: 72%;
      aspect-ratio: 1;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #fff;
      box-shadow: inset 0 0 0 1px var(--line);
    }

    .timer-number {
      font-size: clamp(3rem, 12vw, 5.6rem);
      font-weight: 1000;
      letter-spacing: -0.08em;
      color: var(--primary-dark);
    }

    .question-card {
      text-align: center;
      padding: clamp(18px, 4vw, 30px);
      border-radius: var(--radius-xl);
      background: rgba(255, 255, 255, 0.74);
      border: 1px solid var(--line);
    }

    .prompt {
      color: var(--muted);
      font-weight: 800;
      margin: 0 0 8px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.78rem;
    }

    .word {
      margin: 0;
      font-size: clamp(2.4rem, 10vw, 5rem);
      line-height: 1;
      letter-spacing: -0.06em;
      color: #111827;
    }

    .part {
      margin-top: 10px;
      color: var(--primary-dark);
      font-weight: 900;
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .answer-btn {
      padding: 16px;
      min-height: 68px;
      background: var(--card-solid);
      border: 1px solid var(--line);
      color: #1f2937;
      text-align: left;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
    }

    .answer-btn.correct {
      color: #fff;
      background: linear-gradient(135deg, var(--success), #22c55e);
    }

    .answer-btn.wrong {
      color: #fff;
      background: linear-gradient(135deg, var(--danger), #fb7185);
    }

    .result-card {
      text-align: center;
    }

    .result-title {
      margin: 6px 0 8px;
      font-size: clamp(2.2rem, 10vw, 5.4rem);
      line-height: 0.9;
      letter-spacing: -0.08em;
    }

    .score-big {
      margin: 18px auto;
      width: min(230px, 70vw);
      aspect-ratio: 1;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff;
      font-size: clamp(3rem, 13vw, 6rem);
      font-weight: 1000;
      box-shadow: 0 28px 60px rgba(124, 58, 237, 0.3);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 20px 0;
    }

    .ghost-btn {
      padding: 14px 18px;
      background: rgba(255, 255, 255, 0.75);
      color: #334155;
      border: 1px solid var(--line);
    }

    .actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      padding-bottom: var(--safe-bottom);
    }

    .loading {
      text-align: center;
      color: var(--muted);
      font-weight: 800;
      margin-top: 12px;
    }

    @media (max-width: 840px) {
      .hero {
        grid-template-columns: 1fr;
        align-content: start;
      }

      .hero-copy {
        text-align: center;
      }

      .subtitle {
        margin-left: auto;
        margin-right: auto;
      }

      .vibe-row {
        justify-content: center;
      }
    }

    @media (max-width: 640px) {
      .app {
        padding: 14px;
        place-items: start center;
      }

      .hero {
        min-height: auto;
      }

      .hero-copy,
      .setup-card,
      .game-card,
      .result-card {
        border-radius: 22px;
      }

      .level-grid {
        grid-template-columns: repeat(4, 1fr);
      }

      .topbar,
      .summary-grid {
        grid-template-columns: 1fr 1fr 1fr;
        gap: 8px;
      }

      .stat {
        padding: 10px 8px;
      }

      .stat-label {
        font-size: 0.66rem;
      }

      .answers {
        grid-template-columns: 1fr;
      }

      .answer-btn {
        min-height: 58px;
        text-align: center;
      }
    }

    @media (max-width: 380px) {
      .level-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .topbar,
      .summary-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="menu" class="screen active">
      <div class="instant-start">
        <div class="setup-card launch-card">
          <div class="mascot" aria-hidden="true"><span>👽</span></div>
          <h1><span class="gradient-text">Cosmic Vocab</span><br />Challenge</h1>
          <div id="levelGrid" class="level-grid" role="group" aria-label="Select vocabulary level"></div>
          <button id="startBtn" class="main-btn">Start Game 🚀</button>
          <div id="loading" class="loading">Vocabulary ready.</div>
        </div>
      </div>
    </section>

    <section id="game" class="screen">
      <div class="game-card">
        <div class="topbar">
          <div class="stat"><span class="stat-label">Score</span><span id="score" class="stat-value">0</span></div>
          <div class="stat"><span class="stat-label">Combo</span><span id="combo" class="stat-value">×0</span></div>
          <div class="stat"><span class="stat-label">Seen</span><span id="seen" class="stat-value">0</span></div>
        </div>

        <div id="timerRing" class="timer-ring" style="--progress: 1">
          <div class="timer-core"><span id="timer" class="timer-number">8</span></div>
        </div>

        <div class="question-card">
          <p class="prompt">Choose the correct meaning</p>
          <h2 id="word" class="word">vocabulary</h2>
          <div id="part" class="part">noun</div>
          <div id="answers" class="answers"></div>
        </div>
      </div>
    </section>

    <section id="result" class="screen">
      <div class="result-card">
        <span class="eyebrow">Mission Complete</span>
        <h2 class="result-title"><span class="gradient-text">Game Over</span></h2>
        <div id="finalScore" class="score-big">0</div>
        <div class="summary-grid">
          <div class="stat"><span class="stat-label">Best Combo</span><span id="bestCombo" class="stat-value">0</span></div>
          <div class="stat"><span class="stat-label">Correct</span><span id="correctCount" class="stat-value">0</span></div>
          <div class="stat"><span class="stat-label">Words Seen</span><span id="wordsSeen" class="stat-value">0</span></div>
          <div class="stat"><span class="stat-label">Time Used</span><span id="timeUsed" class="stat-value">0s</span></div>
        </div>
        <div class="actions">
          <button id="retryBtn" class="main-btn" style="width:auto; min-width: 190px;">↺ Retry</button>
          <button id="menuBtn" class="ghost-btn">← Menu</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const ROUND_SECONDS = 8;

    const fallbackWords = [
      { level: "L1", word: "brave", part: "adj.", meaning: "勇敢的" },
      { level: "L1", word: "quiet", part: "adj.", meaning: "安靜的" },
      { level: "L1", word: "borrow", part: "v.", meaning: "借入" },
      { level: "L2", word: "journey", part: "n.", meaning: "旅程" },
      { level: "L2", word: "protect", part: "v.", meaning: "保護" },
      { level: "L2", word: "valuable", part: "adj.", meaning: "有價值的" },
      { level: "L3", word: "ancient", part: "adj.", meaning: "古代的" },
      { level: "L3", word: "discover", part: "v.", meaning: "發現" },
      { level: "L3", word: "energy", part: "n.", meaning: "能量" },
      { level: "L4", word: "confident", part: "adj.", meaning: "有自信的" },
      { level: "L4", word: "solution", part: "n.", meaning: "解決方法" },
      { level: "L4", word: "reduce", part: "v.", meaning: "減少" },
      { level: "L5", word: "evidence", part: "n.", meaning: "證據" },
      { level: "L5", word: "significant", part: "adj.", meaning: "重要的；顯著的" },
      { level: "L5", word: "persuade", part: "v.", meaning: "說服" },
      { level: "L6", word: "phenomenon", part: "n.", meaning: "現象" },
      { level: "L6", word: "approximate", part: "adj.", meaning: "大約的" },
      { level: "L6", word: "sustainable", part: "adj.", meaning: "永續的" }
    ];

    let vocabulary = [...fallbackWords];
    let selectedLevel = "All";
    let currentQuestion = null;
    let wordQueue = [];
    let activeQueueKey = "";
    let score = 0;
    let gameStartedAt = 0;
    let timeUsed = 0;
    let combo = 0;
    let bestCombo = 0;
    let correct = 0;
    let seen = 0;
    let timerId = null;
    let deadline = 0;
    let acceptingAnswers = false;

    const $ = (id) => document.getElementById(id);
    const screens = { menu: $("menu"), game: $("game"), result: $("result") };

    const levels = ["L1", "L2", "L3", "L4", "L5", "L6", "All"];
    const levelGrid = $("levelGrid");

    levels.forEach(level => {
      const btn = document.createElement("button");
      btn.className = "level-btn" + (level === selectedLevel ? " active" : "");
      btn.textContent = level === "All" ? "All" : level;
      btn.type = "button";
      btn.addEventListener("click", () => {
        selectedLevel = level;
        [...levelGrid.children].forEach(child => child.classList.remove("active"));
        btn.classList.add("active");
      });
      levelGrid.appendChild(btn);
    });

    function showScreen(name) {
      Object.values(screens).forEach(screen => screen.classList.remove("active"));
      screens[name].classList.add("active");
    }

    function getPool() {
      const pool = selectedLevel === "All"
        ? vocabulary
        : vocabulary.filter(item => item.level === selectedLevel);
      return pool.length >= 4 ? pool : vocabulary;
    }

    function getQueueKey(pool) {
      return `${selectedLevel}:${pool.length}:${vocabulary.length}`;
    }

    function refillWordQueue(pool) {
      wordQueue = shuffle(pool);
      activeQueueKey = getQueueKey(pool);
    }

    function getNextWord(pool) {
      const queueKey = getQueueKey(pool);
      if (!wordQueue.length || activeQueueKey !== queueKey) {
        refillWordQueue(pool);
      }
      return wordQueue.pop();
    }

    function shuffle(array) {
      return [...array].sort(() => Math.random() - 0.5);
    }

    function makeQuestion() {
      const pool = getPool();
      const answer = getNextWord(pool);
      const distractors = shuffle(vocabulary.filter(item => item.meaning !== answer.meaning)).slice(0, 3);
      return {
        ...answer,
        options: shuffle([answer, ...distractors].map(item => item.meaning))
      };
    }

    function startGame() {
      wordQueue = [];
      activeQueueKey = "";
      gameStartedAt = performance.now();
      timeUsed = 0;
      score = 0;
      combo = 0;
      bestCombo = 0;
      correct = 0;
      seen = 0;
      updateStats();
      showScreen("game");
      nextQuestion();
    }

    function nextQuestion() {
      clearInterval(timerId);
      acceptingAnswers = true;
      currentQuestion = makeQuestion();
      seen += 1;

      $("word").textContent = currentQuestion.word;
      $("part").textContent = `${currentQuestion.part} · ${currentQuestion.level}`;
      $("answers").innerHTML = "";

      currentQuestion.options.forEach(option => {
        const btn = document.createElement("button");
        btn.className = "answer-btn";
        btn.type = "button";
        btn.textContent = option;
        btn.addEventListener("click", () => chooseAnswer(btn, option));
        $("answers").appendChild(btn);
      });

      updateStats();
      startTimer();
    }

    function startTimer() {
      deadline = performance.now() + ROUND_SECONDS * 1000;
      tickTimer();
      timerId = setInterval(tickTimer, 80);
    }

    function tickTimer() {
      const remainingMs = Math.max(0, deadline - performance.now());
      const remaining = Math.ceil(remainingMs / 1000);
      const progress = remainingMs / (ROUND_SECONDS * 1000);

      $("timer").textContent = remaining;
      $("timerRing").style.setProperty("--progress", progress);

      if (remainingMs <= 0) {
        clearInterval(timerId);
        endGame();
      }
    }

    function chooseAnswer(button, option) {
      if (!acceptingAnswers) return;
      acceptingAnswers = false;
      clearInterval(timerId);

      const isCorrect = option === currentQuestion.meaning;
      const allButtons = [...$("answers").children];

      allButtons.forEach(btn => {
        if (btn.textContent === currentQuestion.meaning) btn.classList.add("correct");
        else if (btn === button) btn.classList.add("wrong");
        btn.disabled = true;
      });

      if (!isCorrect) {
        setTimeout(endGame, 520);
        return;
      }

      combo += 1;
      correct += 1;
      bestCombo = Math.max(bestCombo, combo);
      score += 100 + combo * 25;
      updateStats();
      setTimeout(nextQuestion, 560);
    }

    function updateStats() {
      $("score").textContent = score;
      $("combo").textContent = `×${combo}`;
      $("seen").textContent = seen;
    }

    function endGame() {
      clearInterval(timerId);
      acceptingAnswers = false;
      $("finalScore").textContent = score;
      $("bestCombo").textContent = bestCombo;
      $("correctCount").textContent = correct;
      timeUsed = Math.max(0, Math.ceil((performance.now() - gameStartedAt) / 1000));
      $("wordsSeen").textContent = seen;
      $("timeUsed").textContent = `${timeUsed}s`;
      showScreen("result");
    }

    // Optional external vocabulary support:
    // If your old page already loads vocab.json, this keeps working. If not, fallbackWords are used.
    async function loadVocabulary() {
      try {
        const response = await fetch("vocab.json", { cache: "no-store" });
        if (!response.ok) throw new Error("No external vocabulary file");
        const data = await response.json();
        const normalized = data
          .map(item => ({
            level: item.level || item.Level || "L1",
            word: item.word || item.Word || item.vocab || item.Vocab,
            part: item.part || item.pos || item.Part || "",
            meaning: item.meaning || item.chinese || item.definition || item.Meaning
          }))
          .filter(item => item.word && item.meaning);

        if (normalized.length >= 4) {
          vocabulary = normalized;
          $("loading").textContent = `${normalized.length} vocabulary items loaded.`;
        }
      } catch (error) {
        $("loading").textContent = "Using built-in sample vocabulary. Replace or add vocab.json for your full word bank.";
      }
    }

    $("startBtn").addEventListener("click", startGame);
    $("retryBtn").addEventListener("click", startGame);
    $("menuBtn").addEventListener("click", () => showScreen("menu"));

    loadVocabulary();
  </script>
</body>
</html>
